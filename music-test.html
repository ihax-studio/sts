<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>楽曲検索 疎通テスト (iPhone切り分け用)</title>
<style>
  /* ★意図的に shadow DOM も backdrop-filter も使わない最小構成＝
     これが iPhone で速ければ「遅い/閉じて開くまで出ない」の原因は本体の描画(shadow/--rh)側だと確定できる。 */
  body{ margin:0; font:16px/1.5 -apple-system,system-ui,sans-serif; background:#111; color:#eee; padding:14px; }
  h1{ font-size:16px; opacity:.7; font-weight:600; }
  .row{ display:flex; gap:8px; margin:10px 0; }
  input{ flex:1; font-size:17px; padding:11px 13px; border-radius:12px; border:1px solid #444; background:#1c1c1e; color:#fff; }
  button{ font-size:16px; padding:11px 16px; border-radius:12px; border:0; background:#0a84ff; color:#fff; }
  .log{ white-space:pre-wrap; font:13px/1.5 ui-monospace,Menlo,monospace; background:#000; border:1px solid #333; border-radius:10px; padding:10px; margin:10px 0; }
  .res{ display:flex; align-items:center; gap:10px; padding:7px 0; border-bottom:1px solid #2a2a2a; }
  .res img{ width:44px; height:44px; border-radius:8px; object-fit:cover; background:#222; }
  .res b{ font-size:14px; } .res span{ font-size:12px; opacity:.6; }
</style>
</head>
<body>
<h1>楽曲検索 疎通テスト</h1>
<div class="row">
  <input id="q" type="text" placeholder="曲名・アーティスト" value="yoasobi" autocomplete="off">
  <button id="go">検索</button>
</div>
<div class="log" id="log">ここに各経路の所要時間が出ます。\n・proxy = /itunes-api/search（本体が最優先で叩く同一オリジン経路）\n・direct = itunes.apple.com（CORSフォールバック）</div>
<div id="out"></div>
<script>
  var logEl=document.getElementById('log'), out=document.getElementById('out');
  function log(m){ logEl.textContent += "\n"+m; }
  function now(){ return (performance&&performance.now)?performance.now():Date.now(); }
  function pull(url){ var t0=now(); return fetch(url,{cache:'no-store'}).then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); }).then(function(j){ return { ms:Math.round(now()-t0), n:((j&&j.results)||[]).length, results:((j&&j.results)||[]) }; }); }
  function render(list){ out.innerHTML=''; list.slice(0,12).forEach(function(t){ var d=document.createElement('div'); d.className='res';
    var art=(t.artworkUrl100||'').replace('100x100','120x120');
    d.innerHTML='<img src="'+art+'" alt=""><div><b></b><br><span></span></div>';
    d.querySelector('b').textContent=t.trackName||''; d.querySelector('span').textContent=t.artistName||'';
    out.appendChild(d); }); }
  function search(){ var q=(document.getElementById('q').value||'').trim(); if(!q) return;
    logEl.textContent='検索中: '+q; out.innerHTML='';
    var qs="country=JP&media=music&entity=song&limit=25&term="+encodeURIComponent(q);
    // 1) 本体と同じ最優先経路（同一オリジンproxy）
    pull("/itunes-api/search?"+qs).then(function(a){ log("proxy  : "+a.ms+"ms / "+a.n+"件"); render(a.results); },
      function(e){ log("proxy  : 失敗 ("+e.message+")"); });
    // 2) 直叩き（CORS）も並行計測＝どちらが速い/通るか可視化
    pull("https://itunes.apple.com/search?"+qs).then(function(b){ log("direct : "+b.ms+"ms / "+b.n+"件"); if(!out.children.length) render(b.results); },
      function(e){ log("direct : 失敗 ("+e.message+")"); });
  }
  document.getElementById('go').onclick=search;
  document.getElementById('q').addEventListener('keydown',function(e){ if(e.key==='Enter') search(); });
</script>
</body>
</html>
