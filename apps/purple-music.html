<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#f4f5f9" />
<meta name="apple-mobile-web-app-title" content="Purple Music" />
<title>Purple Music</title>
<style>
  :root{
    --bg-1:#ffffff; --bg-2:#f3f4f8;
    --tx:#1c1c1e; --tx-dim:#6e6e73; --tx-mute:#a1a1aa;
    --hairline:rgba(0,0,0,.08);
    --card:rgba(255,255,255,.72); --card-solid:#ffffff; --glass:rgba(255,255,255,.6);
    --accent:#7c5cff; --accent-rgb:124,92,255;
    --ease:cubic-bezier(.22,.61,.36,1); --ease-out:cubic-bezier(.16,1,.3,1); --ease-spring:cubic-bezier(.34,1.56,.64,1);
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg-1:#000; --bg-2:#0c0c0f; --tx:#f5f5f7; --tx-dim:#9d9da6; --tx-mute:#68686f;
      --hairline:rgba(255,255,255,.12); --card:rgba(28,28,32,.66); --card-solid:#161619; --glass:rgba(28,28,32,.6); }
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; -webkit-touch-callout:none;}
  input{ -webkit-user-select:text; user-select:text; }
  html,body{height:100%}
  body{background:var(--bg-2); color:var(--tx); overflow-x:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Hiragino Sans","Hiragino Kaku Gothic ProN","Helvetica Neue",sans-serif;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;}

  #bloom{position:fixed; inset:-25vmax; z-index:0; pointer-events:none; opacity:.6;
    background:radial-gradient(46vmax 46vmax at 12% -6%, rgba(var(--accent-rgb),.22), transparent 60%),
               radial-gradient(54vmax 54vmax at 92% 110%, rgba(var(--accent-rgb),.16), transparent 62%);
    filter:blur(30px) saturate(140%); transition:background 1.1s var(--ease-out);}
  @media (prefers-color-scheme: dark){ #bloom{opacity:.5} }

  .squircle{ border-radius:27%; overflow:hidden; }

  .app{position:relative; z-index:1; max-width:680px; margin:0 auto; min-height:100%; padding:0 18px calc(186px + env(safe-area-inset-bottom));}

  .topbar{padding:max(26px,env(safe-area-inset-top)) 4px 6px;}
  .lt{display:flex; align-items:baseline; gap:10px;}
  .lt h1{font-size:32px; font-weight:760; letter-spacing:-.025em; line-height:1.1;}
  .lt .dot{width:9px; height:9px; border-radius:50%; background:var(--accent); transform:translateY(-3px); box-shadow:0 0 14px rgba(var(--accent-rgb),.7); transition:background .9s var(--ease-out), box-shadow .9s var(--ease-out);}
  .sub{font-size:13.5px; color:var(--tx-dim); margin-top:3px; padding-left:4px;}
  .seg{display:inline-flex; gap:3px; margin:16px 4px 6px; padding:3px; border-radius:13px; background:var(--glass); border:.5px solid var(--hairline); backdrop-filter:blur(20px) saturate(160%); -webkit-backdrop-filter:blur(20px) saturate(160%);}
  .seg button{appearance:none; border:0; background:transparent; color:var(--tx-dim); font:inherit; font-size:13.5px; font-weight:560; padding:7px 16px; border-radius:10px; cursor:pointer; transition:color .2s, background .25s var(--ease);}
  .seg button[aria-pressed="true"]{color:var(--tx); background:var(--card-solid); box-shadow:0 1px 4px rgba(0,0,0,.1);}

  .list{display:flex; flex-direction:column; gap:3px; margin-top:8px;}
  .list.enter{animation:popUp .5s var(--ease-out) both; transform-origin:top center;}
  @keyframes popUp{from{opacity:0; transform:scale(.7) translateY(14px)} to{opacity:1; transform:none}}
  .row{display:flex; align-items:center; gap:14px; padding:9px 10px; border-radius:18px; cursor:pointer; position:relative;
    transition:background .22s var(--ease), transform .12s var(--ease); animation:rowIn .45s var(--ease-out) both;}
  @keyframes rowIn{from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:none}}
  .row:hover{background:var(--glass)} .row:active{transform:scale(.985); background:rgba(var(--accent-rgb),.08)}
  .row.playing{background:rgba(var(--accent-rgb),.10)}
  .thumb{width:56px; height:56px; flex:0 0 auto; position:relative; border-radius:15px; overflow:hidden; background:linear-gradient(135deg,#dfe1ea,#eef0f6); box-shadow:inset 0 0 0 .5px var(--hairline); filter:drop-shadow(0 3px 8px rgba(0,0,0,.13));}
  @media (prefers-color-scheme: dark){ .thumb{background:linear-gradient(135deg,#26262c,#161619)} }
  .thumb img{width:100%; height:100%; object-fit:cover; display:block;}
  .thumb .eq{position:absolute; inset:0; display:none; align-items:flex-end; justify-content:center; gap:3px; padding:13px; background:rgba(0,0,0,.32);}
  .row.playing .thumb .eq{display:flex}
  .thumb .eq i{width:3px; background:#fff; border-radius:2px; height:30%; animation:eq .9s ease-in-out infinite;}
  .thumb .eq i:nth-child(2){animation-delay:.25s} .thumb .eq i:nth-child(3){animation-delay:.5s}
  @keyframes eq{0%,100%{height:24%}50%{height:78%}}

  /* iTunes-style jacket for artwork-less (local) tracks — static, no animation */
  .jph{position:absolute; inset:0; z-index:0;}
  .jph[hidden]{display:none;}
  .jph .jk-art{width:100%; height:100%; object-fit:cover; display:block;}
  .row .meta{min-width:0; flex:1}
  .row .t{font-size:15.5px; font-weight:560; letter-spacing:-.01em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .row.playing .t{color:var(--accent)}
  .row .a{font-size:13px; color:var(--tx-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px;}
  .row .go{flex:0 0 auto; width:30px; height:30px; border-radius:50%; display:grid; place-items:center; color:var(--tx-mute); opacity:0; transition:opacity .2s;}
  .row:hover .go{opacity:1} .row .go svg{width:16px; height:16px}
  /* SF Proハート: 全検索結果に表示・1曲だけon(=お気に入り→プロフィールに共有) */
  .row .rhb{flex:0 0 auto; width:34px; height:34px; border:none; border-radius:50%; background:none; color:rgba(255,255,255,.38); font-size:21px; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display",sans-serif; cursor:pointer; line-height:1; padding:0; -webkit-tap-highlight-color:transparent; transition:transform .3s cubic-bezier(.16,1,.3,1), color .2s;}
  .row .rhb.on{color:#ff375f; transform:scale(1.14);}
  .row .rhb:active{transform:scale(.82);}
  /* チャットへ送るボタン(?to=chat時のみ) */
  .row .rsend{flex:0 0 auto; border:none; border-radius:15px; padding:7px 12px; background:linear-gradient(135deg,#af52de,#5856d6); color:#fff; font-size:13px; font-weight:600; cursor:pointer; -webkit-tap-highlight-color:transparent;}
  .row .rsend:active{transform:scale(.92);}

  .sk{pointer-events:none}
  .sk .thumb{background:linear-gradient(135deg,#f6c6e0,#cbd6ff 55%,#ffe3c2); position:relative; overflow:hidden; filter:none;}
  .sk .l{height:12px; border-radius:6px; background:rgba(120,120,128,.14); position:relative; overflow:hidden;}
  .sk .l.s{width:42%; margin-top:8px; height:10px}
  .sk .thumb::after,.sk .l::after{content:""; position:absolute; inset:0; transform:translateX(-100%); background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent); animation:sh 1.4s infinite;}
  @keyframes sh{to{transform:translateX(100%)}}

  .state{text-align:center; padding:60px 24px 40px; color:var(--tx-dim);}
  .state .ic{width:72px; height:72px; margin:0 auto 18px; display:grid; place-items:center; color:var(--accent); background:var(--card); border:.5px solid var(--hairline); border-radius:22px; backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); box-shadow:0 10px 30px rgba(0,0,0,.1); transition:color .9s var(--ease-out);}
  .state .ic svg{width:34px; height:34px}
  .state h3{color:var(--tx); font-size:19px; font-weight:640; letter-spacing:-.01em; margin-bottom:6px;}
  .state p{max-width:330px; margin:0 auto; font-size:14px; line-height:1.55;}
  .state .retry{margin-top:18px; appearance:none; border:.5px solid var(--hairline); background:var(--card-solid); color:var(--tx); font:inherit; font-weight:560; font-size:14px; padding:10px 22px; border-radius:13px; cursor:pointer;}

  /* floating buttons */
  .fab{position:fixed; bottom:max(env(safe-area-inset-bottom),22px); z-index:120; cursor:pointer; padding:0; border:0; display:inline-flex; align-items:center; justify-content:center;
    transition:transform .14s var(--ease-spring); background:var(--card); backdrop-filter:blur(34px) saturate(180%); -webkit-backdrop-filter:blur(34px) saturate(180%);
    box-shadow:0 16px 38px rgba(0,0,0,.18), 0 4px 12px rgba(0,0,0,.1), inset 0 1px 0 rgba(255,255,255,.6);}
  @media (prefers-color-scheme: dark){ .fab{box-shadow:0 16px 38px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.08)} }
  .fab:active{transform:scale(.9)} .fab svg{display:block}
  .search-fab{right:22px; width:62px; height:62px; border-radius:31px; color:var(--tx);} .search-fab svg{width:27px; height:27px}
  .fav-fab{left:22px; width:54px; height:54px; border-radius:27px; color:var(--accent);} .fav-fab svg{width:24px; height:24px}
  .fav-fab[aria-pressed="true"]{color:var(--accent)} .fav-fab[aria-pressed="true"] svg{stroke:var(--accent)}

  /* search overlay */
  #ovl{position:fixed; inset:0; z-index:140; display:flex; flex-direction:column; background:var(--bg-2); opacity:0; visibility:hidden; transform:scale(.7); transform-origin:bottom right;
    transition:transform .5s var(--ease-out), opacity .42s var(--ease-out), visibility .5s;}
  #ovl.show{opacity:1; visibility:visible; transform:scale(1);}
  .ovl-bar{display:flex; align-items:center; gap:11px; padding:max(16px,env(safe-area-inset-top)) 16px 12px; background:var(--glass); backdrop-filter:blur(26px) saturate(170%); -webkit-backdrop-filter:blur(26px) saturate(170%); border-bottom:.5px solid var(--hairline);}
  .ovl-back{flex:0 0 auto; width:38px; height:38px; border:0; border-radius:50%; cursor:pointer; display:grid; place-items:center; background:var(--card); color:var(--tx-dim); transition:transform .14s var(--ease-spring);}
  .ovl-back:active{transform:scale(.9)} .ovl-back svg{width:19px; height:19px}
  .ovl-field{flex:1; display:flex; align-items:center; gap:9px; height:46px; padding:0 16px; border-radius:23px; background:var(--card-solid); border:.5px solid var(--hairline); box-shadow:inset 0 1px 3px rgba(0,0,0,.04);}
  .ovl-field svg{width:18px; height:18px; color:var(--tx-mute); flex:0 0 auto}
  .ovl-field input{flex:1; min-width:0; border:0; outline:0; background:transparent; color:var(--tx); font:inherit; font-size:16.5px; letter-spacing:-.01em;}
  .ovl-field input::placeholder{color:var(--tx-mute)}
  .ovl-field .x{appearance:none; border:0; width:24px; height:24px; border-radius:50%; cursor:pointer; display:none; place-items:center; background:rgba(120,120,128,.18); color:var(--tx-dim); font-size:13px; flex:0 0 auto;}
  .ovl-field.has .x{display:grid}
  .ovl-scroll{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:8px 16px 40px;}
  .seeds{display:flex; flex-wrap:wrap; gap:8px; padding:14px 2px;}
  .seeds .lbl{width:100%; font-size:12px; color:var(--tx-mute); margin-bottom:2px;}
  .seed{appearance:none; border:.5px solid var(--hairline); background:var(--card); color:var(--tx-dim); font:inherit; font-size:13.5px; padding:8px 14px; border-radius:999px; cursor:pointer; transition:transform .14s var(--ease-spring), color .2s, border-color .2s;}
  .seed:active{transform:scale(.94)} .seed:hover{color:var(--tx); border-color:rgba(var(--accent-rgb),.5)}

  /* ── frameless mini now-playing (lower-center, no box) ── */
  #np{position:fixed; left:0; right:0; bottom:calc(max(env(safe-area-inset-bottom),22px) + 92px); z-index:118;
    display:flex; justify-content:center; pointer-events:none; opacity:0; transform:translateY(16px) scale(.94); transition:transform .5s var(--ease-spring), opacity .35s var(--ease-out);}
  #np.show{opacity:1; transform:none;}
  #np.pop{animation:npPop .34s var(--ease-spring);}
  @keyframes npPop{0%{transform:scale(.85)}60%{transform:scale(1.03)}100%{transform:scale(1)}}
  .np-inner{pointer-events:auto; display:flex; align-items:center; gap:12px; max-width:90vw; padding:6px 8px; cursor:pointer; border-radius:40px;
    transition:background .2s;}
  .np-inner:active{transform:scale(.98)}
  .ring-wrap{position:relative; width:54px; height:54px; flex:0 0 auto;}
  .np-ring{position:absolute; inset:0; width:100%; height:100%;}
  .np-ring .bg{fill:none; stroke:rgba(120,120,128,.28); stroke-width:3;}
  .np-ring .fg{fill:none; stroke:url(#ringGrad); stroke-width:3.4; stroke-linecap:round; transform:rotate(-90deg); transform-origin:center; transition:stroke-dashoffset .2s linear; filter:drop-shadow(0 0 3px rgba(var(--accent-rgb),.4));}
  .np-thumb{position:absolute; top:6px; left:6px; width:42px; height:42px; border-radius:12px; overflow:hidden; box-shadow:inset 0 0 0 .5px var(--hairline); background:linear-gradient(135deg,#dfe1ea,#eef0f6);}
  .np-thumb img{width:100%; height:100%; object-fit:cover; display:block;}
  .np-meta{min-width:0; max-width:54vw;}
  .np-title{font-size:16px; font-weight:540; letter-spacing:-.01em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-shadow:0 1px 10px var(--bg-2);}
  .np-artist{font-size:12.5px; color:var(--tx-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px;}
  .np-play{flex:0 0 auto; width:42px; height:42px; border:0; border-radius:50%; cursor:pointer; display:grid; place-items:center; background:transparent; color:var(--tx); transition:transform .3s var(--ease-spring);}
  .np-play:active{transform:scale(.86)} .np-play.bump{animation:bump .3s var(--ease-spring)}
  @keyframes bump{0%{transform:scale(.7)}100%{transform:scale(1)}}
  .np-play svg{width:26px; height:26px} .np-play.is-play svg{margin-left:2px}

  /* ── full-screen player ── */
  #player{position:fixed; inset:0; z-index:200; transform:translateY(100%); transition:transform .55s var(--ease-out); overflow:hidden; color:#fff;}
  #player.show{transform:none}
  .pl-bg{position:absolute; inset:-12% ; background-size:cover; background-position:center; filter:blur(46px) saturate(1.5) brightness(.55); transform:scale(1.2); transition:background-image .6s ease; z-index:0;}
  .pl-bg.none{background:linear-gradient(160deg, rgba(var(--accent-rgb),.9), #15151c);}
  .pl-scrim{position:absolute; inset:0; z-index:1; background:linear-gradient(180deg, rgba(0,0,0,.18), rgba(0,0,0,.5) 58%, rgba(0,0,0,.8));}
  /* subtle white at top — no bar; swipe-down or tap to close */
  .pl-top{position:absolute; left:0; right:0; top:0; height:30%; z-index:2; pointer-events:none;
    background:linear-gradient(180deg, rgba(255,255,255,.22), rgba(255,255,255,.05) 40%, transparent 74%);}
  @media (prefers-color-scheme: dark){ .pl-top{background:linear-gradient(180deg, rgba(255,255,255,.15), rgba(255,255,255,.03) 42%, transparent 74%);} }
  .pl-scroll{position:relative; z-index:4; height:100%; overflow-y:auto; -webkit-overflow-scrolling:touch; display:flex; flex-direction:column; align-items:center;
    padding:max(56px,calc(env(safe-area-inset-top) + 38px)) 24px calc(28px + env(safe-area-inset-bottom)); }

  /* swipeable album carousel: prev · current · recommended-next */
  .pl-cards{position:relative; width:100%; max-width:430px; height:min(72vw,320px); margin:min(2.5vh,14px) 0 22px; flex:0 0 auto; touch-action:none;
    transition:transform .34s var(--ease-out);}
  #player.scrubbing .pl-cards{transform:scale(.9);}
  .pl-card{position:absolute; top:50%; left:50%; aspect-ratio:1/1; height:100%; border-radius:24px; overflow:hidden; background:rgba(255,255,255,.1);
    will-change:transform,opacity; box-shadow:0 26px 60px rgba(0,0,0,.5);}
  .pl-card img{width:100%; height:100%; object-fit:cover; display:block; pointer-events:none;}
  /* current: pause = 0.3s scale-down to 0.8 (no play icon) */
  .pl-card.cur{transform:translate(-50%,-50%) scale(1); opacity:1; z-index:3; cursor:pointer; transition:transform .3s var(--ease-out), opacity .3s var(--ease-out);}
  #player.paused .pl-card.cur{transform:translate(-50%,-50%) scale(.8);}
  /* side covers: raised slightly to sit with the bar; 0.5s iOS-style movement */
  .pl-card.prev,.pl-card.next{opacity:.5; z-index:2; filter:brightness(.68); cursor:pointer;
    transition:transform .5s var(--ease-spring), opacity .3s var(--ease-out), filter .5s var(--ease-out);}
  .pl-card.prev{transform:translate(-118%,-56%) scale(.76);}
  .pl-card.next{transform:translate(18%,-56%) scale(.76);}
  /* paused → other jackets hidden over 0.3s */
  #player.paused .pl-card.prev,#player.paused .pl-card.next{opacity:0; pointer-events:none;}
  .pl-card.hidden{opacity:0!important; pointer-events:none;}

  .pl-meta{width:100%; max-width:430px; text-align:center; margin-bottom:18px;}
  .pl-t{font-size:24px; font-weight:680; letter-spacing:-.02em; line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .pl-byline{position:relative; display:flex; align-items:center; justify-content:center; gap:9px; margin-top:7px; min-height:24px;}
  .pl-byline-main{display:flex; align-items:center; justify-content:center; gap:9px; min-width:0; transition:opacity .3s var(--ease-out);}
  .pl-byline.flash .pl-byline-main{opacity:0;}
  .pl-mode{appearance:none; border:0; background:transparent; padding:3px; cursor:pointer; display:grid; place-items:center; line-height:0; flex:0 0 auto;
    opacity:.5; transition:transform .3s var(--ease-spring), opacity .25s;}
  .pl-mode img{width:21px; height:21px; object-fit:contain; display:block; filter:drop-shadow(0 1px 3px rgba(0,0,0,.45));}
  .pl-mode.on{opacity:1}
  .pl-mode.bump{animation:modeBump .3s var(--ease-spring)}
  @keyframes modeBump{0%{transform:scale(1)}45%{transform:scale(1.34)}100%{transform:scale(1)}}
  .pl-a{font-size:16px; color:rgba(255,255,255,.74); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:pointer; max-width:60vw;}
  /* duration flash on track change: fade in .3s, hold 1.2s, scale-up out .3s */
  .pl-flash{position:absolute; inset:0; display:grid; place-items:center; opacity:0; pointer-events:none; transform:scale(1);
    font-size:21px; font-weight:300; letter-spacing:-.01em; color:#fff; font-variant-numeric:tabular-nums; text-shadow:0 1px 10px rgba(0,0,0,.4);
    transition:opacity .3s var(--ease-out), transform .3s var(--ease-out);}
  .pl-byline.flash .pl-flash{opacity:1;}
  .pl-byline.flash-out .pl-flash{opacity:0; transform:scale(1.3);}

  /* scrub row: prev-button · slider · next-button */
  .pl-scrubrow{display:flex; align-items:center; gap:13px; width:100%; max-width:430px;}
  .pl-scrub{flex:1; min-width:0;}
  .pl-side{appearance:none; border:0; background:transparent; padding:6px; margin:0; cursor:pointer; flex:0 0 auto; display:grid; place-items:center; line-height:0;
    transition:transform .14s var(--ease-spring); touch-action:none; -webkit-user-select:none; user-select:none;}
  .pl-side:active{transform:scale(.84)}
  .pl-side.seeking{transform:scale(1.14)}
  .pl-side img{width:29px; height:29px; object-fit:contain; display:block; filter:drop-shadow(0 1px 4px rgba(0,0,0,.5)); pointer-events:none;}

  .track{position:relative; height:5px; border-radius:3px; background:rgba(255,255,255,.26); cursor:pointer; touch-action:none;}
  .track::before{content:""; position:absolute; inset:-14px 0; }   /* taller hit area */
  .track .fill{position:absolute; left:0; top:0; height:100%; width:0%; background:#fff; border-radius:3px;}
  .track .knob{position:absolute; top:50%; left:0; width:13px; height:13px; border-radius:50%; background:#fff; transform:translate(-50%,-50%); box-shadow:0 1px 6px rgba(0,0,0,.5); transition:width .2s var(--ease-spring), height .2s var(--ease-spring);}
  .track.drag .knob{width:22px; height:22px;}
  /* slider sits a touch lower; no time shown by default */
  .pl-scrubrow{margin-top:12px;}

  /* 5-band EQ (scrubbing swaps it for the big time readout) */
  .pl-eqwrap{position:relative; width:100%; max-width:430px; height:132px; margin:26px 0 6px;}
  .pl-eq{position:absolute; inset:0; display:flex; align-items:flex-end; justify-content:center; gap:min(9vw,40px); height:100%; transition:opacity .3s var(--ease-out);}
  #player.scrubbing .pl-eq{opacity:0; pointer-events:none;}
  .pl-scrubtime{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; opacity:0; pointer-events:none; transition:opacity .3s var(--ease-out);}
  #player.scrubbing .pl-scrubtime{opacity:1;}
  .pl-scrubtime .cur{height:1.15em; overflow:hidden; color:#fff; font-size:54px; font-weight:300; letter-spacing:-.02em; font-variant-numeric:tabular-nums;}
  .pl-scrubtime .cur .odo{display:block; will-change:transform,opacity;}
  .pl-scrubtime .tot{font-size:18px; font-weight:300; color:rgba(255,255,255,.55); font-variant-numeric:tabular-nums;}
  .eqband{position:relative; width:30px; height:100%; display:flex; flex-direction:column; align-items:center; touch-action:none; cursor:pointer;}
  .eqtrack{position:relative; flex:1; width:4px; border-radius:3px; background:rgba(255,255,255,.2);}
  .eqfill{position:absolute; left:0; right:0; bottom:0; height:50%; border-radius:3px; background:linear-gradient(180deg, #fff, rgba(255,255,255,.65));}
  /* live per-band output level (JS-smoothed ~0.3s) — grey, painted ON TOP of the white set-fill so it stays visible even when the slider is raised */
  .eqmeter{position:absolute; left:0; right:0; bottom:0; height:0%; border-radius:3px; pointer-events:none; z-index:1;
    background:linear-gradient(180deg, rgba(64,64,72,.8), rgba(64,64,72,.56));}
  .eqknob{position:absolute; left:50%; bottom:50%; width:16px; height:16px; border-radius:50%; background:#fff; transform:translate(-50%,50%); box-shadow:0 2px 7px rgba(0,0,0,.5); transition:width .18s var(--ease-spring), height .18s var(--ease-spring); z-index:2;}
  .eqband.drag .eqknob{width:20px; height:20px;}

  /* ── inline (no-settings) fade + spatial controls under the EQ — shown for local tracks ── */
  .pl-extra{width:100%; max-width:430px; margin:14px 0 2px; display:flex; flex-direction:column; gap:13px;}
  .pl-extra[hidden]{display:none;}
  .pe-row{display:flex; align-items:center; gap:14px;}
  .pe-l{flex:0 0 44px; font-size:12px; font-weight:560; color:rgba(255,255,255,.66); letter-spacing:.02em; text-shadow:0 1px 6px rgba(0,0,0,.4);}
  .pe-slider{flex:1;}
  /* one dual-handle fade slider: left edge→center = fade-in, center→right edge = fade-out */
  .fade2{position:relative; flex:1; height:38px; display:flex; align-items:center; touch-action:none; cursor:pointer;}
  .fade2-track{position:relative; flex:1; height:6px; border-radius:4px; background:linear-gradient(90deg,#3a9bff 0%,#7b5cff 50%,#ff2d78 100%);}
  .fade2-track::before{content:""; position:absolute; inset:-16px 0;}
  .fade2-mid{position:absolute; left:50%; top:50%; width:4px; height:4px; border-radius:50%; transform:translate(-50%,-50%); background:#fff; box-shadow:0 0 0 1.5px rgba(0,0,0,.18); z-index:1;}
  .fade2-knob{position:absolute; top:50%; left:0%; width:24px; height:24px; border-radius:50%; background:#fff; transform:translate(-50%,-50%); box-shadow:0 3px 9px rgba(0,0,0,.4), 0 1px 2px rgba(0,0,0,.3); z-index:2;}

  .pl-more{margin-top:20px; appearance:none; border:.5px solid rgba(255,255,255,.28); background:rgba(255,255,255,.1); color:#fff; font:inherit; font-size:13.5px; font-weight:560; padding:11px 20px; border-radius:14px; cursor:pointer; backdrop-filter:blur(10px); transition:transform .14s var(--ease-spring), background .2s;}
  .pl-more:active{transform:scale(.96)} .pl-more.open{background:rgba(255,255,255,.16)}
  .pl-embeds{width:100%; max-width:460px; margin-top:18px; display:flex; flex-direction:column; gap:14px;}
  .pl-embeds[hidden]{display:none;}
  .eb-l{display:flex; align-items:center; gap:8px; font-size:11.5px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:rgba(255,255,255,.65); margin:2px 2px 8px}
  .eb-l .d{width:16px; height:16px; display:grid; place-items:center} .eb-l .d svg{width:16px; height:16px}
  .frame{width:100%; border:0; border-radius:15px; overflow:hidden; background:rgba(255,255,255,.08); display:block}
  .fb{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px 16px; border-radius:15px; background:rgba(255,255,255,.08); border:.5px solid rgba(255,255,255,.18); font-size:13px; color:rgba(255,255,255,.75)}
  .fb a{display:inline-flex; align-items:center; gap:7px; padding:9px 15px; border-radius:12px; background:#fff; color:#111; text-decoration:none; font-weight:600; font-size:13px; white-space:nowrap}
  .fb a svg{width:15px; height:15px}
  .ld{padding:22px 16px; text-align:center; color:rgba(255,255,255,.6); font-size:13px}
  .ld .sp{width:20px; height:20px; margin:0 auto 10px; border-radius:50%; border:2px solid rgba(255,255,255,.25); border-top-color:#fff; animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  a{color:inherit}
  :focus-visible{outline:2px solid var(--accent); outline-offset:2px; border-radius:8px;}

  /* ── lower-left "+" = load local music ── */
  .fav-fab{color:var(--accent);} .fav-fab svg{width:26px; height:26px; filter:drop-shadow(0 1px 4px rgba(var(--accent-rgb),.35));}
  .fav-fab[aria-pressed="true"]{color:var(--accent);} .fav-fab[aria-pressed="true"] svg{stroke:var(--accent);}
  .fav-fab.loading svg{animation:heartPulse 1s var(--ease-out) infinite;}
  @keyframes heartPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.16)}}

  /* ── gear button inside player (appears with a track) ── */
  .pl-gear{position:absolute; top:max(12px,calc(env(safe-area-inset-top) + 4px)); right:12px; z-index:6;
    width:74px; height:74px; border:0; border-radius:50%; cursor:pointer; display:grid; place-items:center; background:transparent; padding:0;
    opacity:0; transform:scale(.7) rotate(-40deg); pointer-events:none; transition:transform .3s var(--ease-spring), opacity .25s var(--ease-out);}
  #player.show .pl-gear{opacity:1; transform:none; pointer-events:auto;}
  .pl-gear:active{transform:scale(.88)}
  .pl-gear img{width:58px; height:58px; object-fit:contain; display:block; filter:drop-shadow(0 2px 9px rgba(0,0,0,.5));}

  /* ── settings sheet — frameless glass, fade-in + gentle slide-up ── */
  #sheet{position:absolute; inset:0; z-index:10; display:flex; flex-direction:column; justify-content:flex-end;
    opacity:0; visibility:hidden; transition:opacity .34s var(--ease-out), visibility .34s;}
  #sheet.show{opacity:1; visibility:visible;}
  #sheet .scrim{position:absolute; inset:0; background:rgba(0,0,0,.34); backdrop-filter:blur(22px) saturate(150%); -webkit-backdrop-filter:blur(22px) saturate(150%);}
  .sheet-card{position:relative; z-index:1; max-height:90%; overflow-y:auto; -webkit-overflow-scrolling:touch;
    background:transparent; border:0; box-shadow:none; color:#fff;
    padding:10px 22px calc(26px + env(safe-area-inset-bottom));
    opacity:0; transform:translateY(34px) scale(.99); transition:transform .44s var(--ease-out), opacity .34s ease;}
  #sheet.show .sheet-card{opacity:1; transform:none;}
  .sheet-grip{width:38px; height:5px; border-radius:3px; background:rgba(255,255,255,.28); margin:6px auto 12px;}
  .sheet-h{display:flex; align-items:center; justify-content:space-between; margin:0 0 4px;}
  .sheet-h h3{font-size:19px; font-weight:680; letter-spacing:-.02em;}
  .sheet-x{appearance:none; border:0; width:30px; height:30px; border-radius:50%; cursor:pointer; display:grid; place-items:center;
    background:rgba(255,255,255,.14); color:#fff; font-size:14px;}
  .sheet-sub{font-size:12.5px; color:rgba(255,255,255,.5); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:14px;}
  .sec{padding:15px 0; border-top:.5px solid rgba(255,255,255,.1);}
  .sec:first-of-type{border-top:0;}
  .sec-l{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:11px;}
  .sec-l .nm{font-size:13.5px; font-weight:620; letter-spacing:.01em;}
  .sec-l .vv{font-size:12.5px; color:var(--accent-2,#d68bff); font-variant-numeric:tabular-nums;}

  /* horizontal sliders (fade, width) */
  .hslider{position:relative; height:30px; display:flex; align-items:center; touch-action:none; cursor:pointer;}
  .htrack{position:relative; flex:1; height:5px; border-radius:3px; background:rgba(255,255,255,.18);}
  .htrack::before{content:""; position:absolute; inset:-13px 0;}
  .hfill{position:absolute; left:0; top:0; height:100%; border-radius:3px; background:linear-gradient(90deg,var(--accent),var(--accent-2,#d68bff)); width:0%;}
  .hknob{position:absolute; top:50%; width:15px; height:15px; border-radius:50%; background:#fff; transform:translate(-50%,-50%); left:0%; box-shadow:0 1px 5px rgba(0,0,0,.5); z-index:2;}
  /* speed slider: round "bump" marker at 1.0x (0.7→2 ⇒ 23.08%) */
  .hslider[data-h="speed"] .htrack::after{content:""; position:absolute; left:23.08%; top:50%; width:9px; height:9px; border-radius:50%;
    transform:translate(-50%,-50%); background:#fff; box-shadow:0 0 0 2.5px rgba(124,92,255,.4), 0 1px 3px rgba(0,0,0,.4); z-index:1; pointer-events:none;}

  /* toggle switch (iOS) */
  .sw{appearance:none; border:0; cursor:pointer; width:50px; height:30px; border-radius:16px; background:rgba(255,255,255,.22); position:relative; flex:0 0 auto; transition:background .25s var(--ease);}
  .sw::after{content:""; position:absolute; top:2.5px; left:2.5px; width:25px; height:25px; border-radius:50%; background:#fff; box-shadow:0 1px 4px rgba(0,0,0,.3); transition:transform .25s var(--ease-spring);}
  .sw.on{background:#34c759;} .sw.on::after{transform:translateX(20px);}
  .sw.accent.on{background:var(--accent);}

  /* export format grid */
  .fmt-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:4px;}
  .fmt-btn{appearance:none; border:0; background:rgba(255,255,255,.08); -webkit-backdrop-filter:blur(10px) saturate(150%); backdrop-filter:blur(10px) saturate(150%); color:#fff; cursor:pointer;
    font:inherit; font-size:11.5px; font-weight:680; letter-spacing:.02em; padding:13px 0; border-radius:15px; text-transform:uppercase;
    transition:transform .12s var(--ease-spring), background .2s;}
  .fmt-btn:active{transform:scale(.93)} .fmt-btn:hover{background:rgba(255,255,255,.15)}
  .fmt-btn .sub2{display:block; font-size:9px; font-weight:500; letter-spacing:0; text-transform:none; color:rgba(255,255,255,.45); margin-top:2px;}
  .fmt-btn:disabled{opacity:.32; pointer-events:none;}
  .exp-note{font-size:11px; color:rgba(255,255,255,.42); line-height:1.5; margin-top:10px;}

  /* toast */
  #toast{position:fixed; left:50%; bottom:calc(env(safe-area-inset-bottom) + 92px); transform:translate(-50%,14px); z-index:300;
    max-width:84vw; padding:12px 20px; border-radius:16px; background:rgba(28,28,32,.92); color:#fff; font-size:13.5px; font-weight:500;
    box-shadow:0 12px 36px rgba(0,0,0,.4), inset 0 0 0 .5px rgba(255,255,255,.12); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
    opacity:0; pointer-events:none; transition:opacity .3s var(--ease-out), transform .3s var(--ease-spring); text-align:center;}
  #toast.show{opacity:1; transform:translate(-50%,0);}
  #toast .sp2{display:inline-block; width:14px; height:14px; vertical-align:-2px; margin-right:7px; border-radius:50%; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; animation:spin .8s linear infinite;}

  @media(prefers-reduced-motion:reduce){ *{animation-duration:.001ms!important; transition-duration:.001ms!important} #bloom,.pl-bg{transition:none} }
</style>
</head>

  // squircle (n=4) per element
  function squirclePath(w,h){ const a=w/2,b=h/2,n=4,steps=64; let p=[];
    for(let i=0;i<=steps;i++){ const t=i/steps*2*Math.PI,c=Math.cos(t),s=Math.sin(t);
      const x=a*Math.pow(Math.abs(c),2/n)*(Math.sign(c)||1), y=b*Math.pow(Math.abs(s),2/n)*(Math.sign(s)||1);
      p.push((a+x).toFixed(2)+" "+(b+y).toFixed(2)); }
    return "M "+p[0]+" "+p.slice(1).map(q=>"L "+q).join(" ")+" Z"; }

  function jsonp(url){ return new Promise((res,rej)=>{ const cb="sb_"+Date.now()+"_"+Math.floor(Math.random()*1e4),s=document.createElement("script");
    const tm=setTimeout(()=>{clean();rej(0);},9000); function clean(){ clearTimeout(tm); try{delete window[cb];}catch(e){} if(s.parentNode)s.parentNode.removeChild(s); }
    window[cb]=d=>{clean();res(d);}; s.onerror=()=>{clean();rej(0);}; s.src=url+"&callback="+cb; document.body.appendChild(s); }); }
  // タイムアウト付きfetch→JSON（AbortControllerでハングを断つ。!r.ok も即失敗扱い）
  function fetchJSON(url, ms, opt){
    return new Promise(function(res,rej){
      var ctl=("AbortController" in window)?new AbortController():null;
      var tm=setTimeout(function(){ if(ctl){try{ctl.abort();}catch(e){}} rej(new Error("timeout")); }, ms||4500);
      var o=opt||{}; if(ctl) o.signal=ctl.signal;
      fetch(url,o).then(function(r){ clearTimeout(tm); if(!r||!r.ok) return rej(new Error("http "+(r&&r.status))); return r.json(); })
        .then(function(j){ res(j); }).catch(function(e){ clearTimeout(tm); rej(e); });
    });
  }
  // 複数の取得経路を同時に走らせ「最初に成功した値」を返す（全部失敗で reject）。
  function firstOk(arr){ return new Promise(function(res,rej){ var n=arr.length, done=false; if(!n)return rej(0);
    arr.forEach(function(p){ Promise.resolve(p).then(function(v){ if(!done){done=true;res(v);} }, function(){ if(--n===0&&!done)rej(0); }); }); }); }
  async function searchTracks(term){
    const qs="country=JP&media=music&entity=song&limit=25&term="+encodeURIComponent(term);
    const base="https://itunes.apple.com/search?"+qs;
    var okArr=function(j){ return (j&&Array.isArray(j.results))?j.results:Promise.reject(new Error("no results")); };
    // ★ 同一オリジンproxy(/itunes-api)とJSONPを「同時に」走らせ、先に返った方を採用。
    //   片方がハング/ブロックされても他方が即返る＝iPhone/iPad/Mac全部で開き直さず「すぐ出る」(カタログ不具合の根治)。
    try{
      var winner=await firstOk([
        fetchJSON("/itunes-api/search?"+qs, 4500).then(okArr),
        jsonp(base).then(function(d){ return (d&&Array.isArray(d.results))?d.results:Promise.reject(0); })
      ]);
      if(Array.isArray(winner)) return winner;
    }catch(e){ /* 両経路ダメ→下のフォールバックへ */ }
    let lastErr=0;
    // 直CORS fetch（多くのデスクトップで通る）
    try{ const j=await fetchJSON(base,5000,{mode:"cors"}); if(j&&Array.isArray(j.results)) return j.results; }catch(e){ lastErr=e; }
    // 公開CORSプロキシ（最終手段）
    for(const mk of [u=>"https://corsproxy.io/?url="+encodeURIComponent(u), u=>"https://api.allorigins.win/raw?url="+encodeURIComponent(u)]){
      try{ const j=await fetchJSON(mk(base),6000); if(j&&Array.isArray(j.results)) return j.results; }catch(e){ lastErr=e; }
    }
    throw lastErr||new Error("search failed");
  }

    document.documentElement.style.setProperty("--accent-rgb", c.join(",")); document.documentElement.style.setProperty("--accent", `rgb(${c[0]},${c[1]},${c[2]})`);
    const light=c.map(v=>Math.round(v+(255-v)*0.45)); $("rs1").setAttribute("stop-color",`rgb(${light[0]},${light[1]},${light[2]})`); $("rs2").setAttribute("stop-color",`rgb(${c[0]},${c[1]},${c[2]})`); }
  function extractColor(url, done){ if(!url)return; if(colorCache[url])return done(colorCache[url]);
    const img=new Image(); img.crossOrigin="anonymous";
    img.onload=()=>{ try{ const S=24,cv=document.createElement("canvas"); cv.width=S;cv.height=S; const x=cv.getContext("2d",{willReadFrequently:true}); x.drawImage(img,0,0,S,S);
      const d=x.getImageData(0,0,S,S).data,b={}; for(let i=0;i<d.length;i+=4){ const r=d[i],g=d[i+1],bl=d[i+2],a=d[i+3]; if(a<128)continue;
        const mx=Math.max(r,g,bl),mn=Math.min(r,g,bl),sat=mx===0?0:(mx-mn)/mx,li=(mx+mn)/510; const k=(r>>5)+"-"+(g>>5)+"-"+(bl>>5); (b[k]||(b[k]={r:0,g:0,b:0,n:0,sc:0}));
        const o=b[k]; o.r+=r;o.g+=g;o.b+=bl;o.n++; o.sc+=1+sat*2.4-Math.abs(li-.52)*1.4; }
      let best=null; for(const k in b){ if(!best||b[k].sc>best.sc)best=b[k]; } if(!best)return;
      const rgb=[Math.round(best.r/best.n),Math.round(best.g/best.n),Math.round(best.b/best.n)]; colorCache[url]=rgb; done(rgb); }catch(e){} };

  const JACKET_BIG='<img class="jk-art" alt="" src="'+JK_BIG+'">';
  const JACKET_SMALL='<img class="jk-art" alt="" src="'+JK_SMALL+'">';

  // ── render list ──
  /* 曲を友達へ送る: iframe(StS内)なら常に「送る」を表示。?to=chat=今の相手へ / それ以外(Apps起動)=親が友達ピッカーを出す */
  const CHAT_MODE=(window.parent && window.parent!==window) || /[?&]to=chat/.test(location.search);
  function favGet(){ try{ return JSON.parse(localStorage.getItem('cx_fav')||'null'); }catch(e){ return null; } }
  function favSet(t){ try{ if(t) localStorage.setItem('cx_fav', JSON.stringify(t)); else localStorage.removeItem('cx_fav'); }catch(e){} }
  function favOn(t){ const f=favGet(); if(!f) return false; return f.id===uid(t) || ((f.title||'')===(t.trackName||'') && (f.artist||'')===(t.artistName||'')); }
  function rowHTML(t){ const id=uid(t),art=hi(t.artworkUrl100),playing=current&&uid(current)===id&&!audio.paused,on=favOn(t);
    return `<div class="row${playing?" playing":""}" data-id="${esc(id)}"><div class="thumb">${art?`<img src="${esc(art)}" alt="" loading="lazy"/>`:`<div class="jph">${JACKET_SMALL}</div>`}<div class="eq"><i></i><i></i><i></i></div></div>
      <div class="meta"><div class="t">${esc(t.trackName||"Unknown")}</div><div class="a">${esc(t.artistName||"")}${t.collectionName?" · "+esc(t.collectionName):""}</div></div><button class="rhb${on?" on":""}" aria-label="お気に入りに設定">${on?"♥":"♡"}</button>${CHAT_MODE?'<button class="rsend" aria-label="この曲を友達に送る">送る</button>':""}<div class="go">${IC.go}</div></div>`; }
  function skeletons(n){ let h=""; for(let i=0;i<n;i++)h+=`<div class="row sk"><div class="thumb"></div><div class="meta"><div class="l"></div><div class="l s"></div></div></div>`; return h; }
  function stateHTML(ic,title,body,retry){ return `<div class="state"><div class="ic">${ic}</div><h3>${esc(title)}</h3><p>${body}</p>${retry?'<button class="retry" id="retry">もう一度</button>':""}</div>`; }
  function rebuildIndex(){ byId=new Map(); results.forEach(t=>byId.set(uid(t),t)); favorites.forEach(t=>byId.set(uid(t),t)); localTracks.forEach(t=>byId.set(uid(t),t)); }
  const SEARCH_IC='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>';

  function renderMain(){ const el=$("main-list");
    if(view==="local") el.innerHTML = localTracks.length ? localTracks.map(rowHTML).join("") : stateHTML(JACKET_SMALL,"ローカルの曲はまだありません","左下の＋を押して、PCの中から音楽ファイルを読み込めます。EQ・空間・速度・フェードを効かせて再生・書き出しできます。");
    else el.innerHTML = results.length ? results.map(rowHTML).join("") : stateHTML(SEARCH_IC,"右下の検索から始めよう","曲やアーティストを検索すると30秒プレビューが鳴り、フル尺は各音楽アプリで開けます。");
    pop(el); applySquircles(); }
  function renderOverlay(){ const el=$("ovl-list"), term=$("q").value.trim(); $("seeds").style.display=(results.length||lastQuery)?"none":"flex";
    if(!term && !results.length){ el.innerHTML=""; return; }
    el.innerHTML = results.length ? results.map(rowHTML).join("") : (lastQuery?stateHTML(SEARCH_IC,"見つかりませんでした",`「${esc(lastQuery)}」に一致する曲がありません。`):"");
    pop(el); applySquircles(); }
  function pop(el){ el.classList.remove("enter"); void el.offsetWidth; el.classList.add("enter"); }
  function refreshRows(){ const id=current?uid(current):null, playing=!audio.paused;
    document.querySelectorAll(".row").forEach(r=>r.classList.toggle("playing", !!id && r.dataset.id===id && playing));
    setPlayIcon($("np-play"), playing);
    $("player").classList.toggle("paused", !playing); }
  function setPlayIcon(btn, playing){ btn.classList.toggle("is-play", !playing); btn.innerHTML = playing?IC.pause:IC.play; }

  // ── playback ──
  let lastShownSec=-1, savedVol=1, fadeRAF=null, playHistory=[];
  const recCache=new Map();
  function pool(){ return (view==="local"?localTracks:results); }
  function playerOpen(){ return $("player").classList.contains("show"); }

  // a recommended track that "fits" the current one (same artist first, else random)
  function recommendFor(t){ if(!t)return null; const k=uid(t); if(recCache.has(k))return recCache.get(k);
    const p=pool().filter(x=>uid(x)!==k && x.previewUrl);
    let pick=null;
    if(p.length){ const same=p.filter(x=>x.artistName===t.artistName); const base=same.length?same:p;
      pick=base[Math.floor(Math.random()*base.length)]; }
    recCache.set(k,pick); return pick; }
  function nextTrack(){ return recommendFor(current); }
  function prevTrack(){ if(playHistory.length) return playHistory[playHistory.length-1];

  function scheduleFadeOffline(param, dur){ const fi=ST.fadeIn, fo=ST.fadeOut;

    function up(){ if(!drag)return; drag=false; saveST(); window.removeEventListener("pointermove",mv); window.removeEventListener("pointerup",up); }
    tr.addEventListener("pointerdown", e=>{ drag=true; setv(fr(e)); e.preventDefault(); try{tr.setPointerCapture(e.pointerId);}catch(_){}; window.addEventListener("pointermove",mv); window.addEventListener("pointerup",up); }); });

  // single dual-handle fade slider (player + sheet share ST): left edge→center = fade-in, center→right edge = fade-out; default both at the ends
  document.querySelectorAll(".fade2").forEach(wrap=>{ const track=wrap.querySelector(".fade2-track"); let active=null;
    function fr(e){ const r=track.getBoundingClientRect(); const x=(e.touches?e.touches[0].clientX:e.clientX); return Math.max(0,Math.min(1,(x-r.left)/r.width)); }
    function pick(p){ const L=(ST.fadeIn/FADE_MAX)*0.5, R=1-(ST.fadeOut/FADE_MAX)*0.5; return Math.abs(p-L)<=Math.abs(p-R)?"in":"out"; }
    function apply(p){ if(active==="in"){ const L=Math.max(0,Math.min(0.5,p)); ST.fadeIn=(L/0.5)*FADE_MAX; }
      else { const R=Math.max(0.5,Math.min(1,p)); ST.fadeOut=((1-R)/0.5)*FADE_MAX; } applyFadeLive(); renderFadeUI(); }
    function mv(e){ if(active){ apply(fr(e)); e.preventDefault(); } }
    function up(){ if(!active)return; active=null; saveST(); window.removeEventListener("pointermove",mv); window.removeEventListener("pointerup",up); }
    wrap.addEventListener("pointerdown", e=>{ const p=fr(e); active=pick(p); apply(p); e.preventDefault(); try{wrap.setPointerCapture(e.pointerId);}catch(_){}; window.addEventListener("pointermove",mv); window.addEventListener("pointerup",up); }); });

  // boot
  // ── 親(チャットアプリ)からの楽曲受け取りブリッジ（iframe埋め込み時のみ・standaloneでは無効） ──
  if(window.parent && window.parent!==window){
    var _pmMap=function(t){ if(!t) return null; if(t.previewUrl||t.trackName) return t;
      return { trackId:(t.id!=null?t.id:("ext-"+(t.preview||t.title||""))), trackName:t.title||"", artistName:t.artist||"", collectionName:t.album||"",
        artworkUrl100:String(t.art||"").replace("600x600","100x100").replace("300x300","100x100"), previewUrl:t.preview||t.previewUrl||"",
        trackTimeMillis:t.trackTimeMillis||0, trackViewUrl:t.trackViewUrl||"", collectionId:t.collectionId||0 }; };
    window.addEventListener("message", function(e){ var d=(e&&e.data)||{}; if(d && d.type==="pm-play"){ try{
      if(Array.isArray(d.list) && d.list.length){ results=d.list.map(_pmMap).filter(Boolean); rebuildIndex(); if(view==="all")renderMain(); }
      var tk=_pmMap(d.track); if(tk && tk.previewUrl){ var ex=byId.get(uid(tk))||tk; selectTrack(ex); openPlayer(current); }
    }catch(err){} } });
    try{ window.parent.postMessage({type:"pm-ready"}, "*"); }catch(_){}
    /* now-playing 状態/レベルを親へ通知（左下pin=ジャケ55+レベルリング用） */
    var _pmPost=function(m){ try{ window.parent.postMessage(m,"*"); }catch(_){} };
    var _pmArt=function(){ try{ return current?(hi(current.artworkUrl100||"")||current.artworkUrl100||""):""; }catch(_){ return ""; } };
    var _pmReport=function(p){ _pmPost({type:"pm-state", playing:!!p, art:_pmArt(), title:(current&&current.trackName)||""}); };
    try{ audio.addEventListener("playing",function(){ _pmReport(true); }); audio.addEventListener("play",function(){ _pmReport(true); }); audio.addEventListener("pause",function(){ _pmReport(false); }); audio.addEventListener("ended",function(){ _pmReport(false); }); }catch(_){}
    (function _pmLvl(){ try{ if(A&&A.lvl&&audio&&!audio.paused){ var l=(A.lvl[0]+A.lvl[1]+A.lvl[2]+A.lvl[3]+A.lvl[4])/5; _pmPost({type:"pm-level", level:l}); } }catch(_){} setTimeout(_pmLvl,120); })();
  }
  /* 外部(Coverflow/おすすめ等の追加UI)から本体を操作するフック */
  try{
    window.__pmPlayExt=function(tk){ try{ if(!byId.get(uid(tk))){ results=[tk].concat(results); rebuildIndex(); } }catch(e){}
      try{ selectTrack(byId.get(uid(tk))||tk); }catch(e){} };
    window.__pmSearch=function(q){ try{ openOvl(); var qq=$("q"); if(qq){ qq.value=q; qq.dispatchEvent(new Event("input",{bubbles:true})); } }catch(e){} };
    window.__pmOnOvlOpen=null; var _sf=$("search-fab"); if(_sf){ _sf.addEventListener("click", function(){ try{ if(window.__pmOnOvlOpen) window.__pmOnOvlOpen(); }catch(e){} }); }
  }catch(e){}
  rebuildIndex(); renderMain(); applySquircles(); setTimeout(applySquircles,120);
})();
</script>
<script>
/* P17/P18: タイトルに「最近聞いた曲」vision-gallery風＋お気に入り(ハート1個)。お気に入り有→[お気に入り+最近4]、無→最近5。ハート付与0.3s scaleup/解除0.3s scaledown。タップで再生検索。お気に入りは cx_fav に保存（Aeroのosx代替にも使用）。 */
(function(){ try{
  var CSS='#pmRecent{padding:10px 2px 4px;}#pmRecent .lbl{font-size:12px;color:#9aa6b2;margin:0 0 8px 2px;letter-spacing:.04em;}#pmRecent .rrow{display:flex;gap:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:6px;}#pmRecent .rrow::-webkit-scrollbar{display:none;}#pmRecent .rc{position:relative;flex:0 0 auto;width:128px;height:128px;border-radius:18px;overflow:hidden;background:#22303f center/cover no-repeat;box-shadow:0 6px 20px rgba(0,0,0,.3);cursor:pointer;opacity:0;transform:translateY(16px) scale(.94);}#pmRecent .rc.show{animation:pmRcIn .6s cubic-bezier(.16,1,.3,1) forwards;}@keyframes pmRcIn{to{opacity:1;transform:none;}}#pmRecent .rc::after{content:"";position:absolute;inset:0;background:linear-gradient(transparent 38%,rgba(0,0,0,.62));}#pmRecent .rc .dt{position:absolute;left:0;right:0;bottom:10px;text-align:center;z-index:2;color:#fff;padding:0 6px;}#pmRecent .rc .dm{font-size:14px;font-weight:600;line-height:1.15;text-shadow:0 1px 8px rgba(0,0,0,.5);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}#pmRecent .rc .ds{font-size:10px;letter-spacing:.16em;text-transform:uppercase;opacity:.8;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}#pmRecent .rc .hb{position:absolute;top:6px;right:6px;z-index:3;width:30px;height:30px;border:none;border-radius:50%;background:rgba(0,0,0,.32);color:#fff;font-size:16px;cursor:pointer;line-height:30px;padding:0;-webkit-tap-highlight-color:transparent;transition:transform .3s cubic-bezier(.16,1,.3,1);}#pmRecent .rc .hb.on{transform:scale(1.18);}#pmRecent .rc .hb.off{transform:scale(.8);}';
  function injectCss(){ if(document.getElementById('pmRecentCss'))return; var st=document.createElement('style'); st.id='pmRecentCss'; st.textContent=CSS; document.head.appendChild(st); }
  function recent(){ try{ return JSON.parse(localStorage.getItem('cx_recent')||'[]'); }catch(e){ return []; } }
  function getFav(){ try{ return JSON.parse(localStorage.getItem('cx_fav')||'null'); }catch(e){ return null; } }
  function setFav(t){ try{ if(t) localStorage.setItem('cx_fav', JSON.stringify(t)); else localStorage.removeItem('cx_fav'); }catch(e){} }
  function key(t){ return t? (t.id||((t.title||'')+'|'+(t.artist||''))) : ''; }
  function build(){ injectCss(); var host=document.getElementById('ovl-scroll'); if(!host) return; var seeds=document.getElementById('seeds');
    var box=document.getElementById('pmRecent'); var rc=recent(); var fav=getFav();

    if(!box){ box=document.createElement('div'); box.id='pmRecent'; box.innerHTML='<div class="lbl">最近聞いた曲</div><div class="rrow"></div>'; host.insertBefore(box, seeds||host.firstChild); }
    box.style.display='';
    var list=[]; if(fav){ list.push(fav); } var fk=key(fav);
    rc.forEach(function(t){ if(key(t)!==fk && list.length< (fav?5:5)) list.push(t); });
    list=list.slice(0,5);
    var row=box.querySelector('.rrow'); row.innerHTML='';
    list.forEach(function(t,i){ var isFav=(key(t)===fk && !!fav); var c=document.createElement('div'); c.className='rc'; if(t&&t.art){ c.style.backgroundImage="url('"+String(t.art).replace(/'/g,"%27")+"')"; }
      var dt=document.createElement('div'); dt.className='dt'; var dm=document.createElement('div'); dm.className='dm'; dm.textContent=(t&&t.title)||''; var ds=document.createElement('div'); ds.className='ds'; ds.textContent=(t&&t.artist)||''; dt.appendChild(dm); dt.appendChild(ds); c.appendChild(dt);
      var hb=document.createElement('button'); hb.className='hb'; hb.textContent=isFav?'❤️':'🤍';
      hb.addEventListener('click',function(ev){ ev.stopPropagation(); var nowFav=getFav(); if(key(nowFav)===key(t)){ setFav(null); hb.textContent='🤍'; hb.classList.remove('on'); hb.classList.add('off'); }   // お気に入り解除=0.3s scaledown
        else { setFav({id:t.id,title:t.title,artist:t.artist,art:t.art,preview:t.preview}); hb.textContent='❤️'; hb.classList.remove('off'); hb.classList.add('on'); try{ parent.postMessage({type:'fav-set'},'*'); }catch(e){} }   // 1個だけ=change（0.3s scaleup）
        setTimeout(build, 320); });
      c.appendChild(hb);
      c.addEventListener('click',function(){ try{ var q=document.getElementById('q'); if(q){ q.value=((t&&t.title)||'')+' '+((t&&t.artist)||''); q.dispatchEvent(new Event('input',{bubbles:true})); q.focus(); } }catch(e){} });
      row.appendChild(c); setTimeout(function(){ try{ c.classList.add('show'); }catch(e){} }, 60+i*70); });
  }
  function friendFavs(){ try{ return JSON.parse(localStorage.getItem('cx_friend_songs')||'[]'); }catch(e){ return []; } }
  function buildFriendFav(){ injectCss(); var host=document.getElementById('ovl-scroll'); if(!host) return; var ff=friendFavs(); var box=document.getElementById('pmFriendFav');
    if(!ff.length){ if(box) box.style.display='none'; return; }
    if(!box){ box=document.createElement('div'); box.id='pmFriendFav'; box.innerHTML='<div class="lbl">友達のお気に入り</div><div class="rrow"></div>'; var pr=document.getElementById('pmRecent'); if(pr&&pr.nextSibling){ host.insertBefore(box, pr.nextSibling); } else { var sd=document.getElementById('seeds'); host.insertBefore(box, sd||host.firstChild); } }
    box.style.display=''; box.style.padding='6px 2px 4px';
    var row=box.querySelector('.rrow'); row.innerHTML='';
    ff.slice(0,8).forEach(function(t,i){ var c=document.createElement('div'); c.className='rc'; if(t&&t.art){ c.style.backgroundImage="url('"+String(t.art).replace(/'/g,"%27")+"')"; }
      var dt=document.createElement('div'); dt.className='dt'; var dm=document.createElement('div'); dm.className='dm'; dm.textContent=(t&&t.t)||''; var ds=document.createElement('div'); ds.className='ds'; ds.textContent='♥ '+((t&&t.name)||'友達'); dt.appendChild(dm); dt.appendChild(ds); c.appendChild(dt);
      c.addEventListener('click',function(){ try{ var q=document.getElementById('q'); if(q){ q.value=((t&&t.t)||'')+' '+((t&&t.a)||''); q.dispatchEvent(new Event('input',{bubbles:true})); q.focus(); } }catch(e){} });
      row.appendChild(c); setTimeout(function(){ try{ c.classList.add('show'); }catch(e){} }, 60+i*70); }); }
  function toggleOnSearch(){ var q=document.getElementById('q'); var on=!(q&&q.value.trim()); var b1=document.getElementById('pmRecent'); if(b1) b1.style.display=on?'':'none'; var b2=document.getElementById('pmFriendFav'); if(b2) b2.style.display=on?'':'none'; }
  function init(){ build(); buildFriendFav(); var q=document.getElementById('q'); if(q){ q.addEventListener('input', toggleOnSearch); } }
  if(document.readyState!=='loading') setTimeout(init,300); else document.addEventListener('DOMContentLoaded', function(){ setTimeout(init,300); });
  try{ window.__pmGetFav=getFav; }catch(e){}
}catch(e){} })();
</script>
<script>
/* ═══ P-Tokyo: 初期画面=日本(東京)でよく再生されている曲のCoverflow + メイン画面の最近聞いた曲 +
       検索おすすめ(枠なし1曲1行スライドアップ・RSSからランダム) ═══
   ソース: Apple公式RSS(rss.applemarketingtools.com / most-played JP) = 完全無料・毎日自動更新・キー不要。
   6時間キャッシュ(localStorage pm_jp_top)。CORS不可環境は corsproxy.io フォールバック。 */
(function(){ try{
  var RSS='https://rss.applemarketingtools.com/api/v2/jp/music/most-played/30/songs.json';
  var CSS=''
   +'#pmFlowSec{padding:4px 0 10px;}'
   +'#pmFlowSec .lbl,#pmMainRec .lbl{font-size:12px;color:#9aa6b2;margin:0 0 10px 4px;letter-spacing:.04em;}'
   +'.pm-flow{display:flex;gap:26px;overflow-x:auto;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory;padding:16px 50% 34px;perspective:900px;}'
   +'.pm-flow::-webkit-scrollbar{display:none;}'
   +'.pm-fc{position:relative;flex:0 0 auto;width:158px;height:158px;border-radius:14px;scroll-snap-align:center;background:#22303f center/cover no-repeat;cursor:pointer;'
   +'  box-shadow:0 16px 44px rgba(0,0,0,.45);transform-style:preserve-3d;will-change:transform;'
   +'  -webkit-box-reflect:below 6px linear-gradient(transparent 58%, rgba(255,255,255,.22));}'
   +'.pm-fc .rk{position:absolute;left:8px;top:8px;min-width:22px;height:22px;padding:0 6px;border-radius:11px;background:rgba(0,0,0,.55);color:#fff;font:700 12px/22px -apple-system,sans-serif;text-align:center;}'
   +'#pmFlowTitle{text-align:center;margin-top:2px;min-height:36px;}'
   +'#pmFlowTitle .t{font:600 15px/1.3 -apple-system,"Hiragino Sans",sans-serif;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}'
   +'#pmFlowTitle .a{font:400 12px/1.3 -apple-system,"Hiragino Sans",sans-serif;color:#9aa6b2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}'
   +'#pmMainRec{padding:2px 0 12px;}'
   +'#pmMainRec .rrow{display:flex;gap:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:6px;}'
   +'#pmMainRec .rrow::-webkit-scrollbar{display:none;}'
   +'#pmMainRec .rc{position:relative;flex:0 0 auto;width:104px;height:104px;border-radius:14px;overflow:hidden;background:#22303f center/cover no-repeat;box-shadow:0 6px 18px rgba(0,0,0,.3);cursor:pointer;}'
   +'#pmMainRec .rc::after{content:"";position:absolute;inset:0;background:linear-gradient(transparent 40%,rgba(0,0,0,.62));}'
   +'#pmMainRec .dt{position:absolute;left:0;right:0;bottom:7px;text-align:center;z-index:2;color:#fff;padding:0 6px;}'
   +'#pmMainRec .dm{font-size:12px;font-weight:600;line-height:1.15;text-shadow:0 1px 6px rgba(0,0,0,.5);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}'
   +'#pmSuggest{display:flex;flex-direction:column;gap:2px;padding:6px 4px 10px;}'
   +'#pmSuggest .lbl{font-size:12px;color:#9aa6b2;margin:0 0 6px 2px;letter-spacing:.04em;}'
   +'.pm-sg{display:flex;align-items:center;gap:12px;padding:8px 4px;border:none;background:none;text-align:left;cursor:pointer;width:100%;'
   +'  opacity:0;transform:translateY(18px);-webkit-tap-highlight-color:transparent;}'
   +'.pm-sg.in{animation:pmSgUp .55s cubic-bezier(.16,1,.3,1) forwards;}'
   +'@keyframes pmSgUp{to{opacity:1;transform:none;}}'
   +'.pm-sg img{width:40px;height:40px;border-radius:8px;object-fit:cover;flex:0 0 auto;}'
   +'.pm-sg .t{font:600 14.5px/1.25 -apple-system,"Hiragino Sans",sans-serif;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}'
   +'.pm-sg .a{font:400 12px/1.25 -apple-system,"Hiragino Sans",sans-serif;color:#9aa6b2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}'
   +'.pm-sg .mt{min-width:0;display:flex;flex-direction:column;gap:1px;}';
  var st=document.createElement('style'); st.textContent=CSS; document.head.appendChild(st);

  function jget(u,ms){ return new Promise(function(res,rej){ var ctl=('AbortController' in window)?new AbortController():null;
    var tm=setTimeout(function(){ if(ctl){try{ctl.abort();}catch(e){}} rej(new Error('timeout')); }, ms||6000);
    fetch(u, ctl?{signal:ctl.signal}:{}).then(function(r){ clearTimeout(tm); if(!r.ok) throw 0; return r.json(); }).then(res).catch(function(e){ clearTimeout(tm); rej(e); }); }); }
  function loadTop(){ try{ var c=JSON.parse(localStorage.getItem('pm_jp_top')||'null'); if(c&&c.ts&&(Date.now()-c.ts)<6*3600e3&&Array.isArray(c.list)&&c.list.length) return Promise.resolve(c.list); }catch(e){}
    return jget(RSS).catch(function(){ return jget('https://corsproxy.io/?url='+encodeURIComponent(RSS)); })
      .then(function(j){ var list=(j&&j.feed&&j.feed.results)||[]; if(list.length){ try{ localStorage.setItem('pm_jp_top', JSON.stringify({ts:Date.now(), list:list})); }catch(e){} } return list; }); }

  /* RSSエントリ→lookupでpreviewUrl付きトラックに解決して再生 */
  function playRss(e){ if(!e||!e.id) return;
    var qs='id='+encodeURIComponent(e.id)+'&country=JP';
    jget('/itunes-api/lookup?'+qs,4500).catch(function(){ return jget('https://itunes.apple.com/lookup?'+qs,5000); })
      .catch(function(){ return jget('https://corsproxy.io/?url='+encodeURIComponent('https://itunes.apple.com/lookup?'+qs),6000); })
      .then(function(j){ var t=j&&j.results&&j.results[0];
        if(t&&t.previewUrl){ if(window.__pmPlayExt) window.__pmPlayExt(t); }
        else if(window.__pmSearch){ window.__pmSearch((e.name||'')+' '+(e.artistName||'')); } })
      .catch(function(){ if(window.__pmSearch) window.__pmSearch((e.name||'')+' '+(e.artistName||'')); }); }

  /* ── メイン画面: Coverflow(東京の人気曲) + 最近聞いた曲 ── */
  function buildMain(list){
    var main=document.getElementById('main-list'); if(!main||!list.length) return;
    var old=document.getElementById('pmFlowSec'); if(old) old.remove();
    var sec=document.createElement('div'); sec.id='pmFlowSec';
    sec.innerHTML='<div class="lbl">東京でよく再生されている曲 — 自動更新</div><div class="pm-flow" id="pmFlow"></div><div id="pmFlowTitle"><div class="t"></div><div class="a"></div></div>';
    main.parentNode.insertBefore(sec, main);
    var flow=sec.querySelector('#pmFlow'), tt=sec.querySelector('#pmFlowTitle .t'), ta=sec.querySelector('#pmFlowTitle .a');
    list.slice(0,24).forEach(function(e,i){
      var c=document.createElement('div'); c.className='pm-fc';
      var art=String(e.artworkUrl100||'').replace('100x100','300x300');
      if(art) c.style.backgroundImage="url('"+art.replace(/'/g,'%27')+"')";
      var rk=document.createElement('div'); rk.className='rk'; rk.textContent=String(i+1); c.appendChild(rk);
      c.addEventListener('click', function(){ playRss(e); });
      c._e=e; flow.appendChild(c);
    });
    function center(){ /* Coverflow変形: 中央からの距離でrotateY/scale/Z */
      var r=flow.getBoundingClientRect(), cx=r.left+r.width/2, best=null, bd=1e9;
      Array.prototype.forEach.call(flow.children, function(c){
        var cr=c.getBoundingClientRect(), d=(cr.left+cr.width/2-cx)/cr.width;
        var rot=Math.max(-55, Math.min(55, -d*38));
        var sc=Math.max(.78, 1-Math.abs(d)*.16);
        var z=Math.max(0, 70-Math.abs(d)*70);
        c.style.transform='translateZ('+z+'px) rotateY('+rot+'deg) scale('+sc+')';
        c.style.zIndex=String(1000-Math.round(Math.abs(d)*10));
        var ad=Math.abs(d); if(ad<bd){ bd=ad; best=c; }
      });
      if(best&&best._e){ tt.textContent=best._e.name||''; ta.textContent=best._e.artistName||''; }
    }
    flow.addEventListener('scroll', function(){ requestAnimationFrame(center); }, {passive:true});
    window.addEventListener('resize', center);
    center(); setTimeout(center, 80);
    setTimeout(function(){ try{ var c3=flow.children[2]||flow.children[0]; if(c3) c3.scrollIntoView({inline:'center', block:'nearest'}); center(); }catch(e){} }, 60);
  }
  function buildMainRecents(){
    var main=document.getElementById('main-list'); if(!main) return;
    var rc=[]; try{ rc=JSON.parse(localStorage.getItem('cx_recent')||'[]'); }catch(e){}
    var old=document.getElementById('pmMainRec'); if(old) old.remove();
    if(!rc.length) return;
    var sec=document.createElement('div'); sec.id='pmMainRec';
    sec.innerHTML='<div class="lbl">最近聞いた曲</div><div class="rrow"></div>';
    var flowSec=document.getElementById('pmFlowSec');
    if(flowSec&&flowSec.nextSibling){ flowSec.parentNode.insertBefore(sec, flowSec.nextSibling); } else { main.parentNode.insertBefore(sec, main); }
    var row=sec.querySelector('.rrow');

      var c=document.createElement('div'); c.className='rc';
      if(t&&t.art) c.style.backgroundImage="url('"+String(t.art).replace(/'/g,'%27')+"')";
      var dt=document.createElement('div'); dt.className='dt'; var dm=document.createElement('div'); dm.className='dm'; dm.textContent=(t&&t.title)||''; dt.appendChild(dm); c.appendChild(dt);
      c.addEventListener('click', function(){ if(t&&t.preview&&window.__pmPlayExt){ window.__pmPlayExt({trackId:t.id||('rc-'+(t.title||'')), trackName:t.title||'', artistName:t.artist||'', artworkUrl100:t.art||'', previewUrl:t.preview}); } else if(window.__pmSearch){ window.__pmSearch(((t&&t.title)||'')+' '+((t&&t.artist)||'')); } });

  /* ── 検索オーバーレイ: おすすめ(枠なし1曲1行・スライドアップ・ランダム) ── */
  function buildSuggest(list){
    var host=document.getElementById('ovl-scroll'); if(!host||!list.length) return;
    var seeds=document.getElementById('seeds'); if(seeds) seeds.style.display='none';   // 旧チップは廃止=おすすめ行に置換
    var old=document.getElementById('pmSuggest'); if(old) old.remove();
    var box=document.createElement('div'); box.id='pmSuggest';
    box.innerHTML='<div class="lbl">おすすめ</div>';
    var pool=list.slice(); var pick=[];

      var b=document.createElement('button'); b.className='pm-sg'; b.type='button'; b.style.animationDelay=(80+i*90)+'ms';
      var im=document.createElement('img'); im.src=String(e.artworkUrl100||''); im.alt=''; im.loading='lazy';
      var mt=document.createElement('div'); mt.className='mt';
      var t=document.createElement('div'); t.className='t'; t.textContent=e.name||'';
      var a=document.createElement('div'); a.className='a'; a.textContent=e.artistName||'';
      mt.appendChild(t); mt.appendChild(a); b.appendChild(im); b.appendChild(mt);
      b.addEventListener('click', function(){ playRss(e); });
      box.appendChild(b);
      requestAnimationFrame(function(){ requestAnimationFrame(function(){ b.classList.add('in'); }); });
    });
    var recent=document.getElementById('pmRecent');
    if(recent&&recent.nextSibling){ host.insertBefore(box, recent.nextSibling); }
    else { host.insertBefore(box, host.firstChild); }
    /* 入力があるときは隠す(既存toggleと同じ挙動) */
    var q=document.getElementById('q');
    if(q&&!q.__pmSgHook){ q.__pmSgHook=1; q.addEventListener('input', function(){ box.style.display=q.value.trim()?'none':'flex'; }); }
  }

  /* ── おすすめ縦フィード(TikTok風): 1画面1曲・上スワイプで次の曲＝スナップ確定で自動再生 ── */
  function buildTok(list){
    var main=document.getElementById('main-list'); if(!main||!list.length) return;
    var old=document.getElementById('pmTok'); if(old) old.remove();
    var css=document.getElementById('pmTokCss');
    if(!css){ css=document.createElement('style'); css.id='pmTokCss'; css.textContent=''
      +'#pmTok{padding:2px 0 14px;}'
      +'#pmTok .lbl{font-size:12px;color:#9aa6b2;margin:0 0 10px 4px;letter-spacing:.04em;}'
      +'.pm-tok{height:62vh;min-height:340px;overflow-y:auto;-webkit-overflow-scrolling:touch;scroll-snap-type:y mandatory;border-radius:22px;}'
      +'.pm-tok::-webkit-scrollbar{display:none;}'
      +'.pm-tk{position:relative;height:100%;scroll-snap-align:start;scroll-snap-stop:always;border-radius:22px;overflow:hidden;background:#151b24 center/cover no-repeat;cursor:pointer;margin-bottom:10px;}'
      +'.pm-tk::after{content:"";position:absolute;inset:0;background:linear-gradient(rgba(0,0,0,.06) 40%,rgba(0,0,0,.72));}'
      +'.pm-tk .in{position:absolute;left:18px;right:18px;bottom:18px;z-index:2;color:#fff;}'
      +'.pm-tk .t{font:700 21px/1.25 -apple-system,"Hiragino Sans",sans-serif;text-shadow:0 2px 12px rgba(0,0,0,.6);}'
      +'.pm-tk .a{font:500 14px/1.3 -apple-system,"Hiragino Sans",sans-serif;color:rgba(255,255,255,.78);margin-top:4px;}'
      +'.pm-tk .hint{position:absolute;right:16px;bottom:18px;z-index:2;color:rgba(255,255,255,.85);font:600 12px/1.3 -apple-system,sans-serif;text-align:center;text-shadow:0 1px 6px rgba(0,0,0,.6);}'
      +'.pm-tk .rk2{position:absolute;left:14px;top:14px;z-index:2;min-width:26px;height:26px;padding:0 8px;border-radius:13px;background:rgba(0,0,0,.5);color:#fff;font:700 13px/26px -apple-system,sans-serif;text-align:center;}';
      document.head.appendChild(css); }
    var sec=document.createElement('div'); sec.id='pmTok';
    sec.innerHTML='<div class="lbl">おすすめ — 上にスワイプで次の曲</div><div class="pm-tok" id="pmTokScroll"></div>';
    var rec=document.getElementById('pmMainRec');
    if(rec&&rec.nextSibling){ rec.parentNode.insertBefore(sec, rec.nextSibling); }
    else { var fs=document.getElementById('pmFlowSec'); if(fs&&fs.nextSibling){ fs.parentNode.insertBefore(sec, fs.nextSibling); } else { main.parentNode.insertBefore(sec, main); } }
    var scr=sec.querySelector('#pmTokScroll');
    var pool=list.slice(); var pick=[];
    while(pick.length<12&&pool.length){ pick.push(pool.splice(Math.floor(Math.random()*pool.length),1)[0]); }
    pick.forEach(function(e,i){
      var c=document.createElement('div'); c.className='pm-tk';
      var art=String(e.artworkUrl100||'').replace('100x100','600x600');
      if(art) c.style.backgroundImage="url('"+art.replace(/'/g,'%27')+"')";
      c.innerHTML='<div class="rk2">'+(i+1)+'</div><div class="in"><div class="t"></div><div class="a"></div></div><div class="hint">▲<br>スワイプ</div>';
      c.querySelector('.t').textContent=e.name||''; c.querySelector('.a').textContent=e.artistName||'';
      c.addEventListener('click', function(){ playRss(e); });
      c._e=e; scr.appendChild(c);
    });
    /* スナップ確定(スクロール停止)で中央のカードを自動再生。iOSで自動再生が拒否されたらタップで再生 */
    var st=null, lastId=null;
    scr.addEventListener('scroll', function(){ clearTimeout(st); st=setTimeout(function(){
      var r=scr.getBoundingClientRect(), cy=r.top+r.height/2, best=null, bd=1e9;
      Array.prototype.forEach.call(scr.children, function(c){ var cr=c.getBoundingClientRect(); var d=Math.abs(cr.top+cr.height/2-cy); if(d<bd){ bd=d; best=c; } });
      if(best&&best._e&&best._e.id!==lastId){ lastId=best._e.id; playRss(best._e); }
    }, 160); }, {passive:true});
  }

  var TOP=[];
  function init(){ loadTop().then(function(list){ TOP=list||[]; buildMain(TOP); buildMainRecents(); buildTok(TOP); buildSuggest(TOP); }).catch(function(){}); }
  try{ window.__pmOnOvlOpen=function(){ if(TOP.length) buildSuggest(TOP); }; }catch(e){}   // 検索を開く度にランダム入替
  if(document.readyState!=='loading') setTimeout(init,200); else document.addEventListener('DOMContentLoaded', function(){ setTimeout(init,200); });
}catch(e){} })();
</script>
