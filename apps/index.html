                        const ioRow = makeSlider(0, 100, 1, s.insetOpacity == null ? 22 : s.insetOpacity, (v) => { s.insetOpacity = v; applyShadow(s); saveCurrentSiteState(); });
                        insHolder.appendChild(ioRow.row);
                        subBox.appendChild(insHolder);
                    } else if (sub === 'opacity') {
                        // 2 段構成（ユーザー指示）:
                        //   1) 枠の色の不透明度 = box-shadow の outer color α (data-shadow.opacity)
                        //   2) 枠の blur トグル — ON で frosted-glass の backdrop-filter を有効化、
                        //      その間は枠の不透明度スライダの上限を 50% に制限。
                        //   3) 全体の不透明度 = aChild.style.opacity (これまで唯一のスライダだったやつ)
                        const s = getShadowState();
                        const isBlurOn = aChild.getAttribute('data-frame-blur') === '1';

                        const fLbl = document.createElement('div');
                        fLbl.style.cssText = 'font:600 12px/1 -apple-system;color:#6c6c70;margin:6px 4px 4px;';
                        fLbl.textContent = '枠の色の不透明度';
                        subBox.appendChild(fLbl);
                        const fMax  = isBlurOn ? 50 : 100;
                        const fInit = Math.min(s.opacity || 0, fMax);
                        if (fInit !== s.opacity) { s.opacity = fInit; applyShadow(s); }
                        const fSl = makeSlider(0, fMax, 1, fInit, (v) => {
                            s.opacity = v;
                            applyShadow(s);
                            saveCurrentSiteState();
                        });
                        subBox.appendChild(fSl.row);

                        const blurRow = document.createElement('div');
                        blurRow.className = 'ee-toggle-row';
                        blurRow.innerHTML = '<span class="ee-toggle-label">枠の blur</span>';
                        blurRow.appendChild(makeIosToggle(isBlurOn, (on) => {
                            aChild.setAttribute('data-frame-blur', on ? '1' : '0');
                            if (on) {
                                aChild.style.backdropFilter        = 'blur(18px) saturate(180%)';
                                aChild.style.webkitBackdropFilter  = 'blur(18px) saturate(180%)';
                                // clamp frame α to 50 — slider max + current value
                                fSl.slider.max = 50;
                                if ((s.opacity || 0) > 50) {
                                    s.opacity = 50;
                                    applyShadow(s);
                                    fSl.slider.value = 50;
                                    fSl.label.textContent = '50';
                                }
                            } else {
                                aChild.style.backdropFilter       = '';
                                aChild.style.webkitBackdropFilter = '';
                                fSl.slider.max = 100;
                            }
                            saveCurrentSiteState();
                        }));
                        subBox.appendChild(blurRow);

                        const oLbl = document.createElement('div');
                        oLbl.style.cssText = 'font:600 12px/1 -apple-system;color:#6c6c70;margin:14px 4px 4px;';
                        oLbl.textContent = '全体の不透明度';
                        subBox.appendChild(oLbl);
                        const op = Math.round((parseFloat(aChild.style.opacity || '1')) * 100);
                        const sl = makeSlider(10, 100, 1, op, (v) => {
                            aChild.style.opacity = String(v/100);
                            saveCurrentSiteState();
                        });
                        subBox.appendChild(sl.row);
                    } else { // size
                        const r = aChild.getBoundingClientRect();
                        // HR: width-only adjustment (the wrapper holds the width for hr)
                        const widthTarget = (aType === 'hr') ? aWrap : aChild;
                        const wr = widthTarget.getBoundingClientRect();
                        let curW = Math.round(wr.width);
                        let curH = Math.round(r.height);
                        // Allow fractional px so aspect lock doesn't drift through repeated rounding.
                        // The wheel itself still scrolls in integers; only the *derived* dimension
                        // can be fractional (e.g. W=201 with ratio 2.0 → H=100.5).
                        function setW(v) { curW = v; widthTarget.style.width = (Math.round(v * 100) / 100) + 'px'; positionKnobs(); saveCurrentSiteState(); }
                        function setH(v) { curH = v; aChild.style.height = (Math.round(v * 100) / 100) + 'px'; positionKnobs(); saveCurrentSiteState(); }
                        if (aType === 'hr') {
                            const wRow = makeSlider(40, 700, 2, curW, setW);
                            subBox.appendChild(wRow.row);
                        } else {
                            // 横幅 / 高さ = Apple-Watch-style number wheels (same feel as the
                            // shadow X/Y wheels). サイズ = proportional scale. 揃える = W==H.
                            let baseW = curW, baseH = curH, sizeSl;
                            function rebase() {
                                baseW = curW; baseH = curH;
                                if (sizeSl) { sizeSl.slider.value = 100; sizeSl.label.textContent = '100'; }
                            }
                            function wheelCol(iconSrc, labelText, wheel) {
                                const col = document.createElement('div'); col.className = 'size-half';
                                const ic = document.createElement('img');
                                ic.src = iconSrc; ic.alt = labelText; ic.className = 'size-icon';
                                const lb = document.createElement('div');
                                lb.style.cssText = 'font:600 12px/1 -apple-system;color:#6c6c70;margin:0 0 2px;';
                                lb.textContent = labelText;
                                col.appendChild(ic); col.appendChild(lb); col.appendChild(wheel);
                                return col;
                            }
                            const whRow = document.createElement('div'); whRow.className = 'size-wh-row';
                            // wheels honour data-aspect-lock: changing W also drags H (and vice
                            // versa) at the captured ratio.  Direct setH bypasses the wheel's
                            // 20-500 range cap, so we clamp H at 20 here too.
                            const wheelW = makeNumberWheel(20, 500, Math.min(500, Math.max(20, curW)), (v) => {
                                setW(v);
                                const lk = getAspectLock();
                                if (lk > 0) {
                                    setH(Math.max(20, v / lk));
                                    rebase();
                                    renderSub();           // rebuild so the H wheel snaps to the new value
                                    return;
                                }
                                rebase();
                            }, true);
                            const wheelH = makeNumberWheel(20, 500, Math.min(500, Math.max(20, curH)), (v) => {
                                setH(v);
                                const lk = getAspectLock();
                                if (lk > 0) {
                                    setW(Math.max(20, v * lk));
                                    rebase();
                                    renderSub();
                                    return;
                                }
                                rebase();
                            }, true);
                            whRow.appendChild(wheelCol('w-arrow.png', '横幅', wheelW));
                            whRow.appendChild(wheelCol('h-arrow.png', '高さ', wheelH));
                            subBox.appendChild(whRow);
                            // 横幅と縦幅を揃える
                            const eqBtn = document.createElement('button');
                            eqBtn.type = 'button'; eqBtn.className = 'size-eq-btn';
                            eqBtn.appendChild(document.createTextNode('横幅と縦幅を揃える'));
                            eqBtn.addEventListener('click', () => {
                                try { haptic.confirm(); } catch (_) {}
                                const t = curW;
                                setW(t); setH(t); rebase();
                                renderSub();   // rebuild wheels at the new values
                            });
                            subBox.appendChild(eqBtn);
                            // 横縦比を戻す（画像のみ有効） + 横縦比を固定（全要素）
                            subBox.appendChild(aspectRestoreBtn('横縦比を戻す'));
                            subBox.appendChild(aspectLockToggleRow('横縦比を固定'));
                            // サイズ (proportional scale) — wh-arrow icon
                            const sizeRow = document.createElement('div'); sizeRow.className = 'ios-color-row';
                            const sizeIcon = document.createElement('img');
                            sizeIcon.src = 'wh-arrow.png'; sizeIcon.alt = 'サイズ'; sizeIcon.className = 'size-icon';
                            sizeRow.appendChild(sizeIcon);
                            sizeSl = makeSlider(25, 200, 1, 100, (v) => {
                                setW(Math.round(baseW * v / 100));
                                setH(Math.round(baseH * v / 100));
                            });
                            sizeSl.row.classList.add('inline-slider');
                            sizeRow.appendChild(sizeSl.row);
                            subBox.appendChild(sizeRow);
                        }
                        // ----- 回転（角度リング・全要素） -----
                        const rotLbl = document.createElement('div');
                        rotLbl.style.cssText = 'font:600 12px/1 -apple-system;color:#6c6c70;margin:14px 4px 2px;';
                        rotLbl.textContent = '回転';
                        subBox.appendChild(rotLbl);
                        const rotM = (aChild.style.transform || '').match(/rotate\(([-\d.]+)deg\)/);
                        const rotWrap = document.createElement('div');
                        rotWrap.style.cssText = 'display:flex;justify-content:center;margin:2px 0;';
                        rotWrap.appendChild(makeAngleRing(rotM ? parseFloat(rotM[1]) : 0, (deg) => {
                            const base = (aChild.style.transform || '').replace(/rotate\([^)]*\)/g, '').trim();
                            aChild.style.transform = (base + ' rotate(' + deg + 'deg)').trim();
                            positionKnobs();
                            saveCurrentSiteState();
                        }));
                        subBox.appendChild(rotWrap);
                    }
                }
                renderSub();
                setTimeout(seg.position, 60);
            }

            function renderDisplayTab() {
                eeBody.innerHTML = '';
                if (aType === 'text' || aType === 'emoji' || aType === 'heart') {
                    // 表示 is OFF by default for text — toggle to enable
                    const tRow = document.createElement('div');
                    tRow.className = 'ee-toggle-row';
                    const enabled = aChild.getAttribute('data-display-on') === '1';
                    tRow.innerHTML = `<span class="ee-toggle-label">表示（枠）を有効化</span>`;
                    const holder = document.createElement('div');
                    tRow.appendChild(makeIosToggle(enabled, (on) => {
                        aChild.setAttribute('data-display-on', on ? '1' : '0');
                        holder.style.display = on ? '' : 'none';
                        if (on) {
                            if (!holder.dataset.built) { buildDisplayControls(holder); holder.dataset.built = '1'; }
                            applyShadow(getShadowState());           // toggle ON → frame comes back
                        } else {
                            // toggle OFF → the frame (shadow) actually disappears
                            aChild.style.setProperty('box-shadow', 'none', 'important');
                        }
                        showKnobs(true);   // resize knobs stay available even with the frame OFF
                        saveCurrentSiteState();
                    }));
                    eeBody.appendChild(tRow);
                    eeBody.appendChild(holder);
                    holder.style.display = enabled ? '' : 'none';
                    if (enabled) {
                        buildDisplayControls(holder); holder.dataset.built = '1';
                    } else {
                        aChild.style.setProperty('box-shadow', 'none', 'important');
                    }
                    showKnobs(true);   // width/height stay adjustable while selected
                } else {
                    // Image: 枠を表示 toggle (synced with スタイル) + fill + border
                    let imgFrame = null;
                    if (aType === 'image') { imgFrame = buildImageFrameToggle(); eeBody.appendChild(imgFrame.row); }
                    buildDisplayControls(eeBody);
                    if (aType === 'image') {
                        // ----- 塗りつぶし: 色 / 写真 / なし -----
                        let fillMode = (aChild.style.backgroundImage && aChild.style.backgroundImage !== 'none')
                            ? 'photo' : (aChild.style.backgroundColor ? 'color' : 'none');
                        const fillLbl = document.createElement('div');
                        fillLbl.style.cssText = 'font:600 12px/1 -apple-system;color:#6c6c70;margin:8px 4px 4px;';
                        fillLbl.textContent = '塗りつぶし';
                        eeBody.appendChild(fillLbl);
                        const fillBody = document.createElement('div');
                        const fillSeg = makeSeg(
                            [{id:'color',label:'色'},{id:'photo',label:'写真'},{id:'none',label:'なし'}],
                            fillMode,
                            (id) => {
                                fillMode = id;
                                if (id === 'none') {
                                    aChild.style.backgroundColor = '';
                                    aChild.style.backgroundImage = '';
                                    aChild.style.backgroundSize = '';
                                    aChild.style.backgroundPosition = '';
                                    aChild.style.backgroundRepeat = '';
                                } else if (id === 'color') {
                                    aChild.style.backgroundImage = '';
                                    aChild.style.backgroundSize = '';
                                }
                                renderFillBody();
                                saveCurrentSiteState();
                            }
                        );
                        eeBody.appendChild(fillSeg.el);
                        eeBody.appendChild(fillBody);
                        function renderFillBody() {
                            fillBody.innerHTML = '';
                            if (fillMode === 'color') {
                                const row = document.createElement('div'); row.className = 'ios-color-row';
                                const ci = document.createElement('input'); ci.type='color'; ci.className='ios-color-native';
                                ci.value = (aChild.style.backgroundColor && aChild.style.backgroundColor.startsWith('#')) ? aChild.style.backgroundColor : '#ffffff';
                                ci.addEventListener('input', () => { aChild.style.backgroundColor = ci.value; saveCurrentSiteState(); });
                                row.appendChild(ci);
                                fillBody.appendChild(row);
                            } else if (fillMode === 'photo') {
                                const hasPhoto = aChild.style.backgroundImage && aChild.style.backgroundImage !== 'none';
                                const pick = document.createElement('button');
                                pick.type = 'button';
                                pick.className = 'ee-validate-btn';
                                pick.textContent = hasPhoto ? '写真を変更' : '写真を選ぶ';
                                const fileIn = document.createElement('input');
                                fileIn.type = 'file'; fileIn.accept = 'image/*'; fileIn.style.display = 'none';
                                pick.addEventListener('click', () => fileIn.click());
                                fileIn.addEventListener('change', () => {
                                    const f = fileIn.files && fileIn.files[0];
                                    if (!f) return;
                                    const reader = new FileReader();
                                    reader.onload = (ev) => {
                                        aChild.style.backgroundColor = '';
                                        aChild.style.backgroundImage = `url("${ev.target.result}")`;
                                        aChild.style.backgroundPosition = 'center';
                                        aChild.style.backgroundRepeat = 'no-repeat';
                                        if (!aChild.style.backgroundSize) aChild.style.backgroundSize = '100%';
                                        renderFillBody();
                                        saveCurrentSiteState();
                                    };
                                    reader.readAsDataURL(f);
                                });
                                fillBody.appendChild(pick);
                                fillBody.appendChild(fileIn);
                                // scale wheel — fitted to the frame, only once a photo is set
                                if (hasPhoto) {
                                    const scLbl = document.createElement('div');
                                    scLbl.style.cssText = 'font:600 12px/1 -apple-system;color:#6c6c70;margin:10px 4px 4px;';
                                    scLbl.textContent = '写真のスケール（％）';
                                    fillBody.appendChild(scLbl);
                                    const curScale = parseInt(aChild.style.backgroundSize || '100', 10) || 100;
                                    const scWheel = makeNumberWheel(25, 400, curScale, (v) => {
                                        aChild.style.backgroundSize = v + '%';
                                        saveCurrentSiteState();
                                    }, true);
                                    scWheel.style.maxWidth = '130px';
                                    fillBody.appendChild(scWheel);
                                }
                            }
                        }
                        renderFillBody();
                        setTimeout(fillSeg.position, 60);

                        // ----- 枠線 width -----
                        const bw = parseInt((aChild.style.borderWidth||'0'),10) || 0;
                        const bRow = makeSlider(0, 12, 1, bw, (v) => {
                            if (v > 0) {
                                aChild.style.borderStyle = 'solid';
                                aChild.style.borderWidth = v + 'px';
                                applyBorderColor();
                            } else {
                                // width 0 → fully clear the border so no stray line is left
                                aChild.style.borderWidth = '0';
                                aChild.style.borderStyle = '';
                                aChild.style.borderColor = '';
                                aChild.style.borderImage = '';
                            }
                            saveCurrentSiteState();
                        });
                        eeBody.appendChild(bRow.row);

                        // ----- 枠線の色: base colour + "+" → gradient (max 3 extra) -----
                        const bcLbl = document.createElement('div');
                        bcLbl.style.cssText = 'font:600 12px/1 -apple-system;color:#6c6c70;margin:8px 4px 4px;';
                        bcLbl.textContent = '枠線の色';
                        eeBody.appendChild(bcLbl);
                        const biMatch = (aChild.style.borderImage || '').match(/linear-gradient\(([^)]+)\)/);
                        let borderColors;
                        if (biMatch) {
                            const ps = biMatch[1].split(',').map(s => s.trim());
                            borderColors = /-?\d+deg$/.test(ps[0]) ? ps.slice(1) : ps;
                        } else {
                            borderColors = [(aChild.style.borderColor && aChild.style.borderColor.startsWith('#')) ? aChild.style.borderColor : '#1c1c1e'];
                        }
                        if (borderColors.length > 4) borderColors = borderColors.slice(0, 4); // 1 base + 3 extra
                        const bcRow = document.createElement('div'); bcRow.className = 'ios-color-row';
                        const bc1 = document.createElement('input'); bc1.type='color'; bc1.className='ios-color-native';
                        bc1.value = borderColors[0];
                        bc1.addEventListener('input', () => { borderColors[0] = bc1.value; applyBorderColor(); saveCurrentSiteState(); });
                        const bcExtra = document.createElement('div'); bcExtra.className = 'grad-colors-extra';
                        const bcAdd = document.createElement('button'); bcAdd.type='button'; bcAdd.className='grad-add-btn'; bcAdd.textContent='+';
                        bcRow.appendChild(bc1); bcRow.appendChild(bcExtra); bcRow.appendChild(bcAdd);
                        eeBody.appendChild(bcRow);
                        function renderBorderExtras() {
                            bcExtra.innerHTML = '';
                            borderColors.slice(1).forEach((hex, idx) => {
                                const i = idx + 1;
                                const item = document.createElement('div'); item.className = 'grad-color-item';
                                const inp = document.createElement('input'); inp.type='color'; inp.className='ios-color-native'; inp.value = hex;
                                inp.addEventListener('input', () => { borderColors[i] = inp.value; applyBorderColor(); saveCurrentSiteState(); });
                                item.appendChild(inp);
                                const rm = document.createElement('button'); rm.type='button'; rm.className='grad-remove-btn'; rm.textContent='−';
                                rm.addEventListener('click', (ev) => {
                                    ev.stopPropagation();
                                    item.classList.add('removing');
                                    setTimeout(() => { borderColors.splice(i,1); renderBorderExtras(); applyBorderColor(); saveCurrentSiteState(); }, 500);
                                });
                                item.appendChild(rm);
                                bcExtra.appendChild(item);
                            });
                            bcAdd.style.display = borderColors.length >= 4 ? 'none' : 'flex';
                        }
                        bcAdd.addEventListener('click', () => {
                            if (borderColors.length >= 4) return;
                            try { haptic.selection(); } catch(_){}
                            borderColors.push('#5AC8FA');
                            renderBorderExtras();
                            applyBorderColor();
                            saveCurrentSiteState();
                        });
                        function applyBorderColor() {
                            if (!aChild.style.borderWidth || aChild.style.borderWidth === '0px') return;
                            aChild.style.borderStyle = 'solid';
                            if (borderColors.length > 1) {
                                aChild.style.borderImage = `linear-gradient(135deg, ${borderColors.join(', ')}) 1`;
                            } else {
                                aChild.style.borderImage = '';
                                aChild.style.borderColor = borderColors[0];
                            }
                        }
                        renderBorderExtras();
                    }
                    // 枠を表示 OFF → hide every control below the toggle (all siblings now exist)
                    if (imgFrame && aChild.classList.contains('no-style')) imgFrame.applyVis(false);
                    showKnobs(true);
                }
            }

            // 枠を表示 toggle — controls .no-style on the image (old double-tap behaviour)
            function buildImageFrameToggle() {
                const row = document.createElement('div');
                row.className = 'ee-toggle-row';
                row.innerHTML = '<span class="ee-toggle-label">枠を表示</span>';
                const frameOn = !aChild.classList.contains('no-style');
                // 枠を表示 OFF → every control below this toggle is hidden (no stray elements)
                function applyVis(on) {
                    let n = row.nextElementSibling;
                    while (n) { n.style.display = on ? '' : 'none'; n = n.nextElementSibling; }
                }
                row.appendChild(makeIosToggle(frameOn, (on) => {
                    aChild.classList.toggle('no-style', !on);
                    if (!on) {   // frame OFF → shadow (incl. PNG drop-shadow) all gone
                        aChild.style.filter = (aChild.style.filter || '').replace(/drop-shadow\([^)]*\)/g, '').trim();
                    }
                    saveCurrentSiteState();
                    // ON → full rebuild so the number wheels lay out while visible.
                    // OFF → just hide everything below the toggle.
                    if (on) renderDisplayTab();
                    else applyVis(false);
                }));
                return { row, applyVis };
            }

            // ---------- ACTION tab ----------
            function renderActionTab() {
                eeBody.innerHTML = '';

                // Action-type segmented: URLを開く / アクション (visual blocks)
                // (旧: URL / Java Script / Type Script — ユーザー指示で JS/TS タブ + textarea を全廃止し、
                //  Visual Blocks エディタ (blocks/index.html を iframe で 0.5s scale-up) に置換)
                let actMode = aChild.getAttribute('data-url') ? 'url'
                            : aChild.getAttribute('data-html-file') ? 'url'
                            : (aChild.getAttribute('data-action-blocks') || aChild.getAttribute('data-js-code')) ? 'blocks'
                            : 'url';
                const seg = makeSeg(
                    [{id:'url',label:'URLを開く'},{id:'blocks',label:'アクション'}],
                    actMode,
                    (id) => { actMode = id; renderActBody(); }
                );
                eeBody.appendChild(seg.el);
                const actBox = document.createElement('div');
                eeBody.appendChild(actBox);

                function renderActBody() {
                    actBox.innerHTML = '';
                    if (actMode === 'url') {
                        // Site cards (in-app navigation) + URL input
                        const cards = document.createElement('div');
                        cards.className = 'ee-act-cards';
                        const htmlFiles = addedFiles.filter(f => f.type === 'html' || f.type === '3d');
                        const curHtml = aChild.getAttribute('data-html-file') || '';
                        htmlFiles.forEach(f => {
                            const card = document.createElement('div');
                            card.className = 'ee-act-card' + (f.name === curHtml ? ' selected' : '');
                            card.textContent = f.name.replace(/\.html$/, '');
                            card.addEventListener('click', () => {
                                try { haptic.selection(); } catch(_){}
                                cards.querySelectorAll('.ee-act-card').forEach(c => c.classList.remove('selected'));
                                card.classList.add('selected');
                                aChild.setAttribute('data-html-file', f.name);
                                aChild.removeAttribute('data-url');
                                aChild.removeAttribute('data-js-code');
                                aChild.removeAttribute('data-ts-code');
                                urlInput.value = '';
                                saveCurrentSiteState();
                            });
                            cards.appendChild(card);
                        });
                        const newCard = document.createElement('div');
                        newCard.className = 'ee-act-card new-card';
                        newCard.textContent = '+';
                        newCard.addEventListener('click', () => {
                            try { haptic.confirm(); } catch(_){}
                            const npo = document.getElementById('newPageOverlay');
                            const npi = document.getElementById('newPageInput');
                            if (npo) { npo.classList.add('active'); if (npi) { npi.value=''; setTimeout(()=>npi.focus(),280); } }
                        });
                        cards.appendChild(newCard);
                        actBox.appendChild(cards);
                        const note = document.createElement('div');
                        note.className = 'ear-sub';
                        note.style.textAlign = 'center';
                        note.innerHTML = 'App内を移動する。<br>or';
                        actBox.appendChild(note);
                        const urlInput = document.createElement('input');
                        urlInput.type = 'text';
                        urlInput.className = 'ee-act-urlinput';
                        urlInput.placeholder = 'URLを入力・・・';
                        urlInput.value = aChild.getAttribute('data-url') || '';
                        urlInput.addEventListener('input', () => {
                            const v = urlInput.value.trim();
                            if (v) {
                                aChild.setAttribute('data-url', v);
                                aChild.removeAttribute('data-html-file');
                                aChild.removeAttribute('data-js-code');
                                aChild.removeAttribute('data-ts-code');
                                cards.querySelectorAll('.ee-act-card').forEach(c => c.classList.remove('selected'));
                            } else {
                                aChild.removeAttribute('data-url');
                            }
                            saveCurrentSiteState();
                        });
                        actBox.appendChild(urlInput);
                    } else {
                        // ----- アクション (visual blocks) -----
                        // Pop view: a compact summary of the saved block stack + 「編集」 button.
                        // 編集 → window.__openActionBlocks(aChild) opens the fullscreen iframe overlay
                        // with the 0.5s scale-up animation. State writes back to data-action-blocks
                        // (JSON program) + data-js-code (generated code) on every change.
                        let program = [];
                        try { program = JSON.parse(aChild.getAttribute('data-action-blocks') || '[]'); }
                        catch (_) { program = []; }

                        const summary = document.createElement('div');
                        summary.className = 'ee-act-blocks-summary';
                        function renderSummary() {
                            summary.innerHTML = '';
                            if (!program.length) {
                                const empty = document.createElement('div');
                                empty.className = 'ee-act-blocks-empty';
                                empty.textContent = 'まだアクションがありません。「編集」でブロックを追加';
                                summary.appendChild(empty);
                                return;
                            }
                            program.forEach((node, i) => {
                                const row = document.createElement('div');
                                row.className = 'ee-act-blocks-row';
                                const idx = document.createElement('span');
                                idx.className = 'ee-act-blocks-idx';
                                idx.textContent = String(i + 1);
                                row.appendChild(idx);
                                const lbl = document.createElement('span');
                                lbl.className = 'ee-act-blocks-lbl';
                                lbl.textContent = (node && node.blockId) ? node.blockId : '?';
                                row.appendChild(lbl);
                                summary.appendChild(row);
                            });
                        }
                        renderSummary();
                        actBox.appendChild(summary);

                        const editBtn = document.createElement('button');
                        editBtn.type = 'button';
                        editBtn.className = 'ee-validate-btn ee-act-edit-btn';
                        editBtn.textContent = '編集';
                        editBtn.addEventListener('click', () => {
                            try { haptic.confirm(); } catch (_) {}
                            if (window.__openActionBlocks) window.__openActionBlocks(aChild, (newProgram, generatedCode) => {
                                program = newProgram || [];
                                renderSummary();
                            });
                        });
                        actBox.appendChild(editBtn);
                    }
                    setTimeout(() => positionEditor(), 30);
                }
                renderActBody();
                setTimeout(seg.position, 60);

                // haptic builder
                const hLabel = document.createElement('div');
                hLabel.className = 'ee-haptic-label';
                hLabel.textContent = '触覚フィードバック（タップで追加 / 上下で長さ / 外へドラッグで削除）';
                eeBody.appendChild(hLabel);
                const builder = document.createElement('div');
                builder.className = 'haptic-builder';
                builder.innerHTML = '<div class="hb-scale"><span>0ms</span><span>500</span><span>1000ms</span></div>';
                eeBody.appendChild(builder);
                buildHapticBuilder(builder);
            }

            // Thin wrapper over the shared top-level builder. attrName lets one element
            // carry several independent sequences (e.g. audio: data-haptic-play/-pause).
            function buildHapticBuilder(builder, attrName) {
                const ATTR = attrName || 'data-haptic';
                function getArr()    { try { return JSON.parse(aChild.getAttribute(ATTR) || '[]'); } catch (_) { return []; } }
                function setArr(arr) { aChild.setAttribute(ATTR, JSON.stringify(arr)); }
                buildHapticBuilderOn(builder, getArr, setArr, () => saveCurrentSiteState());

                // 触覚ラボは廃止. プリセットチップをビルダー直下に並べる. タップで
                // 該当パターンの pulse 列を builder に書き込み, 即触覚を再生して結果を体感.
                const PRESETS = [
                    { id:'err6',   label:'エラー6連',
                      build: () => [0,1,2,4,5,6].map(i => ({ at: i * 150, len: 30, kind: 'error' })) },
                    { id:'b3x3',   label:'3×3バースト',
                      build: () => { const o = []; for (let i = 0; i < 3; i++) { const b = i * 3.5; [b, b+1, b+2].forEach(j => o.push({ at: Math.round(j * 45), len: 30, kind: 'error' })); } return o; } },
                    { id:'fast5',  label:'爆速5連',
                      build: () => Array.from({ length: 5 }, (_, i) => ({ at: i * 30, len: 20, kind: 'error' })) },
                    { id:'one+6',  label:'単発→6連',
                      build: () => [{ at: 0, len: 30, kind: 'error' }].concat(Array.from({ length: 6 }, (_, i) => ({ at: 800 + i * 30, len: 20, kind: 'error' }))) },
                    { id:'hold',   label:'ホールド連射',
                      build: () => Array.from({ length: 45 }, (_, i) => ({ at: i * 22, len: 18, kind: 'error' })) }
                ];
                const chipsRow = document.createElement('div');
                chipsRow.className = 'haptic-presets';
                PRESETS.forEach((p) => {
                    const b = document.createElement('button');
                    b.type = 'button'; b.className = 'haptic-preset-chip';
                    b.textContent = p.label;
                    b.addEventListener('click', (e) => {
                        e.stopPropagation();
                        try { haptic.confirm(); } catch (_) {}
                        const arr = p.build();
                        setArr(arr);
                        saveCurrentSiteState();
                        // ビルダーの中身を再構築 — 既存 pulses を捨てて新規スタンプ
                        builder.querySelectorAll('.hb-pulse, .hb-pulse-wrap').forEach((n) => n.remove());
                        buildHapticBuilderOn(builder, getArr, setArr, () => saveCurrentSiteState());
                        // プレビュー再生
                        arr.forEach((s) => setTimeout(() => {
                            try { (s.kind === 'error' ? haptic.error : (haptic.confirm || haptic))(); } catch (_) {}
                        }, s.at));
                    });
                    chipsRow.appendChild(b);
                });
                builder.parentNode.insertBefore(chipsRow, builder);

                // 右上のリセットボタン (CCW 矢印, 0.5s 反時計回り 1 周, haptic 1 発).
                const rstBtn = document.createElement('button');
                rstBtn.type = 'button'; rstBtn.className = 'hl-open-btn haptic-reset-btn';
                rstBtn.setAttribute('aria-label', '触覚をリセット');
                rstBtn.innerHTML = '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
                    '<path d="M3 12a9 9 0 1 0 3-6.7"/><polyline points="3 4 3 9 8 9"/></svg>';
                rstBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    try { (haptic.confirm || haptic)(); } catch (_) {}
                    setArr([]);
                    saveCurrentSiteState();
                    builder.querySelectorAll('.hb-pulse, .hb-pulse-wrap').forEach((n) => n.remove());
                    buildHapticBuilderOn(builder, getArr, setArr, () => saveCurrentSiteState());
                    const svg = rstBtn.querySelector('svg');
                    if (svg) {
                        svg.classList.remove('hl-reset-spin');
                        void svg.offsetWidth;
                        svg.classList.add('hl-reset-spin');
                        svg.addEventListener('animationend', () => svg.classList.remove('hl-reset-spin'), { once: true });
                    }
                });
                builder.appendChild(rstBtn);
            }

            // ---------- resize knobs ----------
            let knobsVisible = false;
            function showKnobs(show) {
                knobsVisible = show;
                if (show && aWrap) {
                    // HR: width-only → show just left/right knobs
                    const widthOnly = (aType === 'hr');
                    resizeKnobs.querySelectorAll('.rk').forEach(k => {
                        const d = k.dataset.dir;
                        k.style.display = (widthOnly && d !== 'w' && d !== 'e') ? 'none' : '';
                    });
                    // Aspect lock → 4 corners only (n/s/e/w hidden via .aspect-locked CSS).
                    resizeKnobs.classList.toggle('aspect-locked', !!(aChild && getAspectLock() > 0));
                    positionKnobs();
                    resizeKnobs.classList.add('active');
                } else {
                    resizeKnobs.classList.remove('active');
                }
            }
            function hideKnobs() { knobsVisible = false; resizeKnobs.classList.remove('active'); }
            function positionKnobs() {
                if (!aWrap || !knobsVisible) return;
                const r = aWrap.getBoundingClientRect();
                resizeKnobs.style.left = (r.left + window.scrollX) + 'px';
                resizeKnobs.style.top = (r.top + window.scrollY) + 'px';
                resizeKnobs.style.width = r.width + 'px';
                resizeKnobs.style.height = r.height + 'px';
            }
            // Called from makeDraggable on every move frame so the resize
            // knobs (and the editor) stay glued to the element in real time.
            window.__followElement = function (el) {
                if (aWrap !== el) return;
                if (knobsVisible) positionKnobs();
                if (editor.classList.contains('active')) positionEditor();
            };
            // knob drag
            resizeKnobs.querySelectorAll('.rk').forEach(knob => {
                knob.addEventListener('pointerdown', (e) => {
                    e.stopPropagation();
                    if (!aChild) return;
                    const dir = knob.dataset.dir;
                    const isHr = (aType === 'hr');
                    // HR: width lives on the wrapper; others: on the child
                    const wTarget = isHr ? aWrap : aChild;
                    const startX = e.clientX, startY = e.clientY;
                    const wr = wTarget.getBoundingClientRect();
                    const cr = aChild.getBoundingClientRect();
                    const startW = wr.width, startH = cr.height;
                    knob.setPointerCapture(e.pointerId);
                    function mv(ev) {
                        let dw = ev.clientX - startX;
                        let dh = ev.clientY - startY;
                        if (dir.includes('w')) dw = -dw;
                        if (dir.includes('n')) dh = -dh;
                        const lk = isHr ? 0 : getAspectLock();          // lock disabled for hr
                        const horiz = dir.includes('e') || dir.includes('w');
                        const vert  = dir.includes('n') || dir.includes('s');
                        if (lk > 0) {
                            // Locked: derive both axes from whichever side the user is dragging.
                            // Corner drag = pick the axis with the bigger relative delta so the
                            // resize feels natural in both directions.
                            let nw, nh;
                            if (horiz && vert) {
                                if (Math.abs(dw) * (startH || 1) >= Math.abs(dh) * (startW || 1)) {
                                    nw = Math.max(24, startW + dw); nh = Math.max(20, nw / lk);
                                } else {
                                    nh = Math.max(20, startH + dh); nw = Math.max(24, nh * lk);
                                }
                            } else if (horiz) {
                                nw = Math.max(24, startW + dw); nh = Math.max(20, nw / lk);
                            } else {
                                nh = Math.max(20, startH + dh); nw = Math.max(24, nh * lk);
                            }
                            wTarget.style.width  = nw + 'px';
                            aChild.style.height  = nh + 'px';
                        } else {
                            if (horiz) wTarget.style.width = Math.max(24, startW + dw) + 'px';
                            if (!isHr && vert) aChild.style.height = Math.max(20, startH + dh) + 'px';
                        }
                        positionKnobs();
                    }
                    function up(ev) {
                        knob.removeEventListener('pointermove', mv);
                        knob.removeEventListener('pointerup', up);
                        try { knob.releasePointerCapture(ev.pointerId); } catch (_) {}
                        saveCurrentSiteState();
                    }
                    knob.addEventListener('pointermove', mv);
                    knob.addEventListener('pointerup', up);
                });
            });

            // ---------- tab management ----------
            function positionTabPill() {
                const a = eeTabsEl.querySelector('.ee-tab.active');
                if (!a) return;
                const sR = eeTabsEl.getBoundingClientRect();
                const aR = a.getBoundingClientRect();
                if (!aR.width) return;
                eeTabPill.style.transform = `translateX(${aR.left - sR.left}px)`;
                eeTabPill.style.width = aR.width + 'px';
                eeTabPill.classList.add('ready');
                // 表示 tab uses dark pill
                eeTabPill.classList.toggle('dark', curTab === 'display');
                eeTabsEl.querySelectorAll('.ee-tab').forEach(t => t.classList.toggle('on-dark', curTab === 'display' && t.classList.contains('active')));
            }
            function selectTab(name) {
                curTab = name;
                eeTabsEl.querySelectorAll('.ee-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
                positionTabPill();
                if (name === 'style') renderStyleTab();
                else if (name === 'display') renderDisplayTab();
                else if (name === 'filter') renderFilterTab();
                else if (name === 'entrance') renderEntranceTab();
                else renderActionTab();
                // 4-corner resize knobs stay available on every tab (not just 表示).
                showKnobs(true);
                setTimeout(() => positionEditor(), 30);
            }

            // ---------- ENTRANCE tab (登場トランジション + 時間) ----------
            function renderEntranceTab() {
                eeBody.innerHTML = '';
                const wrap = document.createElement('div');
                wrap.className = 'entrance-tab';
                wrap.style.cssText = 'display:flex;flex-direction:column;gap:14px;padding:4px 0;';

                // Build one config block (登場 / 非表示) — params determine the attrs read/written
                // and the preview function (entrance plays in place; exit plays a quick preview
                // that auto-removes the class so the element stays visible).
                function buildAnimSection(opts) {
                    const sec = document.createElement('div');
                    sec.style.cssText = 'display:flex;flex-direction:column;gap:8px;';
                    const lbl = document.createElement('div');
                    lbl.style.cssText = 'font:600 12px/1 -apple-system;color:#6c6c70;margin:2px 4px 4px;';
                    lbl.textContent = opts.title;
                    sec.appendChild(lbl);
                    const initial = aChild.getAttribute(opts.attr) || 'none';
                    // Slide is split into ↑ (slide-up) and ↓ (slide-down).  The old combined
                    // 'slide' value migrates implicitly: anything stored as 'slide-up' shows on
                    // the ↑ chip; anything else uses no preset.
                    const presetSeg = makeSeg(
                        [{id:'none',label:'なし'},{id:'fade',label:'フェード'},{id:'scale-up',label:'拡大'},
                         {id:'slide-up',label:'↑スライド'},{id:'slide-down',label:'↓スライド'},{id:'scale-down',label:'縮小'}],
                        initial,
                        (id) => {
                            if (id === 'none') aChild.removeAttribute(opts.attr);
                            else { aChild.setAttribute(opts.attr, id); opts.preview && opts.preview(); }
                            saveCurrentSiteState();
                            syncDurVisibility(id);
                            if (durResetBtn) durResetBtn.style.opacity = (id === 'none') ? '0.45' : '';
                        }
                    );
                    sec.appendChild(presetSeg.el);
                    setTimeout(() => presetSeg.position(), 60);

                    // ----- Duration wheel — preset === 'none' で非表示.
                    // Phase 59-H: 共通 makeIosWheel に統一. 0.1〜3.0 を step 0.1 で.
                    const initDur = parseFloat(aChild.getAttribute(opts.durAttr));
                    const initSec = (isFinite(initDur) && initDur > 0) ? initDur : (opts.defaultSec || 0.5);
                    let toPreview;
                    const dWheel = makeIosWheel({
                        orientation: 'v',
                        min: 0.1, max: 3.0, step: 0.1, val: initSec, plain: true,
                        onChange: (s) => {
                            aChild.setAttribute(opts.durAttr, s.toFixed(1));
                            saveCurrentSiteState();
                            clearTimeout(toPreview);
                            toPreview = setTimeout(() => {
                                if ((aChild.getAttribute(opts.attr) || 'none') !== 'none' && opts.preview) opts.preview();
                            }, 80);
                        }
                    });
                    dWheel.style.cssText = 'width:120px;margin:0 auto;';

                    const durBox = document.createElement('div');
                    durBox.style.cssText = 'display:flex;flex-direction:column;gap:6px;align-items:center;';
                    const durLbl = document.createElement('div');
                    durLbl.style.cssText = 'font:600 12px/1 -apple-system;color:#6c6c70;margin:8px 4px 0;';
                    durLbl.textContent = opts.durLabel;
                    durBox.appendChild(durLbl);
                    durBox.appendChild(dWheel);
                    sec.appendChild(durBox);
                    let durResetBtn = null;     // unused; referenced from syncDurVisibility for compat
                    function syncDurVisibility(id) { durBox.style.display = (id === 'none') ? 'none' : 'flex'; }
                    syncDurVisibility(initial);
                    return sec;
                }

                // ----- 登場 (entrance) -----
                wrap.appendChild(buildAnimSection({
                    title: '登場トランジション',
                    attr: 'data-anim',
                    durAttr: 'data-anim-duration',
                    durLabel: '出る時間 (秒)',
                    defaultSec: 0.5,
                    preview: () => playEntranceAnim(aChild)
                }));

                // ----- 非表示 (exit) — separate preset + duration, stored under data-exit-* -----
                wrap.appendChild(buildAnimSection({
                    title: '非表示トランジション (要素を削除する時)',
                    attr: 'data-exit-anim',
                    durAttr: 'data-exit-duration',
                    durLabel: '消える時間 (秒)',
                    defaultSec: 0.4,
                    // Preview: play the exit anim then immediately reverse so the element stays.
                    preview: () => {
                        playExitAnim(aChild, () => {
                            const a = aChild.getAttribute('data-exit-anim');
                            if (a) aChild.classList.remove('el-exit-' + a);
                            aChild.style.removeProperty('--el-exit-duration');
                            aChild.style.opacity = '';
                            aChild.style.transform = '';
                        });
                    }
                }));

                eeBody.appendChild(wrap);
            }

            // ---------- FILTER tab (CSS filter on any element) ----------
            function renderFilterTab() {
                eeBody.innerHTML = '';
                const FILTERS = [
                    { id:'blur',       label:'ぼかし',     unit:'px',   min:0, max:24,  def:0,   fmt:v=>`blur(${v}px)` },
                    { id:'brightness', label:'明るさ',     unit:'%',    min:0, max:200, def:100, fmt:v=>`brightness(${v}%)` },
                    { id:'contrast',   label:'コントラスト', unit:'%',   min:0, max:200, def:100, fmt:v=>`contrast(${v}%)` },
                    { id:'saturate',   label:'彩度',       unit:'%',    min:0, max:200, def:100, fmt:v=>`saturate(${v}%)` },
                    { id:'grayscale',  label:'グレースケール', unit:'%', min:0, max:100, def:0,   fmt:v=>`grayscale(${v}%)` },
                    { id:'sepia',      label:'セピア',     unit:'%',    min:0, max:100, def:0,   fmt:v=>`sepia(${v}%)` },
                    { id:'hue-rotate', label:'色相回転',   unit:'deg',  min:0, max:360, def:0,   fmt:v=>`hue-rotate(${v}deg)` },
                    { id:'invert',     label:'反転',       unit:'%',    min:0, max:100, def:0,   fmt:v=>`invert(${v}%)` }
                ];
                let state = {};
                try { state = JSON.parse(aChild.getAttribute('data-filter') || '{}'); } catch (_) { state = {}; }
                function applyFilter() {
                    const parts = FILTERS
                        .filter(f => state[f.id] != null && state[f.id] !== f.def)
                        .map(f => f.fmt(state[f.id]));
                    // keep any PNG drop-shadow (set by the 表示 tab) alongside the CSS filters
                    const ds = (aChild.style.filter || '').match(/drop-shadow\([^)]*\)/g) || [];
                    aChild.style.filter = [parts.join(' '), ...ds].filter(Boolean).join(' ');
                    aChild.setAttribute('data-filter', JSON.stringify(state));
                    saveCurrentSiteState();
                }
                FILTERS.forEach(f => {
                    const wrap = document.createElement('div');
                    const lab = document.createElement('div');
                    lab.style.cssText = 'font:600 12px/1 -apple-system;color:#6c6c70;margin:8px 4px 2px;';
                    lab.textContent = f.label;
                    wrap.appendChild(lab);
                    const cur = (state[f.id] != null) ? state[f.id] : f.def;
                    const sl = makeSlider(f.min, f.max, 1, cur, (v) => {
                        state[f.id] = v;
                        applyFilter();
                    });
                    wrap.appendChild(sl.row);
                    eeBody.appendChild(wrap);
                });
                // reset all
                const reset = document.createElement('button');
                reset.type = 'button';
                reset.textContent = 'フィルターをリセット';
                reset.style.cssText = 'width:100%;margin-top:10px;padding:12px;border:none;border-radius:12px;background:rgba(120,120,128,0.14);color:#1c1c1e;font:600 14px -apple-system;cursor:pointer;';
                reset.addEventListener('click', () => {
                    try { haptic.error(); } catch (_) {}
                    state = {};
                    aChild.style.filter = '';
                    aChild.removeAttribute('data-filter');
                    saveCurrentSiteState();
                    renderFilterTab();
                });
                eeBody.appendChild(reset);
            }
            eeTabsEl.addEventListener('click', (e) => {
                const t = e.target.closest('.ee-tab');
                if (!t) return;
                try { haptic.selection(); } catch (_) {}
                selectTab(t.dataset.tab);
            });

            function positionEditor() {
                if (!aWrap || !editor.classList.contains('active')) return;
                const r = aWrap.getBoundingClientRect();
                const tail = editor.querySelector('.ee-tail');
                editor.style.visibility = 'visible';
                const VW = window.innerWidth, VH = window.innerHeight;

                // ── Phone: App Clip-style card. Pin it to the half OPPOSITE the element so the
                //    edited object always stays in a visible position (never hidden behind it).
                if (VW <= 760) {
                    // App Clip card: 常に下、画面の半分くらいの高さ
                    const M = 8, chromeP = 104;
                    editor.classList.add('ee-appclip');
                    editor.classList.remove('ee-appclip-top');
                    tail.style.display = 'none';
                    editor.style.left = M + 'px';
                    editor.style.right = M + 'px';
                    editor.style.width = 'auto';
                    editor.style.top = 'auto';
                    editor.style.bottom = 'calc(' + M + 'px + env(safe-area-inset-bottom))';
                    eeBody.style.maxHeight = Math.max(200, Math.round(0.5 * VH) - chromeP) + 'px';
                    return;
                }
                editor.classList.remove('ee-appclip', 'ee-appclip-top');
                editor.style.right = ''; editor.style.bottom = ''; editor.style.width = '';

                // Constrain body height so the whole editor never exceeds the viewport
                const chrome = 90; // trash + tabs + padding
                const roomAbove = r.top - 26;
                const ew = editor.offsetWidth;

                if (roomAbove >= 200) {
                    // ── ABOVE the element (speech-bubble down). Body height = fit the room above.
                    eeBody.style.maxHeight = Math.min(Math.round(0.56 * VH), roomAbove - chrome) + 'px';
                    const eh = editor.offsetHeight;
                    let left = r.left + r.width / 2 - ew / 2;
                    left = Math.max(8, Math.min(left, VW - ew - 8));
                    let top = r.top - eh - 18;
                    const _sat = window.__safeTop();
                    if (top < _sat + 8) top = _sat + 8;
                    editor.style.left = left + 'px';
                    editor.style.top = top + 'px';
                    tail.style.display = '';
                    tail.style.left = Math.max(16, Math.min((r.left + r.width / 2) - left, ew - 16)) + 'px';
                } else {
                    // ── NOT enough room above → place to the SIDE so the element stays visible.
                    eeBody.style.maxHeight = Math.round(0.6 * VH) + 'px';
                    const eh = editor.offsetHeight;
                    let left, top;
                    const spaceRight = VW - r.right;
                    if (spaceRight >= ew + 16) {
                        left = r.right + 14;            // right of the element
                    } else if (r.left >= ew + 16) {
                        left = r.left - ew - 14;        // left of the element
                    } else {
                        left = Math.max(8, Math.min(r.left + r.width / 2 - ew / 2, VW - ew - 8));
                    }
                    top = Math.max(window.__safeTop() + 8, Math.min(r.top + r.height / 2 - eh / 2, VH - eh - 8));
                    editor.style.left = left + 'px';
                    editor.style.top = top + 'px';
                    tail.style.display = 'none'; // no downward tail when side-positioned
                }
            }
            // Keep editor anchored when its content height changes (toggles, sub-tabs…)
            if (window.ResizeObserver) {
                new ResizeObserver(() => positionEditor()).observe(eeBody);
            }

            function openEditor(wrapper) {
                if (wrapper && wrapper.dataset && wrapper.dataset.locked === '1') return;   // L: ロック中は編集（選択/ノブ/エディタ）不可
                // V3 Phase 3 — add-surfaces and the edit dialog never coexist
                if (window.__hideAddBar) window.__hideAddBar();
                if (window.__hideObjsMenu) window.__hideObjsMenu();
                aWrap = wrapper;
                aChild = wrapper.firstElementChild;
                window.__activeChild = aChild;          // expose so e.g. globe drag-rotate gates on edit mode
                aType = aChild ? (aChild.getAttribute('data-element-type') ||
                        (aChild.querySelector && aChild.querySelector('.smart-stack') ? 'smart-stack' : null) ||
                        (aChild.classList && aChild.classList.contains('media-row') ? 'media-row' : 'unknown')) : 'unknown';
                if (aChild && aChild.classList.contains('smart-stack-wrap')) aType = 'smart-stack';
                if (aChild && aChild.classList.contains('media-row')) aType = 'media-row';
                // Audio is a sound-playback tool — it has no "action", so hide that tab.
                const _actionTab = eeTabsEl.querySelector('.ee-tab[data-tab="action"]');
                if (_actionTab) _actionTab.style.display = (aType === 'audio') ? 'none' : '';
                curTab = 'style';
                eeTabsEl.querySelectorAll('.ee-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'style'));
                renderStyleTab();
                editor.classList.add('active');
                window.__uiOpenedAt = Date.now();   // mobile: block the trailing ghost-click from closing this
                showKnobs(true);   // 4-corner resize available from the moment the editor opens
                requestAnimationFrame(() => {
                    positionEditor();
                    positionTabPill();
                });
                setTimeout(() => { positionEditor(); positionTabPill(); }, 120);
            }
            function closeEditor() {
                editor.classList.remove('active');
                hideKnobs();
                aWrap = aChild = aType = null;
                window.__activeChild = null;
            }
            window.__closeElementEditor = closeEditor;

            // ---------- triggers ----------
            mainContent.addEventListener('click', (e) => {
                if (isDragging) return;
                if (isPreviewMode) return;
                const el = e.target.closest('.placed-element');
                if (!el) return;
