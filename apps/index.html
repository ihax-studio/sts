            if (!fab || !ovr || !card || !rowEl || !segEl) return;

            // Defaults: 1 white solid colour, no blur, no photo.  Adding more colours via +
            // is what unlocks the gradient layout; the angle ring only takes effect with ≥2 colours.
            const DEFAULT_BG = { mode: 'color', colors: ['#ffffff'], angle: 120, blur: false, intensity: 1.0, photo: '' };
            function readState() {
                const s = sites[currentSite] || {};
                const bg = (s.bgState && typeof s.bgState === 'object') ? s.bgState : {};
                return Object.assign({}, DEFAULT_BG, bg, { colors: (bg.colors && bg.colors.length) ? bg.colors.slice(0, 3) : DEFAULT_BG.colors.slice() });
            }
            function writeState(st) {
                if (!sites[currentSite]) sites[currentSite] = { name: currentSite, elements: [], title: currentSite };
                sites[currentSite].bgState = st;
                applyState(st);
                if (typeof saveToStorage === 'function') saveToStorage();
            }
            // Background-layer plumbing.  Apply background + (photo-only) blur to a dedicated
            // `.page-bg-layer` div sitting BEHIND every placed element.  ぼかす never touches
            // the placed elements themselves (ユーザー指示「ぼかすは背景だけ」).
            function ensureBgLayer() {
                const target = (typeof mainContent !== 'undefined') ? mainContent : null;
                if (!target) return null;
                let layer = target.querySelector(':scope > .page-bg-layer');
                if (!layer) {
                    layer = document.createElement('div');
                    layer.className = 'page-bg-layer';
                    target.insertBefore(layer, target.firstChild);
                }
                return layer;
            }
            function bgCss(st) {
                const cols = (st.colors || []).filter(Boolean);
                const colorPart = cols.length === 0 ? ''
                    : (cols.length === 1 ? cols[0]
                        : `linear-gradient(${st.angle || 120}deg, ${cols.join(', ')})`);
                if (st.mode === 'photo' && st.photo) {
                    // PNG 透過対応: 写真を上、色/グラデを下に積層. CSS background は左ほど前面.
                    return colorPart
                        ? `url("${st.photo}") center/cover no-repeat, ${colorPart}`
                        : `url("${st.photo}") center/cover no-repeat`;
                }
                return colorPart;
            }
            function applyState(st) {
                const target = (typeof mainContent !== 'undefined') ? mainContent : null;
                if (!target) return;
                // ブースト ON なら 33px (おまけ仕様). 通常 blur は 15 × intensity.
                function blurFor(st) {
                    if (st.mode !== 'photo' || !st.blur) return 0;
                    return st.blurBoost ? 33 : (15 * (st.intensity || 1.0));
                }
                // 3D ページ: bg-layer (canvas の下のレイヤ) にのみ bg と blur を当てる.
                // canvas/テクスチャ/3D オブジェクトは絶対に blur されない (ユーザー指示).
                const stage3d = target.querySelector(':scope > .stage3d-root');
                if (stage3d) {
                    const bgLayer = stage3d.querySelector(':scope > .stage3d-bg-layer');
                    const layer = bgLayer || stage3d;     // fallback to root for old mounts
                    if (st.mode === 'photo' && st.photo) {
                        layer.style.background = bgCss(st);
                    } else {
                        // 色 / グラデ + default のラジアルブルームを重ねて雰囲気を残す
                        const userBg = bgCss(st);
                        layer.style.background = userBg
                            ? userBg + ',radial-gradient(1200px 800px at 18% 12%, rgba(90,200,250,0.18), transparent 60%),' +
                                       'radial-gradient(1000px 700px at 82% 88%, rgba(175,82,222,0.16), transparent 60%)'
                            : 'radial-gradient(1200px 800px at 18% 12%, rgba(90,200,250,0.18), transparent 60%),' +
                              'radial-gradient(1000px 700px at 82% 88%, rgba(175,82,222,0.16), transparent 60%),' +
                              'linear-gradient(180deg,#0b1020 0%,#0a0a12 100%)';
                    }
                    layer.style.transition = 'filter 0.5s ease, background 0.3s ease';
                    const blurPx = blurFor(st);
                    layer.style.filter = blurPx > 0 ? `blur(${blurPx}px)` : '';
                    return;
                }
                // HTML ページ: .page-bg-layer に色 + フィルタ。配置要素には絶対適用しない。
                const layer = ensureBgLayer();
                if (!layer) return;
                layer.style.background = bgCss(st);
                layer.style.transition = 'filter 0.5s ease, background 0.3s ease';
                const blurPx = blurFor(st);
                layer.style.filter = blurPx > 0 ? `blur(${blurPx}px)` : '';
            }
            // Apply on every page switch (loadSiteState hook)
            const _origLoadSite = (typeof loadSiteState === 'function') ? loadSiteState : null;
            // We can't reassign loadSiteState here (different scope), so instead listen for the
            // first cp-related call to applyState on open.  Page-switch happens via switchSite
            // → loadSiteState → mainContent.innerHTML='', which wipes inline style.  Reapply:
            const reapply = () => { try { applyState(readState()); } catch (_) {} };
            // Hook: after every loadSiteState, the body of mainContent is rebuilt.  We
            // monkey-patch via a MutationObserver on mainContent for cheap state recovery.
            if (typeof mainContent !== 'undefined' && mainContent) {
                const mo = new MutationObserver(() => {
                    // re-apply ONLY if our state has anything custom (otherwise leave defaults)
                    const st = readState();
                    const hasCustom = st.mode === 'photo' && st.photo
                                    || (st.colors && (st.colors.length > 1 || (st.colors[0] && st.colors[0] !== DEFAULT_BG.colors[0])))
                                    || st.blur || (st.intensity && st.intensity !== 1.0);
                    if (hasCustom) reapply();
                });
                mo.observe(mainContent, { childList: true });
            }

            // ---- segmented tab ----
            let curTab = 'color';
            function setTab(t) {
                curTab = t;
                segEl.dataset.on = t;
                segEl.querySelectorAll('.cp-seg-btn').forEach(b => b.classList.toggle('is-on', b.dataset.cpTab === t));
                render();
            }
            segEl.addEventListener('click', (e) => {
                const b = e.target.closest('.cp-seg-btn');
                if (!b) return;
                try { haptic.selection(); } catch (_) {}
                setTab(b.dataset.cpTab);
            });

            // ---- slot factories ----
            function colorSlot(idx, color, onChange, onDelete, onReorder) {
                const s = document.createElement('div');
                s.className = 'cp-slot cp-color';
                s.dataset.colorIdx = String(idx);
                const inner = document.createElement('div'); inner.className = 'cp-color-inner';
                inner.style.background = color;
                inner.style.pointerEvents = 'none';      // never swallow clicks meant for native
                s.appendChild(inner);
                // ドラッグで順序入れ替え.  0.35s 押し続けたらドラッグ開始 (色ピッカーとの誤動作回避).
                if (typeof onReorder === 'function') {
                    let dragArmTimer = null;
                    let armed = false, draggedTarget = null;
                    s.addEventListener('pointerdown', (e) => {
                        if (e.target.closest('.cp-color-del') || e.target.tagName === 'INPUT') return;
                        dragArmTimer = setTimeout(() => {
                            armed = true; draggedTarget = null;
                            s.classList.add('cp-dragging');
                            try { haptic.selection(); } catch (_) {}
                            try { s.setPointerCapture(e.pointerId); } catch (_) {}
                        }, 350);
                    });
                    s.addEventListener('pointermove', (e) => {
                        if (!armed) return;
                        // 透過要素を一時的にして elementFromPoint で目的スロットを取得
                        const prevPe = s.style.pointerEvents; s.style.pointerEvents = 'none';
                        const el = document.elementFromPoint(e.clientX, e.clientY);
                        s.style.pointerEvents = prevPe;
                        const target = el && el.closest && el.closest('.cp-slot[data-color-idx]');
                        if (draggedTarget && draggedTarget !== target) draggedTarget.classList.remove('cp-drop-target');
                        if (target && target !== s) { target.classList.add('cp-drop-target'); draggedTarget = target; }
                        else { draggedTarget = null; }
                    });
                    function dragEnd() {
                        if (dragArmTimer) { clearTimeout(dragArmTimer); dragArmTimer = null; }
                        if (!armed) return;
                        armed = false;
                        s.classList.remove('cp-dragging');
                        if (draggedTarget) {
                            const from = idx;
                            const to = parseInt(draggedTarget.dataset.colorIdx, 10);
                            draggedTarget.classList.remove('cp-drop-target');
                            draggedTarget = null;
                            if (!isNaN(to) && to !== from) onReorder(from, to);
                        }
                    }
                    s.addEventListener('pointerup',     dragEnd);
                    s.addEventListener('pointercancel', dragEnd);
                    s.addEventListener('pointerleave', () => {
                        if (dragArmTimer) { clearTimeout(dragArmTimer); dragArmTimer = null; }
                    });
                }
                // Hidden but functional <input type="color"> — clicking the slot always opens
                // the OS native color palette via input.click().  We don't rely on z-index
                // layering for tap routing.
                const native = document.createElement('input');
                native.type = 'color'; native.value = normalizeHex(color);
                native.className = 'cp-color-native';
                native.addEventListener('click', () => { window.__cpPickerOpenedAt = Date.now(); });
                native.addEventListener('input', () => {
                    inner.style.background = native.value;
                    onChange(native.value);
                    window.__cpPickerOpenedAt = Date.now();
                });
                native.addEventListener('change', () => { window.__cpPickerOpenedAt = Date.now(); });
                native.addEventListener('blur',   () => { window.__cpPickerOpenedAt = Date.now(); });
                s.appendChild(native);
                // Slot click → programmatically open native picker (so any layering issue is moot)
                s.addEventListener('click', (e) => {
                    if (e.target.closest('.cp-color-del')) return;       // delete button has its own handler
                    if (e.target === native) return;                     // native opens itself
                    window.__cpPickerOpenedAt = Date.now();
                    try { native.click(); } catch (_) {}
                });
                if (onDelete) {
                    const del = document.createElement('button');
                    del.type = 'button'; del.className = 'cp-color-del';
                    del.textContent = '−';
                    del.addEventListener('click', (e) => { e.stopPropagation(); try { haptic.error(); } catch (_) {} onDelete(); });
                    s.appendChild(del);
                }
                return s;
            }
            // `<input type="color">` requires a valid 7-char #rrggbb — anything else gets
            // silently coerced to #000000 by the browser, which made our "default white" look
            // black on first open.  Normalise here.
            function normalizeHex(v) {
                if (typeof v !== 'string') return '#ffffff';
                v = v.trim().toLowerCase();
                if (/^#[0-9a-f]{6}$/.test(v)) return v;
                if (/^#[0-9a-f]{3}$/.test(v)) return '#' + v.slice(1).split('').map(c => c + c).join('');
                return '#ffffff';
            }
            function addSlot(onClick) {
                const s = document.createElement('div');
                s.className = 'cp-slot cp-add';
                s.addEventListener('click', () => { try { haptic.confirm(); } catch (_) {} onClick(); });
                return s;
            }
            function blurSlot(state, onTap, onBoost) {
                const s = document.createElement('div');
                s.className = 'cp-slot cp-blur';
                if (state.blur)      s.classList.add('is-on');
                if (state.blurBoost) s.classList.add('is-boost');
                // 通常タップ = ON/OFF 切替 (15px × intensity).  0.11s 以上長押し = ブースト (33px,
                // ライトパープル, 0.5s ease transition).  ユーザー仕様「おまけ」.
                let holdTimer = null, pressed = false, boosted = false;
                s.addEventListener('pointerdown', (e) => {
                    e.stopPropagation();
                    pressed = true; boosted = false;
                    holdTimer = setTimeout(() => {
                        if (!pressed) return;
                        boosted = true;
                        try { haptic.confirm(); } catch (_) {}
                        onBoost();
                    }, 110);
                });
                function endPress(commitTap) {
                    if (!pressed) return;
                    pressed = false;
                    if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
                    if (!boosted && commitTap) {
                        try { haptic.selection(); } catch (_) {}
                        onTap();
                    }
                }
                s.addEventListener('pointerup',     () => endPress(true));
                s.addEventListener('pointercancel', () => endPress(false));
                s.addEventListener('pointerleave',  () => endPress(false));
                return s;
            }
            // Plain number-wheel slot — vertical SCROLL (not pointer drag) with snap.
            // Values: 0.5..1.0 step 0.1 (fine), 1.0..5.0 step 0.5 (coarse) — natural detent
            // at 1.0.  Settles after 200ms with haptic.selection() + onChange.  Surrounding
            // values stay visible (centred item highlighted, neighbours faded).
            const NUM_VALUES = [0.5, 0.6, 0.7, 0.8, 0.9, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 4.5, 5.0];
            const NUM_ROW = 24;
            function numSlot(val, onChange) {
                const s = document.createElement('div');
                s.className = 'cp-slot cp-num-plain';
                const col = document.createElement('div');
                col.className = 'cp-num-col';
                const padT = document.createElement('div'); padT.className = 'cp-num-pad'; col.appendChild(padT);
                NUM_VALUES.forEach((v) => {
                    const it = document.createElement('div');
                    it.className = 'cp-num-item';
                    it.dataset.val = v;
                    it.textContent = v.toFixed(1);
                    col.appendChild(it);
                });
                const padB = document.createElement('div'); padB.className = 'cp-num-pad'; col.appendChild(padB);
                s.appendChild(col);
                function nearestIdx(v) {
                    let best = 0, bestDiff = Infinity;
                    NUM_VALUES.forEach((x, i) => { const d = Math.abs(x - v); if (d < bestDiff) { bestDiff = d; best = i; } });
                    return best;
                }
                function mark(idx) {
                    col.querySelectorAll('.cp-num-item').forEach((it, i) => it.classList.toggle('sel', i === idx));
                }
                const init = nearestIdx(val || 1.0);
                setTimeout(() => { col.scrollTop = init * NUM_ROW; mark(init); }, 30);
                let to;
                col.addEventListener('scroll', () => {
                    const idx = Math.max(0, Math.min(NUM_VALUES.length - 1, Math.round(col.scrollTop / NUM_ROW)));
                    mark(idx);
                    clearTimeout(to);
                    to = setTimeout(() => {
                        try { haptic.selection(); } catch (_) {}
                        onChange(NUM_VALUES[idx]);
                    }, 200);
                });
                // PC mouse-wheel — preventDefault so page doesn't scroll, both axes work.
                s.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    const d = (Math.abs(e.deltaY) >= Math.abs(e.deltaX)) ? e.deltaY : e.deltaX;
                    col.scrollTop += d;
                }, { passive: false });
                return s;
            }
            // Angle slot — reuses the editor's makeAngleRing (the same fine-grained ring you
            // already have in 表示) so behaviour matches the rest of the app.
            function angleSlot(val, onChange) {
                const s = document.createElement('div');
                s.className = 'cp-slot cp-angle-host';
                if (typeof window.__makeAngleRing === 'function') {
                    const ring = window.__makeAngleRing(val || 0, onChange);
                    s.appendChild(ring);
                } else {
                    const inner = document.createElement('div'); inner.className = 'cp-angle-inner';
                    inner.textContent = String(Math.round(val));
                    s.appendChild(inner);
                }
                return s;
            }

            // ---- render the 4-slot row based on tab + state ----
            function render() {
                const st = readState();
                rowEl.innerHTML = '';
                // 動画再生専用ページ: 色も写真も触れない. 警告 + 動画削除ボタンだけ出す.
                if (sites[currentSite] && sites[currentSite].videoOnly) {
                    const warn = document.createElement('div');
                    warn.className = 'cp-video-warn';
                    const msg = document.createElement('div'); msg.className = 'cp-video-warn-msg';
                    msg.textContent = '動画再生専用になっています';
                    warn.appendChild(msg);
                    const del = document.createElement('button');
                    del.type = 'button'; del.className = 'cp-video-warn-del';
                    del.textContent = '動画を削除する。';
                    del.addEventListener('click', (e) => {
                        e.stopPropagation();
                        try { haptic.error(); } catch (_) {}
                        sites[currentSite].videoOnly = false;
                        sites[currentSite].videoSrc  = '';
                        if (typeof saveToStorage === 'function') saveToStorage();
                        document.body.classList.remove('page-video-only');
                        if (typeof loadSiteState === 'function') loadSiteState(currentSite);
                        close();
                    });
                    warn.appendChild(del);
                    rowEl.appendChild(warn);
                    return;
                }
                if (curTab === 'color') {
                    // カラータブ — ぼかす無し / 数値無し.  Layout: [color1] [color2 or +] [color3 or +] [angle]
                    const n = st.colors.length;
                    // ドラッグでスロット順を入れ替える共通ハンドラ (ユーザー指示).
                    function reorder(from, to) {
                        const arr = st.colors.slice();
                        const item = arr.splice(from, 1)[0];
                        arr.splice(Math.max(0, Math.min(arr.length, to)), 0, item);
                        st.colors = arr;
                        writeState(st);
                        render();
                    }
                    rowEl.appendChild(colorSlot(0, st.colors[0], (v) => {
                        st.colors[0] = v; writeState(st);
                    }, null, reorder));
                    // slot 2
                    if (n >= 2) {
                        rowEl.appendChild(colorSlot(1, st.colors[1], (v) => {
                            st.colors[1] = v; writeState(st);
                        }, () => { st.colors.splice(1, 1); writeState(st); render(); }, reorder));
                    } else {
                        rowEl.appendChild(addSlot(() => {
                            st.colors.push('#ffffff'); writeState(st); render();
                        }));
                    }
                    // slot 3
                    if (n >= 3) {
                        rowEl.appendChild(colorSlot(2, st.colors[2], (v) => {
                            st.colors[2] = v; writeState(st);
                        }, () => { st.colors.splice(2, 1); writeState(st); render(); }, reorder));
                    } else if (n === 2) {
                        rowEl.appendChild(addSlot(() => {
                            st.colors.push('#ffffff'); writeState(st); render();
                        }));
                    } else {
                        // n === 1 — show a second + so the user can see the path to 3 colours
                        rowEl.appendChild(addSlot(() => {
                            st.colors.push('#ffffff'); writeState(st); render();
                        }));
                    }
                    // slot 4 — angle ring (only meaningful for gradients but kept for layout parity)
                    rowEl.appendChild(angleSlot(st.angle, (v) => { st.angle = v; writeState(st); }));
                } else {
                    // 写真タブ — [photo +/thumb] [ぼかす] [scale] [angle]
                    const photoSlot = document.createElement('div');
                    photoSlot.className = 'cp-slot ' + (st.photo ? 'cp-color' : 'cp-add');
                    if (st.photo) {
                        const inner = document.createElement('div'); inner.className = 'cp-color-inner';
                        inner.style.background = `url("${st.photo}") center/cover no-repeat`;
                        inner.style.pointerEvents = 'none';
                        photoSlot.appendChild(inner);
                        // − 削除ボタン (色スロットと同じ位置・スタイル)
                        const del = document.createElement('button');
                        del.type = 'button'; del.className = 'cp-color-del';
                        del.textContent = '−';
                        del.addEventListener('click', (e) => {
                            e.stopPropagation();
                            try { haptic.error(); } catch (_) {}
                            st.photo = '';
                            // 色が残っていれば color モードへ、なければ photo モードのまま空表示
                            if ((st.colors || []).filter(Boolean).length > 0) st.mode = 'color';
                            writeState(st);
                            render();
                        });
                        photoSlot.appendChild(del);
                    }
                    photoSlot.addEventListener('click', (e) => {
                        if (e.target.closest('.cp-color-del')) return;
                        // Mark that a native picker is being opened so outside-clicks during it
                        // don't accidentally close the popup.  Reset 1500ms after change/cancel.
                        window.__cpPickerOpenedAt = Date.now();
                        const fi = document.createElement('input');
                        fi.type = 'file'; fi.accept = 'image/*'; fi.style.display = 'none';
                        document.body.appendChild(fi);
                        fi.addEventListener('change', () => {
                            const f = fi.files && fi.files[0];
                            if (!f) { fi.remove(); window.__cpPickerOpenedAt = Date.now(); return; }
                            const reader = new FileReader();
                            reader.onload = (ev) => {
                                st.photo = ev.target.result; st.mode = 'photo';
                                writeState(st); render();
                                fi.remove();
                                window.__cpPickerOpenedAt = Date.now();
                            };
                            reader.readAsDataURL(f);
                        });
                        fi.click();
                    });
                    rowEl.appendChild(photoSlot);
                    rowEl.appendChild(blurSlot(st,
                        () => {
                            // 通常タップ: 標準 blur (15 × intensity) を on/off, ブースト解除
                            st.blur = !st.blur;
                            st.blurBoost = false;
                            writeState(st); render();
                        },
                        () => {
                            // 0.11s 長押し: ブースト ON (33px, ライトパープル, 0.5s)
                            st.blur = true; st.blurBoost = true;
                            writeState(st); render();
                        }
                    ));
                    rowEl.appendChild(numSlot(st.intensity, (v) => { st.intensity = v; writeState(st); }));
                    rowEl.appendChild(angleSlot(st.angle, (v) => { st.angle = v; writeState(st); }));
                }
            }

            // ---- open / close ----
            function open() {
                const st = readState();
                // ensure mode matches the current tab default (color tab even if last saved was photo)
                setTab(st.mode === 'photo' ? 'photo' : 'color');
                ovr.classList.add('active');
                try { haptic.selection(); } catch (_) {}
            }
            function close() {
                ovr.classList.remove('active');
            }
            fab.addEventListener('click', (e) => { e.stopPropagation(); if (ovr.classList.contains('active')) close(); else open(); });
            // Hard isolation: every input event inside the popup must NOT bubble to the rest
            // of the composer (otherwise the long-press preview's outside-click handler sees
            // the tap, calls deactivate(), and the popup flaps closed).  Belt-and-suspenders:
            // we ALSO have the whitelist in the preview-mode handler above.
            ['pointerdown', 'pointerup', 'mousedown', 'mouseup', 'touchstart', 'touchend', 'click'].forEach(t => {
                card.addEventListener(t, (e) => e.stopPropagation());
                fab.addEventListener(t,  (e) => e.stopPropagation());
            });
            document.addEventListener('click', (e) => {
                if (!ovr.classList.contains('active')) return;
                // Target may have been removed by a synchronous re-render — assume that means
                // the click was inside the popup and skip.
                if (e.target && !e.target.isConnected) return;
                if (card.contains(e.target) || fab.contains(e.target)) return;
                // Don't close while any native picker (file / color) is engaged.  Grace
                // window covers slow native dialogs and is refreshed by picker events.
                if (window.__cpPickerOpenedAt && Date.now() - window.__cpPickerOpenedAt < 5000) return;
                close();
            });
            window.addEventListener('keydown', (e) => { if (e.key === 'Escape' && ovr.classList.contains('active')) close(); });

            // Boot: apply whatever state was saved for the current site once the DOM is ready.
            requestAnimationFrame(() => { try { applyState(readState()); } catch (_) {} });
        })();

        /* =====================================================
           Action Blocks editor — fullscreen iframe overlay that hosts the
           Story Dock Visual Blocks app (blocks/index.html).  Replaces the old
           JS/TS textarea.  postMessage protocol:
             parent → iframe : { type:'sd-blocks-load', program, lang }
             iframe → parent : { type:'sd-blocks-ready' } when bridge is up
             iframe → parent : { type:'sd-blocks-state', program, lang, code, initial? }
           Saves state back to the host element on every change so the user can
           close the overlay any time — no explicit "save" button needed.
           ===================================================== */
        (function () {
            const ovr        = document.getElementById('actionBlocksOverlay');
            const iframe     = document.getElementById('actionBlocksIframe');
            const closeBtn   = document.getElementById('actionBlocksClose');
            const doneBtn    = document.getElementById('actionBlocksDone');
            const confirmEl  = document.getElementById('actionBlocksConfirm');
            const cfCancel   = document.getElementById('actionBlocksConfirmCancel');
            const cfDiscard  = document.getElementById('actionBlocksConfirmDiscard');
            if (!ovr || !iframe || !closeBtn) return;

            let host = null;          // current host element (aChild) whose action we're editing
            let onChange = null;      // callback into renderActionTab so the summary refreshes live
            let ready = false;        // flips true on 'sd-blocks-ready'
            let pendingLoad = null;   // program waiting for the iframe to come up
            // Snapshot taken at open time so the × → 破棄 path can restore the original state.
            let snapshot = null;      // { blocks, js, url, htmlFile }

            function pushLoad() {
                if (!iframe.contentWindow || !pendingLoad) return;
                iframe.contentWindow.postMessage(Object.assign({ type: 'sd-blocks-load' }, pendingLoad), '*');
            }

            window.addEventListener('message', (e) => {
                const d = e.data;
                if (!d || typeof d !== 'object') return;
                if (d.type === 'sd-blocks-ready') {
                    ready = true;
                    pushLoad();
                    return;
                }
