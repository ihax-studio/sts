                }
            }
            sliderWrapper.addEventListener('touchend', end);
            sliderWrapper.addEventListener('touchcancel', end);
            window.addEventListener('mouseup', end);
        })();

        /* =====================================================
           SMART STACK: Apple Watch style, 1 default card,
           iPad-style inline editor (text + color + weight + delete)
           ===================================================== */
        function buildSmartStack(initialCards) {
            const wrapper = document.createElement('div');
            wrapper.className = 'placed-element';

            const wrap = document.createElement('div');
            wrap.className = 'smart-stack-wrap';
            wrap.setAttribute('data-element-type', 'smart-stack');

            const stack = document.createElement('div');
            stack.className = 'smart-stack';
            // Default: 1 card with placeholder text
            const startingCards = initialCards && initialCards.length > 0
                ? initialCards
                : [{ text: 'テキスト', color: '#1c1c1e', weight: 400 }];
            stack.setAttribute('data-cards', JSON.stringify(startingCards));
            stack.setAttribute('data-idx', '0');

            // Auto-rotation time-cycle icon (OFF → 1.5s → 3s → 5s → 7.5s → OFF)
            // タップで次へ、長押しで即 OFF
            const TIME_CYCLE = [
                { sec: 0,    img: 'time/0s.png'  },
                { sec: 1.5,  img: 'time/1.5.png' },
                { sec: 3,    img: 'time/3s.png'  },
                { sec: 5,    img: 'time/5s.png'  },
                { sec: 7.5,  img: 'time/7s.png'  }
            ];
            let timeCycleIdx = 0;
            let rotateSeconds = 0;
            // Time-cycle button (moved next to trash in toolbar — placed there below)
            const timeCycleBtn = document.createElement('button');
            timeCycleBtn.type = 'button';
            timeCycleBtn.className = 'stack-time-cycle';
            timeCycleBtn.setAttribute('aria-label', '自動切り替え時間');
            timeCycleBtn.innerHTML = `<img src="${TIME_CYCLE[0].img}" alt="">`;
            const timeCycleImg = timeCycleBtn.querySelector('img');

            function applyTimeCycle(idx) {
                timeCycleIdx = ((idx % TIME_CYCLE.length) + TIME_CYCLE.length) % TIME_CYCLE.length;
                const cur = TIME_CYCLE[timeCycleIdx];
                timeCycleImg.classList.remove('pop');
                void timeCycleImg.offsetWidth;
                timeCycleImg.src = cur.img;
                timeCycleImg.classList.add('pop');
                rotateSeconds = cur.sec;
                stack.setAttribute('data-rotate-seconds', String(rotateSeconds));
                if (rotateSeconds > 0) {
                    wrap.classList.add('auto-rotate');
                } else {
                    wrap.classList.remove('auto-rotate');
                }
                restartAutoRotate();
            }
            // Inline iPad-style editor toolbar with combined weight↔size slider
            const toolbar = document.createElement('div');
            toolbar.className = 'stack-editor-toolbar';
            toolbar.innerHTML = `
                <input type="color" class="se-color" value="#1c1c1e" aria-label="色">
                <input type="range" class="se-slider" min="100" max="900" step="100" value="400" aria-label="太さ">
                <button class="se-mode-toggle" type="button" aria-label="モード切替">
                    <img class="mt-active" src="text-weight.png" alt="">
                    <img class="mt-other" src="size-text.png" alt="" style="display:none;">
                </button>
                <button class="se-delete" type="button" aria-label="削除">🗑</button>
            `;
            const seColor = toolbar.querySelector('.se-color');
            const seSlider = toolbar.querySelector('.se-slider');
            const seModeToggle = toolbar.querySelector('.se-mode-toggle');
            const seModeActiveImg = toolbar.querySelector('.mt-active');
            const seModeOtherImg = toolbar.querySelector('.mt-other');
            const seDelete = toolbar.querySelector('.se-delete');

            // Current slider mode: 'weight' or 'size'
            let sliderMode = 'weight';
            function setSliderMode(mode) {
                sliderMode = mode;
                if (mode === 'weight') {
                    seSlider.min = '100'; seSlider.max = '900'; seSlider.step = '100';
                    seModeActiveImg.src = 'text-weight.png';
                    // value reflects current editing card's weight
                    if (editingIdx >= 0) {
                        const cards = JSON.parse(stack.getAttribute('data-cards') || '[]');
                        const d = cards[editingIdx];
                        if (d) seSlider.value = String((typeof d === 'object' && d.weight) || 400);
                    }
                } else {
                    seSlider.min = '12'; seSlider.max = '64'; seSlider.step = '1';
                    seModeActiveImg.src = 'size-text.png';
                    if (editingIdx >= 0) {
                        const cards = JSON.parse(stack.getAttribute('data-cards') || '[]');
                        const d = cards[editingIdx];
                        if (d) seSlider.value = String((typeof d === 'object' && d.size) || 18);
                    }
                }
            }
            seModeToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                try { haptic.selection(); } catch(_) {}
                setSliderMode(sliderMode === 'weight' ? 'size' : 'weight');
                // Animate icon swap: scale 0.8 → 1
                seModeActiveImg.classList.remove('swap-anim');
                void seModeActiveImg.offsetWidth;
                seModeActiveImg.classList.add('swap-anim');
                // Slider track color/style change indicator
                if (sliderMode === 'size') seSlider.classList.add('size-mode');
                else seSlider.classList.remove('size-mode');
            });

            let editingIdx = -1;

            function applyCardStyle(cardEl, data) {
                cardEl.style.color = data.color || '#1c1c1e';
                cardEl.style.fontWeight = String(data.weight || 400);
                if (data.size) cardEl.style.fontSize = data.size + 'px';
                else cardEl.style.fontSize = '';
            }

            // Direction-aware entry animation for the front card.
            // 'up' = slide-up (prev card incoming), 'down' = scale 0.8→1 (next card incoming),
            // 'add' = new card spawn scale-up
            let nextEntry = null;

            function renderStack() {
                const cards = JSON.parse(stack.getAttribute('data-cards') || '[]');
                Array.from(stack.querySelectorAll('.smart-stack-card, .smart-stack-dots')).forEach(c => c.remove());
                if (cards.length === 0) {
                    const empty = document.createElement('div');
                    empty.className = 'smart-stack-card smart-stack-empty';
                    empty.textContent = '';
                    stack.appendChild(empty);
                    toolbar.classList.remove('active');
                    editingIdx = -1;
                    return;
                }
                let idx = parseInt(stack.getAttribute('data-idx') || '0', 10);
                idx = ((idx % cards.length) + cards.length) % cards.length;
                cards.forEach((d, i) => {
                    const data = (typeof d === 'string') ? { text: d, color: '#1c1c1e', weight: 400 } : d;
                    const card = document.createElement('div');
                    card.className = 'smart-stack-card';
                    if (i === idx) {
                        // Apply entry animation only to the front card
                        if (nextEntry === 'up') card.classList.add('enter-up');
                        else if (nextEntry === 'down') card.classList.add('enter-down');
                        else if (nextEntry === 'add') card.classList.add('enter-add');
                    }
                    else if (i === (idx + 1) % cards.length) card.classList.add('behind');
                    else if (i === (idx + 2) % cards.length && cards.length > 2) card.classList.add('behind-2');
                    else card.classList.add('hidden-card');
                    card.setAttribute('data-card-idx', String(i));

                    // Editable inline input (contenteditable div → grows for long text)
                    const input = document.createElement('div');
                    input.className = 'stack-card-input';
                    input.textContent = data.text || '';
                    input.contentEditable = 'false';
                    input.spellcheck = false;
                    card.appendChild(input);
                    applyCardStyle(card, data);

                    if (i === editingIdx) {
                        card.classList.add('editing');
                        input.contentEditable = 'true';
                        setTimeout(() => {
                            input.focus();
                            const range = document.createRange();
                            range.selectNodeContents(input);
                            const sel = window.getSelection();
                            sel.removeAllRanges();
                            sel.addRange(range);
                        }, 50);
                    }

                    // Tap behind card → bring to front. Tap front card → let it bubble
                    // up to open the unified element editor (inline edit removed).
                    card.addEventListener('click', (e) => {
                        if (isDragging) return;
                        if (card.classList.contains('swipe-reveal')) return;
                        const curIdx = parseInt(stack.getAttribute('data-idx') || '0', 10);
                        const idx2 = ((curIdx % cards.length) + cards.length) % cards.length;
                        if (i !== idx2) {
                            e.stopPropagation();
                            stack.setAttribute('data-idx', String(i));
                            editingIdx = -1;
                            renderStack();
                            try { haptic.selection(); } catch(_) {}
                        }
                        // front card → do nothing here; event bubbles → element editor opens
                    });

                    // Card swipe-to-delete (right-to-left). stopPropagation so wrapper isn't dragged.
                    let swipeStartX = 0, swipeStartY = 0, swipeCurrentX = 0, swiping = false;
                    card.addEventListener('touchstart', (ev) => {
                        if (ev.touches.length !== 1) return;
                        swipeStartX = ev.touches[0].clientX;
                        swipeStartY = ev.touches[0].clientY;
                        swipeCurrentX = swipeStartX;
                        swiping = false;
                    }, { passive: true });
                    card.addEventListener('touchmove', (ev) => {
                        if (ev.touches.length !== 1) return;
                        swipeCurrentX = ev.touches[0].clientX;
                        const dx = swipeCurrentX - swipeStartX;
                        const dy = ev.touches[0].clientY - swipeStartY;
                        // Only treat as horizontal card-swipe if motion is clearly horizontal-left
                        if (dx < -8 && Math.abs(dx) > Math.abs(dy) * 1.4) {
                            swiping = true;
                            ev.stopPropagation();
                            card.classList.add('swiping');
                            card.style.transform = `translateX(${Math.max(dx, -80)}px)`;
                        }
                    }, { passive: true });
                    card.addEventListener('touchend', (ev) => {
                        if (!swiping) return;
                        ev.stopPropagation();
                        const dx = swipeCurrentX - swipeStartX;
                        card.classList.remove('swiping');
                        card.style.transform = '';
                        if (dx < -50) {
                            card.classList.add('swipe-reveal');
                            try { haptic.selection(); } catch(_) {}
                        } else {
                            card.classList.remove('swipe-reveal');
                        }
                    });

                    // X button click → delete card
                    const xBtn = document.createElement('button');
                    xBtn.className = 'card-delete-x';
                    xBtn.type = 'button';
                    xBtn.innerHTML = '✕';
                    xBtn.addEventListener('click', (ev) => {
                        ev.stopPropagation();
                        try { haptic.error(); } catch(_) {}
                        card.classList.add('deleting');
                        setTimeout(() => {
                            const arr = JSON.parse(stack.getAttribute('data-cards') || '[]');
                            arr.splice(i, 1);
                            stack.setAttribute('data-cards', JSON.stringify(arr));
                            let cur = parseInt(stack.getAttribute('data-idx') || '0', 10);
                            if (cur >= arr.length) cur = Math.max(0, arr.length - 1);
                            stack.setAttribute('data-idx', String(cur));
                            editingIdx = -1;
                            toolbar.classList.remove('active');
                            renderStack();
                            saveCurrentSiteState();
                        }, 500);
                    });
                    card.appendChild(xBtn);

                    input.addEventListener('input', () => {
                        const arr = JSON.parse(stack.getAttribute('data-cards') || '[]');
                        if (!arr[i]) return;
                        const text = input.textContent || '';
                        if (typeof arr[i] === 'string') arr[i] = { text, color: '#1c1c1e', weight: 400 };
                        else arr[i].text = text;
                        stack.setAttribute('data-cards', JSON.stringify(arr));
                    });
                    input.addEventListener('blur', () => {
                        saveCurrentSiteState();
                    });
                    input.addEventListener('keydown', (e) => {
                        // Enter alone → commit, Shift+Enter → newline within card
                        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); input.blur(); commitEdit(); }
                        if (e.key === 'Escape') { e.preventDefault(); commitEdit(); }
                    });

                    stack.appendChild(card);
                });
                // dots removed per user request
                // Reset entry animation flag after render
                nextEntry = null;
            }

            function commitEdit() {
                editingIdx = -1;
                toolbar.classList.remove('active');
                renderStack();
                saveCurrentSiteState();
            }

            seColor.addEventListener('input', () => {
                if (editingIdx < 0) return;
                try { haptic.selection(); } catch(_) {}
                const cards = JSON.parse(stack.getAttribute('data-cards') || '[]');
                if (!cards[editingIdx]) return;
                if (typeof cards[editingIdx] === 'string') cards[editingIdx] = { text: cards[editingIdx], color: seColor.value, weight: 400 };
                else cards[editingIdx].color = seColor.value;
                stack.setAttribute('data-cards', JSON.stringify(cards));
                const cardEl = stack.querySelector(`.smart-stack-card[data-card-idx="${editingIdx}"]`);
                if (cardEl) cardEl.style.color = seColor.value;
            });
            seColor.addEventListener('change', () => saveCurrentSiteState());

            // Combined slider: applies to weight or size based on current mode
            seSlider.addEventListener('input', () => {
                if (editingIdx < 0) return;
                try { haptic.selection(); } catch(_) {}
                const cards = JSON.parse(stack.getAttribute('data-cards') || '[]');
                if (!cards[editingIdx]) return;
                if (typeof cards[editingIdx] === 'string') cards[editingIdx] = { text: cards[editingIdx], color: '#1c1c1e', weight: 400 };
                const cardEl = stack.querySelector(`.smart-stack-card[data-card-idx="${editingIdx}"]`);
                if (sliderMode === 'weight') {
                    const v = parseInt(seSlider.value, 10) || 400;
                    cards[editingIdx].weight = v;
                    if (cardEl) cardEl.style.fontWeight = String(v);
                } else {
                    const v = parseInt(seSlider.value, 10) || 18;
                    cards[editingIdx].size = v;
                    if (cardEl) cardEl.style.fontSize = v + 'px';
                }
                stack.setAttribute('data-cards', JSON.stringify(cards));
            });
            seSlider.addEventListener('change', () => saveCurrentSiteState());

            seDelete.addEventListener('click', (e) => {
                e.stopPropagation();
                if (editingIdx < 0) return;
                try { haptic.error(); } catch(_) {}
                const cards = JSON.parse(stack.getAttribute('data-cards') || '[]');
                cards.splice(editingIdx, 1);
                stack.setAttribute('data-cards', JSON.stringify(cards));
                let cur = parseInt(stack.getAttribute('data-idx') || '0', 10);
                if (cur >= cards.length) cur = Math.max(0, cards.length - 1);
                stack.setAttribute('data-idx', String(cur));
                editingIdx = -1;
                toolbar.classList.remove('active');
                renderStack();
                saveCurrentSiteState();
            });

            // Vertical swipe rotates cards (Apple Watch style)
            let sy = 0, sx = 0;
            stack.addEventListener('touchstart', (e) => {
                if (e.touches.length !== 1) return;
                sy = e.touches[0].clientY;
                sx = e.touches[0].clientX;
            }, { passive: true });
            stack.addEventListener('touchend', (e) => {
                const cards = JSON.parse(stack.getAttribute('data-cards') || '[]');
                if (cards.length < 2) return;
                const dy = e.changedTouches[0].clientY - sy;
                const dx = e.changedTouches[0].clientX - sx;
                // Vertical swipe → rotate cards (Apple Watch style)
                if (Math.abs(dy) > 30 && Math.abs(dy) > Math.abs(dx) * 1.2) {
                    try { haptic.selection(); } catch(_) {}
                    let idx = parseInt(stack.getAttribute('data-idx') || '0', 10);
                    nextEntry = dy < 0 ? 'down' : 'up';
                    idx = dy < 0 ? (idx + 1) % cards.length : (idx - 1 + cards.length) % cards.length;
                    stack.setAttribute('data-idx', String(idx));
                    editingIdx = -1;
                    toolbar.classList.remove('active');
                    renderStack();
                    saveCurrentSiteState();
                }
            });
            // Mouse wheel on stack also rotates (PC)
            stack.addEventListener('wheel', (e) => {
                if (e.ctrlKey) return; // pinch zoom takes precedence
                const cards = JSON.parse(stack.getAttribute('data-cards') || '[]');
                if (cards.length < 2) return;
                e.preventDefault();
                let idx = parseInt(stack.getAttribute('data-idx') || '0', 10);
                nextEntry = e.deltaY > 0 ? 'down' : 'up';
                idx = e.deltaY > 0 ? (idx + 1) % cards.length : (idx - 1 + cards.length) % cards.length;
                stack.setAttribute('data-idx', String(idx));
                editingIdx = -1;
                toolbar.classList.remove('active');
                renderStack();
                saveCurrentSiteState();
            }, { passive: false });

            // Click outside the wrap to commit editing
            document.addEventListener('click', (e) => {
                if (editingIdx < 0) return;
                if (e.target.closest('.smart-stack-wrap')) return;
                commitEdit();
            });

            // Add button
            const addBtn = document.createElement('button');
            addBtn.className = 'smart-stack-add';
            addBtn.type = 'button';
            addBtn.innerHTML = '<span class="ssa-plus">+</span><span class="ssa-label">追加</span>';
            addBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                try { haptic.selection(); } catch(_) {}
                const cards = JSON.parse(stack.getAttribute('data-cards') || '[]');
                cards.push({ text: 'テキスト', color: '#1c1c1e', weight: 400 });
                stack.setAttribute('data-cards', JSON.stringify(cards));
                stack.setAttribute('data-idx', String(cards.length - 1));
                editingIdx = cards.length - 1;
                seColor.value = '#1c1c1e';
                if (sliderMode === 'weight') seSlider.value = '400';
                else seSlider.value = '18';
                toolbar.classList.add('active');
                // New card spawn animation: scale-up
                nextEntry = 'add';
                renderStack();
                saveCurrentSiteState();
                try { haptic.confirm(); } catch(_) {}
            });

            // ===== up.png / down.png arrows on the stack =====
            const upArrow = document.createElement('img');
            upArrow.src = 'up.png';
            upArrow.className = 'smart-stack-arrow up';
            upArrow.draggable = false;
            upArrow.alt = '上';
            const downArrow = document.createElement('img');
            downArrow.src = 'down.png';
            downArrow.className = 'smart-stack-arrow down';
            downArrow.draggable = false;
            downArrow.alt = '下';

            function shiftCard(direction) {
                const arr = JSON.parse(stack.getAttribute('data-cards') || '[]');
                if (arr.length < 2) return;
                let idx = parseInt(stack.getAttribute('data-idx') || '0', 10);
                idx = direction > 0 ? (idx + 1) % arr.length : (idx - 1 + arr.length) % arr.length;
                stack.setAttribute('data-idx', String(idx));
                editingIdx = -1;
                toolbar.classList.remove('active');
                // up arrow (direction = -1) → slide-up entry; down arrow (direction = 1) → scale-in
                nextEntry = direction < 0 ? 'up' : 'down';
                renderStack();
                saveCurrentSiteState();
                try { haptic.selection(); } catch(_) {}
            }
            upArrow.addEventListener('click', (e) => { e.stopPropagation(); shiftCard(-1); });
            downArrow.addEventListener('click', (e) => { e.stopPropagation(); shiftCard(1); });
            stack.appendChild(upArrow);
            stack.appendChild(downArrow);

            // Auto-rotate logic — 0.5s smooth card transition, repeat at N seconds
            let rotateInterval = null;
            function restartAutoRotate() {
                if (rotateInterval) { clearInterval(rotateInterval); rotateInterval = null; }
                if (!wrap.classList.contains('auto-rotate')) return;
                rotateInterval = setInterval(() => {
                    const arr = JSON.parse(stack.getAttribute('data-cards') || '[]');
                    if (arr.length < 2) return;
                    let idx = parseInt(stack.getAttribute('data-idx') || '0', 10);
                    idx = (idx + 1) % arr.length;
                    stack.setAttribute('data-idx', String(idx));
                    // Auto-rotate uses "down" direction animation (scale 0.8→1)
                    nextEntry = 'down';
                    renderStack();
                }, rotateSeconds * 1000);
            }

            // Time-cycle icon: tap → next preset (1.5 → 3 → 5 → 7.5 → off).
            // Long-press → immediately back to OFF.
            let timeCyclePressTimer = null, timeCycleLongPressed = false;
            timeCycleBtn.addEventListener('pointerdown', (e) => {
                e.stopPropagation();
                timeCycleLongPressed = false;
                timeCyclePressTimer = setTimeout(() => {
                    timeCycleLongPressed = true;
                    try { haptic.error(); } catch(_) {}
                    applyTimeCycle(0); // immediate OFF
                    saveCurrentSiteState();
                    timeCyclePressTimer = null;
                }, 500);
            });
            timeCycleBtn.addEventListener('pointermove', () => {
                if (timeCyclePressTimer) { clearTimeout(timeCyclePressTimer); timeCyclePressTimer = null; }
            });
            timeCycleBtn.addEventListener('pointerup', () => {
                if (timeCyclePressTimer) { clearTimeout(timeCyclePressTimer); timeCyclePressTimer = null; }
            });
            timeCycleBtn.addEventListener('pointercancel', () => {
                if (timeCyclePressTimer) { clearTimeout(timeCyclePressTimer); timeCyclePressTimer = null; }
            });
            timeCycleBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (timeCycleLongPressed) { timeCycleLongPressed = false; return; }
                try { haptic.selection(); } catch(_) {}
                applyTimeCycle(timeCycleIdx + 1);
                saveCurrentSiteState();
            });

            // Long-press on the stack itself (front area, not arrows) advances time-cycle
            let pressTimer = null;
            stack.addEventListener('pointerdown', (e) => {
                if (e.target.closest('.smart-stack-arrow, .card-delete-x, .smart-stack-card.swipe-reveal')) return;
                pressTimer = setTimeout(() => {
                    if (!wrap.classList.contains('auto-rotate')) {
                        applyTimeCycle(1); // step to 1.5s
                        try { haptic.confirm(); } catch(_) {}
                        saveCurrentSiteState();
                    }
                    pressTimer = null;
                }, 600);
            });
            stack.addEventListener('pointermove', () => {
                if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
            });
            stack.addEventListener('pointerup', () => {
                if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
            });
            stack.addEventListener('pointercancel', () => {
                if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
            });

            // Append time-cycle into the editor toolbar (right side, next to trash)
            toolbar.appendChild(timeCycleBtn);
            // Always-visible toolbar so time-cycle is reachable without entering edit mode
            toolbar.classList.add('always-active');
            wrap.appendChild(stack);
            wrap.appendChild(toolbar);
            wrap.appendChild(addBtn);
            wrapper.appendChild(wrap);
            renderStack();
            // Expose for the unified element editor (スタイル tab)
            stack._renderStack = renderStack;
            stack._addCard = function () {
                const arr = JSON.parse(stack.getAttribute('data-cards') || '[]');
                arr.push({ text: 'テキスト', color: '#1c1c1e', weight: 400 });
                stack.setAttribute('data-cards', JSON.stringify(arr));
                stack.setAttribute('data-idx', String(arr.length - 1));
                nextEntry = 'add';            // → 0.5s scale-up entry animation
                renderStack();
                saveCurrentSiteState();
            };
            stack._setNextEntry = function (v) { nextEntry = v; };
            return wrapper;
        }
        function placeSmartStack(initialCards) {
            const wrapper = buildSmartStack(initialCards);
            placeElement(wrapper);
        }

        /* =====================================================
           MEDIA ROW: + button left, items added horizontally
           ===================================================== */
        // Pop a single item out of a horizontal media-row into a standalone element.
        function extractMediaItem(item, rowWrapper) {
            const img = item.querySelector('img');
            const video = item.querySelector('video');
            const audio = item.querySelector('audio');
            let w = null;
            if (img) w = createImageElement(img.src, null, true);
            else if (video) w = createVideoElement(video.src);
            else if (audio) w = createAudioElement(audio.src);
            if (!w) return;
            // pop out roughly where the item sat
            const ir = item.getBoundingClientRect();
            const mr = mainContent.getBoundingClientRect();
            const coords = { x: ir.left - mr.left + mainContent.scrollLeft,
                             y: ir.top - mr.top + mainContent.scrollTop };
            item.classList.add('mri-extracting');           // 0.3s shrink-out
            setTimeout(() => {
                item.remove();
                if (rowWrapper.querySelectorAll('.media-row-item').length === 0) rowWrapper.remove();
                saveCurrentSiteState();
            }, 300);
            placeElement(w, coords);                        // adds scale-up-animation = 0.5s pop
            saveCurrentSiteState();
        }

        // "画像を分離" dialog — eject every item out of the row at once.
        function showMediaSeparateDialog(rowWrapper) {
            const row = rowWrapper.querySelector('.media-row');
            const count = row ? row.querySelectorAll('.media-row-item').length : 0;
            actionDialog.innerHTML = `
                <h3>画像を分離</h3>
                <p style="font:400 12px/1.5 -apple-system;color:#8e8e93;margin:0 0 12px;">横スライドの ${count} 個を、すべて個別の要素として取り出します。</p>
                <button id="mediaSepGo">分離する</button>
                <button class="cancel-btn" id="mediaSepCancel">キャンセル</button>
            `;
            actionDialog.classList.add('active');
            actionDialog.style.opacity = '1';
            actionDialog.style.visibility = 'visible';
            document.getElementById('mediaSepGo').addEventListener('click', () => {

        function buildMediaRow() {
            const wrapper = document.createElement('div');
            wrapper.className = 'placed-element';

            const row = document.createElement('div');
            row.className = 'media-row';
            row.setAttribute('data-element-type', 'media-row');

            const addBtn = document.createElement('button');
            addBtn.className = 'media-row-add';
            addBtn.type = 'button';
            addBtn.setAttribute('aria-label', '追加');
            addBtn.textContent = '+';
            addBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                try { haptic.selection(); } catch(_) {}
                const fi = document.createElement('input');
                fi.type = 'file';
                fi.accept = 'image/*,video/*,audio/*';
                fi.multiple = true;
                fi.style.display = 'none';
                document.body.appendChild(fi);
                fi.addEventListener('change', (ev) => {
                    const files = Array.from(ev.target.files || []);
                    let done = 0;
                    if (files.length === 0) { fi.remove(); return; }
                    files.forEach((file) => {
                        const reader = new FileReader();
                        reader.onload = (fe) => {
                            const item = document.createElement('div');
                            item.className = 'media-row-item';
                            let inner = null;
                            if (file.type.startsWith('image/')) {
                                inner = document.createElement('img');
                                inner.src = fe.target.result;
                                inner.draggable = false;
                            } else if (file.type.startsWith('video/')) {
                                inner = document.createElement('video');
                                inner.src = fe.target.result;
                                inner.muted = true;
                                inner.playsInline = true;
                                inner.loop = true;
                                inner.autoplay = true;
                            } else if (file.type.startsWith('audio/')) {
                                const icon = document.createElement('span');
                                icon.className = 'mri-audio-icon';
                                icon.textContent = '🎵';
                                item.appendChild(icon);
                                const aud = document.createElement('audio');
                                aud.src = fe.target.result;
                                aud.controls = true;
                                item.appendChild(aud);
                                item.style.flexDirection = 'column';
                            }
                            if (inner) item.appendChild(inner);
                            row.appendChild(item);
                            done++;
                            if (done === files.length) {
                                saveCurrentSiteState();
                                try { haptic.confirm(); } catch(_) {}
                                fi.remove();
                            }
                        };
                        reader.readAsDataURL(file);
                    });
                });
                fi.click();
            });

            row.appendChild(addBtn);
            // Tap an item → pop it out of the row as its own element (0.5s pop).
            row.addEventListener('click', (e) => {
                if (isDragging || window.__elementGrabbed) return;
                const item = e.target.closest('.media-row-item');
                if (!item || !row.contains(item)) return;
                e.stopPropagation();   // don't bubble → don't open the media-row editor
                try { haptic.confirm(); } catch (_) {}
                extractMediaItem(item, wrapper);
            });
            wrapper.appendChild(row);
            return wrapper;
        }
        function placeParallaxStrip() {
            const wrapper = buildMediaRow();
            placeElement(wrapper);
        }

                        } catch (e) { reject(e); }

            async function ensureEditor() {
                const monaco = await loadMonaco();

                    styleModel = monaco.editor.createModel(userCSS || '/* カスタム CSS — 自由に編集できます */\n\n.main-content {\n    \n}\n', 'css');
                    editor = monaco.editor.create(bodyEl, {

                            localStorage.setItem('composerUserCSS', userCSS);
                            userStyleEl.textContent = userCSS;
                        }, 250);

                }

                else { fallbackEl.value = userCSS || '/* カスタム CSS — 自由に編集できます */\n\n.main-content {\n    \n}\n'; fallbackEl.readOnly = false; }
            }

            // ===== sections =====
            let currentSection = 'resource';
            async function showSection(sec) {
                currentSection = sec;
                secRes.classList.toggle('is-on', sec === 'resource');
                secStyle.classList.toggle('is-on', sec === 'style');
                try {
                    await ensureEditor();
                } catch (e) {
                    console.warn('Monaco unavailable — using fallback editor', e);
                    showSectionFallback(sec);
                    return;
                }
                if (sec === 'resource') { resModel.setValue(generateResource()); editor.setModel(resModel); editor.updateOptions({ readOnly: true }); }
                else { editor.setModel(styleModel); editor.updateOptions({ readOnly: false }); }

            // ===== reveal Monaco (vs.png inside the island) =====
            async function revealCode() {
                try { haptic.confirm(); } catch (_) {}
                if (overlay.dataset.mode === 'collapsed') setMode('expanded');
                overlay.classList.add('ci-code');
                await showSection(currentSection);
                setTimeout(function () { try { editor && editor.layout(); } catch (_) {} }, 520);
            }

            // ===== mode machine: collapsed | expanded | full =====
            function setMode(mode) {
                overlay.dataset.mode = mode;
                if (mode === 'full' || mode === 'expanded') { try { if (editor) setTimeout(function(){ editor.layout(); }, 520); } catch (_) {} }
            }
            function expandStep() {            // up: collapsed → expanded → full
                const m = overlay.dataset.mode;
                if (m === 'collapsed') { try { haptic.confirm(); } catch (_) {} setMode('expanded'); }
                else if (m === 'expanded') { try { haptic.confirm(); } catch (_) {} overlay.classList.add('ci-code'); showSection(currentSection); setMode('full'); }
            }
            function collapseStep() {          // down: full → expanded → collapsed → dismiss
                const m = overlay.dataset.mode;
                if (m === 'full') { try { haptic.selection(); } catch (_) {} setMode('expanded'); }
                else if (m === 'expanded') { try { haptic.selection(); } catch (_) {} overlay.classList.remove('ci-code'); setMode('collapsed'); }

                intro.classList.remove('play'); void intro.offsetWidth; intro.classList.add('play');
            }
            function dismiss() {
                try { haptic.selection(); } catch (_) {}
                if (currentSection === 'style' && styleModel) {

                    userStyleEl.textContent = userCSS;

                setTimeout(function () { overlay.dataset.mode = 'collapsed'; }, 450);

            function getClips() { try { return JSON.parse(localStorage.getItem(CLIP_KEY) || '[]'); } catch (_) { return []; } }
            function refreshClipState() { overlay.classList.toggle('ci-noclip', getClips().length === 0); }
            function pad2(n){ return (n < 10 ? '0' : '') + n; }
            function renderClips() {
                const clips = getClips();
                clipList.innerHTML = '';
                if (!clips.length) { clipList.innerHTML = '<div class="ci-clip-empty">クリップはまだありません</div>'; return; }
                clips.forEach(function (c, i) {
                    const d = new Date(c.at);
                    const when = (d.getMonth() + 1) + '/' + d.getDate() + ' ' + pad2(d.getHours()) + ':' + pad2(d.getMinutes());
                    const item = document.createElement('div');
                    item.className = 'ci-clip-item';
                    const w = document.createElement('span'); w.className = 'ci-clip-when'; w.textContent = (c.kind || 'code') + ' · ' + when;

                });

                    if (!dragging) return;

                    try { knob.releasePointerCapture(e.pointerId); } catch (_) {}

                        try { haptic.confirm(); } catch (_) {}

        (function () {

            function commit(opts) {

                const raw = (inputEl.value || '').trim();
                if (!raw) return;
                let name = raw.endsWith('.html') ? raw : raw + '.html';

                } else {
                    container.appendChild(lbl('Radius'));
                    const rSl = makeSlider(0, 200, 1, parseInt(shapeEl.getAttribute('data-radius') || '20', 10), (v) => {
                        shapeEl.setAttribute('data-radius', String(v));
                        applyShapeGeometry(shapeEl);
                        saveCurrentSiteState();
                    });
                    container.appendChild(rSl.row);
                    container.appendChild(lbl('角の数', 10));
                    const sSl = makeSlider(3, 12, 1, parseInt(shapeEl.getAttribute('data-sides') || '4', 10), (v) => {
                        shapeEl.setAttribute('data-sides', String(v));
                        applyShapeGeometry(shapeEl);
                        saveCurrentSiteState();
                    });
                    container.appendChild(sSl.row);
                }
                // ---- 色 / グラデーション（複数色対応）＋ 角度リング ----
                container.appendChild(lbl('色 / グラデーション', 12));
                const bg0 = shapeEl.style.background || shapeEl.style.backgroundColor || '#5AC8FA';
                const gmm = bg0.match(/linear-gradient\(([^)]+)\)/);
                let gradMode = !!gmm, gradAngle = 135, colors;
                if (gmm) {
                    let parts = gmm[1].split(',').map(s => s.trim());
                    if (/-?\d+deg$/.test(parts[0])) { gradAngle = parseInt(parts[0], 10) || 135; parts = parts.slice(1); }
                    colors = parts.filter(Boolean);
                } else {
                    colors = [/^#/.test(bg0.trim()) ? bg0.trim() : '#5AC8FA'];
                }
                if (!colors.length) colors = ['#5AC8FA'];
                if (gradMode && colors.length < 2) colors.push('#AF52DE');
                // optional image fill (tiled → pattern). When set it overrides color/gradient.
                let imgFill = null, imgScale = 50;
                const ub = bg0.match(/url\(["']?([^"')]+)["']?\)/);
                if (ub) {
                    imgFill = ub[1];
                    const sm = (shapeEl.style.backgroundSize || '').match(/(\d+)/);
                    if (sm) imgScale = parseInt(sm[1], 10);
                }
                function applyBg() {
                    if (imgFill) {
                        shapeEl.style.background = `url("${imgFill}")`;
                        shapeEl.style.backgroundSize = imgScale + '%';
                        shapeEl.style.backgroundRepeat = 'repeat';
                        shapeEl.style.backgroundPosition = 'center';
                    } else {
                        shapeEl.style.backgroundSize = '';
                        shapeEl.style.backgroundRepeat = '';
                        shapeEl.style.background = gradMode
                            ? `linear-gradient(${gradAngle}deg, ${colors.join(', ')})`
                            : colors[0];
                    }
                    saveCurrentSiteState();
                }
                // shape rotation — driven by the angle ring in 単色 mode
                function shapeRotation() {
                    const m = (shapeEl.style.transform || '').match(/rotate\(([-\d.]+)deg\)/);
                    return m ? parseFloat(m[1]) : 0;
                }
                function applyShapeRotation(deg) {
                    const base = (shapeEl.style.transform || '').replace(/rotate\([^)]*\)/g, '').trim();
                    shapeEl.style.transform = (base + ' rotate(' + deg + 'deg)').trim();
                    positionKnobs();
                    saveCurrentSiteState();
                }
                // multi-colour swatch row (+ to add, − on each when >2 in グラデ mode)
                const cRow = document.createElement('div'); cRow.className = 'ios-color-row';
                const addBtn = document.createElement('button');
                addBtn.type = 'button'; addBtn.className = 'grad-add-btn'; addBtn.textContent = '+';
                addBtn.addEventListener('click', () => {
                    // + only in グラデ mode, up to 5 colours total (= +4)
                    if (!gradMode || colors.length >= 5) return;
                    try { haptic.selection(); } catch (_) {}
                    colors.push('#FF2D55');
                    renderColors(true); applyBg();
                });
                function renderColors(animLast) {
                    cRow.querySelectorAll('.grad-color-item').forEach(n => n.remove());
                    const list = gradMode ? colors : colors.slice(0, 1);   // 単色 = one swatch only
                    list.forEach((hex, i) => {
                        const item = document.createElement('div'); item.className = 'grad-color-item';
                        if (animLast && i === list.length - 1) item.classList.add('entering');   // 0.5s grow-in
                        const inp = document.createElement('input');
                        inp.type = 'color'; inp.className = 'ios-color-native';
                        inp.value = /^#/.test(hex) ? hex : '#5AC8FA';
                        inp.addEventListener('input', () => { colors[i] = inp.value; applyBg(); });
                        item.appendChild(inp);
                        if (gradMode && colors.length > 2) {
                            const rm = document.createElement('button');
                            rm.type = 'button'; rm.className = 'grad-remove-btn'; rm.textContent = '−';
                            rm.addEventListener('click', (ev) => {
                                ev.stopPropagation();
                                item.classList.add('removing');                  // 0.5s shrink-out
                                setTimeout(() => { colors.splice(i, 1); renderColors(); applyBg(); }, 500);
                            });
                            item.appendChild(rm);
                        }
                        cRow.insertBefore(item, addBtn);
                    });
                    // + shows ONLY in グラデ mode and only until 5 colours (explicit 'flex'
                    // so it beats the .grad-add-btn { display:none } base rule)
                    addBtn.style.display = (gradMode && colors.length < 5) ? 'flex' : 'none';
                }
                cRow.appendChild(addBtn);
                // angle ring — ALWAYS visible. グラデ時 = グラデ角度 / 単色時 = 図形の傾き(回転)
                const angleHolder = document.createElement('div');
                angleHolder.className = 'ee-collapse open';
                function rebuildAngleRing() {
                    angleHolder.innerHTML = '';
                    angleHolder.appendChild(makeAngleRing(
                        gradMode ? gradAngle : shapeRotation(),
                        (deg) => {
                            if (gradMode) { gradAngle = deg; applyBg(); }
                            else applyShapeRotation(deg);
                        }
                    ));
                }
                const seg = makeSeg(
                    [{ id: 'solid', label: '単色' }, { id: 'gradient', label: 'グラデ' }],
                    gradMode ? 'gradient' : 'solid',
                    (id) => {
                        gradMode = id === 'gradient';
                        if (gradMode) {
                            if (colors.length < 2) colors.push('#AF52DE');
                        } else {
                            colors = [colors[0]];   // グラデ→単色 = drop the extra colours
                        }
                        renderColors();
                        rebuildAngleRing();
                        applyBg();
                    }
                );
                container.appendChild(seg.el);
                container.appendChild(cRow);
                container.appendChild(angleHolder);
                // ---- 画像で塗る（タイルでパターン表示）----
                container.appendChild(lbl('画像で塗る（タイルでパターン表示）', 12));
                const imgBtn = document.createElement('button');
                imgBtn.type = 'button'; imgBtn.className = 'ee-validate-btn';
                imgBtn.textContent = imgFill ? '画像を変更' : '画像を選ぶ';
                imgBtn.addEventListener('click', (ev) => {
                    ev.stopPropagation();
                    window.__ee_pickerAt = Date.now();   // cancel/return must not close the editor
                    const fi = document.createElement('input');
                    fi.type = 'file'; fi.accept = 'image/*'; fi.style.display = 'none';
                    document.body.appendChild(fi);
                    fi.addEventListener('change', () => {
                        window.__ee_pickerAt = Date.now();
                        const f = fi.files && fi.files[0];
                        if (f) {
                            const rd = new FileReader();
                            rd.onload = (e) => { imgFill = e.target.result; applyBg(); renderImgControls(); };
                            rd.readAsDataURL(f);
                        }
                        fi.remove();
                    });
                    fi.click();
                });
                container.appendChild(imgBtn);
                const imgCtrlHolder = document.createElement('div');
                container.appendChild(imgCtrlHolder);
                function renderImgControls() {
                    imgCtrlHolder.innerHTML = '';
                    imgBtn.textContent = imgFill ? '画像を変更' : '画像を選ぶ';
                    if (!imgFill) return;
                    imgCtrlHolder.appendChild(lbl('タイルサイズ（小さくするとパターン）', 8));
                    const tsl = makeSlider(10, 200, 1, imgScale, (v) => { imgScale = v; applyBg(); });
                    imgCtrlHolder.appendChild(tsl.row);
                    const rmBtn = document.createElement('button');
                    rmBtn.type = 'button'; rmBtn.className = 'ee-validate-btn';
                    rmBtn.textContent = '画像を外す（色に戻す）';
                    rmBtn.style.marginTop = '8px';
                    rmBtn.addEventListener('click', () => {
                        try { haptic.error(); } catch (_) {}
                        imgFill = null; applyBg(); renderImgControls();
                    });
                    imgCtrlHolder.appendChild(rmBtn);
                }
                renderImgControls();
                renderColors();
                rebuildAngleRing();
                setTimeout(() => seg.position(), 60);
            }

            function renderStyleTab() {
                eeBody.innerHTML = '';
                window.__eeFocusText = null;   // re-set below only for text elements
                const label = document.createElement('div');
                label.className = 'ee-type-label';
                label.textContent = TYPE_LABELS[aType] || '要素';
                eeBody.appendChild(label);

                if (aType === 'text' || aType === 'emoji' || aType === 'heart') {
                    // Single tap-to-edit PREVIEW — no separate always-on textarea.
                    // (The old label + textarea duplicated the on-canvas preview.)
                    const preview = document.createElement('div');
                    preview.className = 'ee-text-preview';
                    function syncPreview() {
                        const v = aChild.textContent || '';
                        preview.textContent = v || 'タップして編集';
                        preview.classList.toggle('empty', !v);
                    }
                    syncPreview();
                    let editing = false;
                    function enterEdit() {
                        if (editing) return;
                        editing = true;
                        const ta = document.createElement('textarea');
                        ta.className = 'ee-text-input';
                        ta.value = aChild.textContent || '';
                        ta.placeholder = 'テキストを入力';
                        ta.rows = 2;
                        ta.addEventListener('input', () => {
                            aChild.textContent = ta.value;
                            if (aType === 'text') positionEditor();
                            saveCurrentSiteState();
                        });
                        ta.addEventListener('blur', () => {
                            editing = false;
                            syncPreview();
                            ta.replaceWith(preview);
                            positionEditor();
                        });
                        preview.replaceWith(ta);
                        ta.focus();
                        try { ta.setSelectionRange(ta.value.length, ta.value.length); } catch (_) {}
                        positionEditor();
                    }
                    preview.addEventListener('click', () => {
                        try { haptic.selection(); } catch (_) {}
                        enterEdit();
                    });
                    eeBody.appendChild(preview);
                    // Double-tapping the element on canvas → jump straight into edit mode.
                    window.__eeFocusText = enterEdit;
                    if (aType === 'text') buildTextStyleControls(eeBody, aChild);
                } else if (aType === 'image' || aType === 'video' || aType === 'iframe' ||
                           aType === 'site-preview' || aType === 'netlify-form') {
                    // Image: 枠を表示 toggle (synced with 表示 tab via the .no-style class)
                    if (aType === 'image') {
                        const fr = document.createElement('div');
                        fr.className = 'ee-toggle-row';
                        fr.innerHTML = '<span class="ee-toggle-label">枠を表示</span>';
                        const frameOn = !aChild.classList.contains('no-style');
                        fr.appendChild(makeIosToggle(frameOn, (on) => {
                            aChild.classList.toggle('no-style', !on);
                            if (!on) {   // frame OFF → shadow (incl. PNG drop-shadow) all gone
                                aChild.style.filter = (aChild.style.filter || '').replace(/drop-shadow\([^)]*\)/g, '').trim();
                            }
                            saveCurrentSiteState();
                        }));
                        eeBody.appendChild(fr);
                    }
                    // 動画: 「このページを動画再生のみに。」トグル削除 (Phase 59-J, ユーザー指示).
                } else if (aType === 'smart-stack') {
                    buildStackStyleControls(eeBody);
                } else if (aType === 'media-row') {
                    // 枠の丸さ — applied to every item in the row
                    const rLbl = document.createElement('div');
                    rLbl.style.cssText = 'font:600 12px/1 -apple-system;color:#6c6c70;margin:4px 4px 2px;';
                    rLbl.textContent = '枠の丸さ';
                    eeBody.appendChild(rLbl);
                    const curR = parseInt(aChild.getAttribute('data-radius') || '12', 10) || 0;
                    const rSl = makeSlider(0, 40, 1, curR, (v) => {
                        aChild.setAttribute('data-radius', String(v));
                        aChild.querySelectorAll('.media-row-item').forEach(it => { it.style.borderRadius = v + 'px'; });
                        saveCurrentSiteState();
                    });
                    eeBody.appendChild(rSl.row);
                    // 画像を分離 — eject every item out of the row
                    const sepBtn = document.createElement('button');
                    sepBtn.type = 'button';
                    sepBtn.className = 'ee-validate-btn';
                    sepBtn.textContent = '画像を分離';
                    sepBtn.style.marginTop = '12px';
                    sepBtn.addEventListener('click', () => {
                        try { haptic.selection(); } catch (_) {}
                        showMediaSeparateDialog(aWrap);
                    });
                    eeBody.appendChild(sepBtn);
                } else if (aType === 'audio') {
                    buildAudioStyleControls(eeBody, aChild);
                } else if (aType === 'shape') {
                    buildShapeStyleControls(eeBody, aChild);
                } else if (aType === 'hr') {
                    buildHrStyleControls(eeBody, aChild);
                } else if (aType === 'globe') {
                    buildGlobeStyleControls(eeBody, aChild);
                } else {
                    const note = document.createElement('div');
                    note.className = 'ear-sub';
                    note.style.textAlign = 'center';
                    note.textContent = 'この要素にスタイルはありません';
                    eeBody.appendChild(note);
                }
                // 横縦比を固定 — applies to most visual elements.  Skip hr (width-only),
                // audio (intrinsic height), smart-stack & media-row (container layouts).
                if (aType !== 'hr' && aType !== 'audio' && aType !== 'smart-stack' && aType !== 'media-row') {
                    eeBody.appendChild(aspectLockToggleRow('横縦比を固定'));
                }
            }

            // HR line style: 点線/線 + custom color + thickness
            function buildHrStyleControls(container, hr) {
                let lineStyle = hr.getAttribute('data-hr-style') || 'solid';
                let customColor = hr.getAttribute('data-hr-color') || null;
                const seg = makeSeg(
                    [{id:'dotted',label:'・・・ 点線'},{id:'solid',label:'｜ 線'}],
                    lineStyle,
                    (id) => { lineStyle = id; applyHrStyle(hr, lineStyle, customColor); saveCurrentSiteState(); }
                );
                container.appendChild(seg.el);
                // thickness
                const thick = parseInt(hr.getAttribute('data-hr-thick') || '3', 10);
                const sl = makeSlider(1, 14, 1, thick, (v) => {
                    hr.setAttribute('data-hr-thick', String(v));
                    applyHrStyle(hr, lineStyle, customColor);
                    saveCurrentSiteState();
                });
                container.appendChild(sl.row);
                // custom color vs. auto W&B — mutually exclusive, with a
                // clear visual "selected" state on whichever is active.
                const cRow = document.createElement('div');
                cRow.className = 'ios-color-row hr-color-row';
                const ci = document.createElement('input');
                ci.type = 'color';
                ci.className = 'ios-color-native';
                ci.value = customColor || '#1c1c1e';
                cRow.appendChild(ci);
                const reset = document.createElement('button');
                reset.type = 'button';
                reset.className = 'hr-wb-btn';
                reset.textContent = 'W & B';
                cRow.appendChild(reset);
                container.appendChild(cRow);

                // Reflect which mode is selected (auto W&B vs custom color)
                function syncWbUi() {
                    const auto = (customColor === null);
                    reset.classList.toggle('is-active', auto);
                    ci.classList.toggle('is-active', !auto);
                    editor.classList.toggle('ee-auto-bw', auto);
                }
                ci.addEventListener('input', () => {
                    customColor = ci.value;
                    applyHrStyle(hr, lineStyle, customColor);
                    syncWbUi();
                    saveCurrentSiteState();
                });
                reset.addEventListener('click', () => {
                    customColor = null;
                    applyHrStyle(hr, lineStyle, null);
                    syncWbUi();
                    saveCurrentSiteState();
                    try { haptic.selection(); } catch (_) {}
                });
                syncWbUi();
                setTimeout(seg.position, 60);
            }

            // ----- Globe style controls (dots + edges) -----
            // Dots are added at "front centre" (lat 0, lon = -90 so it lands on the side facing
            // the camera).  Each dot can carry a link to another page (filename from `sites`).
            // 線で結ぶ ON → 2 タップで edge を toggle. 全消去 = dots + edges リセット.
            function buildGlobeStyleControls(container, globeEl) {
                function getDots()  { try { return JSON.parse(globeEl.getAttribute('data-dots')  || '[]'); } catch (_) { return []; } }
                function getEdges() { try { return JSON.parse(globeEl.getAttribute('data-edges') || '[]'); } catch (_) { return []; } }
                function refresh() { renderList(); }
                // External adds (placement-mode tap) fire this — keep the list in sync.
                globeEl.addEventListener('globe-dots-changed', refresh);

                // ----- 枠を表示 トグル — デフォルト OFF.  ON で .has-frame 適用 (黒丸 + drop shadow) -----
                const frameRow = document.createElement('div');
                frameRow.className = 'ee-toggle-row';
                frameRow.innerHTML = '<span class="ee-toggle-label">枠を表示</span>';
                const frameOn = globeEl.classList.contains('has-frame');
                frameRow.appendChild(makeIosToggle(frameOn, (on) => {
                    globeEl.classList.toggle('has-frame', on);
                    saveCurrentSiteState();
                }));
                container.appendChild(frameRow);

                const hdr = document.createElement('div');
                hdr.style.cssText = 'font:600 12px/1 -apple-system;color:#6c6c70;margin:4px 4px 2px;';
                hdr.textContent = '点 (タップで配置先ページへ遷移)';
                container.appendChild(hdr);

                // Add button — enters placement mode.  Banner says "点を置いて" and the next tap
                // on the earth surface drops a new dot at that lat/lon (drag still rotates).
                const addBtn = document.createElement('button');
                addBtn.type = 'button';
                addBtn.className = 'ee-validate-btn';
                addBtn.textContent = '・を追加';
                addBtn.addEventListener('click', () => {
                    try { haptic.confirm(); } catch (_) {}
                    if (window.__startPlacingGlobeDot) window.__startPlacingGlobeDot(globeEl);
                });
                container.appendChild(addBtn);

                // Connect-mode toggle — when ON, dot taps add/remove edges instead of navigating
                const connectRow = document.createElement('div');
                connectRow.className = 'ee-toggle-row';
                connectRow.innerHTML = '<span class="ee-toggle-label">点を線で結ぶ</span>';
                const connectInit = !!globeEl.__connectMode;
                connectRow.appendChild(makeIosToggle(connectInit, (on) => {
                    globeEl.__connectMode = on;
                    if (!on) globeEl.__connectFirst = null;
                }));
                container.appendChild(connectRow);

                // 全消去
                const clrBtn = document.createElement('button');
                clrBtn.type = 'button';
                clrBtn.className = 'ee-validate-btn';
                clrBtn.style.marginTop = '8px';
                clrBtn.textContent = '点と線をすべて消す';
                clrBtn.addEventListener('click', () => {
                    if (!getDots().length && !getEdges().length) return;
                    try { haptic.error(); } catch (_) {}
                    globeEl.setAttribute('data-dots', '[]');
                    globeEl.setAttribute('data-edges', '[]');
                    if (window.__rebuildGlobeDots) window.__rebuildGlobeDots(globeEl);
                    saveCurrentSiteState();
                    refresh();
                });
                container.appendChild(clrBtn);

                // List of existing dots — name + link picker + delete
                const list = document.createElement('div');
                list.style.cssText = 'margin-top:10px;display:flex;flex-direction:column;gap:8px;';
                container.appendChild(list);
                function renderList() {
                    list.innerHTML = '';
                    const dots = getDots();
                    if (!dots.length) {
                        const empty = document.createElement('div');
                        empty.className = 'ear-sub';
                        empty.style.cssText = 'font:500 12px/1.4 -apple-system;color:#8e8e93;text-align:center;padding:4px;';
                        empty.textContent = 'まだ点はありません。「・を追加」で配置できます。';
                        list.appendChild(empty);
                        return;
                    }
                    // Build a list of html sites for the link picker (exclude the current page).
                    const htmlSites = (typeof sites === 'object')
                        ? Object.keys(sites).filter((n) => (sites[n].pageType || 'html') === 'html' || sites[n].pageType === '3d')
                        : [];
                    dots.forEach((d, idx) => {
                        const row = document.createElement('div');
                        row.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px;align-items:center;background:rgba(120,120,128,0.08);border-radius:10px;padding:8px;';
                        // line 1: index, name, link, delete
                        const topRow = document.createElement('div');
                        topRow.style.cssText = 'display:flex;gap:6px;align-items:center;width:100%;';
                        const idx2 = document.createElement('span');
                        idx2.style.cssText = 'font:700 12px -apple-system;color:#29c5ff;min-width:18px;text-align:center;';
                        idx2.textContent = '#' + (idx + 1);
                        topRow.appendChild(idx2);
                        const nameI = document.createElement('input');
                        nameI.type = 'text';
                        nameI.placeholder = '名前';
                        nameI.value = d.name || '';
                        nameI.style.cssText = 'flex:0 0 70px;min-width:60px;border:none;background:transparent;font:500 12px -apple-system;color:#1c1c1e;outline:none;';
                        nameI.addEventListener('input', () => {
                            const all = getDots();
                            const e = all.find((x) => x.id === d.id);
                            if (e) { e.name = nameI.value; globeEl.setAttribute('data-dots', JSON.stringify(all)); saveCurrentSiteState(); }
                        });
                        topRow.appendChild(nameI);
                        const linkSel = document.createElement('select');
                        linkSel.style.cssText = 'flex:1;min-width:0;border:none;background:rgba(255,255,255,0.7);border-radius:8px;padding:6px;font:500 12px -apple-system;color:#1c1c1e;';
                        const blank = document.createElement('option'); blank.value = ''; blank.textContent = '— リンクなし —'; linkSel.appendChild(blank);
                        htmlSites.forEach((n) => {
                            const o = document.createElement('option'); o.value = n; o.textContent = n;
                            if (d.link === n) o.selected = true;
                            linkSel.appendChild(o);
                        });
                        linkSel.addEventListener('change', () => {
                            const all = getDots();
                            const e = all.find((x) => x.id === d.id);
                            if (e) { e.link = linkSel.value; globeEl.setAttribute('data-dots', JSON.stringify(all)); saveCurrentSiteState(); }
                        });
                        topRow.appendChild(linkSel);
                        const delBtn = document.createElement('button');
                        delBtn.type = 'button';
                        delBtn.textContent = '×';
                        delBtn.style.cssText = 'width:24px;height:24px;border:none;border-radius:50%;background:rgba(255,69,58,0.18);color:#ff453a;font:700 14px -apple-system;cursor:pointer;';
                        delBtn.addEventListener('click', () => {
                            try { haptic.error(); } catch (_) {}
                            window.__removeGlobeDot(globeEl, d.id);
                            saveCurrentSiteState();
                            refresh();
                        });
                        topRow.appendChild(delBtn);
                        row.appendChild(topRow);
                        // line 2: color picker + outline / glow toggles
                        const styleRow = document.createElement('div');
                        styleRow.style.cssText = 'display:flex;gap:10px;align-items:center;width:100%;padding-left:24px;';
                        // color (default brighter blue 0x29c5ff)
                        const curColor = (typeof d.color === 'string' && d.color.startsWith('#'))
                            ? d.color
                            : '#29c5ff';
                        const colorI = document.createElement('input');
                        colorI.type = 'color'; colorI.value = curColor;
                        colorI.style.cssText = 'width:28px;height:28px;border:none;background:transparent;cursor:pointer;padding:0;border-radius:50%;';
                        colorI.addEventListener('input', () => {
                            const all = getDots();
                            const e = all.find((x) => x.id === d.id);
                            if (!e) return;
                            e.color = colorI.value;
                            globeEl.setAttribute('data-dots', JSON.stringify(all));
                            __rebuildGlobeDots(globeEl);
                            saveCurrentSiteState();
                        });
                        styleRow.appendChild(colorI);
                        function tinyToggle(label, get, set) {
                            const w = document.createElement('label');
                            w.style.cssText = 'display:flex;gap:5px;align-items:center;font:500 11px -apple-system;color:#3c3c43;cursor:pointer;';
                            const cb = document.createElement('input');
                            cb.type = 'checkbox'; cb.checked = get();
                            cb.style.cssText = 'accent-color:#29c5ff;';
                            cb.addEventListener('change', () => set(cb.checked));
                            w.appendChild(cb);
                            const t = document.createElement('span'); t.textContent = label; w.appendChild(t);
                            return w;
                        }
                        styleRow.appendChild(tinyToggle('枠線のみ', () => !!d.outline, (on) => {
                            const all = getDots(); const e = all.find((x) => x.id === d.id);
                            if (!e) return;
                            e.outline = on;
                            globeEl.setAttribute('data-dots', JSON.stringify(all));
                            __rebuildGlobeDots(globeEl);
                            saveCurrentSiteState();
