<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#f0f2f5">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title id="pageTitle" contenteditable="true">Composer</title>
    <link rel="stylesheet" href="ihax-studios'-style.css">
    <link rel="stylesheet" href="composer-export.css">
    <script src="ui-sfx.js"></script>
    <script src="motion-fx.js"></script>
    <script>window.MotionFX && MotionFX.boot();</script>
</head>
<body>

    <!-- ============================================================
         MOBILE TOUCH LAYER — kill the 300ms tap delay, the grey tap flash
         and accidental text-selection on every control, and give every
         interactive element a snappy spring press so the whole UI keeps its
         motion-graphics feel under a finger.
         ============================================================ -->
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="index.css">

    <!-- shared gradient used by every launcher glyph -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
        <linearGradient id="slGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#7a4ff5"/><stop offset="0.5" stop-color="#4f6cf5"/><stop offset="1" stop-color="#e24a86"/>
        </linearGradient>
    </defs></svg>

    <div class="studio-launcher" id="studioLauncher">
        <div class="sl-stage" id="slStage">
            <div class="sl-title"><b>何</b>をつくる？</div>
            <div class="sl-dockrow">
                <button class="sl-cube" data-route="threeD" data-name="🕹️ 3D・ゲーム" type="button" aria-label="3D・ゲームを作成">
                    <svg viewBox="0 0 24 24">
                        <path fill="url(#slGrad)" d="M7.6 7.5h8.8a6 6 0 0 1 5.94 6.86l-.32 2.2a2.5 2.5 0 0 1-4.48 1.06L15.7 15.6H8.3l-1.74 2.02a2.5 2.5 0 0 1-4.48-1.06l-.32-2.2A6 6 0 0 1 7.6 7.5Z"/>
                        <g fill="#fff"><rect x="5.1" y="10.3" width="1.5" height="4.2" rx=".7"/><rect x="3.5" y="11.9" width="4.2" height="1.5" rx=".7"/><circle cx="16.6" cy="11.6" r="1.05"/><circle cx="18.9" cy="13.5" r="1.05"/></g>
                    </svg>
                </button>
                <button class="sl-cube sl-cube-cinema" data-route="video" data-name="🎬 動画" type="button" aria-label="動画編集を開く">
                    <svg viewBox="0 0 24 24">
                        <rect x="3" y="10" width="18" height="10.6" rx="1.7" fill="url(#slGrad)"/>
                        <path fill="url(#slGrad)" d="M3.4 9.4 5 6.5l3.1.5-1.6 2.9zM8.7 7.2l3.1.5-1.6 2.9-3.1-.5zM14 8l3.1.5-1.6 2.9-3.1-.5zM19.3 8.8 21 9l-.5 1.7-2.7-.5z"/>
                        <g fill="none" stroke="#fff" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" opacity=".96"><path d="M8 13.6l2 1.85-2 1.85"/><path d="M11.2 13.6l2 1.85-2 1.85"/><path d="M14.4 13.6l2 1.85-2 1.85"/></g>
                    </svg>
                </button>
                <button class="sl-cube" data-route="document" data-name="📄 書類" type="button" aria-label="A4 書類を作成">
                    <svg viewBox="0 0 24 24">
                        <path fill="url(#slGrad)" d="M6 2.5h7.2L18.5 7.8V20a1.5 1.5 0 0 1-1.5 1.5H6A1.5 1.5 0 0 1 4.5 20V4A1.5 1.5 0 0 1 6 2.5Z"/>
                        <path fill="rgba(255,255,255,.6)" d="M13 2.8V7.5a.7.7 0 0 0 .7.7h4.6z"/>
                        <g fill="#fff" opacity=".9"><rect x="7" y="11" width="8.5" height="1.4" rx=".7"/><rect x="7" y="14" width="8.5" height="1.4" rx=".7"/><rect x="7" y="17" width="5.5" height="1.4" rx=".7"/></g>
                    </svg>
                </button>
                <button class="sl-cube sl-cube-app" data-route="app" data-name="📱 アプリ" type="button" aria-label="アプリを作成">
                    <img src="iphone&mac.png" alt="" draggable="false">
                </button>
            </div>
            <div class="sl-caption" id="slCaption"></div>

            <!-- 前回の続き — Apple Watch Smart Stack (no alert) -->
            <div class="sl-recents" id="slRecents">
                <div class="sl-recents-label">前回の続き</div>
                <div class="sl-stack" id="slStack"></div>
            </div>
        </div>

        <!-- name screen for App / 3D — "ページの名前は" -->
        <div class="sl-name" id="slName">
            <div class="sl-name-kicker" id="slNameKicker">ページの名前は👀</div>
            <input class="sl-name-input" id="slNameInput" type="text" autocomplete="off" placeholder="">
            <!-- D27: 作成時デバイス4択（4つ目=レスポンシブ iphone-mac） -->
            <div class="sl-dev-row" id="slDevRow" style="display:flex;gap:10px;justify-content:center;margin:14px 0 2px">
                <button type="button" class="sl-dev" data-dev="iphone"     title="iPhone"       style="width:54px;height:54px;border-radius:14px;border:2px solid transparent;background:rgba(255,255,255,.08);cursor:pointer;padding:8px"><img src="iphone.png"     alt="iPhone"       style="width:100%;height:100%;object-fit:contain;pointer-events:none"></button>
                <button type="button" class="sl-dev" data-dev="ipadmac"    title="iPad &amp; Mac" style="width:54px;height:54px;border-radius:14px;border:2px solid transparent;background:rgba(255,255,255,.08);cursor:pointer;padding:8px"><img src="ipad-mac.png"   alt="iPad/Mac"     style="width:100%;height:100%;object-fit:contain;pointer-events:none"></button>
                <button type="button" class="sl-dev sel" data-dev="responsive" title="レスポンシブ" style="width:54px;height:54px;border-radius:14px;border:2px solid #5ac8fa;background:rgba(90,200,250,.16);cursor:pointer;padding:8px"><img src="iphone-mac.png" alt="レスポンシブ" style="width:100%;height:100%;object-fit:contain;pointer-events:none"></button>
                <button type="button" class="sl-dev" data-dev="vision"     title="Vision Pro"    style="width:54px;height:54px;border-radius:14px;border:2px solid transparent;background:rgba(255,255,255,.08);cursor:pointer;padding:8px"><img src="i-vision.png"   alt="Vision Pro"   style="width:100%;height:100%;object-fit:contain;pointer-events:none"></button>
            </div>
            <div class="sl-name-row">
                <button class="sl-name-btn" id="slNameBack" type="button" aria-label="戻る">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="14 18 8 12 14 6"/></svg>
                </button>
                <button class="sl-name-btn go" id="slNameGo" type="button" aria-label="決定">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Return-to-launcher button (visible only after a studio is open) -->
    <button class="sl-home-btn" id="slHomeBtn" type="button" aria-label="ホーム（ランチャーに戻る）">
       
    </button>

    <div class="current-site-indicator" id="currentSiteIndicator">site1.html</div>


    <!-- Filename pill (top-right) — collapsed = name only / expanded = input + 􀈈 export + check -->
    <div class="filename-pill" id="filenamePill">
        <button class="filename-collapsed" id="filenameCollapsed" type="button">
            <span class="filename-text-display" id="filenameTextDisplay">site1.html</span>
        </button>
        <div class="filename-expanded" id="filenameExpanded">
            <input type="text" class="filename-input" id="filenameInput" placeholder="ファイル名" autocomplete="off">
            <div class="filename-actions">
                <button class="filename-action-btn sf-btn" data-action="export" id="filenameExportBtn" type="button" aria-label="エクスポート"><img src="savex.png" alt=""></button>
                <button class="filename-action-btn close-btn" data-action="close" type="button" aria-label="閉じる">
                    <img src="check.png" alt="">
                </button>
            </div>
        </div>
    </div>

    <!-- Power button (top-left) — slide-to-delete + restore -->
    <div class="power-btn" id="powerBtn" role="button" aria-label="リセット">
        <img src="power.png" alt="Power">
    </div>

    <!-- Lock button (bottom-left) — shown during long-press preview. -->
    <div class="lock-btn" id="lockBtn" role="button" aria-label="ロック">
        <img src="locks.png" alt="Lock">
    </div>

    <!-- export-btn-preview 撤去: body.preview-mode が付与されないため永久非表示の死にボタン。
         同じ open() は表示中の filenameExportBtn が担当。 -->

    <!-- Rainbow color button (bottom-right) — mirror of lockBtn, only visible during
         long-press preview.  Tap → opens the iOS-style color/photo popup that configures
         the current page's background. -->
    <div class="color-fab" id="colorFab" role="button" aria-label="カラー">
        <div class="color-fab-ring" aria-hidden="true"></div>
    </div>

    <!-- Color / photo popup — segmented (カラー / 写真) + 4-circle row underneath.
         Lives at top-level so it can float over the preview. -->
    <div class="cp-overlay" id="colorPopupOverlay" aria-hidden="true">
        <div class="cp-card" id="colorPopupCard">
            <div class="cp-seg" role="tablist">
                <button type="button" class="cp-seg-btn is-on" data-cp-tab="color" role="tab">カラー</button>
                <button type="button" class="cp-seg-btn"       data-cp-tab="photo" role="tab">写真</button>
                <span class="cp-seg-pill" aria-hidden="true"></span>
            </div>
            <div class="cp-row" id="colorPopupRow"></div>
        </div>
    </div>

    <!-- Code-view button (top-right) -->
    <button type="button" class="code-btn" id="codeBtn" aria-label="コード表示">
        <img src="vs.png" alt="Code">
    </button>

    <!-- ============================================================
         CODE ISLAND — AppClip / AirPods-pairing-style code preview.
         Collapsed pill (pink close · green expand) ⇄ Dynamic Island
         (✕ · 📎clip · VS · ⤢expand) ⇄ Monaco (Resource / Style).
         The root keeps class "code-overlay" so the app's existing tap
         guards (.closest('.code-overlay')) keep ignoring it.
         ============================================================ -->
    <div class="code-overlay ci-overlay" id="codeOverlay" aria-hidden="true" data-mode="collapsed">
        <div class="ci-card" id="ciCard" role="dialog" aria-label="コード">

            <!-- Dynamic Island — pink ✕ (close) · blue ＋ (open code) · green (expand) -->
            <div class="ci-island" id="ciIsland">
                <div class="ci-knob" id="ciKnob" role="button" aria-label="拡大／縮小"></div>
                <div class="ci-pill" id="ciPill">
                    <button type="button" class="ci-icon ci-close" id="ciClose" aria-label="閉じる">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"><path d="M6.5 6.5l11 11M17.5 6.5l-11 11"/></svg>
                    </button>
                    <button type="button" class="ci-icon ci-plus" id="ciPlus" aria-label="コードを開く">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"><path d="M12 5.5v13M5.5 12h13"/></svg>
                    </button>
                    <button type="button" class="ci-icon ci-expand" id="ciExpand" aria-label="拡大"></button>
                </div>
            </div>

            <!-- clip history (fab, shown when code is open) -->
            <button type="button" class="ci-clipfab" id="ciClip" aria-label="クリップ"><img src="clip.png" alt=""></button>

            <!-- Monaco editor mounts here -->
            <div class="ci-body" id="ciBody"></div>

            <!-- Resource / Style switch (Image #2) -->
            <div class="ci-sections" id="ciSections">
                <button type="button" class="ci-sec is-on" id="ciSecResource" data-sec="resource">
                    <span class="ci-sec-bar"></span><span class="ci-sec-label">Resource</span>
                </button>
                <button type="button" class="ci-sec" id="ciSecStyle" data-sec="style">
                    <span class="ci-sec-bar"></span><span class="ci-sec-label">Style</span>
                </button>
            </div>

            <!-- intro flourish: the "Style" word eases in for 1s then out over .5s -->
            <div class="ci-intro" id="ciIntro" aria-hidden="true">Style</div>
        </div>

        <!-- Clip history (frameless): bg blurs, list slides up -->
        <div class="ci-clipsheet" id="ciClipSheet" aria-hidden="true">
            <div class="ci-clip-handle"></div>
            <div class="ci-clip-list" id="ciClipList"></div>
        </div>
    </div>


    <!-- ===== Code Island styles (override the old external .code-overlay) ===== -->
    <!-- styles → index.css -->

    <!-- Reset slider overlay (slide-to-delete) -->
    <div class="reset-slider-overlay" id="resetSliderOverlay">
        <div class="slider-wrapper" id="sliderWrapper">
            <div class="slider-track">
                <div class="slider-inner-track" id="sliderInner"></div>
                <div class="slider-label" id="sliderLabel">スライドで全て削除</div>
            </div>
            <div class="slider-knob" id="sliderKnob">
                <svg id="knobSVG" width="32" height="32" viewBox="0 0 32 32">
                    <polyline class="slider-arrow-polyline"
                        points="12,8 20,16 12,24"
                        fill="none" stroke="#2579F7" stroke-width="2.6"
                        stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
        </div>
        <button type="button" class="reset-cancel-btn" id="resetCancelBtn">キャンセル</button>
    </div>


    <div class="main-content" id="mainContent"></div>

    <div class="trash-area" id="trashArea">🗑️</div>
    <div class="gear-area" id="gearArea" aria-label="設定"><img src="gear.png" alt="設定"></div>
    <div class="lock-area" id="lockArea" aria-label="ロック"><img src="locks.png" alt="ロック"></div>
    <div class="snap-guide vertical" id="snapGuideV"></div>
    <div class="snap-guide horizontal" id="snapGuideH"></div>

    <div class="overlay" id="overlay"></div>

    <div class="popup-wrapper" id="popupWrapper">
        <div class="ui-container">
            <div class="handle" id="handle"></div>
            <div id="popupContent"></div>
        </div>
    </div>

    <div class="action-dialog" id="actionDialog"></div>

    <!-- Drawing canvas overlay (iPad + Pencil only) -->
    <div class="draw-overlay" id="drawOverlay">
        <div class="draw-toolbar">
            <button class="draw-close" id="drawClose">×</button>
            <span class="draw-title">ペン描画</span>
            <button class="draw-done" id="drawDone">完了</button>
        </div>
        <div class="draw-thickness-row">
            <label>太さ</label>
            <input type="range" id="drawThickness" min="1" max="24" value="3">
            <span class="thickness-val" id="drawThicknessVal">3</span>
        </div>
        <div class="draw-color-row" id="drawColorRow">
            <div class="draw-color-swatch active" data-color="#1c1c1e" style="background:#1c1c1e"></div>
            <div class="draw-color-swatch" data-color="#007AFF" style="background:#007AFF"></div>
            <div class="draw-color-swatch" data-color="#FF3B30" style="background:#FF3B30"></div>
            <div class="draw-color-swatch" data-color="#30D158" style="background:#30D158"></div>
            <div class="draw-color-swatch" data-color="#FF9500" style="background:#FF9500"></div>
            <div class="draw-color-swatch" data-color="#AF52DE" style="background:#AF52DE"></div>
        </div>
        <div class="draw-canvas-wrap" id="drawCanvasWrap">
            <canvas id="drawCanvas"></canvas>
        </div>
    </div>

    <!-- Preview-mode: current page name at top -->
    <div class="preview-pagename" id="previewPagename"></div>

    <!-- Preview-mode: swipe-up to delete this page (pink X) -->
    <button class="delete-page-x" id="deletePageX" type="button" aria-label="このページを削除">
        <span>×</span>
    </button>

    <!-- Preview-mode: rightmost = new page placeholder (tap + to create) -->
    <div class="new-page-placeholder" id="newPagePlaceholder">
        <button class="npp-add-btn" type="button" aria-label="新規ページを作成">+</button>
    </div>

    <!-- Long-press preview chrome -->
    <button class="close-btn-preview" id="closeBtnPreview" type="button" aria-label="閉じる">
        <svg viewBox="0 0 24 24">
            <line x1="6" y1="6" x2="18" y2="18"/>
            <line x1="18" y1="6" x2="6" y2="18"/>
        </svg>
    </button>
    <div class="file-dots" id="fileDots"></div>
    <!-- Glass pill tabs (preview mode site switcher) -->
    <div class="file-tabs" id="fileTabs">
        <div class="file-tab-active-pill" id="fileTabActivePill"></div>
        <div class="file-tabs-scroll" id="fileTabsScroll"></div>
    </div>

    <!-- Double-tap edit menu (floating) -->
    <!-- Unified element editor (iPad Pro glass style, speech-bubble) -->
    <div class="element-editor" id="elementEditor">
        <button class="ee-trash" id="eeTrash" aria-label="削除">
            <svg viewBox="0 0 24 24" fill="none" stroke="#FF2D55" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 4h6M4 7h16M6 7l1 13h10l1-13"/>
                <path d="M12 3v4"/>
            </svg>
        </button>
        <div class="ee-tabs" id="eeTabs">
            <div class="ee-tab-pill" id="eeTabPill"></div>
            <button class="ee-tab active" data-tab="style" type="button">スタイル</button>
            <button class="ee-tab" data-tab="display" type="button">表示</button>
            <button class="ee-tab" data-tab="filter" type="button">フィルター</button>
            <button class="ee-tab" data-tab="entrance" type="button">登場</button>
            <button class="ee-tab" data-tab="action" type="button">アクション</button>
        </div>
        <div class="ee-body" id="eeBody"></div>
        <div class="ee-tail"></div>
    </div>
    <!-- Resize knobs overlay (iPad Stage Manager style) -->
    <div class="resize-knobs" id="resizeKnobs">
        <div class="rk rk-nw" data-dir="nw"></div>
        <div class="rk rk-ne" data-dir="ne"></div>
        <div class="rk rk-sw" data-dir="sw"></div>
        <div class="rk rk-se" data-dir="se"></div>
        <div class="rk rk-n" data-dir="n"></div>
        <div class="rk rk-s" data-dir="s"></div>
        <div class="rk rk-w" data-dir="w"></div>
        <div class="rk rk-e" data-dir="e"></div>
    </div>

    <div class="quicklook-overlay" id="quicklookOverlay">
        <div class="quicklook-content" id="quicklookContent">
            <button class="quicklook-close" onclick="closeQuickLook()">×</button>
            <div id="quicklookBody"></div>
        </div>
    </div>

    <!-- Legacy dock kept hidden — only its handlers (text popup, page+) are reused -->
    <div class="story-dock" id="storyDock" style="display:none !important;">
        <img src="dock1.png" alt="Text" id="dock1">
        <!-- dock2(Media) 撤去: 非表示ドック内の到達不能ボタン。add-bar の media が直接処理 -->
        <div class="dock-page-plus" id="dockPagePlus" role="button" aria-label="新しいページ">
            <svg viewBox="0 0 24 24" fill="none" stroke="#1c1c1e" stroke-width="2" stroke-linecap="round">
                <rect x="4" y="3" width="16" height="18" rx="3"/>
                <line x1="12" y1="9" x2="12" y2="15"/>
                <line x1="9" y1="12" x2="15" y2="12"/>
            </svg>
        </div>
    </div>

    <!-- New add-bar — appears on empty-tap / two-finger-tap -->
    <div class="add-bar" id="addBar">
        <button class="add-bar-btn" data-add="stacks" type="button" aria-label="スタック">
            <img src="objs.png" alt="">
        </button>
        <button class="add-bar-btn" data-add="media" type="button" aria-label="画像・音声・動画・STL">
            <img src="photo&video.png" alt="">
        </button>
        <button class="add-bar-btn" data-add="text" type="button" aria-label="テキスト">
            <img src="text.png" alt="">
        </button>
        <button class="add-bar-btn add-bar-site" data-add="site" type="button" aria-label="サイト切り替え">
            <img src="windows.png" alt="">
        </button>
    </div>

    <!-- objs.png → expands into this 6-icon menu (icons slide in L→R over 0.5s) -->
    <div class="objs-menu" id="objsMenu">
        <button class="objs-menu-btn objs-back" data-objs="back" type="button" aria-label="戻る"><img src="backs.png" alt=""></button>
        <button class="objs-menu-btn" data-objs="dia" type="button" aria-label="スーパー楕円"><img src="dia.png" alt=""></button>
        <button class="objs-menu-btn" data-objs="shape" type="button" aria-label="図形"><img src="c-b.png" alt=""></button>
        <button class="objs-menu-btn" data-objs="stack" type="button" aria-label="スタック"><img src="stack.png" alt=""></button>
        <button class="objs-menu-btn" data-objs="sidecar" type="button" aria-label="サイドカー"><img src="sidecar.png" alt=""></button>
        <button class="objs-menu-btn" data-objs="globe" type="button" aria-label="グローブ"><img src="globe.png" alt=""></button>
    </div>

    <!-- (旧 haptic lab overlay は廃止. 触覚プリセットチップとリセットボタンは
         buildHapticBuilder 内に直結されている.) -->

    <!-- Toast stack -->
    <div class="toast-stack" id="toastStack"></div>

    <!-- V3 Phase 5 — JS/TS Preview Sandbox (isolated iframe) -->
    <div class="sandbox-overlay" id="sandboxOverlay">
        <div class="sandbox" id="sandbox" role="dialog" aria-label="JS/TS サンドボックス">
            <div class="sb-header">
                <span class="sb-title">JS / TS サンドボックス</span>
                <button class="sb-close" id="sandboxClose" type="button" aria-label="閉じる">×</button>
            </div>
            <textarea class="sb-code" id="sbCode" spellcheck="false" placeholder="// JavaScript / TypeScript をここに。実行はメインアプリから完全に隔離されます。"></textarea>
            <div class="sb-actions">
                <button class="sb-btn sb-run" id="sbRun" type="button">▶ 試す</button>
                <button class="sb-btn sb-stop" id="sbStop" type="button">⛔ 停止</button>
            </div>
            <div class="sb-console" id="sbConsole"></div>
            <div class="sb-note">隔離 iframe で実行・5秒でタイムアウト。クラッシュしてもアプリは無傷。</div>
        </div>
    </div>

    <!-- Lock choice overlay — opens when lockBtn is tapped during long-press preview.
         Top = 🔒, title, ← back. Bottom row = bio (device-aware) / passcode / window.
         iOS-style 0.5s staggered entrance. -->
    <div class="lock-overlay" id="lockOverlay">

    <!-- Action-blocks overlay — replaces the old JS/TS Script tab.  Hosts the Story Dock

            <!-- ✕ — SF Pro 由来の細い multiplication sign。タップで「変更内容を削除しますか？」確認 -->

    <script type="module">
        import { haptic } from "https://esm.sh/ios-haptics";

        // ===== Haptics, repaired & unified (iPhone haptic()) =====
        // ios-haptics only ships haptic() / haptic.confirm() / haptic.error().
        // This app calls haptic.selection()/.light()/etc. in ~100 places — those
        // names are undefined, so every call threw a TypeError that the surrounding
        // try/catch swallowed → those buttons NEVER buzzed. We polyfill the missing
        // names onto the (mutable) imported object, coalesce rapid light ticks so the
        // global press tick + an inline click tick on the same gesture feel like one,
        // and expose window.haptic for the classic (non-module) scripts.
        const _hBase = {
            tap:     (typeof haptic === 'function') ? haptic.bind(null) : function () {},
            confirm: (haptic && haptic.confirm) ? haptic.confirm.bind(haptic) : function () {},
            error:   (haptic && haptic.error)   ? haptic.error.bind(haptic)   : function () {},
        };
        let _hLastTap = 0;
        function _hTap() {
            const now = Date.now();
            if (now - _hLastTap < 110) return;   // merge duplicate light ticks within one gesture
            _hLastTap = now;
            try { _hBase.tap(); } catch (_) {}
        }
        function _hConfirm() { _hLastTap = Date.now(); try { _hBase.confirm(); } catch (_) {} }
        function _hError()   { _hLastTap = Date.now(); try { _hBase.error(); } catch (_) {} }
        // Augment the imported object in place (const binding, mutable object).
        haptic.selection = _hTap;
        haptic.light     = _hTap;
        haptic.soft      = _hTap;
        haptic.rigid     = _hTap;
        haptic.impact    = _hTap;
        haptic.tap       = _hTap;
        haptic.medium    = _hTap;
        haptic.success   = _hConfirm;
        haptic.warning   = _hConfirm;
        haptic.confirm   = _hConfirm;
        haptic.error     = _hError;
        window.haptic    = haptic;

        // Global tactile layer: every button gives an immediate tick on press, so even
        // controls without an inline haptic call feel alive. pointerdown matches native
        // iOS timing (fires before 'click'); the coalesce above stops a double tick when
        // the element ALSO calls haptic.selection() on its click.
        (function installGlobalHaptics() {
            const SEL = 'button,[role="button"],a[href],summary,' +
                'input[type="checkbox"],input[type="radio"],input[type="button"],' +
                'input[type="submit"],input[type="range"],input[type="file"],' +
                '.sl-cube,.sl-rcard,#dock1,.dock-page-plus,.dock-icon,' +
                '[data-haptic],[onclick]';
            const onDown = function (e) {
                if (e.pointerType === 'mouse' && e.button !== 0) return;
                const t = e.target && e.target.closest && e.target.closest(SEL);
                if (!t) return;
                if (t.disabled) return;
                if (t.getAttribute && t.getAttribute('aria-disabled') === 'true') return;
                if (t.dataset && t.dataset.haptic === 'off') return;
                _hTap();
            };
            document.addEventListener('pointerdown', onDown, { capture: true, passive: true });
        })();

        // env(safe-area-inset-top) resolved to px (cached). JS positioners (add-bar /
        // objs-menu / element-editor) use it to clamp BELOW the Dynamic Island now that
        // the status bar is black-translucent (full-bleed).
        window.__safeTop = (function () {
            let cached = null;
            function measure() {
                const p = document.createElement('div');
                p.style.cssText = 'position:fixed;top:0;left:0;width:0;height:env(safe-area-inset-top,0px);visibility:hidden;pointer-events:none';
                document.body.appendChild(p);
                const h = Math.round(p.getBoundingClientRect().height) || 0;
                p.remove();
                return h;
            }
            addEventListener('resize', () => { cached = null; }, { passive: true });
            addEventListener('orientationchange', () => { cached = null; });
            return function () { if (cached == null) { try { cached = measure(); } catch (_) { cached = 0; } } return cached; };
        })();

        // PeerJS — free public broker for WebRTC signalling; data flows P2P after handshake.
        // Loaded lazily inside the handoff IIFE so the rest of the app never blocks on it.
        let _peerJsPromise = null;
        function loadPeerJs() {
            if (!_peerJsPromise) {
                _peerJsPromise = import("https://esm.sh/peerjs@1.5.4").then(m => m.Peer || m.default && m.default.Peer || m.default);
            }
            return _peerJsPromise;
        }

        const dock1 = document.getElementById('dock1');
        const dock2 = document.getElementById('dock2');
        const overlay = document.getElementById('overlay');
        const popupWrapper = document.getElementById('popupWrapper');
        const handle = document.getElementById('handle');
        const popupContent = document.getElementById('popupContent');
        const mainContent = document.getElementById('mainContent');
        const trashArea = document.getElementById('trashArea');
        const gearArea = document.getElementById('gearArea');
        const lockArea = document.getElementById('lockArea');
        const snapGuideV = document.getElementById('snapGuideV');
        const snapGuideH = document.getElementById('snapGuideH');
        const fileInput = document.getElementById('fileInput');
        const actionDialog = document.getElementById('actionDialog');
        const quicklookOverlay = document.getElementById('quicklookOverlay');
        const quicklookContent = document.getElementById('quicklookContent');
        const quicklookBody = document.getElementById('quicklookBody');
        const currentSiteIndicator = document.getElementById('currentSiteIndicator');
        const hiddenColorPicker = document.getElementById('hiddenColorPicker');
        const storyDock = document.getElementById('storyDock');

        let currentStyle = 'normal';
        let currentTextColor = '#000000';
        let isDragging = false;
        let isPreviewMode = false;
        let topZIndex = 1000;
        let addedFiles = [];
        let sites = {};
        let currentSite = 'site1.html';

        // (colorCycle removed — tap-to-cycle-color on placed text no longer exists)

        // Load from localStorage
        function loadFromStorage() {
            const savedSites = localStorage.getItem('storyDockSites');
            const savedFiles = localStorage.getItem('storyDockFiles');
            const savedCurrentSite = localStorage.getItem('storyDockCurrentSite');

            if (savedSites) {
                sites = JSON.parse(savedSites);
            } else {
                sites = {
                    'site1.html': {
                        name: 'site1.html',
                        elements: [],
                        title: 'Story Dock'
                    }
                };
            }

            if (savedFiles) {
                addedFiles = JSON.parse(savedFiles);
            } else {
                addedFiles = [{
                    name: 'site1.html',
                    type: 'html',
                    content: ''
                }];
            }

            if (savedCurrentSite && sites[savedCurrentSite]) {
                currentSite = savedCurrentSite;
            } else {
                currentSite = 'site1.html';
            }
        }

        // Save to localStorage
        function saveToStorage() {
            localStorage.setItem('storyDockSites', JSON.stringify(sites));
            localStorage.setItem('storyDockFiles', JSON.stringify(addedFiles));
            localStorage.setItem('storyDockCurrentSite', currentSite);
        }
        // Phase 59 — expose sites / saveToStorage so 3D action menu / Atelier 4D
        // helpers (installed before this script) can read+write scene state.
        Object.defineProperty(window, 'sites', { get: () => sites, set: (v) => { sites = v; } });
        window.saveToStorage = saveToStorage;
        window.__composerSave = saveToStorage;   // bugfix: slHomeBtn「保存して戻る」が呼ぶが未定義だった
        window.__currentSiteName = () => currentSite;

        function triggerHaptic() {
            try { haptic.selection(); } catch(e) { console.log('Haptic not available'); }
        }

        function triggerHapticConfirm() {
            try { haptic.confirm(); } catch(e) { console.log('Haptic not available'); }
        }

        // ===== Filename pill: tap to expand to input + share/save/close =====
        const filenamePill = document.getElementById('filenamePill');
        const filenameCollapsed = document.getElementById('filenameCollapsed');
        const filenameExpanded = document.getElementById('filenameExpanded');
        const filenameInput = document.getElementById('filenameInput');
        const filenameTextDisplay = document.getElementById('filenameTextDisplay');

        function updateFilenameDisplay() {
            filenameTextDisplay.textContent = currentSite;
            currentSiteIndicator.textContent = currentSite;
        }
        updateFilenameDisplay();

        // Launcher → App: the first name the user types becomes the first page (no forced
        // "site1.html" default). Renames the current page's key/title to that name.
        window.__composerSetPageName = function (name) {
            if (!name) return;
            const raw = String(name).trim();
            if (!raw) return;
            const full = raw.endsWith('.html') ? raw : raw + '.html';
            const old = currentSite;
            const pt = document.getElementById('pageTitle');
            if (pt) pt.textContent = raw;
            if (full !== old && !sites[full]) {
                if (sites[old]) { sites[full] = sites[old]; sites[full].name = full; delete sites[old]; }
                else { sites[full] = { name: full, elements: [], title: raw }; }
                const fi = addedFiles.findIndex(f => f.name === old);
                if (fi !== -1) addedFiles[fi].name = full; else addedFiles.push({ name: full, type: 'html', content: '' });
                currentSite = full;
            }
            if (sites[currentSite]) sites[currentSite].title = raw;
            updateFilenameDisplay();
            try { saveToStorage(); } catch (_) {}
        };

        function expandFilenamePill() {
            if (filenamePill.classList.contains('expanded')) return;
            triggerHaptic();
            filenamePill.classList.add('expanded');
            filenameInput.value = currentSite;
            // Focus after expansion animation begins
            setTimeout(() => {
                filenameInput.focus();
                filenameInput.select();
            }, 250);
        }

        function commitFilename() {
            const raw = (filenameInput.value || '').trim();
            if (!raw || raw === currentSite) return false;
            let fullName = raw.endsWith('.html') ? raw : raw + '.html';
            if (sites[fullName]) {
                triggerHaptic();
                alert('そのファイル名は既にあります');
                return false;
            }
            sites[fullName] = sites[currentSite];
            delete sites[currentSite];
            sites[fullName].name = fullName;
            const fileIndex = addedFiles.findIndex(f => f.name === currentSite);
            if (fileIndex !== -1) addedFiles[fileIndex].name = fullName;
            currentSite = fullName;
            updateFilenameDisplay();
            saveToStorage();
            triggerHapticConfirm();
            return true;
        }

        function collapseFilenamePill(opts = { commit: true }) {
            if (!filenamePill.classList.contains('expanded')) return;
            if (opts.commit) commitFilename();
            filenamePill.classList.remove('expanded');
            triggerHaptic();
        }

        filenameCollapsed.addEventListener('click', (e) => {
            e.stopPropagation();
            expandFilenamePill();
        });

        filenameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                collapseFilenamePill({ commit: true });
            } else if (e.key === 'Escape') {
                e.preventDefault();
                collapseFilenamePill({ commit: false });
            }
        });

        filenameExpanded.addEventListener('click', (e) => {
            const btn = e.target.closest('.filename-action-btn');
            if (!btn) return;
            e.stopPropagation();
            const action = btn.dataset.action;
            triggerHaptic();
            switch (action) {
                case 'share': {
                    commitFilename();
                    // Save current snapshot as HTML and share
                    saveCurrentSiteState();
                    const main = document.getElementById('mainContent');
                    const inner = main ? main.innerHTML.trim() : '';
                    const title = (sites[currentSite] && sites[currentSite].title) || currentSite;
                    const html = `<!DOCTYPE html>\n<html lang="ja">\n<head>\n<meta charset="UTF-8">\n<title>${title}</title>\n</head>\n<body>\n<div class="main-content">\n${inner}\n</div>\n</body>\n</html>`;
                    if (navigator.share) {
                        navigator.share({
                            title: currentSite,
                            text: title,
                            files: [new File([html], currentSite, { type: 'text/html' })]
                        }).catch(() => {
                            // Fallback: text-only
                            navigator.share({ title: currentSite, text: html }).catch(() => {});
                        });
                    } else {
                        // Fallback for desktop: copy to clipboard
                        navigator.clipboard.writeText(html).then(() => {
                            triggerHapticConfirm();
                        }).catch(() => {});
                    }
                    break;
                }
                case 'save': {
                    commitFilename();
                    saveCurrentSiteState();
                    const main = document.getElementById('mainContent');
                    const inner = main ? main.innerHTML.trim() : '';
                    const title = (sites[currentSite] && sites[currentSite].title) || currentSite;
                    const html = `<!DOCTYPE html>\n<html lang="ja">\n<head>\n<meta charset="UTF-8">\n<title>${title}</title>\n</head>\n<body>\n<div class="main-content">\n${inner}\n</div>\n</body>\n</html>`;
                    const blob = new Blob([html], { type: 'text/html' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = currentSite;
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    setTimeout(() => URL.revokeObjectURL(url), 1000);
                    triggerHapticConfirm();
                    break;
                }
                case 'close': {
                    collapseFilenamePill({ commit: true });
                    break;
                }
            }
        });

        // Tap outside the pill to close (iOS-style)
        document.addEventListener('click', (e) => {
            if (!filenamePill.classList.contains('expanded')) return;
            if (e.target.closest('.filename-pill')) return;
            collapseFilenamePill({ commit: true });
        });

        function placeElement(wrapper, coords) {
            if (!coords) {
                const rect = mainContent.getBoundingClientRect();
                const elementWidth = wrapper.offsetWidth || 150;
                const elementHeight = wrapper.offsetHeight || 50;
                coords = {
                    x: rect.width / 2 - elementWidth / 2,
                    y: rect.height / 2 - elementHeight / 2
                };
            }
            wrapper.style.left = coords.x + 'px';
            wrapper.style.top = coords.y + 'px';
            wrapper.style.zIndex = ++topZIndex;
            wrapper.classList.add('scale-up-animation');

            mainContent.appendChild(wrapper);
            makeDraggable(wrapper);
            makePinchZoomable(wrapper);
            saveToStorage();
        }

        function switchSite(siteName) {
            saveCurrentSiteState();
            currentSite = siteName;
            currentSiteIndicator.textContent = siteName;
            const fnDisp = document.getElementById('filenameTextDisplay');
            if (fnDisp) fnDisp.textContent = siteName;
            localStorage.setItem('storyDockCurrentSite', siteName);
            loadSiteState(siteName);
        }

        function saveCurrentSiteState() {
            const elements = mainContent.querySelectorAll('.placed-element');
            sites[currentSite].elements = [];

            elements.forEach(element => {
                const child = element.firstElementChild;
                if (!child) return;
                // Skip elements that are mid-delete-animation — persisting their
                // opacity:0 / scale(0.8) style would make them load back invisible.
                if (element.dataset.deleting === '1') return;
                const elementData = {
                    type: child.getAttribute('data-element-type'),
                    style: element.style.cssText,
                    left: element.style.left,
                    top: element.style.top,
                    transform: element.style.transform || '',
                    anim: child.getAttribute('data-anim') || '',
                    animDuration: child.getAttribute('data-anim-duration') || '',
                    exitAnim: child.getAttribute('data-exit-anim') || '',
                    exitDuration: child.getAttribute('data-exit-duration') || '',
                    aspectLock: child.getAttribute('data-aspect-lock') || '',
                    frameBlur: child.getAttribute('data-frame-blur') || '',
                    // visual-blocks action program (JSON) — JS code itself is in jsCode (button case)
                    actionBlocks: child.getAttribute('data-action-blocks') || '',
                    locked: element.dataset.locked === '1' ? '1' : ''   // L (#29): ロック状態を永続化
                };

                switch(elementData.type) {
                    case 'text':
                        elementData.text = child.textContent;
                        elementData.textStyle = child.style.cssText;
                        break;
                    case 'image':
                        elementData.src = child.src;
                        elementData.hasStyle = !child.classList.contains('no-style');
                        elementData.imgStyle = child.style.cssText;   // fill / border / shadow
                        break;
                    case 'video':
                        elementData.src = child.src;
                        break;
                    case 'audio': {
                        const am = child.querySelector('audio');
                        elementData.src = am ? am.src : '';
                        elementData.hapticPlay = child.getAttribute('data-haptic-play') || '[]';
                        elementData.hapticPause = child.getAttribute('data-haptic-pause') || '[]';
                        elementData.audioStyle = child.style.cssText || '';
                        elementData.dataFilter = child.getAttribute('data-filter') || '';
                        break;
                    }
                    case 'shape':
                        elementData.shapeKind = child.getAttribute('data-shape-kind') || 'rect';
                        elementData.shapeExp = child.getAttribute('data-exp') || '';
                        elementData.shapeSides = child.getAttribute('data-sides') || '';
                        elementData.shapeRadius = child.getAttribute('data-radius') || '';
                        elementData.shapeStyle = child.style.cssText || '';
                        break;
                    case 'globe':
                        elementData.globeStyle = child.style.cssText || '';
                        elementData.dots  = child.getAttribute('data-dots')  || '';
                        elementData.edges = child.getAttribute('data-edges') || '';
                        elementData.hasFrame = child.classList.contains('has-frame') ? '1' : '';
                        break;
                    case 'button':
                        elementData.text = child.textContent;
                        elementData.jsCode = child.getAttribute('data-js-code');
                        elementData.url = child.getAttribute('data-url');
                        elementData.htmlFile = child.getAttribute('data-html-file');
                        elementData.activeEffect = child.getAttribute('data-active-effect') || '';
                        elementData.bgImage = child.getAttribute('data-bg-image') || '';
                        elementData.btnStyle = child.style.cssText;
                        break;
                    case 'heart':
                        elementData.text = child.textContent;
                        elementData.state = child.getAttribute('data-state');
                        elementData.heartMode = child.getAttribute('data-heart-mode') || 'transition';
                        elementData.tapJs = child.getAttribute('data-tap-js') || '';
                        elementData.doubleTapJs = child.getAttribute('data-double-tap-js') || '';
                        elementData.tapGlyph  = child.getAttribute('data-tap-glyph') || '';
                        elementData.dblGlyph  = child.getAttribute('data-dbl-glyph') || '';
                        elementData.tapEffect = child.getAttribute('data-tap-effect') || '';
                        elementData.dblEffect = child.getAttribute('data-dbl-effect') || '';
                        elementData.tapHaptic = child.getAttribute('data-tap-haptic') || '';
                        elementData.dblHaptic = child.getAttribute('data-dbl-haptic') || '';
                        break;
                    case 'iframe':
                        elementData.src = child.src;
                        elementData.rounded = child.getAttribute('data-rounded');
                        break;
                    case 'hr':
                        elementData.hrStyle = child.style.cssText;
                        elementData.hrLineStyle = child.getAttribute('data-hr-style') || 'solid';
                        elementData.hrColor = child.getAttribute('data-hr-color') || '';
                        elementData.hrThick = child.getAttribute('data-hr-thick') || '3';
                        break;
                    case 'emoji':
                        elementData.text = child.textContent;
                        break;
                    case 'site-preview':
                        elementData.htmlFile = child.getAttribute('data-html-file');
                        break;
                    case 'smart-stack': {
                        const stack = child.querySelector('.smart-stack');
                        if (stack) {
                            elementData.cards = stack.getAttribute('data-cards') || '[]';
                            elementData.idx = stack.getAttribute('data-idx') || '0';
                            elementData.innerShadow = stack.classList.contains('inner-shadow');
                            elementData.rotateSeconds = stack.getAttribute('data-rotate-seconds') || '0';
                        }
                        break;
                    }
                    case 'media-row': {
                        const items = Array.from(child.querySelectorAll('.media-row-item'));
                        elementData.items = items.map(mi => {
                            const img = mi.querySelector('img');
                            const video = mi.querySelector('video');
                            const audio = mi.querySelector('audio');
                            if (img) return { kind: 'image', src: img.src };
                            if (video) return { kind: 'video', src: video.src };
                            if (audio) return { kind: 'audio', src: audio.src };
                            return null;
                        }).filter(Boolean);
                        elementData.radius = child.getAttribute('data-radius') || '';
                        break;
                    }
                }
                sites[currentSite].elements.push(elementData);
            });

            sites[currentSite].title = document.getElementById('pageTitle').textContent;
            saveToStorage();
        }

        function loadSiteState(siteName) {
            // Any previously-mounted 3D stage owns mainContent — tear it down before the
            // standard HTML element renderer (or the next 3D stage) wipes the DOM.
            if (window.__unmount3DStage) window.__unmount3DStage();
            mainContent.innerHTML = '';
            if (!sites[siteName]) {
                 sites[siteName] = { name: siteName, elements: [], title: siteName };
            }
            document.getElementById('pageTitle').textContent = sites[siteName].title;

            // page-level body classes so unrelated UI (add-bar / objs menu) can hide itself
            const is3D = (sites[siteName].pageType === '3d');
            const isVideoOnly = !!sites[siteName].videoOnly;
            document.body.classList.toggle('page-3d', is3D);
            document.body.classList.toggle('page-video-only', isVideoOnly);

            // 3D page: skip the HTML element renderer, mount a Three.js stage instead.
            if (is3D) {
                if (window.__mount3DStage) window.__mount3DStage(siteName);
                return;
            }
            // 動画再生専用ページ: 全画面 <video> autoplay loop muted — UI なし.
            // sites[name].videoSrc に保存された data URL / src を読み込み.
            if (isVideoOnly && sites[siteName].videoSrc) {
                const v = document.createElement('video');
                v.className = 'page-video-fill';
                v.src = sites[siteName].videoSrc;
                v.autoplay = true; v.loop = true; v.muted = true; v.playsInline = true;
                v.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000;z-index:0;';
                mainContent.appendChild(v);
                // 入る瞬間に play() — autoplay 属性で失敗するブラウザ向け
                requestAnimationFrame(() => { try { v.play(); } catch (_) {} });
                return;
            }

            sites[siteName].elements.forEach(elementData => {
                let wrapper;
                switch(elementData.type) {
                    case 'text':
                        wrapper = createTextElement(elementData.text, null, elementData.textStyle);
                        break;
                    case 'image':
                        wrapper = createImageElement(elementData.src, null, elementData.hasStyle);
                        if (elementData.imgStyle) {
                            const im = wrapper.firstElementChild;
                            if (im) im.style.cssText = elementData.imgStyle;
                        }
                        break;
                    case 'video':
                        wrapper = createVideoElement(elementData.src);
                        break;
                    case 'audio': {
                        wrapper = createAudioElement(elementData.src);
                        const ac = wrapper.firstElementChild;
                        if (ac) {
                            if (elementData.hapticPlay) ac.setAttribute('data-haptic-play', elementData.hapticPlay);
                            if (elementData.hapticPause) ac.setAttribute('data-haptic-pause', elementData.hapticPause);
                            if (elementData.audioStyle) ac.style.cssText = elementData.audioStyle;
                            if (elementData.dataFilter) ac.setAttribute('data-filter', elementData.dataFilter);
                        }
                        break;
                    }
                    case 'shape':
                        wrapper = createShapeElement(elementData.shapeKind || 'rect', {
                            exp: elementData.shapeExp || undefined,
                            sides: elementData.shapeSides || undefined,
                            radius: elementData.shapeRadius || undefined,
                            shapeStyle: elementData.shapeStyle || undefined
                        });
                        break;
                    case 'globe':
                        wrapper = createGlobeElement({
                            globeStyle: elementData.globeStyle || undefined,
                            dots:  elementData.dots  || undefined,
                            edges: elementData.edges || undefined
                        });
                        if (elementData.hasFrame === '1' && wrapper.firstElementChild) {
                            wrapper.firstElementChild.classList.add('has-frame');
                        }
                        break;
                    case 'heart': {
                        wrapper = createHeartElement(null, elementData.state, elementData.text, elementData.heartMode || 'transition');
                        const h = wrapper.querySelector('.placed-heart');
                        if (h) {
                            if (elementData.tapJs) h.setAttribute('data-tap-js', elementData.tapJs);
                            if (elementData.doubleTapJs) h.setAttribute('data-double-tap-js', elementData.doubleTapJs);
                            if (elementData.tapGlyph)  h.setAttribute('data-tap-glyph', elementData.tapGlyph);
                            if (elementData.dblGlyph)  h.setAttribute('data-dbl-glyph', elementData.dblGlyph);
                            if (elementData.tapEffect) h.setAttribute('data-tap-effect', elementData.tapEffect);
                            if (elementData.dblEffect) h.setAttribute('data-dbl-effect', elementData.dblEffect);
                            if (elementData.tapHaptic) h.setAttribute('data-tap-haptic', elementData.tapHaptic);
                            if (elementData.dblHaptic) h.setAttribute('data-dbl-haptic', elementData.dblHaptic);
                        }
                        break;
                    }
                    case 'hr': {
                        wrapper = createHrElement(elementData.hrLineStyle || 'solid', null);
                        const hrEl = wrapper.querySelector('hr');
                        if (hrEl) {
                            if (elementData.hrThick) hrEl.setAttribute('data-hr-thick', elementData.hrThick);
                            applyHrStyle(hrEl, elementData.hrLineStyle || 'solid', elementData.hrColor || null);
                        }
                        break;
                    }
                    case 'button': {
                        wrapper = createButtonElement(elementData);
                        const b = wrapper.querySelector('.placed-button');
                        if (b) {
                            if (elementData.activeEffect) b.setAttribute('data-active-effect', elementData.activeEffect);
                            if (elementData.bgImage) b.setAttribute('data-bg-image', elementData.bgImage);
                            if (elementData.btnStyle) b.style.cssText = elementData.btnStyle;
                        }
                        break;
                    }
                    case 'iframe':
                        wrapper = createIframeElement(elementData.src, null, elementData.rounded === 'true');
                        break;
                    case 'emoji': {
                        wrapper = document.createElement('div');
                        wrapper.className = 'placed-element';
                        const em = document.createElement('div');
                        em.className = 'placed-emoji';
                        em.textContent = elementData.text || '✨';
                        em.setAttribute('data-element-type', 'emoji');
                        wrapper.appendChild(em);
                        break;
                    }
                    case 'site-preview':
                        wrapper = createSitePreviewCard(elementData.htmlFile);
                        break;
                    case 'smart-stack': {
                        const cards = JSON.parse(elementData.cards || '[]');
                        wrapper = buildSmartStack(cards);
                        const stack = wrapper.querySelector('.smart-stack');
                        if (stack) {
                            stack.setAttribute('data-idx', elementData.idx || '0');
                            if (elementData.innerShadow) stack.classList.add('inner-shadow');
                            if (elementData.rotateSeconds) stack.setAttribute('data-rotate-seconds', elementData.rotateSeconds);
                            if (stack._renderStack) stack._renderStack();
                        }
                        break;
                    }
                    case 'media-row': {
                        wrapper = buildMediaRow();
                        const row = wrapper.querySelector('.media-row');
                        if (row) {
                            (elementData.items || []).forEach(it => {
                                const item = document.createElement('div');
                                item.className = 'media-row-item';
                                if (it.kind === 'image') {
                                    const img = document.createElement('img');
                                    img.src = it.src;
                                    img.draggable = false;
                                    item.appendChild(img);
                                } else if (it.kind === 'video') {
                                    const v = document.createElement('video');
                                    v.src = it.src;
                                    v.muted = true;
                                    v.playsInline = true;
                                    v.loop = true;
                                    v.autoplay = true;
                                    item.appendChild(v);
                                } else if (it.kind === 'audio') {
                                    const icon = document.createElement('span');
                                    icon.className = 'mri-audio-icon';
                                    icon.textContent = '🎵';
                                    item.appendChild(icon);
                                    const a = document.createElement('audio');
                                    a.src = it.src;
                                    a.controls = true;
                                    item.appendChild(a);
                                }
                                row.appendChild(item);
                            });
                            if (elementData.radius) {
                                row.setAttribute('data-radius', elementData.radius);
                                row.querySelectorAll('.media-row-item').forEach(it => {
                                    it.style.borderRadius = elementData.radius + 'px';
                                });
                            }
                        }
                        break;
                    }
                }

                if (wrapper) {
                    wrapper.style.cssText = elementData.style;
                    // Defense against any legacy state saved mid-delete-animation
                    if (parseFloat(wrapper.style.opacity || '1') < 0.05) wrapper.style.opacity = '1';
                    mainContent.appendChild(wrapper);
                    makeDraggable(wrapper);
                    makePinchZoomable(wrapper);
                    if (elementData.locked) wrapper.dataset.locked = '1';   // L: ロック状態を復元

                    // configured entrance transition — plays as the element appears
                    const _ch = wrapper.firstElementChild;
                    if (_ch && elementData.anim && elementData.anim !== 'none') {
                        _ch.setAttribute('data-anim', elementData.anim);
                        if (elementData.animDuration) _ch.setAttribute('data-anim-duration', elementData.animDuration);
                        playEntranceAnim(_ch);
                    }
                    if (_ch && elementData.aspectLock)   _ch.setAttribute('data-aspect-lock',   elementData.aspectLock);
                    if (_ch && elementData.frameBlur)    _ch.setAttribute('data-frame-blur',    elementData.frameBlur);
                    if (_ch && elementData.actionBlocks) _ch.setAttribute('data-action-blocks', elementData.actionBlocks);
                    if (_ch && elementData.exitAnim)     _ch.setAttribute('data-exit-anim',     elementData.exitAnim);
                    if (_ch && elementData.exitDuration) _ch.setAttribute('data-exit-duration', elementData.exitDuration);
                }
            });

            checkEmptyState();
        }

        function addAudioEventListeners(audioEl) {

        // ===== Shape element — superellipse (dia.png) / polygon (c-b.png) =====
        // Round every corner of a polygon by replacing each vertex with a short
        // quadratic-bezier arc — works for any vertex count (regular N-gon or custom).
        function roundedPolygon(verts, rPct) {
            if (rPct <= 0.5) return verts;
            const n = verts.length, out = [];
            for (let i = 0; i < n; i++) {
                const A = verts[(i - 1 + n) % n], B = verts[i], C = verts[(i + 1) % n];
                const dBA = { x: A.x - B.x, y: A.y - B.y };
                const dBC = { x: C.x - B.x, y: C.y - B.y };
                const lBA = Math.hypot(dBA.x, dBA.y) || 1;
                const lBC = Math.hypot(dBC.x, dBC.y) || 1;
                const t = Math.min(rPct, lBA * 0.45, lBC * 0.45);
                const P1 = { x: B.x + dBA.x / lBA * t, y: B.y + dBA.y / lBA * t };
                const P2 = { x: B.x + dBC.x / lBC * t, y: B.y + dBC.y / lBC * t };
                const STEPS = 6;
                for (let s = 0; s <= STEPS; s++) {
                    const u = s / STEPS, iu = 1 - u;
                    out.push({
                        x: iu * iu * P1.x + 2 * iu * u * B.x + u * u * P2.x,
                        y: iu * iu * P1.y + 2 * iu * u * B.y + u * u * P2.y
                    });
                }
            }
            return out;

        // Recomputes clip-path / border-radius from the shape's data-* attributes.
        function applyShapeGeometry(el) {
            const kind = el.getAttribute('data-shape-kind') || 'rect';
            if (kind === 'superellipse') {
                const n = parseFloat(el.getAttribute('data-exp') || '2.5');
                if (n <= 10) {
                    // squircle range — clip-path superellipse from the exponent
                    el.style.borderRadius = '0';
                    const pts = [], steps = 80;
                    for (let i = 0; i <= steps; i++) {
                        const t = (i / steps) * 2 * Math.PI;
                        const ct = Math.cos(t), st = Math.sin(t);
                        const x = Math.pow(Math.abs(ct), 2 / n) * Math.sign(ct) * 50 + 50;
                        const y = Math.pow(Math.abs(st), 2 / n) * Math.sign(st) * 50 + 50;
                        pts.push(x.toFixed(2) + '% ' + y.toFixed(2) + '%');
                    }
                    el.style.clipPath = 'polygon(' + pts.join(', ') + ')';
                } else {
                    // past 10 → a plain square whose corner-radius GRADUALLY grows with n,
                    // becoming a full circle at n≈25 (border-radius animates, no snap).
                    el.style.clipPath = 'none';
                    el.style.borderRadius = Math.max(0, Math.min(50, (n - 10) / 15 * 50)) + '%';
                }

                const radius = parseInt(el.getAttribute('data-radius') || '20', 10);
                const sides = parseInt(el.getAttribute('data-sides') || '4', 10);
                if (sides === 4) {                           // plain quadrilateral → real border-radius
                    el.style.clipPath = 'none';
                    el.style.borderRadius = radius + 'px';
                    return;
                }
                const verts = [];
                for (let i = 0; i < sides; i++) {
                    const a = (i / sides) * 2 * Math.PI - Math.PI / 2;
                    verts.push({ x: 50 + 50 * Math.cos(a), y: 50 + 50 * Math.sin(a) });
                }
                // regular N-gon — corner radius applies to any vertex count
                el.style.borderRadius = '0';
                const out = roundedPolygon(verts, Math.min(48, radius / 4)); // data-radius 0-200 → 0-48% cut
                el.style.clipPath = 'polygon(' +
                    out.map(p => p.x.toFixed(2) + '% ' + p.y.toFixed(2) + '%').join(', ') + ')';
            }
        }
        window.applyShapeGeometry = applyShapeGeometry;

            __loadThree().then((THREE) => {

            const heart = document.createElement('div');
            heart.className = 'placed-heart';
            heart.setAttribute('data-element-type', 'heart');
            heart.setAttribute('data-state', state);
            heart.setAttribute('data-heart-mode', mode);
            // fixed-* modes lock the glyph; transition mode keeps the passed-in text
            heart.textContent = HEART_FIXED_GLYPH[mode] || text;
            addHeartEventListeners(heart);
            wrapper.appendChild(heart);
            return wrapper;
        }

        function addHeartEventListeners(heart) {
            let tapTimeout = null;
            let tapCount = 0;

            function runJs(code, e) {
                try {
                    new Function('heart', 'event', code).call(heart, heart, e);
                    try { haptic.confirm(); } catch (_) {}
                } catch (err) {
                    console.error('Heart JS error:', err);
                    try { haptic.error(); } catch (_) {}
                    alert('実行エラー:\n' + err.message);
                }
            }
            // Run the configured behaviour for a tap-type ('tap' | 'dbl'). Each of
            // glyph / effect / action / haptic is set independently via the gear-drag
            // dialog (showHeartActionEditor). A tap-type with NOTHING configured falls
            // back to the original default (tap = like-toggle, dbl = burning + dots).
            function applyTapType(type, e) {
                const A = type === 'tap'
                    ? { glyph:'data-tap-glyph', eff:'data-tap-effect', js:'data-tap-js',        hap:'data-tap-haptic' }
                    : { glyph:'data-dbl-glyph', eff:'data-dbl-effect', js:'data-double-tap-js', hap:'data-dbl-haptic' };
                const glyph     = heart.getAttribute(A.glyph) || '';
                const effect    = heart.getAttribute(A.eff) === '1';
                const js        = heart.getAttribute(A.js) || '';
                const hasHaptic = (heart.getAttribute(A.hap) || '[]') !== '[]';
                if (hasHaptic) playElementHaptic(heart, A.hap);
                // ----- fixed modes: the glyph is locked, taps never transition -----
                const _mode = heart.getAttribute('data-heart-mode') || 'transition';
                if (_mode !== 'transition') {
                    heart.textContent = HEART_FIXED_GLYPH[_mode] || heart.textContent;
                    if (effect) {
                        heart.classList.add('scale-up');
                        heart.addEventListener('animationend', () => heart.classList.remove('scale-up'), { once: true });
                        createDotExplosion(e.clientX, e.clientY);
                    }
                    if (js.trim()) runJs(js, e);
                    saveCurrentSiteState();
                    return;
                }
                if (!glyph && !effect && !js.trim() && !hasHaptic) {
                    // ----- original defaults -----
                    if (type === 'tap') {
                        if (heart.getAttribute('data-state') === 'empty') {
                            heart.textContent = '♥️'; heart.setAttribute('data-state', 'filled');
                            try { haptic.confirm(); } catch (_) {}
                        } else {
                            heart.textContent = '♡'; heart.setAttribute('data-state', 'empty');
                        }
                        heart.classList.add('scale-up');
                        heart.addEventListener('animationend', () => heart.classList.remove('scale-up'), { once: true });
                    } else {
                        heart.textContent = '❤️‍🔥'; heart.setAttribute('data-state', 'burning');
                        createDotExplosion(e.clientX, e.clientY);
                    }
                    saveCurrentSiteState();
                    return;
                }
                // ----- configured behaviour -----
                if (glyph) heart.textContent = glyph;
                if (effect) {
                    heart.classList.add('scale-up');
                    heart.addEventListener('animationend', () => heart.classList.remove('scale-up'), { once: true });
                    createDotExplosion(e.clientX, e.clientY);
                }
                if (js.trim()) runJs(js, e);
                saveCurrentSiteState();
            }

            heart.addEventListener('click', function (e) {
                // Functional in edit mode; never on a drag. stopPropagation keeps the
                // unified editor from opening — heart config is via the gear drag.
                if (isDragging || window.__elementGrabbed) return;
                e.stopPropagation();
                tapCount++;
                if (tapCount === 1) {
                    tapTimeout = setTimeout(() => { tapCount = 0; applyTapType('tap', e); }, 300);
                } else if (tapCount === 2) {
                    clearTimeout(tapTimeout);
                    tapCount = 0;
                    applyTapType('dbl', e);
                }
            });
        }

        function createDotExplosion(x, y) {
            const colors = ['#ff3b30', '#ff6b6b', '#ff9999', '#ffcccc', '#ffffff'];
            const dotCount = 40;
            for (let i = 0; i < dotCount; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                // Thinner dots: 2–6px (was 5–20px)
                const sz = Math.random() * 4 + 2;
                dot.style.width = sz + 'px';
                dot.style.height = sz + 'px';
                dot.style.background = colors[Math.floor(Math.random() * colors.length)];
                dot.style.boxShadow = '0 1px 3px rgba(0,0,0,0.18)';
                dot.style.left = x + 'px';
                dot.style.top = y + 'px';
                const angle = (Math.PI * 2 * i) / dotCount + Math.random() * 0.15;
                const distance = Math.random() * 220 + 80;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                dot.style.setProperty('--tx', tx + 'px');
                dot.style.setProperty('--ty', ty + 'px');
                document.body.appendChild(dot);
                setTimeout(() => dot.remove(), 1600);
            }
        }

        // Play a custom haptic sequence on data-haptic.
        // Format: array of { t: ms, len: 1-8 }. Bursts are flattened, sorted and
        // spaced ≥22ms apart so two haptics never overlap (up to ~0.7s window OK).
        function playElementHaptic(el, attr) {
            let pulses = [];
            try { pulses = JSON.parse(el.getAttribute(attr || 'data-haptic') || '[]'); } catch (_) {}
            const bursts = [];
            pulses.forEach(p => {
                const t = (typeof p === 'number') ? p : p.t;
                const len = (typeof p === 'number') ? 1 : (p.len || 1);
                for (let i = 0; i < len; i++) bursts.push(t + i * 22);
            });
            bursts.sort((a, b) => a - b);
            let last = -100;
            bursts.forEach(b => {
                const at = Math.max(b, last + 22); // enforce ≥22ms gap → no overlap
                last = at;
                setTimeout(() => { try { haptic.error(); } catch (_) {} }, at);
            });
        }
        window.playElementHaptic = playElementHaptic;

        // Replay an element's configured entrance transition (data-anim).
        // Played when the element appears (page load) and previewed in the editor.
        // `data-anim-duration` (seconds, 0.1-3.0) overrides the default 0.5s.
        function playEntranceAnim(el) {
            if (!el) return;
            const a = el.getAttribute('data-anim');
            if (!a || a === 'none') return;
            const cls = 'el-anim-' + a;
            const dur = parseFloat(el.getAttribute('data-anim-duration')) || 0;
            el.classList.remove(cls);
            void el.offsetWidth;   // restart the animation
            if (dur > 0) el.style.setProperty('--el-anim-duration', dur + 's');
            else el.style.removeProperty('--el-anim-duration');
            el.classList.add(cls);
            el.addEventListener('animationend', () => el.classList.remove(cls), { once: true });
        }
        window.playEntranceAnim = playEntranceAnim;

        // Play the configured exit (退場) animation, then call `done()` when finished.
        // If no exit anim is configured, `done()` runs immediately so the caller doesn't
        // need to special-case the no-anim path.  Reads data-exit-anim / data-exit-duration.
        function playExitAnim(el, done) {
            const cb = (typeof done === 'function') ? done : () => {};
            if (!el) { cb(); return; }
            const a = el.getAttribute('data-exit-anim');
            if (!a || a === 'none') { cb(); return; }
            const cls = 'el-exit-' + a;
            const dur = parseFloat(el.getAttribute('data-exit-duration')) || 0;
            if (dur > 0) el.style.setProperty('--el-exit-duration', dur + 's');
            else el.style.removeProperty('--el-exit-duration');
            let called = false;
            const finish = () => { if (called) return; called = true; cb(); };
            el.addEventListener('animationend', finish, { once: true });
            // Fallback in case animationend never fires (browser/DOM detach edge cases)
            setTimeout(finish, ((dur > 0) ? dur : 0.5) * 1000 + 80);
            el.classList.add(cls);
        }
        window.playExitAnim = playExitAnim;

        // Reusable haptic-timeline builder — works anywhere (editor IIFE OR a plain
        // dialog like the heart gear-config). getPulses()→[{t,len}], setPulses(arr)
        // stores, onCommit() optional. Tap empty = add pulse, drag a pulse L/R = length,
        // drag down = remove.
        function buildHapticBuilderOn(builder, getPulses, setPulses, onCommit) {
            let pulses = (getPulses() || []).map(x => (typeof x === 'number') ? { t: x, len: 1 } : { t: x.t, len: x.len || 1 });
            function commit() {
                setPulses(pulses.map(p => ({ t: p.t, len: p.len })));
                if (onCommit) onCommit();
            }
            function render() {
                builder.querySelectorAll('.haptic-pulse').forEach(p => p.remove());
                pulses.forEach((pl, i) => {
                    const p = document.createElement('div');
                    p.className = 'haptic-pulse adding';
                    p.style.left = (pl.t / 1000 * 100) + '%';
                    p.style.width = (8 + pl.len * 7) + 'px';
                    p.style.marginLeft = -(8 + pl.len * 7) / 2 + 'px';
                    p.style.height = '36px';
                    p.style.top = '10px';
                    p.dataset.idx = i;
                    builder.appendChild(p);
                    setTimeout(() => p.classList.remove('adding'), 400);
                    let dragging = false, sx = 0, sy = 0, startLen = pl.len;
                    p.addEventListener('pointerdown', (e) => {
                        e.stopPropagation();
                        dragging = true; sx = e.clientX; sy = e.clientY; startLen = pl.len;
                        p.setPointerCapture(e.pointerId);
                    });
                    p.addEventListener('pointermove', (e) => {
                        if (!dragging) return;
                        const dx = e.clientX - sx, dy = e.clientY - sy;
                        if (dy > 60 && Math.abs(dy) > Math.abs(dx)) {
                            p.classList.add('removing');
                        } else {
                            p.classList.remove('removing');
                            const newLen = Math.max(1, Math.min(8, startLen + Math.round(dx / 14)));
                            pl.len = newLen;
                            const w = 8 + newLen * 7;
                            p.style.width = w + 'px';
                            p.style.marginLeft = -w / 2 + 'px';
                        }
                    });
                    p.addEventListener('pointerup', (e) => {
                        if (!dragging) return;
                        dragging = false;
                        try { p.releasePointerCapture(e.pointerId); } catch (_) {}
                        const dx = e.clientX - sx, dy = e.clientY - sy;
                        if (dy > 60 && Math.abs(dy) > Math.abs(dx)) {
                            try { haptic.error(); } catch (_) {}
                            pulses.splice(parseInt(p.dataset.idx, 10), 1);
                        } else {
                            try { haptic.selection(); } catch (_) {}
                        }
                        render(); commit();
                    });
                });
            }
            builder.addEventListener('click', (e) => {
                if (e.target.closest('.haptic-pulse')) return;
                const r = builder.getBoundingClientRect();
                const t = Math.max(0, Math.min(1000, Math.round((e.clientX - r.left) / r.width * 1000)));
                pulses.push({ t, len: 1 });
                pulses.sort((a, b) => a.t - b.t);
                try { haptic.confirm(); } catch (_) {}
                render(); commit();
            });
            render();
        }

            let initialDistance = 0;

            element.addEventListener('touchstart', function(e) {
                if (isPreviewMode || e.touches.length < 2) return;
                if (element.dataset.locked === '1') return;   // L: ロック中はピンチ拡大も不可

                initialDistance = Math.hypot(touch2.clientX - touch1.clientX, touch2.clientY - touch1.clientY);

                if (child) {

                    const match = transform.match(/scale\(([^)]+)\)/);

                if (isPreviewMode || e.touches.length < 2) return;

                e.preventDefault();
                const touch1 = e.touches[0];
                const touch2 = e.touches[1];
                const currentDistance = Math.hypot(touch2.clientX - touch1.clientX, touch2.clientY - touch1.clientY);
                const scale = (currentDistance / initialDistance) * currentScale;

                cur = Math.max(0.3, Math.min(4, cur + delta));
