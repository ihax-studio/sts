<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#8b7af5">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Document Studio</title>
    <script src="ui-sfx.js"></script>
    <script src="motion-fx.js"></script>
    <script>window.MotionFX && MotionFX.boot();</script>
    <link rel="stylesheet" href="ds.css">
</head>
<body>
    <!-- Home / back to launcher. The old icon button is kept (hidden) so its tested
         save-confirm handler can be reused; the visible control is the sl-home-btn
         pill (same grabber affordance as the app launcher). -->
    <button class="home-btn" id="homeBtn" type="button" aria-label="ホームに戻る" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
    </button>
    <button class="sl-home-btn" id="slHomeBtn" type="button" aria-label="ホーム（ランチャーに戻る）"></button>
    <!-- styles → ds.css -->

    <!-- Top toolbar removed — undo/redo live in the OmniBar (dynamic island);
         箇条書き / 見出し / ページ余白 moved into the selection bubble below. -->

    <!-- Contextual text bubble — appears above the selection.
         B/I/U · 整列(1つで循環) · 箇条書き/見出し · サイズ · ページ余白 -->
    <div class="sel-bar" id="dsSelBar">
        <!-- simple & unified: 整列(motion) ／ サイズ ／ ⚙設定(全機能を1パネルに集約) のみ -->
        <button class="tb-btn ds-align-cycle" id="dsAlignCycle" data-aligncycle title="整列（タップ=次／右クリック・長押し=前）" aria-label="整列"><img src="motion.png" alt="整列"></button>
        <span class="tb-sep"></span>
        <div class="tb-size-swipe" id="sizeSwipe" role="button" tabindex="0" title="上下スワイプでサイズ／ダブルタップで入力" aria-label="文字サイズ"><span class="tb-size" id="sizeLabel">16</span></div>
        <span class="tb-sep"></span>
        <button class="tb-btn ds-gear" data-doc="textstyle" title="テキスト設定" aria-label="テキスト設定"><img src="gear.png" alt="設定"></button>
    </div>

    <!-- Left language switcher (multilingual view) -->
    <div class="langs" id="langs"></div>

    <!-- Center A4 stack -->
    <div class="stage" id="stage">
        <div class="paper-stack" id="paperStack">
            <div class="paper back2"></div>
            <div class="paper back1"></div>
            <div class="paper front">
                <div class="doc-page" id="docPage" contenteditable="true" spellcheck="false" data-placeholder="ここに入力…"></div>
            </div>
        </div>
    </div>

    <!-- Right page ruler -->
    <div class="ruler" id="ruler"></div>

    <!-- Bottom page pill / page bar removed (ページ番号はルーラーの tick だけに集約) -->

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Add-language overlay -->
    <div class="overlay" id="langOverlay">
        <div class="sheet">
            <h3>言語を追加</h3>
            <p class="sub">この書類に新しい言語ビューを追加します。</p>
            <div class="lang-grid" id="langGrid"></div>
        </div>
    </div>

    <!-- Add-language via terrakoku globe (same globe as the app). bare iframe, opacity fade -->
    <div class="ds-lang-globe" id="dsLangGlobe" aria-hidden="true">
        <iframe id="dsGlobeFrame" title="地球儀"></iframe>
        <button class="ds-globe-close" id="dsGlobeClose" type="button" aria-label="閉じる">×</button>
    </div>
    <!-- styles → ds.css -->

    <!-- Hidden file input for docx import -->
    <input type="file" id="docxInput" accept=".docx,application/vnd.openxmlformats-officedocument.wordprocessingml.document,.html,.htm,.psd,.pxd,text/html" style="display:none">

    <script src="platform-bridge.js"></script>
    <script src="liveTranslate.js"></script>
    <script src="omnibar.js"></script>
    <script>
    (function () {
        'use strict';

        // ---------------------------------------------------------------
        // Haptics (Mac native bridge via platform-bridge.js, with fallback)
        // ---------------------------------------------------------------
        const haptic = {
            tap()  { try { window.haptic ? (window.haptic.light||window.haptic.selection||function(){})() : null; } catch(_){} try { navigator.vibrate && navigator.vibrate(6); } catch(_){} },
            ok()   { try { if (window.sfx) { window.sfx.play('done'); return; } } catch(_){} try { window.haptic ? (window.haptic.confirm||window.haptic.light||function(){})() : null; } catch(_){} try { navigator.vibrate && navigator.vibrate(12); } catch(_){} },
            err()  { try { window.haptic ? (window.haptic.error||function(){})() : null; } catch(_){} try { navigator.vibrate && navigator.vibrate([18,40,18]); } catch(_){} }
        };

        // ---------------------------------------------------------------
        // State + persistence
        // ---------------------------------------------------------------
        const STORE_KEY = 'documentStudio.v1';
        const DEFAULT_LANGS = [{ code: 'ja', label: '日本語' }, { code: 'en', label: 'English' }];

        function blankPage(id) {
            return { id, name: '', content: {} };  // no "Page" naming; content[langCode] = HTML string
        }

        let state = load();
        // Page layout (Image #2: 余白/向き/サイズ). Defensive defaults for old saves.
        if (!state.layout) state.layout = { mv: 48, mh: 54, landscape: false, ph: null };
        function load() {
            try {
                const raw = localStorage.getItem(STORE_KEY);
                if (raw) {
                    const s = JSON.parse(raw);
                    if (s && Array.isArray(s.pages) && s.pages.length && Array.isArray(s.languages)) return s;
                }
            } catch (_) {}
            return {
                languages: DEFAULT_LANGS.slice(),
                currentLang: 'ja',
                currentPage: 0,
                pages: [blankPage(1)],
                fontSize: 16
            };
        }
        let saveTimer = null;
        function save() {
            clearTimeout(saveTimer);
            saveTimer = setTimeout(() => {
                try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch (_) {}
            }, 350);
        }

        // ---------------------------------------------------------------
        // DOM refs
        // ---------------------------------------------------------------
        const docPage   = document.getElementById('docPage');
        const langsEl   = document.getElementById('langs');
        const rulerEl   = document.getElementById('ruler');
        const pagePill  = document.getElementById('pagePill');
        const toolbar   = document.getElementById('toolbar');
        const toastEl   = document.getElementById('toast');
        const sizeLabel = document.getElementById('sizeLabel');
        const langOverlay = document.getElementById('langOverlay');
        const langGrid  = document.getElementById('langGrid');
        const docxInput = document.getElementById('docxInput');

        function toast(msg, kind) {
            toastEl.textContent = msg;
            toastEl.classList.add('show');
            if (kind === 'err') haptic.err();
            clearTimeout(toast._t);
            toast._t = setTimeout(() => toastEl.classList.remove('show'), 1900);
        }

        // ---------------------------------------------------------------
        // Rendering
        // ---------------------------------------------------------------
        function curPage() { return state.pages[state.currentPage]; }

        function loadEditor() {
            if (window.__dsHrEdit) window.__dsHrEdit.close();   // 遷移前に区切り線ポップを閉じる(選択枠の残留防止)
            const p = curPage();
            const html = (p.content && p.content[state.currentLang]) || '';
            docPage.innerHTML = html;
            // 保存から復元した動画も必ず動く状態に（controls/playsinline/contenteditable=false を担保）
            docPage.querySelectorAll('video').forEach(v => {
                v.controls = true; v.setAttribute('playsinline', ''); v.playsInline = true;
                v.setAttribute('contenteditable', 'false'); if (!v.preload) v.preload = 'metadata';
            });
        }
        function stashEditor() {
            const p = curPage();
            if (!p.content) p.content = {};
            // 一時的なUIクラス(区切り線の選択枠 / ♡のタップアニメ)は保存HTMLに残さない
            const _tmp = docPage.querySelectorAll('.ds-hr-sel, .ds-heart-pop'), _restore = [];
            _tmp.forEach(el => { _restore.push([el, el.className]); el.classList.remove('ds-hr-sel', 'ds-heart-pop'); });
            p.content[state.currentLang] = docPage.innerHTML;
            _restore.forEach(pair => { pair[0].className = pair[1]; });
        }

        let langSlide = null;
        function renderLangs() {
            langsEl.innerHTML = '';
            langSlide = null;
            state.languages.forEach(l => {
                const b = document.createElement('button');
                b.className = 'lang' + (l.code === state.currentLang ? ' active' : '');
                b.type = 'button';
                b.dataset.code = l.code;
                var _flag = '🌐'; try { var _ch = LANG_CHOICES.find(function (c) { return c.code === l.code; }); if (_ch && _ch.flag) _flag = _ch.flag; } catch (_) {}
                b.innerHTML = '<span class="bar"></span><span class="lang-flag">' + _flag + '</span><span class="lbl">' + escapeHtml(l.label) + '</span>';   // G2#24: 国旗(入力中)＋言語名
                b.addEventListener('click', () => switchLang(l.code));
                langsEl.appendChild(b);
            });
            const add = document.createElement('button');
            add.className = 'lang lang-add';
            add.type = 'button';
            add.innerHTML = '<span class="bar"></span><span class="lbl"><span class="lng-long">言語を追加</span><span class="lng-short">＋🌐</span><span class="spark"> ✨</span></span>';
            add.addEventListener('click', openLangGlobe);
            langsEl.appendChild(add);
            positionLangSlide();
        }
        // a single accent that SLIDES (0.5s) to the active language (replaces the old toast)
        function positionLangSlide() {
            if (!langSlide) { langSlide = document.createElement('div'); langSlide.className = 'lang-slide'; langsEl.appendChild(langSlide); }
            const active = langsEl.querySelector('.lang.active');
            if (!active) { langSlide.style.opacity = '0'; return; }
            langSlide.style.opacity = '1';
            langSlide.style.transform = 'translateY(' + (active.offsetTop + active.offsetHeight / 2) + 'px)';
        }

        function renderRuler() {
            rulerEl.innerHTML = '';
            // ruler-label (総ページ数) removed — ページが1枚なら番号 tick は「1」の1つだけ出る。
            state.pages.forEach((p, i) => {
                const t = document.createElement('button');
                t.className = 'tick' + (i === state.currentPage ? ' active' : '');
                t.type = 'button';
                t.innerHTML = '<span class="num">' + (i + 1) + '</span><span class="line"></span>';
                t.addEventListener('click', () => switchPage(i));
                rulerEl.appendChild(t);
            });
            // "+" tick — tap to add a page (今までの index のようにタップで追加)
            const add = document.createElement('button');
            add.className = 'tick tick-add';
            add.type = 'button';
            add.innerHTML = '<span class="plus">+</span><span class="line"></span>';
            add.addEventListener('click', addPage);
            rulerEl.appendChild(add);
        }

        function renderPill() {
            if (pagePill) pagePill.textContent = curPage().name || String(state.currentPage + 1);
        }

        function renderAll() {
            renderLangs();
            renderRuler();
            renderPill();
            loadEditor();
            sizeLabel.textContent = state.fontSize;
            docPage.style.fontSize = state.fontSize + 'px';
        }

        // ---------------------------------------------------------------
        // Navigation
        // ---------------------------------------------------------------
        function switchLang(code) {
            if (code === state.currentLang) return;
            stashEditor();
            const _sc = docPage.scrollTop;   // #10 innerHTML 差し替えで本文がトップにズレないようスクロール位置を保持
            state.currentLang = code;
            showLangIsland(code);
            // update in place (no rebuild)
            langsEl.querySelectorAll('.lang').forEach(b => b.classList.toggle('active', b.dataset.code === code));
            positionLangSlide();
            loadEditor();
            docPage.scrollTop = _sc;          // #10 復元（毎回ズレるのを防ぐ）
            if (window.sfx) sfx.play('swish'); else haptic.tap();
            save();
        }
        // card-style 0.5s swap when changing / adding pages
        function flashCard() {
            const front = document.querySelector('.paper.front');
            if (!front) return;
            front.style.animation = 'none'; void front.offsetWidth;
            front.style.animation = 'cardSwap .5s cubic-bezier(.16,1,.3,1)';
        }
        function switchPage(i) {
            if (i === state.currentPage) return;
            stashEditor();
            const dir = i > state.currentPage ? 'navPush' : 'navPop';
            state.currentPage = i;
            renderRuler(); renderPill(); loadEditor(); flashCard();
            if (window.sfx) sfx.play(dir); else haptic.tap();
            save();
        }
        function addPage() {
            stashEditor();
            const id = (state.pages.reduce((m, p) => Math.max(m, p.id), 0)) + 1;
            state.pages.push(blankPage(id));
            state.currentPage = state.pages.length - 1;
            renderRuler(); renderPill(); loadEditor(); flashCard();
            haptic.ok();
            save();
            docPage.focus();
        }

        // rename current page by tapping the pill (pill removed → guard)
        if (pagePill) pagePill.addEventListener('click', () => {
            const name = prompt('ページ名', curPage().name);
            if (name && name.trim()) { curPage().name = name.trim(); renderPill(); renderRuler(); save(); haptic.tap(); }
        });

        // ---------------------------------------------------------------
        // Editor: toolbar (Word-like). Buttons preventDefault on pointerdown
        // so the text selection / caret is NEVER lost (this is what made the
        // old mobile UI "close / lose focus" on tap — fixed here).
        // ---------------------------------------------------------------
        try { document.execCommand('defaultParagraphSeparator', false, 'p'); } catch (_) {}
        try { document.execCommand('styleWithCSS', false, true); } catch (_) {}

        function exec(cmd, val) { try { docPage.focus(); document.execCommand(cmd, false, val); } catch (_) {} }

        function applyAlign(dir) {
            const map = { left: 'justifyLeft', center: 'justifyCenter', right: 'justifyRight' };
            exec(map[dir]);
            refreshToolbarState();
            stashEditor(); save();
        }
        function applySize(delta) {
            state.fontSize = Math.max(10, Math.min(40, state.fontSize + delta));
            sizeLabel.textContent = state.fontSize;
            // apply to selection if any, else to whole page baseline
            const sel = window.getSelection();
            if (sel && sel.rangeCount && !sel.isCollapsed) {
                exec('fontSize', '4'); // placeholder size 4, then override px on the produced font tags
                docPage.querySelectorAll('font[size="4"]').forEach(f => { f.removeAttribute('size'); f.style.fontSize = state.fontSize + 'px'; });
            } else {
                docPage.style.fontSize = state.fontSize + 'px';
            }
            stashEditor(); save();
        }

        // ── A3: 文字サイズ = 上下スワイプ・ピッカー + ダブルタップで数値入力 ──
        (function () {
            const sw = document.getElementById('sizeSwipe');
            if (!sw) return;
            function setSize(v, commit) {
                v = Math.max(10, Math.min(40, Math.round(v)));
                const changed = v !== state.fontSize;
                state.fontSize = v; sizeLabel.textContent = v;
                if (!commit) { docPage.style.fontSize = v + 'px'; return changed; }   // live baseline preview
                const sel = window.getSelection();
                if (sel && sel.rangeCount && !sel.isCollapsed) {
                    exec('fontSize', '4');
                    docPage.querySelectorAll('font[size="4"]').forEach(f => { f.removeAttribute('size'); f.style.fontSize = v + 'px'; });
                } else { docPage.style.fontSize = v + 'px'; }
                stashEditor(); save();
                return changed;
            }
            let startY = null, startSize = 16, moved = false, lastTap = 0;
            sw.addEventListener('pointerdown', e => {
                if (sw.classList.contains('editing')) return;
                e.preventDefault();                                    // keep the doc selection (don't steal focus)
                startY = e.clientY; startSize = state.fontSize; moved = false;
                try { sw.setPointerCapture(e.pointerId); } catch (_) {}
            });
            sw.addEventListener('pointermove', e => {
                if (startY == null) return;
                const dy = startY - e.clientY;
                if (Math.abs(dy) > 3) moved = true;
                if (setSize(startSize + Math.round(dy / 7), false)) { try { haptic.tap(); } catch (_) {} }
            });
            function endSwipe() {
                if (startY == null) return;
                startY = null;
                if (moved) { setSize(state.fontSize, true); return; }   // commit the swiped size to the selection
                const now = Date.now();                                 // tap (no move) → double-tap?
                if (now - lastTap < 320) { lastTap = 0; beginEdit(); } else lastTap = now;
            }
            sw.addEventListener('pointerup', endSwipe);
            sw.addEventListener('pointercancel', () => { if (startY != null && moved) setSize(state.fontSize, true); startY = null; });
            function beginEdit() {
                sw.classList.add('editing');
                sizeLabel.contentEditable = 'true';
                try { const r = document.createRange(); r.selectNodeContents(sizeLabel); const s = window.getSelection(); s.removeAllRanges(); s.addRange(r); } catch (_) {}
                sizeLabel.focus();
            }
            function endEdit(apply) {
                if (!sw.classList.contains('editing')) return;
                sizeLabel.contentEditable = 'false';
                sw.classList.remove('editing');
                if (apply) { const n = parseInt((sizeLabel.textContent || '').replace(/[^\d]/g, ''), 10); if (n) { setSize(n, true); return; } }
                sizeLabel.textContent = state.fontSize;
            }
            sizeLabel.addEventListener('keydown', e => {
                if (!sw.classList.contains('editing')) return;
                if (e.key === 'Enter') { e.preventDefault(); endEdit(true); }
                else if (e.key === 'Escape') { e.preventDefault(); endEdit(false); }
            });
            sizeLabel.addEventListener('blur', () => endEdit(true));
        })();

        // ── A1: 「テキストと線」リッチ・テキストパネル（index準拠）→ 選択テキストへ適用 ──
        // ---- 区切り線(hr) スタイル適用 — index.html applyHrStyle 準拠（点線=丸ドット / 実線、太さ・色、タップ用に上下padding） ----
        function applyDsHr(hr, style, color) {
            style = (style === 'dotted') ? 'dotted' : 'solid';
            const thick = parseInt(hr.getAttribute('data-hr-thick') || (style === 'dotted' ? '3' : '2'), 10) || 2;
            hr.setAttribute('data-hr-style', style);
            if (color) hr.setAttribute('data-hr-color', color); else hr.removeAttribute('data-hr-color');
            const c = color || 'var(--hr-default-color, #16161a)';
            hr.style.border = 'none';
            hr.style.margin = '.4em 0';
            hr.style.padding = '7px 0';          // 線は細いので上下paddingでタップ領域を確保
            hr.style.height = thick + 'px';
            hr.style.boxSizing = 'content-box';
            hr.style.backgroundPosition = 'center';
            if (style === 'dotted') {
                hr.style.backgroundImage = 'radial-gradient(circle, ' + c + ' 0 50%, transparent 52%)';
                hr.style.backgroundSize = (thick * 3) + 'px ' + thick + 'px';
                hr.style.backgroundRepeat = 'repeat-x';
            } else {
                hr.style.backgroundImage = 'linear-gradient(to right, ' + c + ', ' + c + ')';
                hr.style.backgroundSize = '100% ' + thick + 'px';
                hr.style.backgroundRepeat = 'no-repeat';
            }
        }

        window.__dsOpenTextPanel = (function () {
            const st = document.createElement('style');
            st.textContent =
                '.dtp-ov{position:fixed;inset:0;z-index:1400;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.18)}' +
                '.dtp-ov.show{display:flex;animation:dtpFade .2s ease}' +
                '@keyframes dtpFade{from{opacity:0}to{opacity:1}}' +
                '.dtp-sheet{width:min(440px,96vw);margin-bottom:max(12px,env(safe-area-inset-bottom));background:linear-gradient(180deg,#fbfbfd,#f1f1f5);border-radius:26px;padding:14px 14px 16px;box-shadow:0 24px 70px rgba(20,18,50,.34),inset 0 .5px 0 rgba(255,255,255,.9);transform:translateY(16px);opacity:0;transition:transform .32s cubic-bezier(.2,.9,.2,1.05),opacity .28s ease}' +
                '.dtp-ov.show .dtp-sheet{transform:none;opacity:1}' +
                '.dtp-grab{width:38px;height:5px;border-radius:3px;background:rgba(0,0,0,.18);margin:0 auto 12px}' +
                '.dtp-title{text-align:center;font:700 15px -apple-system,"Hiragino Sans";color:#1c1c1e;margin-bottom:10px}' +
                '.dtp-fmt{display:flex;gap:8px;margin-bottom:10px}' +
                '.dtp-fmt button{flex:1;border:1px solid rgba(0,0,0,.08);background:#fff;border-radius:12px;padding:11px 0;cursor:pointer;font:700 16px -apple-system;color:#1c1c1e;transition:transform .12s,background .2s}' +
                '.dtp-fmt button:active{transform:scale(.9)}' +
                '.dtp-fmt button.on{background:#1c1c1e;color:#fff}' +
                '.dtp-presets{display:flex;gap:8px;margin-bottom:10px}' +
                '.dtp-tile{flex:1;border:1px solid rgba(0,0,0,.08);background:#fff;border-radius:14px;padding:14px 6px;cursor:pointer;font:600 14px -apple-system;color:#1c1c1e;text-align:center;transition:transform .15s}' +
                '.dtp-tile:active{transform:scale(.94)}' +
                '.dtp-tile[data-preset="heading"]{font-size:17px;font-weight:800}' +
                '.dtp-tile[data-preset="caption"]{font-size:11px;color:#8e8e93;letter-spacing:.4px;text-transform:uppercase}' +
                '.dtp-tile[data-preset="quote"]{font-style:italic;color:#5856d6;border-left:3px solid #AF52DE}' +
                '.dtp-seg{display:flex;position:relative;background:rgba(118,118,128,.12);border-radius:12px;padding:3px;margin-bottom:10px}' +
                '.dtp-pill{position:absolute;top:0;left:0;width:0;border-radius:9px;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.14);transition:transform .28s cubic-bezier(.2,.9,.2,1.05),width .26s cubic-bezier(.2,.9,.2,1.05);pointer-events:none;z-index:0}' +
                '.dtp-seg button{position:relative;z-index:1;flex:1;border:none;background:none;cursor:pointer;padding:9px 0;border-radius:9px;font:600 13px -apple-system;color:#3a3a3c;transition:color .2s}' +
                '.dtp-seg button.on{color:#1c1c1e}' +
                '.dtp-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}' +
                '.dtp-row input[type=range]{flex:1}' +
                '.dtp-val{min-width:48px;text-align:right;font:700 13px -apple-system;color:#5b3df0}' +
                '.dtp-color{display:flex;align-items:center;gap:12px;background:rgba(118,118,128,.08);border-radius:14px;padding:10px 12px;margin-bottom:10px}' +
                '.dtp-color input[type=color]{width:54px;height:36px;border:none;border-radius:10px;background:none;cursor:pointer;padding:0}' +
                '.dtp-hex{font:600 13px ui-monospace,monospace;color:#8e8e93;flex:1}' +
                '.dtp-hr{display:flex;gap:8px}' +
                '.dtp-hr button{flex:1;border:1px solid rgba(0,0,0,.08);background:#fff;border-radius:12px;padding:11px 0;cursor:pointer;font:600 13px -apple-system;color:#1c1c1e}' +
                '.dtp-hr button:active{transform:scale(.94)}' +
                '.dtp-done{margin-top:10px;width:100%;border:none;background:#5b3df0;color:#fff;border-radius:14px;padding:13px;font:700 15px -apple-system;cursor:pointer}';
            document.head.appendChild(st);

            const ov = document.createElement('div'); ov.className = 'dtp-ov';
            ov.innerHTML =
                '<div class="dtp-sheet">' +

                cv.setUint16(6, 20, true);           // version needed
                cv.setUint16(8, 0, true);            // flags
                cv.setUint16(10, 0, true);           // method = STORE (0)  ← key field unzip checks

            const ds = new DecompressionStream('deflate-raw');
            const ab = await new Response(new Blob([bytes]).stream().pipeThrough(ds)).arrayBuffer();
            return new Uint8Array(ab);

        async function unzip(bytes) {
            const dv = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
            let eo = -1;
            for (let i = bytes.length - 22; i >= 0; i--) { if (dv.getUint32(i, true) === 0x06054b50) { eo = i; break; } }
            if (eo < 0) throw new Error('not-a-zip');
            const count = dv.getUint16(eo + 10, true);
            let p = dv.getUint32(eo + 16, true);
            const dec = new TextDecoder();
            const out = {};
            for (let n = 0; n < count; n++) {
                if (dv.getUint32(p, true) !== 0x02014b50) break;
                const method = dv.getUint16(p + 10, true);
                const compSize = dv.getUint32(p + 20, true);
                const nameLen = dv.getUint16(p + 28, true);
                const extraLen = dv.getUint16(p + 30, true);
                const commentLen = dv.getUint16(p + 32, true);
                const lho = dv.getUint32(p + 42, true);
                const name = dec.decode(bytes.subarray(p + 46, p + 46 + nameLen));
                const lNameLen = dv.getUint16(lho + 26, true);
                const lExtraLen = dv.getUint16(lho + 28, true);
                const start = lho + 30 + lNameLen + lExtraLen;
                const comp = bytes.subarray(start, start + compSize);
                if (method === 0) out[name] = comp;
                else if (method === 8) { try { out[name] = await inflateRaw(comp); } catch (e) { out[name] = null; } }
                p += 46 + nameLen + extraLen + commentLen;
            }
            return out;
        }

        function xmlEsc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

        // ---- Editor DOM → block model (paragraphs / tables / images) ----
        function editorToBlocks(rootHtml) {
            const root = document.createElement('div');
            root.innerHTML = rootHtml;
            const out = [];
            Array.from(root.childNodes).forEach(node => {
                if (node.nodeType === 3) { if (node.textContent.trim()) out.push({ type:'p', align:'left', runs:[{ text:node.textContent }] }); return; }
                if (node.nodeType !== 1) return;
                const tag = node.tagName;
                if (tag === 'TABLE') { out.push(tableBlock(node)); return; }
                if (tag === 'UL' || tag === 'OL') {
                    Array.from(node.children).forEach(li => {
                        const im = li.querySelector && li.querySelector('img');
                        if (im) out.push(imageBlock(im));
                        if (li.textContent.trim()) out.push(Object.assign({ type:'p' }, blockToParagraph(li, '• ')));
                    });
                    return;
                }
                if (tag === 'IMG') { out.push(imageBlock(node)); return; }
                const im = node.querySelector ? node.querySelector('img') : null;
                if (im) {
                    out.push(imageBlock(im));
                    const clone = node.cloneNode(true);
                    clone.querySelectorAll('img').forEach(x => x.remove());
                    if (clone.textContent.trim()) out.push(Object.assign({ type:'p' }, blockToParagraph(clone, '')));
                    return;
                }
                out.push(Object.assign({ type:'p' }, blockToParagraph(node, '')));
            });
            return out.length ? out : [{ type:'p', align:'left', runs:[] }];
        }
        function tableBlock(table) {
            const rows = [];
            table.querySelectorAll('tr').forEach(tr => {
                const cells = [];
                tr.querySelectorAll('td,th').forEach(td => {
                    const kids = Array.from(td.children).filter(n => /^(P|DIV|H[1-3]|LI)$/.test(n.tagName));
                    const paras = kids.length ? kids.map(b => blockToParagraph(b, '')) : [blockToParagraph(td, '')];
                    cells.push({ paras });
                });
                if (cells.length) rows.push(cells);
            });
            return { type:'table', rows, cols: rows.length ? Math.max.apply(null, rows.map(r => r.length)) : 0 };
        }
        function imageBlock(img) {
            const src = img.getAttribute('src') || '';
            let w = parseInt(img.style.width, 10) || img.clientWidth || img.naturalWidth || 460;
            const ratio = (img.naturalWidth && img.naturalHeight) ? (img.naturalHeight / img.naturalWidth) : 0.66;
            if (w > 600) w = 600; if (w < 16) w = 200;
            return { type:'image', dataUrl: src, w: Math.round(w), h: Math.round(w * ratio) };

        function blockToParagraph(el, prefix) {
            const align = (el.style.textAlign || getComputedStyle(el).textAlign || 'left');
            const a = /center/.test(align) ? 'center' : /right/.test(align) ? 'right' : /justify/.test(align) ? 'both' : 'left';
            const heading = /^H([1-3])$/.exec(el.tagName);
            const runs = [];
            collectRuns(el, { bold: !!heading, italic: false, underline: false, size: heading ? (heading[1] === '1' ? 36 : heading[1] === '2' ? 28 : 24) : 0 }, runs);
            if (prefix && runs.length) runs[0] = { ...runs[0], text: prefix + runs[0].text };

        function collectRuns(node, inh, out) {
            node.childNodes.forEach(ch => {
                if (ch.nodeType === 3) {
                    if (ch.textContent) out.push({ text: ch.textContent, bold: inh.bold, italic: inh.italic, underline: inh.underline, size: inh.size });
                    return;
                }
                if (ch.nodeType !== 1) return;
                const t = ch.tagName;
                const st = { ...inh };
                if (t === 'B' || t === 'STRONG') st.bold = true;
                if (t === 'I' || t === 'EM') st.italic = true;
                if (t === 'U') st.underline = true;
                const fw = ch.style.fontWeight; if (fw === 'bold' || parseInt(fw, 10) >= 600) st.bold = true;
                if (ch.style.fontStyle === 'italic') st.italic = true;
                if ((ch.style.textDecorationLine || ch.style.textDecoration || '').indexOf('underline') >= 0) st.underline = true;
                const fs = parseFloat(ch.style.fontSize); if (fs) st.size = Math.round(fs * 2); // px→half-points approx (×2)
                if (t === 'BR') { out.push({ text: '\n', bold: st.bold, italic: st.italic, underline: st.underline, size: st.size, brk: true }); return; }
                collectRuns(ch, st, out);

        }

        // ---- block model → OOXML ----
        const EMU_PER_PX = 9525;
        function runXml(r) {
            if (r.brk) return '<w:r><w:br/></w:r>';
            if (!r.text) return '';
            let rpr = '';
            if (r.bold) rpr += '<w:b/>';
            if (r.italic) rpr += '<w:i/>';
            if (r.underline) rpr += '<w:u w:val="single"/>';
            if (r.size) rpr += '<w:sz w:val="' + r.size + '"/><w:szCs w:val="' + r.size + '"/>';

        function paraXml(b, pageBreak) {

        function tableXml(b) {

                .map(s => '<w:' + s + ' w:val="single" w:sz="4" w:space="0" w:color="9aa0aa"/>').join('') + '</w:tblBorders>';
            const grid = '<w:tblGrid>' + Array.from({ length: cols }).map(() => '<w:gridCol w:w="' + colW + '"/>').join('') + '</w:tblGrid>';
            let trs = '';
            b.rows.forEach(row => {

                    tcs += '<w:tc><w:tcPr><w:tcW w:w="' + colW + '" w:type="dxa"/></w:tcPr>' + inner + '</w:tc>';

                + '<pic:nvPicPr><pic:cNvPr id="' + info.seq + '" name="image' + info.seq + '"/><pic:cNvPicPr/></pic:nvPicPr>'
                + '<pic:blipFill><a:blip r:embed="' + info.rid + '"/><a:stretch><a:fillRect/></a:stretch></pic:blipFill>'
                + '<pic:spPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="' + cx + '" cy="' + cy + '"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom></pic:spPr>'
                + '</pic:pic></a:graphicData></a:graphic></wp:inline></w:drawing></w:r></w:p>';

        function dataUrlToBytes(dataUrl) {

        // Build document.xml + the media parts + their relationships.
        function buildDocxParts(lang, pageIdx) {
            const media = [], rels = [];

            const addImage = (dataUrl) => {
                const d = dataUrlToBytes(dataUrl);
                if (!d) return null;

            pagesFor(pageIdx).forEach((p, i) => {
                const blocks = editorToBlocks((p.content && p.content[lang]) || '');
                blocks.forEach((b, idx) => {

                    if (b.type === 'table') { if (pb) body += '<w:p><w:pPr><w:pageBreakBefore/></w:pPr></w:p>'; body += tableXml(b); }

        function buildDocxBlob(langArg, pageIdx) {
            stashEditor();
            const enc = new TextEncoder();
            const lang = langArg || state.currentLang;
            const parts = buildDocxParts(lang, pageIdx);
            const exts = {}; parts.media.forEach(m => { exts[m.ext] = true; });

                (exts.jpeg ? '<Default Extension="jpeg" ContentType="image/jpeg"/>' : '') +

                '</Relationships>';

        function downloadBytes(bytes, name, mime) {

            document.body.appendChild(a); a.click();
            setTimeout(() => { a.remove(); URL.revokeObjectURL(url); }, 1500);

        // ================================================================
        // Export — HTML / PNG / PDF / DOCX, with a language picker shown only

        // (.pages は lib 無しで正しく読める形にできないため対象外)

        function langsWithContent() {
            stashEditor();

                const h = p.content && p.content[l.code];
                return h && h.replace(/<[^>]*>/g, '').trim();
            }));
        }
        // pageIdx: 数値ならそのページだけ / undefined なら全ページ（保存・共有のページ選択用）

        function pageSuffix(pageIdx) { return (typeof pageIdx === 'number') ? '-p' + (pageIdx + 1) : ''; }
        function pagesHtml(lang, pageIdx) {
            return pagesFor(pageIdx).map(p => '<section class="page">' + ((p.content && p.content[lang]) || '') + '</section>').join('\n');
        }
        function buildExportHtml(lang, pageIdx) {
            const L = state.layout;
            const css = 'body{margin:0;background:#eceef2;font-family:-apple-system,"Hiragino Sans",system-ui;color:#16161a}' +
                '.page{background:#fff;box-sizing:border-box;width:' + (L.landscape ? '297mm' : '210mm') + ';min-height:' + (L.landscape ? '210mm' : '297mm') + ';' +
                'padding:' + L.mv + 'px ' + L.mh + 'px;margin:18px auto;box-shadow:0 2px 12px rgba(0,0,0,.15);line-height:1.75}img,video{max-width:100%}';

        function nodeToCanvas(node, W, H, scale) {
            return new Promise((resolve, reject) => {
                const xml = new XMLSerializer().serializeToString(node);
                const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + W + '" height="' + H + '">' +
                    '<foreignObject width="100%" height="100%">' + xml + '</foreignObject></svg>';

                    const c = document.createElement('canvas'); c.width = W * scale; c.height = H * scale;

        function buildPrintHtml(lang, pageIdx) {

        function exportPdf(lang, pageIdx) { openPrintWindow(lang, '🖨 PDF: 「PDFに保存」を選んでください', pageIdx); }
        function printDoc(lang, pageIdx)  { openPrintWindow(lang, '🖨 印刷ダイアログを開きました', pageIdx); }
        function ensureSheetStyle() {

            st.textContent =
                '.ds-sheet-ov{position:fixed;inset:0;z-index:99996;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.35);opacity:0;transition:opacity .25s ease}' +
                '.ds-sheet-ov.show{opacity:1}' +

                '.ds-sheet-ov.show .ds-sheet{transform:none}' +

        function pickSheet(title, items) {
            return new Promise(resolve => {

        function sanitizeHtml(html) {   // script/style/イベント属性を除去して安全なページHTMLに
            const d = document.implementation.createHTMLDocument('');
            d.body.innerHTML = html;
            d.body.querySelectorAll('script,style,link,meta,iframe,object,embed').forEach(n => n.remove());
            d.body.querySelectorAll('*').forEach(el => {
                [...el.attributes].forEach(a => { if (/^on/i.test(a.name) || (a.name === 'href' && /^javascript:/i.test(a.value))) el.removeAttribute(a.name); });
            });
            return d.body.innerHTML;
        }

                const m = text.match(/<body[^>]*>([\s\S]*?)<\/body>/i);

        async function importPsdFile(file) {    // #16d: PSD → ag-psd(無料CDN) で各レイヤー→画像/テキスト → 新ページ
            try {
                toast('📥 PSD を解析中…');
                const mod = await import('https://esm.sh/ag-psd@25');
                const psd = mod.readPsd(await file.arrayBuffer());

                    const cap = 2048, sc = Math.min(1, cap / Math.max(cv.width, cv.height));
                    let c = cv;
                    if (sc < 1) { c = document.createElement('canvas'); c.width = Math.round(cv.width * sc); c.height = Math.round(cv.height * sc); c.getContext('2d').drawImage(cv, 0, 0, c.width, c.height); }
                    return '<p><img src="' + c.toDataURL('image/png') + '" style="max-width:100%"></p>';
                };
                const walk = (layers) => (layers || []).forEach(L => {
                    if (L.children && L.children.length) { walk(L.children); return; }
                    if (L.hidden) return;
                    if (L.text && L.text.text) parts.push('<p>' + escapeHtml(L.text.text) + '</p>');   // テキストレイヤーは編集可能テキストに
                    else if (L.canvas) parts.push(toImg(L.canvas));
                });
                walk(psd.children);
                if (!parts.length && psd.canvas) parts.push(toImg(psd.canvas));   // レイヤー無し → 合成画像1枚

                importNew(parts.join(''));
                if (window.sfx) sfx.play('received'); else haptic.ok();

        }

        function docxXmlToPages(xml) {
            const doc = new DOMParser().parseFromString(xml, 'application/xml');
            const ps = doc.getElementsByTagName('w:p');
            const pages = [];
            let cur = [];
            for (let i = 0; i < ps.length; i++) {
                const p = ps[i];
                // page break?
                const ppr = p.getElementsByTagName('w:pPr')[0];
                const breakBefore = ppr && ppr.getElementsByTagName('w:pageBreakBefore').length > 0;
                const hasPageBr = p.getElementsByTagName('w:br').length &&
                    Array.from(p.getElementsByTagName('w:br')).some(b => b.getAttribute('w:type') === 'page');
                if ((breakBefore || hasPageBr) && cur.length) { pages.push(cur.join('')); cur = []; }
                const jc = ppr && ppr.getElementsByTagName('w:jc')[0];
                const align = jc ? jc.getAttribute('w:val') : 'left';
                const alignCss = (align === 'center' || align === 'right') ? (' style="text-align:' + align + '"') : '';
                // runs
                let inner = '';
                const runs = p.getElementsByTagName('w:r');
                for (let r = 0; r < runs.length; r++) {
                    const run = runs[r];
                    if (run.getElementsByTagName('w:br').length) { inner += '<br>'; }
                    const ts = run.getElementsByTagName('w:t');
                    if (!ts.length) continue;
                    let txt = '';
                    for (let k = 0; k < ts.length; k++) txt += ts[k].textContent;
                    if (!txt) continue;
                    const rpr = run.getElementsByTagName('w:rPr')[0];
                    let open = '', close = '';
                    if (rpr) {
                        if (rpr.getElementsByTagName('w:b').length) { open += '<b>'; close = '</b>' + close; }
                        if (rpr.getElementsByTagName('w:i').length) { open += '<i>'; close = '</i>' + close; }
                        if (rpr.getElementsByTagName('w:u').length) { open += '<u>'; close = '</u>' + close; }
                        const sz = rpr.getElementsByTagName('w:sz')[0];
                        if (sz) { const px = Math.round(parseInt(sz.getAttribute('w:val'), 10) / 2); open = '<span style="font-size:' + px + 'px">' + open; close = close + '</span>'; }
                    }
                    inner += open + escapeHtml(txt) + close;
                }

    <script>
      window.NativeChangeConfig = {
        current: 'doc',                 // document studio; hide 書類, offer App / 動画
        ready: function () { return window.__dsReady === true; },
        undoImport: function () {   // F: 変換取消＝importNewが追加した「そのページ」をidで特定して削除
          var ds = window.__ds; if (!ds || !ds.state) return false;
          var st = ds.state;
          var pid = null; try { pid = sessionStorage.getItem('nc_undo_doc'); } catch (_) {}
          var idx = -1;
          if (pid != null) idx = st.pages.findIndex(function (p) { return String(p.id) === String(pid); });
          if (idx < 0) return false;                       // 取込ページが見つからない(手動削除済み等)→何も壊さない
          if (st.pages.length > 1) { st.pages.splice(idx, 1); if (st.currentPage >= st.pages.length) st.currentPage = st.pages.length - 1; }
          else { st.pages[0].content = {}; }
          try { sessionStorage.removeItem('nc_undo_doc'); } catch (_) {}
          try { ds.loadEditor(); } catch (_) {}            // docPageを現ページに同期(unload時のstashで取込HTMLが他ページへ漏れない)
          window.__dsSkipUnloadSave = true;                // beforeunloadのstash+saveをこのreloadだけスキップ(上書き破壊防止)
          try { localStorage.setItem(ds.STORE_KEY, JSON.stringify(st)); } catch (_) {}   // 直書き(saveのdebounceとreload競合を回避)

          return true;
        },
        extraOptions: [                 // 書類⇄プレゼン 向き変換（同一スタジオ内・遷移なし）。アイコンは Image#21 の暫定(crop.rotate.png)
          { label: 'プレゼン⇄書類', icon: 'crop.rotate.png', action: function () { if (window.__ds && window.__ds.toggleOrientation) window.__ds.toggleOrientation(); } }
        ],
        exportDoc: function () {

          try { if (ds.stashEditor) ds.stashEditor(); } catch (_) {}
          var st = ds.state, html = '';
          if (st && st.pages && st.pages[st.currentPage]) {
            var pg = st.pages[st.currentPage];
            html = (pg.content && pg.content[st.currentLang]) || '';
          }
          if (!html && ds.docPage) html = ds.docPage.innerHTML || '';
          var root = document.createElement('div'); root.innerHTML = html;
          var blocks = [], layers = [];   // blocks=back-compat / layers=R1 full-fidelity
          function styleOf(el){ var s={}; try{ var c=el.style||{}; if(c.textAlign)s.textAlign=c.textAlign;
            var inner=el.querySelector&&el.querySelector('[style],b,strong,i,em,u,s,strike,font'); var d=(inner&&inner.style)||c;
            if(d.fontSize)s.fontSize=d.fontSize; if(d.color)s.color=d.color; if(d.fontWeight)s.fontWeight=d.fontWeight;
            if(d.fontStyle)s.fontStyle=d.fontStyle; var td=d.textDecorationLine||d.textDecoration; if(td)s.textDecoration=td; }catch(_){} return s; }

            if (tag==='UL'||tag==='OL') { var items=[]; Array.prototype.forEach.call(n.children, function(li){ var lt=(li.textContent||'').trim(); if(lt){ pushText('• '+lt); items.push(lt); } }); if(items.length) layers.push({kind:'list', ordered:tag==='OL', items:items, style:sty}); return; }

              if (L.kind === 'video')   return L.src ? '<p'+s+'><video src="'+L.src+'" controls style="max-width:100%"></video></p>' : '';
              if (L.kind === 'list')    return (L.ordered?'<ol':'<ul')+s+'>'+((L.items||[]).map(function(it){return '<li>'+esc(it)+'</li>';}).join(''))+(L.ordered?'</ol>':'</ul>');

            }).join('');

            var blocks = (ncDoc && ncDoc.blocks) || [];
            if (blocks.length) html = blocks.map(function (b) {
              if (b.type === 'heading') return '<h' + (b.level || 2) + '>' + esc(b.text || '') + '</h' + (b.level || 2) + '>';
              if (b.type === 'image')   return '<p><img src="' + (b.src || '') + '"></p>';
              if (b.type === 'video')   return '<p><video src="' + (b.src || '') + '" controls></video></p>';
              return '<p>' + esc(b.text || '') + '</p>';
            }).join('');
            if (!html && ncDoc && ncDoc.html) { var tmp = document.createElement('div'); tmp.innerHTML = ncDoc.html; var body = tmp.querySelector('body'); html = (body ? body.innerHTML : tmp.innerHTML) || ('<p>' + esc(tmp.textContent || '') + '</p>'); }

          if (_ok) { try { var _p = ds.state.pages[ds.state.currentPage]; if (_p && _p.id != null) sessionStorage.setItem('nc_undo_doc', String(_p.id)); } catch (_) {} }   // F: 取消は「このページ」をidで特定

        }
      };
