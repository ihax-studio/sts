<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Earth to Earth</title>
<link rel="stylesheet" href="styles-t's.css">
<style>
  /* === 言語/国旗マッピング用: 文字UI・右バー・左下ドックを排除 === */
  #notch, #eraRail, #catRail, #dock, #searchPill,
  .overlay, #pinHoverHUD, #ftRing { display: none !important; }
  /* self-contained reset (styles-t's.css が無い環境でも地球儀が全画面で出る) */
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
  canvas { display: block; }
  #bootMask { position: fixed; inset: 0; background: #000; opacity: 1; pointer-events: none;
    transition: opacity 1s ease; z-index: 50; }
  #bootMask.lit { opacity: 0; }
</style>
</head>
<body>

<!-- 起動暗幕 (1s フェード) -->
<div id="bootMask"></div>

<!-- UI レイヤ (0.8s フェードイン) -->
<div id="uiLayer">

<!-- Notch Year HUD: compact 表示 / expand 時は年スライダ -->
<div id="notch" class="glass">
  <div class="compact">
    <div class="icon">🌍</div>
    <div class="year-line">
      <div class="year" id="notchYear">A.D. 2026</div>
      <div class="era" id="notchEra">令和 <span class="romaji">Reiwa</span></div>
    </div>
    <div class="chip">SCRUB</div>
  </div>
  <div class="expanded-pane">
    <div class="exp-top">
      <div>
        <div class="exp-year" id="expYear">A.D. 2026</div>
        <div class="exp-era" id="expEra">令和 <span class="romaji">Reiwa</span></div>
      </div>
      <div class="exp-close" id="notchClose">✕</div>
    </div>
    <div class="yearSliderWrap">
      <div class="yearSliderTrack"></div>
      <div class="yearSliderFill" id="ysFill"></div>
      <input type="range" class="yearSlider" id="yearSlider" min="-10000" max="2030" value="2026" step="1" />
      <div class="yearSliderTicks" id="ysTicks"></div>
    </div>
  </div>
</div>

<!-- Era Timeline (right rail) — weather統合 iOS 風 -->
<div id="eraRail">
  <div class="eraRailWeather loading" id="railWeather" title="天気 / 中心地">
    <div class="regionIcon bootIn" id="regionIcon">
      <img data-key="us"   alt="" />
      <img data-key="afr"  alt="" />
      <img data-key="asia" alt="" />
      <img data-key="aust" alt="" />
    </div>
    <span class="temp">--°C</span>
  </div>
  <div class="eraRailScroll" id="eraRailScroll"></div>
</div>

<!-- Category Rail (right bottom) -->
<div id="catRail"></div>

<!-- Search Pill -->
<div id="searchPill" class="glass">
  <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M16 16l5 5"/></svg>
  <input id="searchInput" type="text" placeholder="年・場所・事件で検索  例: 平安 / 794 / ローマ / ナイル" autocomplete="off" />
  <div id="searchHint">↵ で移動</div>
</div>

<!-- Bottom Left Dock -->
<div id="dock">
  <div class="iconChip" id="btnClock" title="年を選ぶ">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
  </div>
  <div class="textChip" id="btnMode" title="2D/3D 切替">3D</div>
  <div class="iconChip" id="btnStack" title="タイムマシン">
    <svg viewBox="0 0 24 24"><rect x="4" y="6" width="16" height="3" rx="1.2"/><rect x="4" y="11" width="16" height="3" rx="1.2"/><rect x="4" y="16" width="16" height="3" rx="1.2"/></svg>
  </div>
  <div class="iconChip" id="btnSaveCurrent" title="現在地を保存">
    <svg viewBox="0 0 24 24"><path d="M6 4h12v17l-6-4-6 4z"/></svg>
  </div>
  <div class="iconChip" id="btnSaved" title="保存済み一覧">
    <svg viewBox="0 0 24 24"><path d="M6 4h12v17l-6-4-6 4z" fill="rgba(255,255,255,.85)" stroke="none"/></svg>
    <div class="badge" id="savedBadge" style="display:none">0</div>
  </div>
</div>

<!-- (handoff badge は撤去) -->

<!-- Pin hover HUD -->
<div id="pinHoverHUD"><span id="pinHoverIcon">📍</span><span id="pinHoverText"></span></div>

<!-- ForceTouch Ring -->
<div id="ftRing"></div>

<!-- TimeMachine Overlay -->
<div class="overlay" id="stackOverlay">
  <div class="stackPanel glass">
    <div class="stackHeader">
      <span>⟳</span><span>TimeMachine</span>
      <span class="x" id="stackClose">✕</span>
    </div>
    <div id="stackInner"></div>
    <div class="stackFooter">
      <button id="stackUp" title="前">▲</button>
      <div class="counter" id="stackCounter">1 / 1</div>
      <button id="stackDown" title="次">▼</button>
    </div>
  </div>
</div>

<!-- Saved Overlay -->
<div class="overlay" id="savedOverlay" style="align-items:flex-end;justify-content:flex-start;">
  <div class="savedPanel glass" style="margin:0 0 86px 22px;">
    <div class="savedTitle">📌 保存済みの場所<span class="x" id="savedClose">✕</span></div>
    <div class="savedList" id="savedList"></div>
  </div>
</div>

</div><!-- /#uiLayer -->

const scene = new THREE.Scene();

// ── 星空 (xxx.html ベース): cube 分布 8000 個 + ソフトグローでうるさくない
function makeStarSprite(){
  const c = document.createElement('canvas');
  c.width = c.height = 32;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(16,16,0, 16,16,16);
  g.addColorStop(0.00, 'rgba(255,255,255,1.00)');
  g.addColorStop(0.30, 'rgba(255,255,255,0.55)');
  g.addColorStop(0.70, 'rgba(255,255,255,0.10)');
  g.addColorStop(1.00, 'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,32,32);
  const t = new THREE.CanvasTexture(c);
  t.minFilter = THREE.LinearFilter;
  t.magFilter = THREE.LinearFilter;
  return t;
}
const STAR_TEX = makeStarSprite();

// 主層: ふんわり光る星 (sprite glow). cube 分布.

  depthWrite: false,
  alphaTest: 0.002,
  opacity: 0.85,
});

function rampLighting(dur){
  const t0 = performance.now();
  function step(){
    const t = Math.min(1, (performance.now()-t0)/dur);
    const k = 1 - Math.pow(1-t, 3);
    sun.intensity = LIGHT_TARGET.sun * k;
    amb.intensity = LIGHT_TARGET.amb * k;
    earthMaterial.emissive = new THREE.Color(0x0); // 念のため
    if (t < 1) requestAnimationFrame(step);
  }
  step();
}

/* =====================================================
   緯度経度 → 3D 座標
===================================================== */
function latLonToVec3(lat, lon, radius){
  const phi = (90 - lat) * Math.PI/180;
  const theta = (lon + 180) * Math.PI/180;
  return new THREE.Vector3(
    -(radius * Math.sin(phi) * Math.cos(theta)),
     (radius * Math.cos(phi)),
     (radius * Math.sin(phi) * Math.sin(theta))
  );
}
function vec3ToLatLon(v){
  const r = v.length();
  const lat = 90 - Math.acos(v.y / r) * 180/Math.PI;
  // x = -r*sin(phi)*cos(theta), z = r*sin(phi)*sin(theta)
  const lon = Math.atan2(v.z, -v.x) * 180/Math.PI - 180;
  let l = lon;
  while (l < -180) l += 360;
  while (l > 180) l -= 360;
  return { lat, lon: l };
}

}

// ── 上下スワイプでもスライダを動かす. 0.3s 滑らかに到達.
(function attachVerticalSwipe(){
  const wrap = document.querySelector('.yearSliderWrap');
  let active = false, startY = 0, startX = 0, startYear = 0, mode = null;
  let pid = null;
  let easeTarget = null, easeFrom = null, easeT0 = 0, easeRaf = null;

  function startEase(toYear){
    cancelAnimationFrame(easeRaf);
    easeFrom = state.year;
    easeTarget = toYear;
    easeT0 = performance.now();
    const dur = 300;
    function step(){
      const t = Math.min(1, (performance.now()-easeT0)/dur);
      const k = 1 - Math.pow(1-t, 3);
      const y = Math.round(easeFrom + (easeTarget - easeFrom)*k);
      setYear(y, { silent:true });
      if (t < 1) easeRaf = requestAnimationFrame(step);
    }
    easeRaf = requestAnimationFrame(step);
  }

  wrap.addEventListener('pointerdown', e => {
    if (!notchEl.classList.contains('expanded')) return;
    active = true; pid = e.pointerId;
    startY = e.clientY; startX = e.clientX; startYear = state.year;
    mode = null;
    wrap.setPointerCapture(pid);
  });
  wrap.addEventListener('pointermove', e => {
    if (!active) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    if (!mode){
      if (Math.abs(dx) > 5 || Math.abs(dy) > 5){
        mode = (Math.abs(dy) > Math.abs(dx)) ? 'v' : 'h';
      }
    }
    if (mode === 'v'){
      e.preventDefault();
      // 上スワイプ = 未来へ. 1px = 12 年.
      const delta = -dy * 12;
      const target = Math.max(NOTCH_MIN_YEAR, Math.min(NOTCH_MAX_YEAR, startYear + Math.round(delta)));
      setYear(target, { silent: true });
    }
  });
  function endSwipe(){
    if (!active) return;
    if (pid != null) try { wrap.releasePointerCapture(pid); } catch(_){}
    active = false; pid = null;
    if (mode === 'v') haptic('confirm');
    mode = null;
  }
  wrap.addEventListener('pointerup', endSwipe);
  wrap.addEventListener('pointercancel', endSwipe);

  // ホイール (trackpad 2 本指縦) でも 0.3s 滑らかに
  wrap.addEventListener('wheel', e => {
    if (!notchEl.classList.contains('expanded')) return;
    e.preventDefault();
    const delta = -e.deltaY * 6;
    const target = Math.max(NOTCH_MIN_YEAR, Math.min(NOTCH_MAX_YEAR, state.year + Math.round(delta)));
    startEase(target);
  }, { passive:false });
})();

/* =====================================================
   TimeMachine Stack
===================================================== */
const stackOverlay = document.getElementById('stackOverlay');
const stackInner = document.getElementById('stackInner');
const stackUp = document.getElementById('stackUp');
const stackDown = document.getElementById('stackDown');
const stackCounter = document.getElementById('stackCounter');
const stackClose = document.getElementById('stackClose');

let stackCards = [];
let stackFocus = 0;

function openTimeMachine(events){
  if (!events.length){
    // 周辺イベントを採用
    events = nearestEvents(state.year, 7);
  }
  stackCards = events;
  stackFocus = 0;
  renderStack();
  stackOverlay.classList.add('show');
  haptic('confirm');
}
function closeTimeMachine(){
  stackOverlay.classList.remove('show');
}

function renderStack(){
  stackInner.innerHTML = '';
  stackCards.forEach((ev, idx) => {
    const dz = idx - stackFocus;
    const isFocus = idx === stackFocus;
    const yOff = dz * 48;
    const sc = isFocus ? 1.0 : (1 - Math.abs(dz)*0.06);
    const op = isFocus ? 1 : Math.max(0.18, 1 - Math.abs(dz)*0.22);
    const rot = isFocus ? 0 : dz * -3.4;
    const card = document.createElement('div');
    card.className = 'tmCard' + (isFocus ? ' focus':'');
    card.style.transform = `translate(-50%, calc(-50% + ${yOff}px)) scale(${sc}) rotateX(${rot}deg)`;
    card.style.top = '50%';
    card.style.opacity = op;
    card.style.zIndex = 100 - Math.abs(dz);
    const meta = KIND_META[ev.kind] || {label:'', css:'#fff'};
    card.innerHTML = `
      <div class="year">${formatYear(ev.year)}　<span class="dot" style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${meta.css};margin:0 4px 0 4px;"></span>${meta.label}<span class="focusChip">FOCUS</span></div>
      <div class="title">${escapeHtml(ev.title)}</div>
      <div class="summary">${escapeHtml(ev.summary)}</div>
      <div class="link">🔗<a href="${ev.url}" target="_blank" rel="noopener">${ev.url}</a></div>
    `;
    card.addEventListener('click', ()=>{
      stackFocus = idx;
      renderStack();
      haptic('snap');
      // 該当年へジャンプ
      setYear(ev.year);
      // ピンへフォーカス
      flyTo(ev.lat, ev.lon);
    });
    stackInner.appendChild(card);
  });
  stackCounter.textContent = `${stackFocus+1} / ${stackCards.length}`;
  stackUp.disabled = stackFocus <= 0;
  stackDown.disabled = stackFocus >= stackCards.length-1;
}
function stepStack(d){
  const n = Math.max(0, Math.min(stackCards.length-1, stackFocus+d));
  if (n !== stackFocus){
    stackFocus = n;
    renderStack();
    haptic('snap');
  }
}
stackUp.addEventListener('click', ()=> stepStack(-1));
stackDown.addEventListener('click', ()=> stepStack(1));
stackClose.addEventListener('click', closeTimeMachine);
stackOverlay.addEventListener('click', e => { if (e.target === stackOverlay) closeTimeMachine(); });

// 上下スワイプ / トラックパッド縦スクロール で stepStack. 連続発火は 500ms スロットル.
(function attachStackSwipe(){
  let lastStep = 0;
  function trySwitch(dir){
    const now = performance.now();
    if (now - lastStep < 500) return;
    lastStep = now;
    stepStack(dir);
  }
  // wheel (PC スクロール / trackpad)
  stackInner.addEventListener('wheel', e => {
    if (!stackOverlay.classList.contains('show')) return;
    e.preventDefault();
    if (Math.abs(e.deltaY) < 8) return;
    trySwitch(e.deltaY > 0 ? 1 : -1);
  }, { passive:false });
  // pointer swipe
  let pid = null, startY = 0, accY = 0, active = false;
  stackInner.addEventListener('pointerdown', e => {
    if (!stackOverlay.classList.contains('show')) return;
    active = true; pid = e.pointerId; startY = e.clientY; accY = 0;
    try { stackInner.setPointerCapture(pid); } catch(_){}
  });
  stackInner.addEventListener('pointermove', e => {
    if (!active) return;
    accY = e.clientY - startY;
    if (Math.abs(accY) > 56){
      trySwitch(accY < 0 ? 1 : -1);
      startY = e.clientY;  // 続けて swipe で連続切替
      accY = 0;
    }
  });
  function endSwipe(){
    if (!active) return;
    try { stackInner.releasePointerCapture(pid); } catch(_){}
    active = false; pid = null; accY = 0;
  }
  stackInner.addEventListener('pointerup', endSwipe);
  stackInner.addEventListener('pointercancel', endSwipe);
  // キーボード
  document.addEventListener('keydown', e => {
    if (!stackOverlay.classList.contains('show')) return;
    if (e.key === 'ArrowDown'){ e.preventDefault(); trySwitch(1); }
    if (e.key === 'ArrowUp'){ e.preventDefault(); trySwitch(-1); }
  });
})();
// 縦スワイプを邪魔しないために stackInner の touch-action を CSS で固定
stackInner.style.touchAction = 'none';

function nearestEvents(year, n){
  const sorted = EVENTS
    .filter(ev => !state.categoryFilter || ev.kind === state.categoryFilter)
    .map(ev => ({ev, d: Math.abs(ev.year - year)}))
    .sort((a,b)=>a.d-b.d)
    .slice(0, n)
    .map(x=> x.ev);
  return sorted;
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c]);
}

camera.fov = camCtl.fov;
camera.updateProjectionMatrix();

function currentCenterLatLon(){
  // 視点正面方向の単位ベクトル (world)
  const cam = camera.position.clone().normalize();
  // earth は回転している. earth ローカルで cam の前方を求める.
  const inv = new THREE.Matrix4().copy(earth.matrixWorld).invert();
  const local = cam.clone().applyMatrix4(inv).normalize();
  return vec3ToLatLon(local);
}

function flyTo(lat, lon, dist){
  // tick() の Euler 設定順 (XYZ) と整合: latLonToVec3 を逆解析した結果
  //   ry = atan2(sin(phi)*cos(theta), sin(phi)*sin(theta))
  //   rx = lat (rad)
  // で点 (lat,lon) が camera 方向 (0,0,1) に来る.
  const phi   = (90 - lat) * Math.PI/180;
  const theta = (lon + 180) * Math.PI/180;
  const px = -(Math.sin(phi) * Math.cos(theta));
  const py =  (Math.cos(phi));
  const pz =  (Math.sin(phi) * Math.sin(theta));
  const ry = Math.atan2(-px, pz);
  const horiz = Math.sqrt(px*px + pz*pz);
  const rx = Math.atan2(py, horiz);
  // shortest path で targetRot.y を合わせる
  let cy = camCtl.targetRot.y;
  let dy = (ry - cy) % (Math.PI*2);
  if (dy >  Math.PI) dy -= Math.PI*2;
  if (dy < -Math.PI) dy += Math.PI*2;
  camCtl.targetRot.y = cy + dy;
  camCtl.targetRot.x = rx;
  camCtl.targetDist  = Math.max(MIN_ZOOM_DIST, dist || 8.0);
}

/* =====================================================
   入力: ドラッグ回転 / ホイールズーム
===================================================== */
let mouseDown = false;
let lastX = 0, lastY = 0;
renderer.domElement.addEventListener('pointerdown', e => {
  if (e.target !== renderer.domElement) return;
  mouseDown = true; lastX = e.clientX; lastY = e.clientY;
  renderer.domElement.setPointerCapture(e.pointerId);
});
renderer.domElement.addEventListener('pointerup', e => {
  mouseDown = false;
  try { renderer.domElement.releasePointerCapture(e.pointerId); } catch(_) {}
  endForceTouch();
});
renderer.domElement.addEventListener('pointercancel', () => { mouseDown = false; endForceTouch(); });
renderer.domElement.addEventListener('pointermove', e => {
  if (!mouseDown) return;
  if (window.__flagFocused) return;   // 国旗拡大中は地球を回さない
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  camCtl.targetRot.y += dx * 0.005;
  camCtl.targetRot.x += dy * 0.005;
  camCtl.targetRot.x = Math.max(-1.3, Math.min(1.3, camCtl.targetRot.x));
});
renderer.domElement.addEventListener('wheel', e => {
  e.preventDefault();
  camCtl.targetDist = Math.max(MIN_ZOOM_DIST, Math.min(MAX_ZOOM_DIST, camCtl.targetDist + e.deltaY * 0.008));
}, { passive: false });

/* =====================================================
   ForceTouch (Mac) ≥ 1.8 → scrub
===================================================== */
const ftRing = document.getElementById('ftRing');
let ftActive = false;
let ftScrubLoopId = null;
let ftMouseX = window.innerWidth/2;
let ftPressure = 0;

document.addEventListener('webkitmouseforcechanged', e => {
  ftPressure = e.webkitForce || 0;
  ftMouseX = e.clientX;
  ftRing.style.left = e.clientX + 'px';
  ftRing.style.top = e.clientY + 'px';
  if (ftPressure >= 1.0){
    ftRing.classList.add('show');
    ftRing.classList.toggle('arming', ftPressure < 1.8);
  } else {
    ftRing.classList.remove('show');
  }
  // 1.8 で始動 (Force Click 強度)
  if (ftPressure >= 1.8 && !ftActive){
    ftActive = true;
    state.scrubbing = true;
    notchEl.classList.add('scrubbing');
    haptic('deepPress');
    startScrubLoop();
  } else if (ftPressure < 1.2 && ftActive){
    endForceTouch();
  }
}, { passive:true });

function endForceTouch(){
  if (!ftActive) return;
  ftActive = false;
  state.scrubbing = false;
  notchEl.classList.remove('scrubbing');
  ftRing.classList.remove('show');
  if (ftScrubLoopId){ cancelAnimationFrame(ftScrubLoopId); ftScrubLoopId = null; }
  haptic('confirm');
}

function startScrubLoop(){
  let last = performance.now();
  function tick(){
    if (!ftActive){ ftScrubLoopId = null; return; }
    const now = performance.now();
    const dt = (now - last)/1000;
    last = now;
    // pressure 1.8〜3 → 0〜1 に正規化
    const norm = Math.min(1, Math.max(0, (ftPressure - 1.8) / 1.2));
    const speed = Math.pow(norm, 1.6) * 200;
    const dir = ftMouseX >= window.innerWidth/2 ? 1 : -1;
    setYear(state.year + Math.round(speed * dt * dir), {silent:true});
    bumpNotch();
    ftScrubLoopId = requestAnimationFrame(tick);
  }
  ftScrubLoopId = requestAnimationFrame(tick);
}

};
let currentRegionKey = null;

function regionKeyFor(lat, lon){
  // Americas: lon < -30
  if (lon < -30) return 'us';
  // Europe + Western Africa: -30 <= lon < 25
  if (lon < 25) return 'afr';
  // 北部 (Ukraine→東アジア): lat >= 30
  if (lat >= 30) return 'asia';
  // 残り (中東/インド/SE アジア/オーストラリア): 中東&aust
  return 'aust';
}

function setRegionIcon(key, {boot=false} = {}){
  if (key === currentRegionKey) return;
  currentRegionKey = key;
  for (const k in regionImgs){
    regionImgs[k].classList.toggle('show', k === key);
  }
  if (boot){
    regionIconEl.classList.add('bootIn');
    setTimeout(()=> regionIconEl.classList.remove('bootIn'), 1000);
  }
}

const weatherCache = new Map();
async function fetchWeather(lat, lon){
  const key = `${Math.round(lat)},${Math.round(lon)}`;
  const cached = weatherCache.get(key);
  if (cached && (Date.now() - cached.t < 30*60*1000)) return cached.v;
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code`;
    const r = await fetch(url);
    const j = await r.json();
    const c = j.current;
    const v = { temp: Math.round(c.temperature_2m), emoji: wmoEmoji(c.weather_code) };
    weatherCache.set(key, { v, t: Date.now() });
    return v;
  } catch(e){ return null; }
}
function wmoEmoji(code){
  if (code === 0) return '☀️';
  if (code === 1) return '🌤';
  if (code === 2) return '⛅️';
  if (code === 3) return '☁️';
  if ([45,48].includes(code)) return '🌫';
  if ([51,53,55,80,81,82].includes(code)) return '🌦';
  if ([56,57,61,63,65,66,67].includes(code)) return '🌧';
  if ([71,73,75,77,85,86].includes(code)) return '🌨';
  if ([95,96,99].includes(code)) return '⛈';
  return '🌍';
}

let lastWeatherFetch = 0;
let lastWeatherKey = '';
async function refreshWeather(force=false){
  const center = currentCenterLatLon();
  // 中心地が変わるたびに地域地球儀を 0.5s 切替
  setRegionIcon(regionKeyFor(center.lat, center.lon));
  const key = `${Math.round(center.lat)},${Math.round(center.lon)}`;
  const now = Date.now();
  if (!force && key === lastWeatherKey && now - lastWeatherFetch < 7000) return;
  lastWeatherKey = key;
  lastWeatherFetch = now;
  weatherEl.classList.add('loading');
  const v = await fetchWeather(center.lat, center.lon);
  if (!v){ weatherEl.classList.remove('loading'); return; }
  weatherTemp.textContent = `${v.temp}°C`;
  weatherEl.classList.remove('loading');
}

function haptic(kind){
  const map = { tap:8, snap:14, confirm:22, hover:4, deepPress:40 };
  const d = map[kind] || 8;
  if (navigator.vibrate) try { navigator.vibrate(d); } catch(_) {}
  // 視覚的: bumpNotch 軽く
  if (kind === 'snap' || kind === 'confirm' || kind === 'deepPress') bumpNotch();
}

let cloudLowDrift = 0, cloudMidDrift = 0, cloudHiDrift = 0;
function tick(){
  requestAnimationFrame(tick);
  // 慣性
  camCtl.rot.x += (camCtl.targetRot.x - camCtl.rot.x) * 0.12;
  camCtl.rot.y += (camCtl.targetRot.y - camCtl.rot.y) * 0.12;
  camCtl.dist  += (camCtl.targetDist  - camCtl.dist)  * 0.10;
  const newFov = camCtl.fov + (camCtl.targetFov - camCtl.fov) * 0.10;
  if (Math.abs(newFov - camCtl.fov) > 0.02){
    camCtl.fov = newFov;
    camera.fov = camCtl.fov;
    camera.updateProjectionMatrix();
  }
  camera.position.z = camCtl.dist;
  // xxx.html 準拠の自動回転 (0.0015 rad/frame)
  if (state.rotating && !mouseDown && !ftActive){
    camCtl.targetRot.y += 0.0015;
  }
  earth.rotation.x = camCtl.rot.x;
  earth.rotation.y = camCtl.rot.y;
  // 雲は 3 層を別速度で流す (パララックス感)
  cloudLowDrift += 0.00060;
  cloudMidDrift += 0.00040;
  cloudHiDrift  += 0.00130;
  cloudsLow.rotation.x = camCtl.rot.x;
  cloudsLow.rotation.y = camCtl.rot.y + cloudLowDrift;
  cloudsMid.rotation.x = camCtl.rot.x;
  cloudsMid.rotation.y = camCtl.rot.y - cloudMidDrift * 0.7;
  cloudsHi.rotation.x  = camCtl.rot.x;
  cloudsHi.rotation.y  = camCtl.rot.y - cloudHiDrift;
  // 星: 微速回転で空の流れ. 微細層は別速度でパララックス.
  stars.rotation.y     += 0.00006;
  tinyStars.rotation.y += 0.00010;
  updateHover();
  renderer.render(scene, camera);
}

    spr.renderOrder = 10;
    flagsGroup.add(spr);
    const f = { code, lat, lon, dir, sprite:spr, mat, active:false, appear:0, hover:0, burstT0:null, front:false };
    spr.userData.flag = f;
    flags.push(f);
    texLoader.load(`https://flagcdn.com/w160/${code}.png`, tex => {
      mat.map = makeFlagTexture(tex.image);
      mat.needsUpdate = true;
      tex.dispose();
    });
  });

  // 旗の出現 (boot 後にスタッガーで pop-in)
  let revealAt = null;
  setTimeout(()=>{ revealAt = performance.now(); }, 1100);

  /* ピック (raycast) */
  const raycaster = new THREE.Raycaster();
  const ndc = new THREE.Vector2();
  let hovered = null;
  let downX=0, downY=0, downT=0, moved=0;

  function pickFlag(cx, cy){
    ndc.x = (cx / window.innerWidth) * 2 - 1;
    ndc.y = -(cy / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(ndc, camera);
    const pickable = flags.filter(f => f.front && f.appear > 0.5 && f.burstT0 == null).map(f => f.sprite);
    const hits = raycaster.intersectObjects(pickable, false);
    return hits.length ? hits[0].object.userData.flag : null;
  }

  renderer.domElement.addEventListener('pointerdown', e => {
    downX = e.clientX; downY = e.clientY; downT = performance.now(); moved = 0;
  });
  // ドラッグ移動量の計測 + PC hover
  renderer.domElement.addEventListener('pointermove', e => {
    moved += Math.abs(e.clientX - downX) + Math.abs(e.clientY - downY);
    downX = e.clientX; downY = e.clientY;
    if (mouseDown){ hovered = null; renderer.domElement.style.cursor = ''; return; }
    hovered = pickFlag(e.clientX, e.clientY);   // hover で国旗がポップ (PC)
    renderer.domElement.style.cursor = hovered ? 'pointer' : '';
  });
  // タップ → スケールアップ & フェードアウト
  renderer.domElement.addEventListener('pointerup', e => {
    if (moved >= 9 || performance.now() - downT >= 500) return;  // ドラッグはタップ扱いしない
    const hit = pickFlag(e.clientX, e.clientY);
    if (hit && hit.burstT0 == null){
      hit.burstT0 = performance.now();
      hit.sprite.renderOrder = 50;
      setTimeout(()=>{ hit.sprite.renderOrder = 10; }, BURST_DUR*1000 + 60);
      state.rotating = false;
      flyTo(hit.lat, hit.lon, 7.2);
      setTimeout(()=>{ state.rotating = true; }, 1400);
      if (typeof haptic === 'function') haptic('confirm');
      // When embedded in the app's language launchpad, report the picked
      // country → language so the parent can add it and auto-translate.
      try {
        if (window.parent && window.parent !== window) {
          const C2L = { jp:'ja', kr:'ko', cn:'zh', mn:'ru', in:'hi', id:'id', th:'th', vn:'vi',
            ph:'en', sa:'ar', ir:'fa', tr:'tr', kz:'ru', ru:'ru', eg:'ar', za:'en', ng:'en',
            ke:'en', et:'en', ma:'ar', dz:'ar', cd:'fr', it:'it', fr:'fr', es:'es', pt:'pt',
            gb:'en', ie:'en', de:'de', pl:'pl', se:'sv', no:'no', fi:'fi', gr:'el', ua:'uk',
            nl:'nl', ch:'de', is:'is', us:'en', ca:'en', mx:'es', cu:'es', br:'pt', ar:'es',
            cl:'es', pe:'es', co:'es', ve:'es', au:'en', nz:'en' };
          window.parent.postMessage({ type:'terrakoku-lang', lang: (C2L[hit.code] || 'en'), country: hit.code }, '*');
        }
      } catch(_){}
    }
  });

  /* イージング */
  const easeOutBack  = x => { x = Math.max(0,Math.min(1,x)); const c1=1.70158, c3=c1+1; return 1 + c3*Math.pow(x-1,3) + c1*Math.pow(x-1,2); };
  const easeOutCubic = x => 1 - Math.pow(1-x, 3);
  const smoothstep   = (a,b,x) => { const t = Math.max(0,Math.min(1,(x-a)/(b-a))); return t*t*(3-2*t); };

  /* 毎フレーム更新 (出現 / hover / burst / 裏面カリング) */
  const camLocal = new THREE.Vector3(), inv = new THREE.Matrix4(), pos = new THREE.Vector3();
  let lastT = performance.now();
  function flagTick(){
    requestAnimationFrame(flagTick);
    const now = performance.now();
    const dt = Math.min(0.05, (now - lastT)/1000); lastT = now;

    if (revealAt != null){
      for (let i=0; i<flags.length; i++){
        const f = flags[i];
        if (!f.active && now >= revealAt + i*32) f.active = true;
      }
    }
    earth.updateMatrixWorld();
    inv.copy(earth.matrixWorld).invert();
    camLocal.copy(camera.position).applyMatrix4(inv).normalize();

    for (const f of flags){
      if (f.active && f.appear < 1) f.appear = Math.min(1, f.appear + dt/0.55);

      const dot = f.dir.dot(camLocal);
      f.front = dot > 0.08;

      const hTarget = (f === hovered && f.front && f.burstT0 == null) ? 1 : 0;
      f.hover += (hTarget - f.hover) * 0.2;

      let scaleMul, op, lift;
      if (f.burstT0 != null){
        const p = Math.min(1, (now - f.burstT0)/(BURST_DUR*1000));
        const e = easeOutCubic(p);
        scaleMul = 1 + BURST_MAX * e;   // スケールアップ
        op       = 1 - p;               // フェードアウト
        lift     = 0.6 * e;             // カメラ側へせり出す
        if (p >= 1){ f.burstT0 = null; f.appear = 0; }   // 消えたら再 pop-in
      } else {
        scaleMul = 1 + HOVER_K * f.hover;
        op       = f.appear * smoothstep(0.04, 0.30, dot);
        lift     = 0.06 * f.hover;
      }

      const w = BASE_W * easeOutBack(f.appear) * scaleMul;
      f.sprite.scale.set(w, w, 1);
      pos.copy(f.dir).multiplyScalar(FLAG_R + lift);
      f.sprite.position.copy(pos);
      f.mat.opacity = op;
      f.sprite.visible = op > 0.01;
    }
  }
  flagTick();
})();
</script>

</body>
</html>
