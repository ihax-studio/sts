<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Atelier 4D</title>
<link rel="icon" type="image/png" href="atelier 4d.png">
<link rel="apple-touch-icon" href="atelier 4d.png">
<link rel="stylesheet" href="design.css">
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
    "ios-haptics": "https://esm.sh/ios-haptics"
  }
}
</script>
</head>
<body>
  <div class="app">
    <!-- Left: Outliner -->
    <aside class="panel panel-left">
      <div class="panel-head">
        <span>シーン</span>
        <button class="icon-btn" id="btn-clear" title="すべてクリア">⌫</button>
      </div>
      <ul id="outliner" class="outliner"></ul>
      <div class="panel-foot">
        <span class="brand">Aether <em>Studio</em></span>
      </div>
    </aside>

    <!-- Center: Viewport -->
    <main class="viewport">
      <canvas id="c"></canvas>

      <!-- Lasso overlay -->
      <svg class="lasso" id="lasso"><path d=""/></svg>

      <!-- Top Bar -->
      <div class="top-bar">
        <div class="glass-chip select-modes" title="Selection tool">
          <button class="sel active" data-sel="pick" title="Pick (V)">
            <svg viewBox="0 0 24 24"><path d="M5 2l14 7-6 2-2 6-6-15z"/></svg>
          </button>
          <button class="sel" data-sel="lasso" title="Lasso (L)">
            <svg viewBox="0 0 24 24" fill="none"><path d="M4 10c0-4 4-7 9-7s9 3 9 7-4 7-9 7c-2 0-3.5-.3-5-1"/><path d="M10 17c0 2-1 4-3 4s-3-1-3-2 1-2 3-2"/></svg>
          </button>
        </div>
        <div class="glass-chip tool-modes" title="Edit tool">
          <button class="tool active" data-tool="none" title="None">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2"/></svg>
          </button>
          <button class="tool" data-tool="paint" title="Paint (P)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 11V4a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v7"/><path d="M3 11h18"/><path d="M12 18v3"/></svg>
          </button>
          <button class="tool" data-tool="carve" title="Carve / Drill (C)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="9"/></svg>
          </button>
          <button class="tool" data-tool="bump" title="Bump (B)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17c3-6 7-8 9-8s6 2 9 8"/></svg>
          </button>
          <button class="tool" data-tool="pencil" title="3Dペンシル (K)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
          </button>
          <button class="tool" data-tool="eraser" title="3D消しゴム (X)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H7L3 16a2 2 0 0 1 0-2.83l10-10a2 2 0 0 1 2.83 0l6 6a2 2 0 0 1 0 2.83L13 20"/><path d="M7 20L17 10"/></svg>
          </button>
        </div>
        <div class="glass-chip transform-modes" title="Transform mode">
          <button class="mode active" data-mode="translate" title="Move (W)">
            <svg viewBox="0 0 24 24"><path d="M12 2v20M2 12h20M8 6l4-4 4 4M8 18l4 4 4-4M6 8l-4 4 4 4M18 8l4 4-4 4"/></svg>
          </button>
          <button class="mode" data-mode="rotate" title="Rotate (E)">
            <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 11-3.2-6.9"/><path d="M21 4v5h-5"/></svg>
          </button>
          <button class="mode" data-mode="scale" title="Scale (R)">
            <svg viewBox="0 0 24 24"><path d="M3 3h7M3 3v7M3 3l7 7M21 21h-7M21 21v-7M21 21l-7-7"/></svg>
          </button>
        </div>
        <div class="glass-chip view-axes" title="Camera view">
          <button data-view="perspective">Persp</button>
          <button data-view="top">Top</button>
          <button data-view="front">Front</button>
          <button data-view="side">Side</button>
        </div>
        <div class="glass-chip">
          <button id="btn-lights" title="Scene lights">
            <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5L19 19M5 19l1.5-1.5M17.5 6.5L19 5"/></svg>
          </button>
        </div>
        <div class="glass-chip unit-chip" title="Unit">
          <button data-unit="m" class="active">m</button>
          <button data-unit="cm">cm</button>
          <button data-unit="mm">mm</button>
          <button data-unit="in">in</button>
          <button data-unit="px">px</button>
        </div>
      </div>

      <!-- Hint -->
      <div class="hint-chip" id="hint">ドラッグで回転 · L ラッソ · P ペイント · C 削り · B 盛上 · W/E/R 変形</div>

      <!-- Floating file actions (bottom-left) -->
      <div class="file-fab" id="file-fab">
        <button class="fab-btn" id="btn-import-menu" title="読み込み">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h3.5l2 2H19a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg>
        </button>
        <button class="fab-btn" id="btn-export-menu" title="書き出し">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v14M7 8l5-5 5 5M5 13v6a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-6"/></svg>
        </button>
        <button class="fab-btn" id="btn-com-pivot" title="重心へピボット (Cinema 4D 風)" style="font-size:18px">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3" fill="currentColor"/><line x1="12" y1="2.5" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="21.5"/><line x1="2.5" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="21.5" y2="12"/></svg>
        </button>
        <button class="fab-btn" id="btn-explode" title="💥 瞬時の爆発" style="font-size:18px">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v3M19 5l-2 2M22 12h-3M19 19l-2-2M12 19v3M5 19l2-2M2 12h3M5 5l2 2"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>

      <!-- Undo / Redo floating buttons -->
      <button class="hist-btn left" id="btn-undo" title="戻す (⌘Z)" aria-label="Undo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14L3 8l6-6"/><path d="M3 8h12a6 6 0 0 1 6 6v2a6 6 0 0 1-6 6H7"/></svg>
      </button>
      <button class="hist-btn right" id="btn-redo" title="やり直す (⌘⇧Z)" aria-label="Redo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14l6-6-6-6"/><path d="M21 8H9a6 6 0 0 0-6 6v2a6 6 0 0 0 6 6h8"/></svg>
      </button>

      <!-- Mobile panel toggle -->
      <button class="mob-toggle" id="mob-left" aria-label="Scene">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h10"/></svg>
      </button>
      <button class="mob-toggle right" id="mob-right" aria-label="Inspector">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33"/></svg>
      </button>

      <!-- Tool popover -->
      <div class="tool-popover" id="tool-popover" hidden>
        <div class="tp-title" id="tp-title">Tool</div>
        <div class="tp-body" id="tp-body"></div>
      </div>

      <!-- Lights panel -->
      <div class="lights-panel" id="lights-panel" hidden>
        <div class="lp-head">
          <span>シーンライト</span>
          <button class="icon-btn" id="lights-close">×</button>
        </div>
        <div class="lp-body">
          <div class="lp-row">
            <svg class="lp-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.4 1.4M17.6 17.6L19 19M5 19l1.4-1.4M17.6 6.4L19 5"/></svg>
            <span>キー</span>
            <div class="num-wheel"><span class="nw-val" id="lux-key-val">1.35</span><input type="number" id="lux-key" min="0" max="4" step="0.01" value="1.35" tabindex="-1" class="nw-input" hidden></div>
          </div>
          <div class="lp-row">
            <svg class="lp-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>
            <span>フィル</span>
            <div class="num-wheel"><span class="nw-val" id="lux-fill-val">0.50</span><input type="number" id="lux-fill" min="0" max="3" step="0.01" value="0.5" tabindex="-1" class="nw-input" hidden></div>
          </div>
          <div class="lp-row">
            <svg class="lp-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9"/><path d="M12 3a9 9 0 0 1 7 14.5"/></svg>
            <span>リム</span>
            <div class="num-wheel"><span class="nw-val" id="lux-rim-val">0.35</span><input type="number" id="lux-rim" min="0" max="3" step="0.01" value="0.35" tabindex="-1" class="nw-input" hidden></div>
          </div>
          <div class="lp-row">
            <svg class="lp-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18"/></svg>
            <span>環境</span>
            <div class="num-wheel"><span class="nw-val" id="lux-hemi-val">0.85</span><input type="number" id="lux-hemi" min="0" max="3" step="0.01" value="0.85" tabindex="-1" class="nw-input" hidden></div>
          </div>
          <div class="lp-divider"></div>
          <div class="lp-row">
            <svg class="lp-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="17" rx="8" ry="3"/><path d="M4 17V7l8 3 8-3v10"/></svg>
            <span>影の濃さ</span>
            <div class="num-wheel"><span class="nw-val" id="sh-opa-val">0.12</span><input type="number" id="sh-opa" min="0" max="1" step="0.01" value="0.12" tabindex="-1" class="nw-input" hidden></div>
          </div>
          <div class="lp-row">
            <svg class="lp-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12c4-6 12-6 16 0M4 17c4-4 12-4 16 0M4 7c4-4 12-4 16 0"/></svg>
            <span>影のぼかし</span>
            <div class="num-wheel"><span class="nw-val" id="sh-rad-val">4.0</span><input type="number" id="sh-rad" min="0" max="16" step="0.1" value="4" tabindex="-1" class="nw-input" hidden></div>
          </div>
          <div class="lp-row">
            <svg class="lp-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/><circle cx="7.5" cy="10" r="1" fill="currentColor"/><circle cx="12" cy="7.5" r="1" fill="currentColor"/><circle cx="16.5" cy="10" r="1" fill="currentColor"/><circle cx="14.5" cy="15" r="1" fill="currentColor"/><circle cx="9.5" cy="15" r="1" fill="currentColor"/></svg>
            <span>光の色</span>
            <input type="color" id="lux-color" value="#ffffff">
          </div>
          <div class="lp-row">
            <svg class="lp-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M4 21a8 8 0 0 1 16 0"/><path d="M12 21V5"/><path d="M12 5l5 3"/></svg>
            <span>光の角度</span>
            <div class="num-wheel"><span class="nw-val" id="lux-ang-val">40</span><input type="number" id="lux-ang" min="0" max="360" step="1" value="40" tabindex="-1" class="nw-input" hidden></div>
          </div>
          <div class="lp-row">
            <svg class="lp-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18M7 8l5-5 5 5M7 16l5 5 5-5"/></svg>
            <span>光の高さ</span>
            <div class="num-wheel"><span class="nw-val" id="lux-hgt-val">12.0</span><input type="number" id="lux-hgt" min="0" max="30" step="0.1" value="12" tabindex="-1" class="nw-input" hidden></div>
          </div>
          <div class="lp-row">
            <svg class="lp-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h18"/><path d="M3 12l5-5M3 12l5 5M21 12l-5-5M21 12l-5 5"/></svg>
            <span>光の距離</span>
            <div class="num-wheel"><span class="nw-val" id="lux-dst-val">14.0</span><input type="number" id="lux-dst" min="2" max="30" step="0.1" value="14" tabindex="-1" class="nw-input" hidden></div>
          </div>
        </div>
      </div>

      <!-- Bottom Dock -->
      <div class="dock">
        <button class="dock-btn" id="add-text" title="Add Text"><span class="dock-label">Aa</span></button>
        <button class="dock-btn" id="add-sphere" title="Add Sphere"><span class="dock-circle"></span></button>
        <button class="dock-btn" id="add-box" title="Add Rounded Box"><span class="dock-square"></span></button>
        <button class="dock-btn" id="add-line" title="Add Line"><span class="dock-lines"></span></button>
        <span class="dock-divider"></span>
        <button class="dock-btn stl-dock" id="add-stl" title="Import STL"><span class="dock-stl">STL</span></button>
      </div>
    </main>

    <!-- Right: Inspector -->
    <aside class="panel panel-right">
      <div class="panel-head">
        <span>インスペクタ</span>
      </div>
      <div id="inspector" class="inspector">
        <p class="hint">No object selected</p>
      </div>
    </aside>
  </div>

  <input type="file" id="stl-input" accept=".stl" hidden>
  <input type="file" id="obj-input" accept=".obj" hidden>
  <input type="file" id="glb-input" accept=".glb,.gltf" hidden>
  <input type="file" id="json-input" accept=".json" hidden>
  <input type="file" id="tex-input" accept="image/png,image/jpeg,image/jpg,image/heif,image/heic,image/webp,image/*" hidden>
  <input type="file" id="pat-input" accept="image/png,image/jpeg,image/jpg,image/heif,image/heic,image/webp,image/*" hidden>

  <div id="toast" class="toast"></div>

  <!-- Dynamic Island style import/export menu -->
  <div class="di-overlay" id="di-overlay" hidden>
    <div class="di-menu" id="di-menu"></div>
  </div>

  <!-- Hidden legacy handlers (kept so existing functions keep working) -->
  <button id="btn-import-json" hidden></button>
  <button id="btn-export-json" hidden></button>
  <button id="btn-export-stl" hidden></button>
  <button id="btn-export-glb" hidden></button>

  <script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { TransformControls } from 'three/addons/controls/TransformControls.js';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';
import { STLExporter } from 'three/addons/exporters/STLExporter.js';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';
import { FontLoader } from 'three/addons/loaders/FontLoader.js';
import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';
import { DecalGeometry } from 'three/addons/geometries/DecalGeometry.js';
import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';
import { OBJExporter } from 'three/addons/exporters/OBJExporter.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// iOS haptics (dynamic — page still works if CDN fails)
let haptic = Object.assign(() => {}, { confirm: () => {}, error: () => {}, warning: () => {} });
import('ios-haptics').then(m => { if (m.haptic) haptic = m.haptic; }).catch(() => {});

// Delegate haptic to all tappable controls
document.addEventListener('pointerdown', e => {
  if (e.target.closest('button, .dock-btn, .icon-btn, .btn-ghost, .outliner-item, .sel, .mode, .pattern-kind button, .surface-kind button, input[type=range], input[type=color], input[type=file]')) {
    try { haptic(); } catch (_) {}
  }
}, { passive: true, capture: true });

// =================== Embed mode (inside composer iframe) ===================
const EMBEDDED = (()=>{ try { return window.self !== window.top; } catch(_) { return true; } })();
if (EMBEDDED) document.documentElement.classList.add('embedded');

// =================== Scene ===================
const canvas = document.getElementById('c');
const viewportEl = canvas.parentElement;
const scene = new THREE.Scene();
scene.background = null;

const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 2000);
camera.position.set(6, 5, 8);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(2, window.devicePixelRatio));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;

// Lights
const hemi = new THREE.HemisphereLight(0xffffff, 0xc6cbd5, 0.85);
scene.add(hemi);
const key = new THREE.DirectionalLight(0xffffff, 1.35);
key.position.set(6, 12, 8);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
Object.assign(key.shadow.camera, { left:-14, right:14, top:14, bottom:-14, near:0.5, far:50 });
key.shadow.bias = -0.0005;
key.shadow.radius = 4;
scene.add(key);
const fill = new THREE.DirectionalLight(0xd8e4ff, 0.5);
fill.position.set(-6, 4, -4);
scene.add(fill);
const rim = new THREE.DirectionalLight(0xffe8d1, 0.35);
rim.position.set(-3, 6, 10);
scene.add(rim);

// Ground shadow catcher
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(200, 200),
  new THREE.ShadowMaterial({ opacity: 0.12 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
ground.position.y = -0.001;
scene.add(ground);

// Grid
const grid = new THREE.GridHelper(40, 40, 0xbcc2cc, 0xdde1e7);
grid.material.opacity = 0.55;
grid.material.transparent = true;
scene.add(grid);

// Origin dot
const pivotMarker = new THREE.Mesh(
  new THREE.SphereGeometry(0.08, 20, 14),
  new THREE.MeshBasicMaterial({ color: 0x8a9099, transparent: true, opacity: 0.78 })
);
scene.add(pivotMarker);

// Controls
const orbit = new OrbitControls(camera, renderer.domElement);
orbit.enableDamping = true;
orbit.dampingFactor = 0.08;
orbit.target.set(0, 1, 0);

const gizmo = new TransformControls(camera, renderer.domElement);
gizmo.setSize(0.85);
gizmo.addEventListener('dragging-changed', e => orbit.enabled = !e.value);
gizmo.addEventListener('objectChange', () => updateInspectorValues());
scene.add(gizmo);

// Pivot for multi-selection group transform
const pivot = new THREE.Object3D();
pivot.name = '__pivot__';
scene.add(pivot);

// =================== Registry ===================
let uid = 0;
const objects = new Map();

const state = {
  selectedIds: new Set(),
  selectionMode: 'pick',
  pendingTexture: null,
  tool: 'none',
};

const tools = {
  paint: { color: '#5ac8fa' },
  carve: { radius: 0.4, strength: 0.12, style: 'smooth' }, // smooth | stamp
  bump:  { radius: 0.4, strength: 0.12, style: 'smooth' },
  pencil:{ color: '#1d1d1f', radius: 0.05 },
  eraser:{ mode: 'object', radius: 0.15, depth: 0.8 },
};

function resize(){
  const r = viewportEl.getBoundingClientRect();
  renderer.setSize(r.width, r.height, false);
  camera.aspect = r.width / Math.max(r.height, 1);
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

// =================== Ray / Picking ===================
const ray = new THREE.Raycaster();
const ndc = new THREE.Vector2();

function collectMeshes(){
  const out = [];
  for (const o of objects.values()) o.mesh.traverse(n => { if (n.isMesh) out.push(n); });
  return out;
}

function hitTest(e){
  const r = canvas.getBoundingClientRect();
  ndc.x = ((e.clientX - r.left) / r.width) * 2 - 1;
  ndc.y = -((e.clientY - r.top) / r.height) * 2 + 1;
  ray.setFromCamera(ndc, camera);
  return ray.intersectObjects(collectMeshes(), false);
}

function findObjId(mesh){
  let t = mesh;
  while (t && !t.userData.objId) t = t.parent;
  return t ? t.userData.objId : null;
}

let downX = 0, downY = 0, downButton = 0;
let toolDrag = null;  // continuous paint/carve/bump
let decalDrag = null; // drag decal along target surface

function applyToolAt(e){
  if (!toolDrag) return;
  if (toolDrag.tool === 'paint') handlePaintClick(e);
  else if (toolDrag.tool === 'carve') handleBrushClick(e, -1);
  else if (toolDrag.tool === 'bump')  handleBrushClick(e, +1);
  else if (toolDrag.tool === 'eraser') handleEraserAt(e);
}

function handleEraserAt(e){
  const hits = hitTest(e);
  if (!hits.length) return;
  const hit = hits[0];
  const id = findObjId(hit.object);
  if (!id) return;
  const obj = objects.get(id);
  if (!obj) return;
  if (tools.eraser.mode === 'object') {
    // オブジェクトを丸ごと削除 (line/pencil/decal/mesh すべて)
    remove(obj.id);
    try { haptic(); } catch(_){}
    return;
  }
  // ドリル: 小半径 × 指定深さ の貫通式スタンプ
  handleBrushClick(e, -1, { radius: tools.eraser.radius, strength: tools.eraser.depth, style: 'stamp' });
}
function applyDecalDragAt(e){
  if (!decalDrag) return;
  const o = decalDrag.obj;
  const hits = hitTest(e);
  const hit = hits.find(h => findObjId(h.object) === o.params.targetId);
  if (!hit) return;
  o.params.worldPos = hit.point.toArray();
  if (hit.face) {
    const n = hit.face.normal.clone().transformDirection(hit.object.matrixWorld).normalize();
    o.params.worldNormal = n.toArray();
  }
  rebuildDecal(o);
}

canvas.addEventListener('pointerdown', e => {
  downX = e.clientX; downY = e.clientY; downButton = e.button;
  if (e.button !== 0) return;
  if (state.selectionMode === 'lasso') { startLasso(e); return; }
  // Continuous tools (Paint / Carve / Bump) — straight-line draggable
  if (state.tool === 'paint' || state.tool === 'carve' || state.tool === 'bump') {
    toolDrag = { tool: state.tool, last: 0, startX: e.clientX, startY: e.clientY };
    orbit.enabled = false;
    applyToolAt(e);
    // Paint: long-press → paint whole object
    if (state.tool === 'paint') {
      const hits = hitTest(e);
      const hit = hits[0];
      if (hit) {
        clearTimeout(paintLongPressTimer);
        paintLongPressTimer = setTimeout(() => {
          const id = findObjId(hit.object);
          const obj = id && objects.get(id);
          if (obj) {
            paintObjectFull(obj, tools.paint.color);
            toolDrag = null;
            orbit.enabled = true;
            try { haptic.confirm && haptic.confirm(); } catch(_){}
            toast('オブジェクト全体を塗りました', 'success');
          }
          paintLongPressTimer = null;
        }, 500);
      }
    }
    return;
  }
  // 3D Pencil — stroke drawing on any surface
  if (state.tool === 'pencil') {
    pencilDrawing = { path: [], preview: null };
    orbit.enabled = false;
    pencilAddPoint(e);
    return;
  }
  // 3D Eraser — remove pencil stroke, or stab a hole into an object
  if (state.tool === 'eraser') {
    toolDrag = { tool: 'eraser', last: 0, startX: e.clientX, startY: e.clientY };
    orbit.enabled = false;
    handleEraserAt(e);
    return;
  }
  // Decal drag along its target surface
  if (state.selectedIds.size === 1 && !gizmo.dragging && !decalPending && !decalReplace) {
    const [id] = state.selectedIds;
    const o = objects.get(id);
    if (o && o.type === 'decal') {
      const hits = hitTest(e);
      const hit = hits.find(h => findObjId(h.object) === o.params.targetId);
      if (hit) {
        decalDrag = { obj: o };
        orbit.enabled = false;
        applyDecalDragAt(e);
        return;
      }
    }
  }
});
canvas.addEventListener('pointermove', e => {
  if (lassoActive) { moveLasso(e); return; }
  if (toolDrag) {
    // Moved enough: cancel paint long-press
    if (paintLongPressTimer && (Math.abs(e.clientX - toolDrag.startX) > 6 || Math.abs(e.clientY - toolDrag.startY) > 6)) {
      clearTimeout(paintLongPressTimer); paintLongPressTimer = null;
    }
    const now = performance.now();
    if (now - toolDrag.last > 35) { toolDrag.last = now; applyToolAt(e); }
    return;
  }
  if (pencilDrawing) { pencilAddPoint(e); updatePencilPreview(); return; }
  if (decalDrag) { applyDecalDragAt(e); return; }
});
canvas.addEventListener('pointerup', e => {
  if (lassoActive) { endLasso(e); return; }
  if (paintLongPressTimer) { clearTimeout(paintLongPressTimer); paintLongPressTimer = null; }
  if (toolDrag) { toolDrag = null; orbit.enabled = true; return; }
  if (pencilDrawing) { finalizePencilStroke(); return; }
  if (decalDrag) { decalDrag = null; orbit.enabled = true; return; }
  if (downButton !== 0) return;
  if (Math.abs(e.clientX - downX) > 4 || Math.abs(e.clientY - downY) > 4) return;
  if (gizmo.dragging) return;
  if (decalPending || decalReplace) { if (handleDecalClickOnCanvas(e)) return; }
  const hits = hitTest(e);
  if (hits.length) {
    const id = findObjId(hits[0].object);
    if (id) select(id, e.shiftKey || e.metaKey || e.ctrlKey);
  } else {
    select(null);
  }
});

canvas.addEventListener('dblclick', e => {
  if (state.selectionMode === 'lasso') return;
  if (state.tool && state.tool !== 'none') return;
  const hits = hitTest(e);
  if (!hits.length) return;
  state.pendingTexture = { hit: hits[0] };

});

// =================== Materials ===================
function makeMaterial(params){
  return new THREE.MeshPhysicalMaterial({
    color: params.color || '#d8dbe1',
    roughness: params.roughness ?? 0.4,
    metalness: params.metalness ?? 0.1,
    clearcoat: 0.35,
    clearcoatRoughness: 0.3,
    envMapIntensity: 0.8,
  });
}

function forMaterials(obj, fn){
  obj.traverse(n => {
    if (!n.material) return;
    const mats = Array.isArray(n.material) ? n.material : [n.material];
    for (const m of mats) fn(m);
  });
}

function applyMaterial(root, p){
  forMaterials(root, m => {
    if (!m.map && p.color) m.color.set(p.color);
    if (p.roughness !== undefined) m.roughness = p.roughness;
    if (p.metalness !== undefined) m.metalness = p.metalness;
    if (p.opacity !== undefined) {
      m.transparent = p.opacity < 0.999;
      m.opacity = p.opacity;
    }
    m.needsUpdate = true;
  });
}
function hexToRGB(hex){
  const m = String(hex || '').match(/^#?([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i);
  return m ? [parseInt(m[1],16), parseInt(m[2],16), parseInt(m[3],16)] : [0,0,0];
}

// =================== Fonts (multiple weights) ===================
const fonts = { 400: null, 700: null };
let fontReady = false;
(function loadFonts(){
  const L = new FontLoader();
  L.load('https://unpkg.com/three@0.160.0/examples/fonts/helvetiker_regular.typeface.json',
    f => { fonts[400] = f; fontReady = true; });
  L.load('https://unpkg.com/three@0.160.0/examples/fonts/helvetiker_bold.typeface.json',
    f => { fonts[700] = f; });
})();
function pickFont(weight){
  return (weight >= 600) ? (fonts[700] || fonts[400]) : (fonts[400] || fonts[700]);
}

// =================== Box 6-face groups ===================
function assignBoxGroups(geo){
  const idx = geo.index;
  const pos = geo.attributes.position;
  const fc = (idx ? idx.count : pos.count) / 3;
  const buckets = [[],[],[],[],[],[]];
  const a = new THREE.Vector3(), b = new THREE.Vector3(), c = new THREE.Vector3();
  const ab = new THREE.Vector3(), ac = new THREE.Vector3(), n = new THREE.Vector3();
  for (let f = 0; f < fc; f++) {
    const base = f * 3;
    const i0 = idx ? idx.getX(base) : base;
    const i1 = idx ? idx.getX(base + 1) : base + 1;
    const i2 = idx ? idx.getX(base + 2) : base + 2;
    a.fromBufferAttribute(pos, i0);
    b.fromBufferAttribute(pos, i1);
    c.fromBufferAttribute(pos, i2);
    ab.subVectors(b, a); ac.subVectors(c, a);
    n.crossVectors(ab, ac).normalize();
    const ax = Math.abs(n.x), ay = Math.abs(n.y), az = Math.abs(n.z);
    let g;
    if (ax >= ay && ax >= az) g = n.x > 0 ? 0 : 1;
    else if (ay >= az) g = n.y > 0 ? 2 : 3;
    else g = n.z > 0 ? 4 : 5;
    buckets[g].push(f);
  }
  const newIdx = [];
  geo.clearGroups();
  let start = 0;
  for (let g = 0; g < 6; g++) {
    for (const f of buckets[g]) {
      const base = f * 3;
      if (idx) newIdx.push(idx.getX(base), idx.getX(base + 1), idx.getX(base + 2));
      else newIdx.push(base, base + 1, base + 2);
    }
    if (buckets[g].length > 0) geo.addGroup(start, buckets[g].length * 3, g);
    start += buckets[g].length * 3;
  }
  geo.setIndex(newIdx);
}

// =================== Creators ===================
function defaultSurface(){ return { kind: 'solid' }; }

function addBox(){
  const params = { width: 2, height: 2, depth: 2, radius: 0.3, color: '#d8dbe1', roughness: 0.4, metalness: 0.1, surface: defaultSurface() };
  const geo = new RoundedBoxGeometry(params.width, params.height, params.depth, 4, params.radius);
  assignBoxGroups(geo);
  const mats = Array.from({ length: 6 }, () => makeMaterial(params));
  const m = new THREE.Mesh(geo, mats);
  m.castShadow = m.receiveShadow = true;
  m.position.y = params.height / 2;
  register({ type: 'box', mesh: m, params, name: `Box ${uid + 1}` });
}

function addSphere(){
  const params = { radius: 1.2, color: '#d8dbe1', roughness: 0.3, metalness: 0.1, surface: defaultSurface() };
  const m = new THREE.Mesh(new THREE.SphereGeometry(params.radius, 64, 48), makeMaterial(params));
  m.castShadow = m.receiveShadow = true;
  m.position.y = params.radius;
  register({ type: 'sphere', mesh: m, params, name: `Sphere ${uid + 1}` });
}

function addText(){
  const params = { text: 'Hello', size: 1, depth: 0.25, bevelRadius: 0.04, weight: 400, color: '#d8dbe1', roughness: 0.35, metalness: 0.1, surface: defaultSurface() };
  if (!fontReady && !hasNonAscii(params.text)) { toast('フォント読込中…'); setTimeout(addText, 400); return; }
  const m = buildTextMesh(params);
  m.castShadow = m.receiveShadow = true;
  m.position.y = 0.1;
  register({ type: 'text', mesh: m, params, name: `Text ${uid + 1}` });
}

function hasNonAscii(s){ return /[^\x00-\x7f]/.test(String(s || '')); }

function buildTextGeo(p){
  const f = pickFont(p.weight || 400);
  if (!f) return new THREE.BufferGeometry();
  const g = new TextGeometry(p.text || ' ', {
    font: f,
    size: Math.max(0.05, p.size),
    height: Math.max(0.01, p.depth),
    curveSegments: 10,
    bevelEnabled: p.bevelRadius > 0.001,
    bevelThickness: Math.min(p.bevelRadius, p.depth * 0.4),
    bevelSize: Math.min(p.bevelRadius, p.size * 0.1),
    bevelOffset: 0,
    bevelSegments: 5,
  });
  g.computeBoundingBox();
  if (g.boundingBox) {
    const c = new THREE.Vector3();
    g.boundingBox.getCenter(c);
    g.translate(-c.x, -g.boundingBox.min.y, -c.z);
  }
  return g;
}

// Canvas-based text (supports Japanese/CJK/emoji) — flat plane with slight depth via Extrude
function buildTextCanvasMesh(p){
  const weight = p.weight || 400;
  const family = '"SF Pro Display", -apple-system, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", "Noto Sans JP", sans-serif';
  // Measure
  const measCv = document.createElement('canvas');
  const mctx = measCv.getContext('2d');
  mctx.font = `${weight} 256px ${family}`;
  const w = Math.max(1, mctx.measureText(p.text || ' ').width);
  const aspect = Math.max(0.25, Math.min(20, w / 256));
  // Render at higher res
  const CH = 512;
  const CW = Math.max(128, Math.min(4096, Math.round(aspect * CH)));
  const cv = document.createElement('canvas');
  cv.width = CW; cv.height = CH;
  const ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, CW, CH);
  ctx.font = `${weight} ${CH * 0.75}px ${family}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = p.color || '#d8dbe1';
  ctx.fillText(p.text || ' ', CW / 2, CH / 2);

  const tex = new THREE.CanvasTexture(cv);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = 8;
  tex.userData = { isTextCanvas: true };

  const h = Math.max(0.05, p.size);
  const W = h * aspect;
  // Slim extruded plane to give a tiny depth (same feel as TextGeometry)
  const depth = Math.max(0.01, Math.min(p.depth ?? 0.25, h * 0.5));
  const shape = new THREE.Shape();
  const r = Math.min(p.bevelRadius ?? 0.02, h * 0.2);
  const x0 = -W / 2, y0 = 0, x1 = W / 2, y1 = h;
  if (r > 0.001) {
    shape.moveTo(x0 + r, y0);
    shape.lineTo(x1 - r, y0);
    shape.quadraticCurveTo(x1, y0, x1, y0 + r);
    shape.lineTo(x1, y1 - r);
    shape.quadraticCurveTo(x1, y1, x1 - r, y1);
    shape.lineTo(x0 + r, y1);
    shape.quadraticCurveTo(x0, y1, x0, y1 - r);
    shape.lineTo(x0, y0 + r);
    shape.quadraticCurveTo(x0, y0, x0 + r, y0);
  } else {
    shape.moveTo(x0, y0);
    shape.lineTo(x1, y0);
    shape.lineTo(x1, y1);
    shape.lineTo(x0, y1);
    shape.closePath();
  }
  const geo = new THREE.ExtrudeGeometry(shape, { depth, bevelEnabled: false, steps: 1, curveSegments: 8 });
  geo.translate(0, 0, -depth / 2);
  // Build UVs so only the front face uses the text texture; back/sides get [0,0] (transparent outside)
  const pos = geo.attributes.position;
  const uv = new Float32Array(pos.count * 2);
  for (let i = 0; i < pos.count; i++) {
    const z = pos.getZ(i);
    if (z > depth / 2 - 1e-4) {
      const x = pos.getX(i), y = pos.getY(i);
      uv[i * 2]     = (x - x0) / W;
      uv[i * 2 + 1] = (y - y0) / h;
    } else {
      uv[i * 2]     = 0;
      uv[i * 2 + 1] = 0;
    }
  }
  geo.setAttribute('uv', new THREE.BufferAttribute(uv, 2));

  const mat = new THREE.MeshPhysicalMaterial({
    color: 0xffffff,
    map: tex,
    roughness: p.roughness ?? 0.4,
    metalness: p.metalness ?? 0.1,
    transparent: true,
    alphaTest: 0.12,
    side: THREE.DoubleSide,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.userData.isCanvasText = true;
  return mesh;
}

function buildTextMesh(p){
  if (hasNonAscii(p.text)) return buildTextCanvasMesh(p);
  const geo = buildTextGeo(p);
  const mesh = new THREE.Mesh(geo, makeMaterial(p));
  return mesh;
}

function addLine(){
  const params = {
    a: { x: -1.5, y: 1, z: 0 }, b: { x: 1.5, y: 1, z: 0 },
    thickness: 0.14, tipSharpness: 0,
    color: '#d8dbe1', roughness: 0.35, metalness: 0.1, surface: defaultSurface(),
  };
  register({ type: 'line', mesh: buildLineGroup(params), params, name: `Line ${uid + 1}` });
}

function buildLineGroup(p){
  const group = new THREE.Group();
  const A = new THREE.Vector3(p.a.x, p.a.y, p.a.z);
  const B = new THREE.Vector3(p.b.x, p.b.y, p.b.z);
  const dir = new THREE.Vector3().subVectors(B, A);
  const len = Math.max(dir.length(), 1e-4);
  const dirN = dir.clone().normalize();
  const tip = Math.min(p.tipSharpness * p.thickness * 3, len / 2 - 0.01);
  const sa = A.clone().addScaledVector(dirN, tip);
  const sb = B.clone().addScaledVector(dirN, -tip);
  const curve = new THREE.LineCurve3(sa, sb);
  const shaft = new THREE.Mesh(
    new THREE.TubeGeometry(curve, 1, p.thickness, 32, false),
    makeMaterial(p)
  );
  shaft.castShadow = shaft.receiveShadow = true;
  group.add(shaft);
  group.add(makeCap(p, A, dirN));
  group.add(makeCap(p, B, dirN.clone().multiplyScalar(-1)));
  return group;
}

function makeCap(p, pos, inwardDir){
  const sharp = p.tipSharpness;
  let cap;
  if (sharp < 0.01) {
    cap = new THREE.Mesh(new THREE.SphereGeometry(p.thickness, 28, 20), makeMaterial(p));
    cap.position.copy(pos);
  } else {
    const h = Math.max(sharp * p.thickness * 3, 0.001);
    const baseR = p.thickness * (1 - sharp * 0.25);
    cap = new THREE.Mesh(new THREE.ConeGeometry(baseR, h, 28), makeMaterial(p));
    const outward = inwardDir.clone().multiplyScalar(-1).normalize();
    const q = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), outward);
    cap.quaternion.copy(q);
    cap.position.copy(pos).addScaledVector(inwardDir.clone().normalize(), h / 2);
  }
  cap.castShadow = cap.receiveShadow = true;
  return cap;
}

// Clean export scene: clone targets, bake world transform, drop helpers/pivot/lights.
function buildExportScene(targets){
  const s = new THREE.Scene();
  for (const o of targets) {
    if (!o || !o.mesh) continue;
    o.mesh.updateMatrixWorld(true);
    const cl = o.mesh.clone(true);
    cl.matrix.copy(o.mesh.matrixWorld);
    cl.matrix.decompose(cl.position, cl.quaternion, cl.scale);
    cl.name = (o.name || ('obj_' + o.id)).replace(/[^\w\-]/g, '_');
    s.add(cl);
  }
  return s;
}
function buildAnimationClips(targets){
  const clips = [];
  for (const o of targets) {
    const a = o.animation;
    if (!a || !a.from || !a.to) continue;
    const name = (o.name || ('obj_' + o.id)).replace(/[^\w\-]/g, '_');
    const dur = Math.max(0.05, a.duration || 1);
    const times = [0, dur];
    const posTrack = new THREE.VectorKeyframeTrack(`${name}.position`, times, [...a.from.position, ...a.to.position]);
    const qa = new THREE.Quaternion().setFromEuler(new THREE.Euler(...a.from.rotation));
    const qb = new THREE.Quaternion().setFromEuler(new THREE.Euler(...a.to.rotation));
    const rotTrack = new THREE.QuaternionKeyframeTrack(`${name}.quaternion`, times, [qa.x, qa.y, qa.z, qa.w, qb.x, qb.y, qb.z, qb.w]);
    const scaleTrack = new THREE.VectorKeyframeTrack(`${name}.scale`, times, [...a.from.scale, ...a.to.scale]);
    clips.push(new THREE.AnimationClip(name + '_anim', dur, [posTrack, rotTrack, scaleTrack]));
  }
  return clips;
}

// =================== Send to Composer (GLB + thumbnail via postMessage) ===================
function captureThumbnail(size = 192){
  try {
    renderer.render(scene, camera);
    const src = renderer.domElement;
    const c = document.createElement('canvas');
    c.width = size; c.height = size;
    const ctx = c.getContext('2d');
    const sw = src.width, sh = src.height;
    const s = Math.min(sw, sh);
    ctx.drawImage(src, (sw - s) / 2, (sh - s) / 2, s, s, 0, 0, size, size);
    return c.toDataURL('image/png');
  } catch (_) { return null; }
}

function pickPrimaryColor(targets){
  for (const o of targets){
    if (o.params && o.params.color) return o.params.color;
  }
  return '#d8dbe1';
}
function pickPrimaryAnim(targets){
  // Inspect first target's animation param (if editor stored one), otherwise 'static'
  for (const o of targets){
    const a = o.params && o.params.anim;
    if (a && a !== 'static') return a;
  }
  return 'static';
}

// Always acknowledge back to the parent (composer) — even on failure — so its
// close-button fallback timeout doesn't have to fire. Kept a no-op when standalone.
function __notifyComposerError(reason){
  try {
    if (window.self !== window.top){
      window.parent.postMessage({ type:'composer:3d-asset-error', reason:String(reason||'') }, '*');
    }
  } catch(_){}
}

function sendToComposer(){
  if (!EMBEDDED) { toast('Composer内でのみ使えます', 'error'); return; }
  if (objects.size === 0) {
    __notifyComposerError('empty');
    toast('書き出すオブジェクトがありません');
    return;
  }
  const targets = state.selectedIds.size ? [...state.selectedIds].map(id => objects.get(id)).filter(Boolean) : [...objects.values()];
  if (!targets.length) {
    __notifyComposerError('no-targets');
    toast('書き出すオブジェクトがありません');
    return;
  }
  const name = (targets.length === 1 ? targets[0].name : 'custom').replace(/[^\w\-]/g, '_');
  const exportScene = buildExportScene(targets);
  const thumbnail = captureThumbnail(192);
  const clips = buildAnimationClips(targets);
  const color = pickPrimaryColor(targets);
  const anim  = pickPrimaryAnim(targets);

  // Export STL (binary) — geometry is what composer cares about
  let stlAB;
  try {
    const stlData = stlExporter.parse(exportScene, { binary: true });
    // stlData is a DataView or ArrayBuffer; normalize to ArrayBuffer
    stlAB = stlData instanceof ArrayBuffer ? stlData : (stlData.buffer || new Uint8Array(stlData).buffer);
  } catch (err) {
    console.error(err);
    __notifyComposerError('stl-export-failed');
    toast('STL書き出し失敗', 'error');
    return;
  }

  // Also export GLB (for future richer import, not strictly required in composer v1)
  const exporter = new GLTFExporter();
  exporter.parse(
    exportScene,
    glbResult => {
      const glbAB = glbResult instanceof ArrayBuffer ? glbResult : new TextEncoder().encode(JSON.stringify(glbResult)).buffer;
      try {
        const msg = {
          type: 'composer:3d-asset',
          name,
          color,
          anim,
          hasAnimation: clips.length > 0,
          thumbnail,
          stl: stlAB,
          glb: glbAB,
        };
        // ArrayBuffers must be transferred; note structuredClone will clone them
        window.parent.postMessage(msg, '*', [stlAB, glbAB]);
        toast('Composerに送りました', 'success');
        try { haptic.confirm && haptic.confirm(); } catch(_){}
      } catch (err) {
        console.error(err);
        toast('送信に失敗', 'error');
      }
    },
    err => {
      // Even if GLB failed, still send STL only
      console.warn('GLB export failed, sending STL only', err);
      try {
        window.parent.postMessage({
          type: 'composer:3d-asset',
          name, color, anim,
          hasAnimation: false,
          thumbnail,
          stl: stlAB,
        }, '*', [stlAB]);
        toast('Composerに送りました', 'success');
      } catch (e2) { console.error(e2); toast('送信に失敗', 'error'); }
    },
    { binary: true, animations: clips, onlyVisible: true, embedImages: true }
  );
}

// Also expose on window so composer can trigger programmatically if wanted

// Listen for composer asking us to send current scene
window.addEventListener('message', e => {
  const d = e.data;
  if (!d || typeof d !== 'object') return;
  if (d.type === 'composer:request-asset') sendToComposer();
  else if (d.type === 'composer:check-dirty') {
    const count = (typeof objects !== 'undefined' && objects && objects.size) ? objects.size : 0;
    try { window.parent.postMessage({ type: 'composer:dirty-status', dirty: count > 0, count }, '*'); } catch(_){}
  }
  else if (d.type === 'composer:load-asset' && d.stl) {
    try {
      const geo = stlLoader.parse(d.stl);
      geo.computeVertexNormals();
      geo.computeBoundingBox();
      const bb = geo.boundingBox, c = new THREE.Vector3(), sz = new THREE.Vector3();
      bb.getCenter(c); bb.getSize(sz);
      geo.translate(-c.x, -c.y, -c.z);
      const fit = 3 / Math.max(sz.x, sz.y, sz.z, 1e-6);
      const params = { color: '#d0d3db', roughness: 0.45, metalness: 0.15, surface: defaultSurface() };
      const m = new THREE.Mesh(geo, makeMaterial(params));
      m.castShadow = m.receiveShadow = true;
      m.scale.setScalar(fit);
      m.position.y = sz.y * fit / 2;
      register({ type: 'stl', mesh: m, params, name: (d.name || 'imported').replace(/\.[^.]+$/, '') });
      try { window.parent.postMessage({ type: 'composer:asset-loaded' }, '*'); } catch(_){}
      toast('Composer から読み込みました');
    } catch (err) {
      console.error(err);
      try { window.parent.postMessage({ type: 'composer:asset-load-error', reason: String(err) }, '*'); } catch(_){}
      toast('STL の読み込みに失敗', 'error');
    }
  }
});

// GLB/GLTF loader — import as new scene objects
document.getElementById('glb-input').onchange = e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    const loader = new GLTFLoader();
    loader.parse(ev.target.result, '', gltf => {
      const root = gltf.scene || gltf.scenes[0];
      if (!root) { toast('GLBにシーンが見つかりません', 'error'); return; }
      let added = 0;
      root.updateMatrixWorld(true);
      root.traverse(n => {
        if (!n.isMesh || !n.geometry) return;
        n.updateMatrixWorld(true);
        const geo = n.geometry.clone();
        // Bake world matrix into geometry for a simple import (loses per-node hierarchy)
        geo.applyMatrix4(n.matrixWorld);
        geo.computeVertexNormals();
        geo.computeBoundingBox();
        const bb = geo.boundingBox, c = new THREE.Vector3();
        bb.getCenter(c);
        geo.translate(-c.x, -c.y, -c.z);
        const params = { color: '#d0d3db', roughness: 0.45, metalness: 0.15, surface: defaultSurface() };
        const mesh = new THREE.Mesh(geo, makeMaterial(params));
        mesh.castShadow = mesh.receiveShadow = true;
        mesh.position.copy(c);
        register({ type: 'stl', mesh, params, name: n.name || f.name.replace(/\.(glb|gltf)$/i, '') });
        added++;
      });
      toast(added ? `${f.name} を読み込みました (${added}メッシュ)` : 'GLBにメッシュが見つかりません', added ? 'success' : 'error');
    }, err => { console.error(err); toast('GLBの読み込みに失敗', 'error'); });
  };
  r.readAsArrayBuffer(f);
  e.target.value = '';
};

function serializeOne(o){
  const out = {
    name: o.name, type: o.type,
    params: JSON.parse(JSON.stringify(o.params)),
    position: o.mesh.position.toArray(),
    rotation: [o.mesh.rotation.x, o.mesh.rotation.y, o.mesh.rotation.z],
    scale: o.mesh.scale.toArray(),
    stlData: o.type === 'stl' ? stlExporter.parse(new THREE.Mesh(o.mesh.geometry), { binary: false }) : null,
    animation: o.animation ? JSON.parse(JSON.stringify(o.animation)) : null,
  };
  if (o.type === 'decal') {
    const t = objects.get(o.params.targetId);
    if (t) out.params.targetName = t.name;
  }
  return out;
}

document.getElementById('json-input').onchange = e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.objects) throw new Error('bad');
      clearAll();
      for (const d of data.objects) deserializeOne(d);
      if (data.camera) { camera.position.fromArray(data.camera.position); orbit.target.fromArray(data.camera.target); }
      if (data.lights) setLightState(data.lights);
      toast(`${f.name} を読み込みました`, 'success');
    } catch (err) { console.error(err); toast('無効なシーンファイル', 'error'); }
  };
  r.readAsText(f);
  e.target.value = '';
};

function deserializeOne(d){
  const p = d.params;
  if (d.type !== 'decal' && !p.surface) p.surface = defaultSurface();
  let entry = null;
  if (d.type === 'decal') {
    const target = [...objects.values()].find(o => o.id === p.targetId) || [...objects.values()].find(o => o.name === p.targetName);
    if (!target) { console.warn('decal skipped — target missing'); return; }
    p.targetId = target.id;
    const mesh = buildDecalMesh(target, p);
    if (!mesh) return;
    entry = { type: 'decal', mesh, params: p, name: d.name };
    register(entry);
    return;
  }
  if (d.type === 'box') {
    const geo = new RoundedBoxGeometry(p.width, p.height, p.depth, 4, p.radius);
    assignBoxGroups(geo);
    const mats = Array.from({ length: 6 }, () => makeMaterial(p));
    const m = new THREE.Mesh(geo, mats);
    m.castShadow = m.receiveShadow = true;
    entry = { type: 'box', mesh: m, params: p, name: d.name };
  } else if (d.type === 'sphere') {
    const m = new THREE.Mesh(new THREE.SphereGeometry(p.radius, 64, 48), makeMaterial(p));
    m.castShadow = m.receiveShadow = true;
    entry = { type: 'sphere', mesh: m, params: p, name: d.name };
  } else if (d.type === 'text') {
    if (!fontReady) { toast('フォント未準備', 'error'); return; }
    const m = new THREE.Mesh(buildTextGeo(p), makeMaterial(p));
    m.castShadow = m.receiveShadow = true;
    entry = { type: 'text', mesh: m, params: p, name: d.name };
  } else if (d.type === 'line') {
    entry = { type: 'line', mesh: buildLineGroup(p), params: p, name: d.name };
  } else if (d.type === 'pencil') {
    const m = buildPencilMesh(p);
    m.castShadow = m.receiveShadow = true;
    entry = { type: 'pencil', mesh: m, params: p, name: d.name };
  } else if (d.type === 'stl' && d.stlData) {
    const geo = stlLoader.parse(d.stlData);
    geo.computeVertexNormals();
    const m = new THREE.Mesh(geo, makeMaterial(p));
    m.castShadow = m.receiveShadow = true;
    entry = { type: 'stl', mesh: m, params: p, name: d.name };
  }
  if (!entry) return;
  if (d.position) entry.mesh.position.fromArray(d.position);
  if (d.rotation) { entry.mesh.rotation.x = d.rotation[0]; entry.mesh.rotation.y = d.rotation[1]; entry.mesh.rotation.z = d.rotation[2]; }
  if (d.scale) entry.mesh.scale.fromArray(d.scale);
  if (d.animation) entry.animation = d.animation;
  register(entry);
  applyMaterial(entry.mesh, entry.params);
  applySurface(entry);
}

function download(blob, name){
  const u = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = u; a.download = name; a.click();
  URL.revokeObjectURL(u);
}

// =================== History (Undo / Redo) ===================
const history = { undoStack: [], redoStack: [], lock: false, max: 40 };
function snapshotState(){
  return JSON.stringify({
    objects: [...objects.values()].map(serializeOne),
  });
}
function restoreSnapshot(snapStr){
  let data;
  try { data = JSON.parse(snapStr); } catch (_) { return; }
  history.lock = true;
  try {
    clearAll();
    for (const d of data.objects) deserializeOne(d);
  } finally { history.lock = false; }
}
function pushHistory(){
  if (history.lock) return;
  history.undoStack.push(snapshotState());
  if (history.undoStack.length > history.max) history.undoStack.shift();
  history.redoStack = [];
  updateHistoryButtons();
}
function undo(){
  if (history.undoStack.length < 2) return;
  const cur = history.undoStack.pop();
  history.redoStack.push(cur);
  const prev = history.undoStack[history.undoStack.length - 1];
  restoreSnapshot(prev);
  updateHistoryButtons();
  toast('戻しました');
}
function redo(){
  const next = history.redoStack.pop();
  if (!next) return;
  history.undoStack.push(next);
  restoreSnapshot(next);
  updateHistoryButtons();
  toast('やり直しました');
}
function updateHistoryButtons(){
  const u = document.getElementById('btn-undo');
  const r = document.getElementById('btn-redo');
  if (u) u.disabled = history.undoStack.length < 2;
  if (r) r.disabled = history.redoStack.length === 0;
}
document.getElementById('btn-undo').onclick = () => undo();
document.getElementById('btn-redo').onclick = () => redo();
// Push initial empty state at load

window.addEventListener('keydown', e => {
  if (e.target.matches('input, textarea, select')) return;
  if ((e.metaKey || e.ctrlKey) && !e.shiftKey && (e.key === 'z' || e.key === 'Z')) { e.preventDefault(); undo(); }
  if ((e.metaKey || e.ctrlKey) && e.shiftKey && (e.key === 'z' || e.key === 'Z')) { e.preventDefault(); redo(); }
});
gizmo.addEventListener('mouseUp', () => pushHistory());
gizmo.addEventListener('touchend', () => pushHistory());

// =================== Registry ops ===================
function register(entry){
  entry.id = 'o_' + (++uid);
  entry.mesh.traverse(n => { n.userData.objId = entry.id; });
  scene.add(entry.mesh);
  objects.set(entry.id, entry);
  refreshOutliner();
  select(entry.id);
  pushHistory();
}
function remove(id){
  const o = objects.get(id); if (!o) return;
  if (state.selectedIds.has(id)) {
    state.selectedIds.delete(id);
  }
  if (o.mesh.parent === pivot) scene.attach(o.mesh);
  scene.remove(o.mesh);
  disposeDeep(o.mesh);
  objects.delete(id);
  select([...state.selectedIds]);
  pushHistory();
}
function disposeDeep(obj){
  obj.traverse(n => {
    if (n.geometry) n.geometry.dispose();
    if (n.material) {
      const mats = Array.isArray(n.material) ? n.material : [n.material];
      for (const m of mats) { if (m.map) m.map.dispose(); m.dispose(); }
    }
  });
}
function clearAll(){ for (const id of [...objects.keys()]) remove(id); }

function select(idOrIds, additive = false){
  // Detach children from pivot back to scene (preserving world transform)
  while (pivot.children.length) scene.attach(pivot.children[0]);
  pivot.position.set(0, 0, 0); pivot.rotation.set(0, 0, 0); pivot.scale.set(1, 1, 1);
  pivot.updateMatrixWorld(true);

  const incoming = (Array.isArray(idOrIds) ? idOrIds : (idOrIds ? [idOrIds] : [])).filter(id => objects.has(id));

  if (!additive) state.selectedIds.clear();
  for (const id of incoming) {
    if (additive && state.selectedIds.has(id)) state.selectedIds.delete(id);
    else state.selectedIds.add(id);
  }

  if (state.selectedIds.size === 0) {
    gizmo.detach();
  } else if (state.selectedIds.size === 1) {
    const [only] = state.selectedIds;
    const entry = objects.get(only);
    // Decal: prefer surface-drag over transform gizmo
    if (entry && entry.type === 'decal') gizmo.detach();
    else gizmo.attach(entry.mesh);
  } else {
    const center = new THREE.Vector3();
    for (const id of state.selectedIds) {
      const b = new THREE.Box3().setFromObject(objects.get(id).mesh);
      const c = new THREE.Vector3(); b.getCenter(c);
      center.add(c);
    }
    center.divideScalar(state.selectedIds.size);
    pivot.position.copy(center);
    pivot.updateMatrixWorld(true);
    for (const id of state.selectedIds) pivot.attach(objects.get(id).mesh);
    gizmo.attach(pivot);
  }
  refreshOutliner();
  renderInspector();
  updateGhosts();
}

// =================== Animation ghosts (start/end visualisation) ===================
const ghostState = { from: null, to: null };
function clearGhosts(){
  ['from', 'to'].forEach(k => {
    if (ghostState[k]) { scene.remove(ghostState[k]); disposeDeep(ghostState[k]); ghostState[k] = null; }
  });
}
function makeGhost(src, color){
  const g = src.clone(true);
  g.traverse(n => {
    if (n.isMesh) {
      n.material = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.28, wireframe: true, depthWrite: false });
      n.castShadow = n.receiveShadow = false;
      n.userData = {};
    }
  });
  return g;
}
function updateGhosts(){
  clearGhosts();
  if (state.selectedIds.size !== 1) return;
  const [id] = state.selectedIds;
  const o = objects.get(id);
  if (!o || !o.animation || o.type === 'decal' || o.type === 'group') return;
  if (animState.has(id)) return;
  if (o.animation.from) {
    ghostState.from = makeGhost(o.mesh, 0x30d158);
    applyPose(ghostState.from, o.animation.from);
    scene.add(ghostState.from);
  }
  if (o.animation.to) {
    ghostState.to = makeGhost(o.mesh, 0xff453a);
    applyPose(ghostState.to, o.animation.to);
    scene.add(ghostState.to);
  }
}

// =================== Groups ===================
function groupSelected(){
  if (state.selectedIds.size < 2) return;
  // Detach from pivot so worldTransforms are on scene root
  while (pivot.children.length) scene.attach(pivot.children[0]);
  pivot.position.set(0, 0, 0); pivot.rotation.set(0, 0, 0); pivot.scale.set(1, 1, 1);
  pivot.updateMatrixWorld(true);
  const ids = [...state.selectedIds];
  const g = new THREE.Group();
  const center = new THREE.Vector3();
  for (const id of ids) {
    const b = new THREE.Box3().setFromObject(objects.get(id).mesh);
    const c = new THREE.Vector3(); b.getCenter(c);
    center.add(c);
  }
  center.divideScalar(ids.length);
  scene.add(g);
  g.position.copy(center);
  g.updateMatrixWorld(true);
  for (const id of ids) g.attach(objects.get(id).mesh);
  register({ type: 'group', mesh: g, params: { childIds: ids }, name: `グループ ${uid + 1}` });
  toast(`${ids.length}個をグループ化`, 'success');
}
function ungroupSelected(){
  if (state.selectedIds.size !== 1) return;
  const [id] = state.selectedIds;
  const o = objects.get(id);
  if (!o || o.type !== 'group') return;
  const children = [...o.mesh.children];
  const childIds = [];
  children.forEach(c => {
    if (c.userData.objId && c.userData.objId !== id) {
      childIds.push(c.userData.objId);
      scene.attach(c);
    }
  });
  scene.remove(o.mesh);
  disposeDeep(o.mesh);
  objects.delete(id);
  state.selectedIds.delete(id);
  select(childIds.length ? childIds : null);
  refreshOutliner();
  toast('グループを解除');
}

// =================== Lasso ===================
let lassoActive = false;
let lassoPoints = [];
const lassoSvg = document.getElementById('lasso');
const lassoPath = lassoSvg.querySelector('path');

function setSelectionMode(mode){
  state.selectionMode = mode;
  document.querySelectorAll('.select-modes .sel').forEach(b => b.classList.toggle('active', b.dataset.sel === mode));
  viewportEl.classList.toggle('lasso-cursor', mode === 'lasso');
}
function startLasso(e){
  lassoActive = true; lassoPoints = []; orbit.enabled = false;
  pushLassoPoint(e);
}
function moveLasso(e){ if (!lassoActive) return; pushLassoPoint(e); renderLasso(); }
function endLasso(e){
  if (!lassoActive) return;
  lassoActive = false; orbit.enabled = true;
  if (lassoPoints.length > 2) {
    const hits = lassoSelect(lassoPoints);
    select(hits, e && (e.shiftKey || e.metaKey || e.ctrlKey));
  }
  lassoPath.setAttribute('d', '');
  lassoPoints = [];
}
function pushLassoPoint(e){
  const r = canvas.getBoundingClientRect();
  lassoPoints.push([e.clientX - r.left, e.clientY - r.top]);
}
function renderLasso(){
  if (lassoPoints.length < 2) return;
  const d = 'M' + lassoPoints.map(p => p.join(',')).join(' L ') + ' Z';
  lassoPath.setAttribute('d', d);
}
function lassoSelect(poly){
  const rect = canvas.getBoundingClientRect();
  const out = [];
  for (const o of objects.values()) {
    const b = new THREE.Box3().setFromObject(o.mesh);
    const c = new THREE.Vector3(); b.getCenter(c);
    const p = c.clone().project(camera);
    const sx = (p.x * 0.5 + 0.5) * rect.width;
    const sy = (-p.y * 0.5 + 0.5) * rect.height;
    if (pointInPolygon(sx, sy, poly)) out.push(o.id);
  }
  return out;
}
function pointInPolygon(x, y, poly){
  let inside = false;
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    const xi = poly[i][0], yi = poly[i][1], xj = poly[j][0], yj = poly[j][1];
    if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi || 1e-9) + xi)) inside = !inside;
  }
  return inside;
}

// =================== Textures ===================
function loadImageToTexture(file){
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      const cv = document.createElement('canvas');
      const max = 2048;
      let w = img.naturalWidth, h = img.naturalHeight;
      if (Math.max(w, h) > max) { const k = max / Math.max(w, h); w = w * k | 0; h = h * k | 0; }
      cv.width = w; cv.height = h;
      cv.getContext('2d').drawImage(img, 0, 0, w, h);
      const t = new THREE.CanvasTexture(cv);
      t.colorSpace = THREE.SRGBColorSpace;
      t.anisotropy = 8;
      t.wrapS = t.wrapT = THREE.RepeatWrapping;
      URL.revokeObjectURL(url);
      resolve(t);
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('読み込み失敗。HEIF は Safari のみ対応します')); };
    img.src = url;
  });
}

function makeGradientTexture(p){
  const s = 512;
  const cv = document.createElement('canvas'); cv.width = cv.height = s;
  const ctx = cv.getContext('2d');
  let g;
  if (p.mode === 'radial') g = ctx.createRadialGradient(s/2, s/2, 12, s/2, s/2, s*0.7);
  else {
    const rad = (p.angle || 0) * Math.PI/180;
    const dx = Math.cos(rad)*s/2, dy = Math.sin(rad)*s/2;
    g = ctx.createLinearGradient(s/2 - dx, s/2 - dy, s/2 + dx, s/2 + dy);
  }
  g.addColorStop(0, p.colorA); g.addColorStop(1, p.colorB);
  ctx.fillStyle = g; ctx.fillRect(0, 0, s, s);
  const t = new THREE.CanvasTexture(cv);
  t.colorSpace = THREE.SRGBColorSpace; t.anisotropy = 8;
  return t;
}

function makePatternTexture(p){
  const s = 256;
  const cv = document.createElement('canvas'); cv.width = cv.height = s;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = p.colorB; ctx.fillRect(0, 0, s, s);
  ctx.fillStyle = p.colorA;
  const u = Math.max(4, Math.min(s/2, p.scale || 32));
  if (p.kind === 'dots') {
    for (let y = 0; y < s; y += u) for (let x = 0; x < s; x += u) {
      ctx.beginPath(); ctx.arc(x + u/2, y + u/2, u * 0.22, 0, Math.PI*2); ctx.fill();
    }
  } else if (p.kind === 'stripes') {
    for (let x = 0; x < s; x += u*2) ctx.fillRect(x, 0, u, s);
  } else if (p.kind === 'checker') {
    for (let y = 0; y < s; y += u) for (let x = 0; x < s; x += u) {
      if ((Math.floor(x/u) + Math.floor(y/u)) % 2 === 0) ctx.fillRect(x, y, u, u);
    }
  } else if (p.kind === 'grid') {
    ctx.strokeStyle = p.colorA; ctx.lineWidth = Math.max(1, u * 0.08);
    for (let x = 0; x <= s; x += u) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, s); ctx.stroke(); }
    for (let y = 0; y <= s; y += u) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(s, y); ctx.stroke(); }
  } else if (p.kind === 'noise') {
    const cA = hexToRGB(p.colorA), cB = hexToRGB(p.colorB);
    const imgData = ctx.createImageData(s, s);
    const grain = Math.max(1, Math.min(8, (p.scale || 32) / 12));
    for (let y = 0; y < s; y++) {
      for (let x = 0; x < s; x++) {
        const t = Math.random();
        const gx = Math.floor(x / grain) * grain, gy = Math.floor(y / grain) * grain;
        const idx = (y * s + x) * 4;
        // Slight clustered noise
        const n = (t * 0.7 + Math.random() * 0.3);
        imgData.data[idx]   = cA[0] * (1 - n) + cB[0] * n;
        imgData.data[idx+1] = cA[1] * (1 - n) + cB[1] * n;
        imgData.data[idx+2] = cA[2] * (1 - n) + cB[2] * n;
        imgData.data[idx+3] = 255;
      }
    }
    ctx.putImageData(imgData, 0, 0);
  }
  const t = new THREE.CanvasTexture(cv);
  t.colorSpace = THREE.SRGBColorSpace;
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.anisotropy = 8;
  return t;
}

function applyFaceTexture(mesh, faceIndex, tex){
  const mat = mesh.material;
  if (Array.isArray(mat)) {
    const geo = mesh.geometry;
    const triStart = faceIndex * 3;
    let mi = -1;
    for (const g of geo.groups) {
      if (triStart >= g.start && triStart < g.start + g.count) { mi = g.materialIndex; break; }
    }
    if (mi >= 0) {
      const m = mat[mi];
      if (m.map) m.map.dispose();
      m.map = tex; m.color.set(0xffffff); m.needsUpdate = true;
    }
  } else {
    if (mat.map) mat.map.dispose();
    mat.map = tex; mat.color.set(0xffffff); mat.needsUpdate = true;
  }
}

async function applySurface(o){
  const s = o.params.surface || { kind: 'solid' };
  // Always clear edge overlays first; re-added if needed for ghost kind.
  removeEdges(o.mesh);
  if (s.kind === 'solid') {
    forMaterials(o.mesh, m => {
      if (m.map) m.map.dispose();
      m.map = null;
      m.transparent = false;
      m.opacity = 1;
      m.color.set(o.params.color);
      m.needsUpdate = true;
    });
    return;
  }
  if (s.kind === 'ghost') {
    forMaterials(o.mesh, m => {
      if (m.map) m.map.dispose();
      m.map = null;
      m.transparent = true;
      m.opacity = Math.max(0.001, s.opacity ?? 0.08);
      m.depthWrite = (s.opacity ?? 0.08) > 0.05;
      m.color.set(s.fillColor || '#ffffff');
      m.needsUpdate = true;
    });
    addEdges(o.mesh, s);
    return;
  }
  let tex = null;
  try {
    if (s.kind === 'gradient') tex = makeGradientTexture(s);
    else if (s.kind === 'pattern') tex = makePatternTexture(s);
    else if (s.kind === 'image' && s.imageSrc) tex = await makeImageTexture(s.imageSrc, { repeat: s.repeat ?? 1, offsetX: s.offsetX ?? 0, offsetY: s.offsetY ?? 0, rotation: s.rotation ?? 0 });
  } catch (err) { toast(err.message || 'texture failed', 'error'); return; }
  if (!tex) return;
  forMaterials(o.mesh, m => {
    if (m.map) m.map.dispose();
    m.map = tex; m.color.set(0xffffff); m.needsUpdate = true;
  });
}

function addEdges(root, s){
  const targets = [];
  root.traverse(n => { if (n.isMesh && n.geometry && !n.userData.isEdges) targets.push(n); });
  for (const n of targets) {
    const edgeGeo = new THREE.EdgesGeometry(n.geometry, s.edgeAngle ?? 30);
    const line = new THREE.LineSegments(edgeGeo, new THREE.LineBasicMaterial({
      color: s.outlineColor || '#1d1d1f',
      transparent: true,
      opacity: s.outlineOpacity ?? 0.9,
      depthWrite: false,
      depthTest: true,
    }));
    line.userData.isEdges = true;
    line.renderOrder = 1;
    n.add(line);
  }
}
function removeEdges(root){
  const victims = [];
  root.traverse(n => { if (n.userData.isEdges) victims.push(n); });
  for (const v of victims) {
    if (v.parent) v.parent.remove(v);
    if (v.geometry) v.geometry.dispose();
    if (v.material) v.material.dispose();
  }
}

function makeImageTexture(src, opts){
  const o = opts || {};
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const cv = document.createElement('canvas');
      const max = 1024;
      let w = img.naturalWidth, h = img.naturalHeight;
      if (Math.max(w, h) > max) { const k = max / Math.max(w, h); w = (w * k) | 0; h = (h * k) | 0; }
      cv.width = w; cv.height = h;
      cv.getContext('2d').drawImage(img, 0, 0, w, h);
      const t = new THREE.CanvasTexture(cv);
      t.colorSpace = THREE.SRGBColorSpace;
      t.wrapS = t.wrapT = THREE.RepeatWrapping;
      const r = Math.max(0.05, (typeof o === 'number') ? o : (o.repeat ?? 1));
      t.repeat.set(r, r);
      if (o.offsetX !== undefined || o.offsetY !== undefined) t.offset.set(o.offsetX || 0, o.offsetY || 0);
      if (o.rotation) { t.center.set(0.5, 0.5); t.rotation = o.rotation * Math.PI / 180; }
      t.anisotropy = 8;
      t.userData = { imageAspect: img.naturalWidth / img.naturalHeight };
      resolve(t);
    };
    img.onerror = () => reject(new Error('画像読み込み失敗 (HEIF は Safari のみ)'));
    img.src = src;
  });
}

function fileToDataURL(file){
  return new Promise((resolve, reject) => {
    const fr = new FileReader();
    fr.onload = () => resolve(fr.result);
    fr.onerror = () => reject(fr.error || new Error('read failed'));
    fr.readAsDataURL(file);
  });
}

document.getElementById('tex-input').onchange = async e => {
  const f = e.target.files[0]; e.target.value = '';
  if (!f) { state.pendingTexture = null; return; }
  const hit = state.pendingTexture?.hit;
  state.pendingTexture = null;
  if (!hit) { showDIError('対象面が指定されていません'); return; }
  askImagePlacement(f, hit);
};

function askImagePlacement(imgFile, hit){
  const targetId = findObjId(hit.object);
  const targetObj = targetId ? objects.get(targetId) : null;
  const items = [];
  items.push({ label: '① 面に貼る', svg: ICO_STL, action: async () => {
    try {
      const tex = await loadImageToTexture(imgFile);
      applyFaceTexture(hit.object, hit.faceIndex, tex);
      toast(`${imgFile.name} を面に適用`, 'success');
    } catch (err) { toast(err.message, 'error'); }
  }});
  if (targetObj && targetObj.type !== 'group') {
    items.push({ label: '② デカール (別レイヤー)', svg: ICO_OBJ, action: async () => {
      try {
        const src = await fileToDataURL(imgFile);
        const n = hit.face ? hit.face.normal.clone().transformDirection(hit.object.matrixWorld).normalize() : new THREE.Vector3(0, 1, 0);
        createDecal(targetObj, src, hit.point.clone(), n);
      } catch (err) { toast(err.message, 'error'); }
    }});
  }
  if (targetObj && targetObj.type !== 'decal' && targetObj.type !== 'group') {
    items.push({ label: '③ オブジェクト全体', svg: ICO_GLB, action: async () => {
      try {
        const src = await fileToDataURL(imgFile);
        targetObj.params.surface = { kind: 'image', imageSrc: src, repeat: 1, offsetX: 0, offsetY: 0, rotation: 0 };
        await applySurface(targetObj);
        if (state.selectedIds.has(targetObj.id)) renderInspector();
        toast('オブジェクト全体に適用', 'success');
      } catch (err) { toast(err.message, 'error'); }
    }});
  }
  openDI(items);
}

// =================== Outliner ===================
const outliner = document.getElementById('outliner');
function refreshOutliner(){
  outliner.innerHTML = '';
  for (const o of objects.values()) {
    const li = document.createElement('li');
    li.className = 'outliner-item' + (state.selectedIds.has(o.id) ? ' active' : '');
    li.innerHTML = `<span class="ico type-${o.type}"></span><span class="nm">${escapeHtml(o.name)}</span><button class="del" title="Delete">×</button>`;
    li.onclick = e => { if (e.target.closest('.del')) return; select(o.id, e.shiftKey || e.metaKey || e.ctrlKey); };
    li.querySelector('.del').onclick = e => { e.stopPropagation(); remove(o.id); };
    outliner.appendChild(li);
  }
}

// =================== Inspector ===================
const inspectorEl = document.getElementById('inspector');

function renderInspector(){
  if (state.selectedIds.size === 0) {
    inspectorEl.innerHTML = '<p class="hint">No object selected</p>';
    return;
  }
  if (state.selectedIds.size > 1) {
    inspectorEl.innerHTML = `
      <div class="selected-count">${state.selectedIds.size} 個のオブジェクトを選択中</div>
      <section class="actions">
        <button class="btn-ghost primary" id="p-group">グループ化</button>
      </section>
      <section class="actions">
        <button class="btn-ghost" id="p-group-stl">まとめて STL 保存</button>
      </section>
      <section class="actions">
        <button class="btn-ghost danger" id="p-group-del">全部削除</button>
      </section>
      <p class="hint" style="padding:20px 10px;font-size:11px;">ギズモでまとめて変形できます。1つを選ぶとプロパティが編集できます。</p>
    `;
    document.getElementById('p-group').onclick = () => groupSelected();
    document.getElementById('p-group-stl').onclick = () => document.getElementById('btn-export-stl').click();
    document.getElementById('p-group-del').onclick = () => {
      for (const id of [...state.selectedIds]) remove(id);
    };
    return;
  }

  const [id] = state.selectedIds;
  const o = objects.get(id);
  inspectorEl.innerHTML = `
    <section>
      <label class="row"><span>名前</span><input type="text" id="p-name" value="${escapeHtml(o.name)}"></label>
      ${o.type === 'text' ? `<label class="row"><span>文字</span><input type="text" id="p-text-top" value="${escapeHtml(o.params.text)}"></label>` : ''}
    </section>
    <section>
      <h3>変形</h3>
      <div class="vec3"><span>位置</span>${numInput('p-px', o.mesh.position.x, 0.1)}${numInput('p-py', o.mesh.position.y, 0.1)}${numInput('p-pz', o.mesh.position.z, 0.1)}</div>
      <div class="vec3"><span>回転°</span>${numInput('p-rx', THREE.MathUtils.radToDeg(o.mesh.rotation.x), 1)}${numInput('p-ry', THREE.MathUtils.radToDeg(o.mesh.rotation.y), 1)}${numInput('p-rz', THREE.MathUtils.radToDeg(o.mesh.rotation.z), 1)}</div>

function digitsFor(step){ return step >= 1 ? 0 : (step >= 0.1 ? 1 : step >= 0.01 ? 2 : 3); }

function buildInlineWheel(container, { min, max, step, value, digits, onChange }){
  if (!container) return;
  const items = [];
  const maxCount = Math.min(3000, Math.round((max - min) / step) + 1);
  for (let i = 0; i < maxCount; i++) {
    const v = Math.round((min + i * step) / step) * step;
    if (v > max + step/2) break;
    items.push(v);
  }
  const dig = digits ?? digitsFor(step);
  container.innerHTML = `
    <div class="iw-selbar"></div>
    <div class="iw-track">
      <div class="pad"></div>
      ${items.map((v, i) => `<div class="iw-item" data-i="${i}">${v.toFixed(dig)}</div>`).join('')}
      <div class="pad"></div>
    </div>
  `;
  const track = container.querySelector('.iw-track');
  const all = container.querySelectorAll('.iw-item');
  const ROW_H = 36;
  const startIdx = Math.max(0, items.findIndex(v => Math.abs(v - value) < step/2));
  requestAnimationFrame(() => { track.scrollTop = Math.max(0, startIdx) * ROW_H; markSel(); });
  let lastIdx = startIdx, st;
  function markSel(){
    const sel = Math.max(0, Math.min(items.length - 1, Math.round(track.scrollTop / ROW_H)));
    all.forEach((it, i) => it.classList.toggle('selected', i === sel));
    return sel;
  }
  track.addEventListener('scroll', () => {
    const idx = Math.max(0, Math.min(items.length - 1, Math.round(track.scrollTop / ROW_H)));
    if (idx !== lastIdx) { lastIdx = idx; try { haptic(); } catch(_){} markSel(); onChange(items[idx]); }
    clearTimeout(st);
    st = setTimeout(() => {
      const sel = Math.round(track.scrollTop / ROW_H);
      const target = Math.max(0, Math.min(items.length - 1, sel)) * ROW_H;
      if (Math.abs(track.scrollTop - target) > 0.5) track.scrollTo({ top: target, behavior: 'smooth' });
    }, 80);
  });
  all.forEach((it, i) => it.onclick = () => track.scrollTo({ top: i * ROW_H, behavior: 'smooth' }));
}
function slider(id, val, min, max, step){
  const digits = digitsFor(step);
  return `<div class="num-wheel">
    <span class="nw-val" id="${id}-val">${formatNumDisplay(val, digits)}</span>
    <input type="number" id="${id}" min="${min}" max="${max}" step="${step}" value="${val}" tabindex="-1" class="nw-input" hidden>
  </div>`;
}
function numInput(id, val, step){
  const digits = digitsFor(step);
  return `<div class="num-wheel">
    <span class="nw-val" id="${id}-val">${formatNumDisplay(val, digits)}</span>
    <input type="number" id="${id}" step="${step}" value="${val}" tabindex="-1" class="nw-input" hidden>
  </div>`;
}
function escapeHtml(s){ return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

function openMatchPicker(o, prop){
  const others = [...objects.values()].filter(x => x.id !== o.id && x.mesh && x.type !== 'decal');
  if (!others.length) { toast('他にオブジェクトがありません', 'error'); return; }
  const label = prop === 'rotation' ? '角度を合わせる対象' : 'スケールを合わせる対象';
  const items = others.map(x => ({ value: x.id, label: x.name || x.id }));
  openPickerPopup({
    title: label, items, index: 0,
    onPick: it => {
      const src = objects.get(it.value);
      if (!src) return;
      if (prop === 'rotation') o.mesh.rotation.copy(src.mesh.rotation);
      else if (prop === 'scale') o.mesh.scale.copy(src.mesh.scale);
      updateInspectorValues();
      toast(`${src.name || '対象'} に合わせました`, 'success');
    }
  });
}

function wireInspector(o){
  const nm = document.getElementById('p-name');
  nm.oninput = () => { o.name = nm.value; refreshOutliner(); };
  const ptop = document.getElementById('p-text-top');
  if (ptop) ptop.oninput = () => {
    o.params.text = ptop.value;
    rebuildText(o);
    const gt = document.getElementById('g-text');
    if (gt) gt.value = ptop.value;
  };

  bindNum('p-px', v => o.mesh.position.x = v);
  bindNum('p-py', v => o.mesh.position.y = v);
  bindNum('p-pz', v => o.mesh.position.z = v);
  bindNum('p-rx', v => o.mesh.rotation.x = THREE.MathUtils.degToRad(v));
  bindNum('p-ry', v => o.mesh.rotation.y = THREE.MathUtils.degToRad(v));
  bindNum('p-rz', v => o.mesh.rotation.z = THREE.MathUtils.degToRad(v));
  bindNum('p-sx', v => o.mesh.scale.x = v);
  bindNum('p-sy', v => o.mesh.scale.y = v);
  bindNum('p-sz', v => o.mesh.scale.z = v);

  // "Match" buttons: copy rotation / scale from another object (picker dialog ~0.5s fade in/out)
  const matchRot = document.getElementById('p-match-rot');
  if (matchRot) matchRot.onclick = () => openMatchPicker(o, 'rotation');
  const matchScl = document.getElementById('p-match-scl');
  if (matchScl) matchScl.onclick = () => openMatchPicker(o, 'scale');

  const color = document.getElementById('p-color');
