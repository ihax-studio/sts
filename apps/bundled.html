function updateImagePreview(o){
  const prev = document.getElementById('sf-prev'); if (!prev) return;
  const s = o.params.surface || {};
  if (!s.imageSrc) return;
  const r = s.repeat ?? 1, ox = s.offsetX ?? 0, oy = s.offsetY ?? 0, rot = s.rotation ?? 0;
  prev.style.backgroundImage = `url('${s.imageSrc}')`;
  prev.style.backgroundSize = `${(100/r).toFixed(2)}% ${(100/r).toFixed(2)}%`;
  prev.style.backgroundPosition = `${(ox*-100).toFixed(2)}% ${(oy*100).toFixed(2)}%`;
  prev.style.transform = `rotate(${rot}deg)`;
}

function minSide(o){ return Math.min(o.params.width, o.params.height, o.params.depth); }
function clampBoxRadius(o){ o.params.radius = Math.min(o.params.radius, minSide(o) / 2 - 0.001); }

function wheelify(input, handler){
  if (!input) return;
  const wrap = input.parentElement;
  if (!wrap || !wrap.classList.contains('num-wheel')) return;
  if (wrap.dataset.wired === '1') return;
  wrap.dataset.wired = '1';
  const valEl = wrap.querySelector('.nw-val');
  const step = parseFloat(input.step) || 0.1;
  const digits = digitsFor(step);
  const min = input.min !== '' && input.min != null ? parseFloat(input.min) : -Infinity;
  const max = input.max !== '' && input.max != null ? parseFloat(input.max) : Infinity;
  const clamp = v => Math.max(min, Math.min(max, v));
  const on = v => {
    let n = clamp(Math.round(v / step) * step);
    if (Math.abs(n) < step / 1000) n = 0;
    input.value = n;
    if (valEl) valEl.textContent = formatNumDisplay(n, digits);
    handler(n);
  };
  wrap._wheelUpdate = on;
  let drag = null;
  wrap.addEventListener('pointerdown', e => {
    if (e.target === input) return;
    e.preventDefault();
    wrap.setPointerCapture(e.pointerId);
    drag = { x: e.clientX, y: e.clientY, v: parseFloat(input.value) || 0, axis: null, moved: false };
    wrap.classList.add('active');
    try { haptic(); } catch (_) {}
  });
  wrap.addEventListener('pointermove', e => {
    if (!drag) return;
    const dx = e.clientX - drag.x;
    const dy = drag.y - e.clientY;
    if (!drag.axis) {
      if (Math.abs(dx) > 5 || Math.abs(dy) > 5) { drag.axis = Math.abs(dx) > Math.abs(dy) ? 'x' : 'y'; drag.moved = true; }
    }
    if (!drag.axis) return;
    const d = drag.axis === 'x' ? dx : dy;
    const range = (isFinite(max) && isFinite(min)) ? (max - min) : 0;
    const perPx = range > 0 && range <= 20 ? range / 160 : step;
    on(drag.v + d * perPx);
  });
  const endDrag = e => {
    const wasMoved = drag && drag.moved;
    drag = null;
    wrap.classList.remove('active');
    if (!wasMoved && e && e.type === 'pointerup') {
      // タップ: popup ダイアログなしで直接キーボード編集
      setTimeout(() => { input.hidden = false; input.focus(); input.select(); }, 10);
    }
  };
  wrap.addEventListener('pointerup', endDrag);
  wrap.addEventListener('pointercancel', () => { drag = null; wrap.classList.remove('active'); });
  wrap.addEventListener('wheel', e => {
    e.preventDefault();
    on((parseFloat(input.value) || 0) + (-Math.sign(e.deltaY) * step));
  }, { passive: false });
  wrap.addEventListener('dblclick', () => { input.hidden = false; input.focus(); input.select(); });
  input.addEventListener('blur', () => { input.hidden = true; });
  input.addEventListener('keydown', e => { if (e.key === 'Enter') input.blur(); });
  input.addEventListener('input', () => {
    const v = parseFloat(input.value);
    if (!isNaN(v)) {
      if (valEl) valEl.textContent = formatNumDisplay(v, digits);
      handler(v);
    }
  });
}

function openNumberPicker(wrap, input, handler){
  const step = parseFloat(input.step) || 0.1;
  const digits = digitsFor(step);
  const cur = parseFloat(input.value) || 0;
  const min = input.min !== '' && input.min != null ? parseFloat(input.min) : cur - step * 100;
  const max = input.max !== '' && input.max != null ? parseFloat(input.max) : cur + step * 100;
  const items = [];
  for (let i = 0; i < 4000; i++) {
    const v = Math.round((min + i * step) / step) * step;
    if (v > max + step / 2) break;
    items.push({ label: formatNumDisplay(v, digits), value: v });
  }
  let idx = items.findIndex(it => Math.abs(it.value - cur) < step / 2);
  if (idx < 0) idx = 0;
  let title = '値';
  const lbl = wrap.closest('label, .row, .vec3');
  if (lbl) { const sp = lbl.querySelector('span'); if (sp) title = sp.textContent; }
  openPickerPopup({
    title, items, index: idx,
    onPick: it => {
      const valEl = wrap.querySelector('.nw-val');
      input.value = it.value;
      if (valEl) valEl.textContent = it.label;
      handler(it.value);
    }
  });
}

function bindNum(id, handler){ wheelify(document.getElementById(id), handler); }
function bindSlider(id, handler){ wheelify(document.getElementById(id), handler); }

// =================== Units (display only) ===================
const unitInfo = {
  m:  { symbol: 'm',  factor: 1 },
  cm: { symbol: 'cm', factor: 100 },
  mm: { symbol: 'mm', factor: 1000 },
  in: { symbol: 'in', factor: 39.3701 },
  px: { symbol: 'px', factor: 100 },
};
state.unit = 'm';
function formatNumDisplay(n, digits){
  const sym = unitInfo[state.unit]?.symbol;
  return Number(n).toFixed(digits) + (sym && sym !== 'm' ? ' ' + sym : '');
}
function refreshAllUnitLabels(){
  document.querySelectorAll('.num-wheel').forEach(wrap => {
    const input = wrap.querySelector('input.nw-input');
    const valEl = wrap.querySelector('.nw-val');
    if (!input || !valEl) return;
    const step = parseFloat(input.step) || 0.1;
    const digits = digitsFor(step);
    const v = parseFloat(input.value);
    if (!isNaN(v)) valEl.textContent = formatNumDisplay(v, digits);
  });
}
document.querySelectorAll('.unit-chip button').forEach(b => {
  b.onclick = () => {
    state.unit = b.dataset.unit;
    document.querySelectorAll('.unit-chip button').forEach(x => x.classList.toggle('active', x === b));
    refreshAllUnitLabels();
  };
});

// =================== iOS-style picker popup ===================
function openPickerPopup({ title, items, index, onPick }){
  const overlay = document.createElement('div');
  overlay.className = 'picker-overlay';
  overlay.innerHTML = `
    <div class="picker-card">
      <div class="picker-title">${title || ''}</div>
      <div class="picker-body">
        <div class="picker-selbar"></div>
        <div class="picker-track">
          <div class="pad"></div>
          ${items.map((it, i) => `<div class="picker-item" data-i="${i}">${it.html || it.label}</div>`).join('')}
          <div class="pad"></div>
        </div>
      </div>
      <div class="picker-actions">
        <button class="btn-ghost" data-act="cancel">Cancel</button>
        <button class="btn-ghost primary" data-act="done">Done</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  const track = overlay.querySelector('.picker-track');
  const itemEls = overlay.querySelectorAll('.picker-item');
  const H = 44;
  const startI = Math.max(0, Math.min(items.length - 1, index || 0));
  requestAnimationFrame(() => { track.scrollTop = startI * H; updateSel(); });
  let lastSel = -1;
  function updateSel(){
    const sel = Math.max(0, Math.min(items.length - 1, Math.round(track.scrollTop / H)));
    if (sel !== lastSel) {
      try { haptic(); } catch(_) {}
      lastSel = sel;
    }
    itemEls.forEach((e, i) => e.classList.toggle('selected', i === sel));
    return sel;
  }
  let st;
  track.addEventListener('scroll', () => {
    clearTimeout(st);
    updateSel();
    st = setTimeout(() => {
      const sel = updateSel();
      if (Math.abs(track.scrollTop - sel * H) > 0.5) track.scrollTo({ top: sel * H, behavior: 'smooth' });
    }, 110);
  });
  itemEls.forEach(e => {
    e.onclick = () => track.scrollTo({ top: parseInt(e.dataset.i) * H, behavior: 'smooth' });
  });
  const doClose = (result) => {
    overlay.style.animation = 'fadeIn .16s ease-out reverse';
    setTimeout(() => overlay.remove(), 150);
    if (result !== undefined) onPick(result);
    document.removeEventListener('keydown', onKey);
  };
  overlay.querySelector('[data-act=done]').onclick = () => { const i = updateSel(); doClose(items[i]); };
  overlay.querySelector('[data-act=cancel]').onclick = () => doClose();
  overlay.addEventListener('click', e => { if (e.target === overlay) doClose(); });
  const onKey = e => {
    if (e.key === 'Escape') doClose();
    if (e.key === 'Enter') { const i = updateSel(); doClose(items[i]); }
  };

function rebuildSphere(o){

function rebuildText(o){
  const parent = o.mesh.parent || scene;

  const keepRot = o.mesh.rotation.clone();

  const nm = buildTextMesh(o.params);
  nm.position.copy(keepPos);
  nm.rotation.copy(keepRot);

  nm.castShadow = true; nm.receiveShadow = true;

  disposeDeep(o.mesh);
  parent.remove(o.mesh);
  parent.add(nm);
  o.mesh = nm;

}
function rebuildLine(o){
  const parent = o.mesh.parent || scene;
  const ng = buildLineGroup(o.params);
  ng.position.copy(o.mesh.position); ng.rotation.copy(o.mesh.rotation); ng.scale.copy(o.mesh.scale);
  ng.traverse(n => n.userData.objId = o.id);
  disposeDeep(o.mesh);
  parent.remove(o.mesh);
  parent.add(ng);

function duplicate(o){

let decalReplace = null; // decal entry

function setPickPendingHint(on){

function handleDecalClickOnCanvas(e){
  const hits = hitTest(e);
  if (!hits.length) { toast('表面に当たりませんでした', 'error'); decalPending = null; decalReplace = null; setPickPendingHint(false); return true; }
  const h = hits[0];
  let targetMesh = h.object;
  const targetId = findObjId(targetMesh);
  const pos = h.point.clone();
  const normal = (h.face && h.face.normal) ? h.face.normal.clone().transformDirection(targetMesh.matrixWorld).normalize() : new THREE.Vector3(0,1,0);
  if (decalReplace) {
    const newTarget = targetId ? objects.get(targetId) : null;
    decalReplace.params.worldPos = pos.toArray();
    decalReplace.params.worldNormal = normal.toArray();
    if (newTarget && newTarget.type !== 'decal' && newTarget.id !== decalReplace.id) decalReplace.params.targetId = newTarget.id;
    rebuildDecal(decalReplace);
    decalReplace = null; setPickPendingHint(false);
    toast('デカールを配置し直しました', 'success');
    return true;
  }
  if (!decalPending) return false;
  const targetObj = decalPending.targetObj;
  if (targetId !== targetObj.id) { toast('選択中のオブジェクトをクリック', 'error'); return true; }
  createDecal(targetObj, decalPending.imageSrc, pos, normal);
  decalPending = null; setPickPendingHint(false);
  return true;
}

function createDecal(targetObj, imageSrc, worldPos, worldNormal){
  const params = {
    targetId: targetObj.id,
    imageSrc,
    worldPos: worldPos.toArray(),
    worldNormal: worldNormal.toArray(),
    size: 0.7,
    distance: 0.0,
    rotation: 0,
    opacity: 1,
  };
  const mesh = buildDecalMesh(targetObj, params);
  if (!mesh) { toast('デカール作成に失敗', 'error'); return; }
  register({ type: 'decal', mesh, params, name: `Decal ${uid + 1}` });
  toast('デカールを配置しました', 'success');
}

function buildDecalMesh(targetObj, p){
  const tm = firstMeshIn(targetObj.mesh);
  if (!tm) return null;
  tm.updateMatrixWorld(true);
  const pos = new THREE.Vector3().fromArray(p.worldPos);
  const nrm = new THREE.Vector3().fromArray(p.worldNormal).normalize();
  const pushed = pos.clone().addScaledVector(nrm, p.distance);
  // Build orientation: z axis along -normal
  const up = Math.abs(nrm.y) > 0.95 ? new THREE.Vector3(1, 0, 0) : new THREE.Vector3(0, 1, 0);
  const zAxis = nrm.clone().multiplyScalar(-1);
  const xAxis = new THREE.Vector3().crossVectors(up, zAxis).normalize();
  const yAxis = new THREE.Vector3().crossVectors(zAxis, xAxis).normalize();
  const m4 = new THREE.Matrix4().makeBasis(xAxis, yAxis, zAxis);
  const euler = new THREE.Euler().setFromRotationMatrix(m4);
  euler.z += p.rotation * Math.PI / 180;
  const sz = new THREE.Vector3(p.size, p.size, p.size * 1.5);
  const geo = new DecalGeometry(tm, pushed, euler, sz);

  const tex = new THREE.TextureLoader().load(p.imageSrc);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = 8;
  const mat = new THREE.MeshStandardMaterial({
    map: tex,
    transparent: true,
    opacity: p.opacity ?? 1,
    depthWrite: false,
    polygonOffset: true,
    polygonOffsetFactor: -4,
    roughness: 0.6,
    metalness: 0.05,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = false;
  mesh.receiveShadow = true;
  // Parent to target so it follows transforms
  targetObj.mesh.attach(mesh);
  return mesh;
}

function rebuildDecal(o){
  const targetObj = objects.get(o.params.targetId);
  if (!targetObj) return;
  const parent = o.mesh.parent;
  disposeDeep(o.mesh);
  if (parent) parent.remove(o.mesh);
  const nm = buildDecalMesh(targetObj, o.params);
  if (!nm) return;
  nm.traverse(n => n.userData.objId = o.id);
  o.mesh = nm;
  if (state.selectedIds.has(o.id) && state.selectedIds.size === 1) gizmo.attach(nm);
}

function firstMeshIn(root){
  let found = null;
  root.traverse(n => { if (!found && n.isMesh && n !== root && n.userData.objId === root.userData.objId) found = n; });
  if (!found && root.isMesh) return root;
  return found || root;
}

// ===== Drag-from-dock to place sphere/box/line =====
const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
function screenToGround(clientX, clientY){
  const r = canvas.getBoundingClientRect();
  ndc.x = ((clientX - r.left) / r.width) * 2 - 1;
  ndc.y = -((clientY - r.top) / r.height) * 2 + 1;
  ray.setFromCamera(ndc, camera);
  const out = new THREE.Vector3();
  return ray.ray.intersectPlane(groundPlane, out) ? out : null;
}
let dragAdd = null; // { kind, start, preview }
function beginDragAdd(kind, e){
  const start = screenToGround(e.clientX, e.clientY) || new THREE.Vector3(0, 0, 0);
  const mat = new THREE.MeshBasicMaterial({ color: 0x5ac8fa, transparent: true, opacity: 0.55, wireframe: true });
  let preview;
  if (kind === 'sphere') preview = new THREE.Mesh(new THREE.SphereGeometry(0.1, 24, 16), mat);
  else if (kind === 'box') preview = new THREE.Mesh(new RoundedBoxGeometry(0.1, 1.5, 0.1, 4, 0.02), mat);
  else if (kind === 'line') preview = new THREE.Mesh(new THREE.TubeGeometry(new THREE.LineCurve3(start.clone(), start.clone()), 1, 0.06, 12, false), mat);
  if (preview) { preview.position.copy(start); scene.add(preview); }
  dragAdd = { kind, start, preview };
  orbit.enabled = false;
  viewportEl.classList.add('lasso-cursor');
}
function updateDragAdd(e){
  if (!dragAdd) return;
  const p = screenToGround(e.clientX, e.clientY); if (!p) return;
  const { kind, start, preview } = dragAdd;
  const old = preview.geometry;
  if (kind === 'sphere') {
    const r = Math.max(0.1, start.distanceTo(p));
    preview.geometry = new THREE.SphereGeometry(r, 32, 20);
    preview.position.copy(start).setY(r);
  } else if (kind === 'box') {
    const w = Math.max(0.1, Math.abs(p.x - start.x));
    const d = Math.max(0.1, Math.abs(p.z - start.z));
    preview.geometry = new RoundedBoxGeometry(w, 1.5, d, 4, Math.min(0.2, Math.min(w, d) / 4));
    preview.position.set((p.x + start.x) / 2, 0.75, (p.z + start.z) / 2);
  } else if (kind === 'line') {
    const a = start.clone().setY(0.5); const b = p.clone().setY(0.5);
    preview.geometry = new THREE.TubeGeometry(new THREE.LineCurve3(a, b), 1, 0.08, 12, false);
    preview.position.set(0, 0, 0);
  }
  old.dispose();
}
function finalizeDragAdd(e){
  if (!dragAdd) return;
  const { kind, start, preview } = dragAdd;
  const p = screenToGround(e.clientX, e.clientY) || start.clone();
  if (preview) { scene.remove(preview); preview.geometry.dispose(); preview.material.dispose(); }
  dragAdd = null; orbit.enabled = true;
  viewportEl.classList.remove('lasso-cursor');
  const dist = start.distanceTo(p);
  if (dist < 0.12) return;
  if (kind === 'sphere') {
    const r = Math.max(0.2, dist);
    const params = { radius: r, color: '#d8dbe1', roughness: 0.3, metalness: 0.1, surface: defaultSurface() };
    const m = new THREE.Mesh(new THREE.SphereGeometry(r, 64, 48), makeMaterial(params));
    m.castShadow = m.receiveShadow = true;
    m.position.copy(start).setY(r);
    register({ type: 'sphere', mesh: m, params, name: `Sphere ${uid + 1}` });
  } else if (kind === 'box') {
    const w = Math.max(0.3, Math.abs(p.x - start.x));
    const d = Math.max(0.3, Math.abs(p.z - start.z));
    const radius = Math.min(0.3, Math.min(w, d) / 4);
    const params = { width: w, height: 1.5, depth: d, radius, color: '#d8dbe1', roughness: 0.4, metalness: 0.1, surface: defaultSurface() };
    const geo = new RoundedBoxGeometry(w, 1.5, d, 4, radius);
    assignBoxGroups(geo);
    const mats = Array.from({ length: 6 }, () => makeMaterial(params));
    const m = new THREE.Mesh(geo, mats);
    m.castShadow = m.receiveShadow = true;
    m.position.set((p.x + start.x) / 2, 0.75, (p.z + start.z) / 2);
    register({ type: 'box', mesh: m, params, name: `Box ${uid + 1}` });
  } else if (kind === 'line') {
    const a = { x: start.x, y: 0.5, z: start.z }, b = { x: p.x, y: 0.5, z: p.z };
    const params = { a, b, thickness: 0.14, tipSharpness: 0, color: '#d8dbe1', roughness: 0.35, metalness: 0.1, surface: defaultSurface() };
    register({ type: 'line', mesh: buildLineGroup(params), params, name: `Line ${uid + 1}` });
  }
}
function attachDragAdd(btn, kind){
  btn.addEventListener('pointerdown', e => {
    if (e.button !== 0) return;
    const sx = e.clientX, sy = e.clientY;
    let engaged = false, clickSuppressed = false;
    const onMove = ev => {
      if (!engaged && Math.hypot(ev.clientX - sx, ev.clientY - sy) > 10) {
        engaged = true; clickSuppressed = true;
        beginDragAdd(kind, ev);
      }
      if (engaged) updateDragAdd(ev);
    };
    const onUp = ev => {
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
      if (engaged) finalizeDragAdd(ev);
    };
    const onClick = ev => {
      if (clickSuppressed) { ev.stopPropagation(); ev.preventDefault(); }
      btn.removeEventListener('click', onClick, true);
    };
    btn.addEventListener('click', onClick, true);
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
  });
}

/* ── Cinema-4D-ish helpers: center-of-mass pivot + instantaneous explosion FX ── */
function computeSceneCenterOfMass(){
  // Volume-weighted centroid across all objects' bounding boxes.
  let totalW = 0;
  const acc = new THREE.Vector3();
  for(const o of objects.values()){
    const m = o.mesh; if(!m) continue;
    const bb = new THREE.Box3().setFromObject(m);
    if(!bb.isEmpty()){
      const c = new THREE.Vector3(); bb.getCenter(c);
      const s = new THREE.Vector3(); bb.getSize(s);
      const w = Math.max(0.0001, s.x * s.y * s.z);
      acc.add(c.multiplyScalar(w));
      totalW += w;
    }
  }
  if(totalW === 0) return null;
  return acc.divideScalar(totalW);
}

document.getElementById('btn-com-pivot').onclick = () => {
  if(!objects.size){ toast('オブジェクトがありません'); return; }
  const com = computeSceneCenterOfMass();
  if(!com){ toast('重心を算出できませんでした'); return; }
  pivot.position.copy(com);
  // Flash the pivot marker
  if(typeof pivotMarker !== 'undefined' && pivotMarker){
    pivotMarker.position.copy(com);
    const m = pivotMarker.material;
    if(m){
      const oldOp = m.opacity;
      m.opacity = 1;
      setTimeout(()=>{ try{ m.opacity = oldOp; }catch(_){} }, 600);
    }
  }
  toast('重心へピボット');
};

let _explosionRunning = false;
document.getElementById('btn-explode').onclick = () => {
  if(_explosionRunning) return;
  if(!objects.size){ toast('オブジェクトがありません'); return; }
  const com = computeSceneCenterOfMass() || new THREE.Vector3();
  const dur = 0.7; // seconds, "瞬時"
  const snapshots = [];
  for(const o of objects.values()){
    const m = o.mesh; if(!m) continue;
    const start = m.position.clone();
    const dir = m.position.clone().sub(com);
    if(dir.lengthSq() < 1e-6) dir.set((Math.random()-0.5), (Math.random()-0.5)+0.5, (Math.random()-0.5));
    dir.normalize();
    // Distance proportional to mesh size so big things drift further
    const bb = new THREE.Box3().setFromObject(m);
    const size = new THREE.Vector3(); bb.getSize(size);
    const reach = 3 + Math.min(8, size.length() * 1.6);
    const end = start.clone().add(dir.multiplyScalar(reach));
    const spin = new THREE.Vector3(
      (Math.random()-0.5)*Math.PI*1.4,
      (Math.random()-0.5)*Math.PI*1.4,
      (Math.random()-0.5)*Math.PI*1.4
    );
    const rot0 = m.rotation.clone();
    snapshots.push({ mesh:m, start, end, rot0, spin });
  }
  _explosionRunning = true;
  const t0 = performance.now();
  const ease = (t) => 1 - Math.pow(1-t, 3);
  function step(now){
    const e = (now - t0)/1000;
    const t = Math.min(1, e/dur);
    const k = ease(t);
    for(const s of snapshots){
      s.mesh.position.lerpVectors(s.start, s.end, k);
      s.mesh.rotation.x = s.rot0.x + s.spin.x * k;
      s.mesh.rotation.y = s.rot0.y + s.spin.y * k;
      s.mesh.rotation.z = s.rot0.z + s.spin.z * k;
    }
    if(t < 1){ requestAnimationFrame(step); }
    else {
      _explosionRunning = false;
      toast('💥 爆発 — ⌘Z で戻る');
      // Record into undo stack if available
      try {
        if(typeof pushHistory === 'function') pushHistory();
        else if(typeof history !== 'undefined' && history.push) history.push();
      } catch(_){}
    }
  }
  requestAnimationFrame(step);
};

const toastEl = document.getElementById('toast');
let toastTimer = null;
function toast(msg, variant){
  toastEl.textContent = msg;
  toastEl.style.background = variant === 'error' ? 'rgba(255,59,48,0.92)' : 'rgba(20,22,30,0.88)';
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2400);
  try {
    if (variant === 'error') haptic.error();
    else if (variant === 'success') haptic.confirm();
  } catch (_) {}
}

// =================== Paint / Bump / Carve tools ===================
let paintLongPressTimer = null;

function paintObjectFull(o, color){
  const endColor = new THREE.Color(color);
  const mats = [];
  o.mesh.traverse(n => {
    if (!n.material) return;
    const list = Array.isArray(n.material) ? n.material : [n.material];
    for (const m of list) {
      if (m.map) { m.map.dispose(); m.map = null; }
      mats.push({ m, start: m.color.clone() });
    }
  });
  const t0 = performance.now(), dur = 500;
  (function step(now){
    const t = Math.min(1, (now - t0) / dur);
    const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    mats.forEach(({ m, start }) => {
      m.color.copy(start).lerp(endColor, ease);
      m.needsUpdate = true;
    });
    if (t < 1) requestAnimationFrame(step);
  })(t0);
  o.params.color = color;
  if (o.params.surface) o.params.surface = { kind: 'solid' };
}

function handlePaintClick(e){
  const hits = hitTest(e);
  if (!hits.length) return;
  const hit = hits[0];
  const mesh = hit.object;
  const geo = mesh.geometry;
  let targetMat;
  if (Array.isArray(mesh.material)) {
    const triStart = hit.faceIndex * 3;
    let mi = 0;
    for (const g of geo.groups) if (triStart >= g.start && triStart < g.start + g.count) { mi = g.materialIndex; break; }
    targetMat = mesh.material[mi];
  } else {
    targetMat = mesh.material;
  }
  if (!targetMat) return;
  if (targetMat.map) { targetMat.map.dispose(); targetMat.map = null; }
  const start = targetMat.color.clone();
  const end = new THREE.Color(tools.paint.color);
  const t0 = performance.now();
  const dur = 500;
  (function step(now){
    const t = Math.min(1, (now - t0) / dur);
    const e2 = t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2;
    targetMat.color.copy(start).lerp(end, e2);
    targetMat.needsUpdate = true;
    if (t < 1) requestAnimationFrame(step);
  })(t0);
  try { haptic(); } catch(_){}
}

function handleBrushClick(e, dir, override){
  const hits = hitTest(e);
  if (!hits.length) return;
  const hit = hits[0];
  const mesh = hit.object;
  const id = findObjId(mesh);
  if (!id) return;
  const entry = objects.get(id);
  if (!entry) return;
  // Prevent on STL only if desired? allow for all
  const geo = mesh.geometry;
  const posAttr = geo.attributes.position;
  if (!posAttr) return;
  // Make non-indexed? keep indexed, but we modify unique vertex positions.
  // Also ensure geometry is not shared — clone if needed.
  if (!mesh.userData._brushReady) {
    mesh.geometry = geo.clone();
    // Preserve groups too
    mesh.userData._brushReady = true;
  }
  const g2 = mesh.geometry;
  const p = g2.attributes.position;
  const local = mesh.worldToLocal(hit.point.clone());
  const nrm = (hit.face && hit.face.normal) ? hit.face.normal.clone() : new THREE.Vector3(0, 1, 0);
  const tool = override || (dir > 0 ? tools.bump : tools.carve);
  const rad = tool.radius;
  const str = tool.strength * dir;
  const rad2 = rad * rad;
  const stamp = tool.style === 'stamp';
  for (let i = 0; i < p.count; i++) {
    const vx = p.getX(i), vy = p.getY(i), vz = p.getZ(i);
    const dx = vx - local.x, dy = vy - local.y, dz = vz - local.z;
    const d2 = dx*dx + dy*dy + dz*dz;
    if (d2 > rad2) continue;
    let f;
    if (stamp) {
      // Hard circle: uniform depth, sharp edge
      f = 1;
    } else {
      const d = Math.sqrt(d2);
      const falloff = Math.cos((d / rad) * Math.PI / 2);
      f = falloff * falloff;
    }
    p.setXYZ(i, vx + nrm.x * str * f, vy + nrm.y * str * f, vz + nrm.z * str * f);
  }
  p.needsUpdate = true;
  g2.computeVertexNormals();
  g2.computeBoundingBox();
  g2.computeBoundingSphere();
  try { haptic(); } catch(_){}
}

// =================== 3D Pencil (freehand 3D line) ===================
let pencilDrawing = null;
function pencilAddPoint(e){
  const hits = hitTest(e);
  let p = null;
  if (hits.length) {
    const hit = hits[0];
    const n = hit.face
      ? hit.face.normal.clone().transformDirection(hit.object.matrixWorld).normalize()
      : new THREE.Vector3(0, 1, 0);
    p = hit.point.clone().addScaledVector(n, tools.pencil.radius * 0.6);
  } else {
    // 何もない空中 — orbit.target を通るカメラ視線に垂直な平面で補間
    const r = canvas.getBoundingClientRect();
    ndc.x = ((e.clientX - r.left) / r.width) * 2 - 1;
    ndc.y = -((e.clientY - r.top) / r.height) * 2 + 1;
    ray.setFromCamera(ndc, camera);
    const planeNormal = new THREE.Vector3().subVectors(camera.position, orbit.target).normalize();
    const airPlane = new THREE.Plane().setFromNormalAndCoplanarPoint(planeNormal, orbit.target);
    const target = new THREE.Vector3();
    if (!ray.ray.intersectPlane(airPlane, target)) return;
    p = target;
  }
  if (!p) return;
  const last = pencilDrawing.path[pencilDrawing.path.length - 1];
  if (!last || last.distanceTo(p) > tools.pencil.radius * 0.25) {
    pencilDrawing.path.push(p);
  }
}
function updatePencilPreview(){
  if (pencilDrawing.preview) { scene.remove(pencilDrawing.preview); pencilDrawing.preview.geometry.dispose(); pencilDrawing.preview.material.dispose(); pencilDrawing.preview = null; }
  const pts = pencilDrawing.path;
  if (pts.length < 2) return;
  // 太さに応じた Tube preview (radius の 90% で軽く透明、実物より薄く表示)
  const curve = new THREE.CatmullRomCurve3(pts, false, 'centripetal', 0.5);
  const segs = Math.max(6, Math.min(pts.length * 3, 220));
  const r = Math.max(0.003, tools.pencil.radius * 0.9);
  const geo = new THREE.TubeGeometry(curve, segs, r, 12, false);
  const mat = new THREE.MeshBasicMaterial({
    color: tools.pencil.color,
    transparent: true,
    opacity: 0.6,
    depthWrite: false,
  });
  pencilDrawing.preview = new THREE.Mesh(geo, mat);
  pencilDrawing.preview.renderOrder = 999;
  scene.add(pencilDrawing.preview);
}
function finalizePencilStroke(){
  if (!pencilDrawing) return;
  if (pencilDrawing.preview) { scene.remove(pencilDrawing.preview); pencilDrawing.preview.geometry.dispose(); pencilDrawing.preview.material.dispose(); }
  const raw = pencilDrawing.path;
  pencilDrawing = null;
  orbit.enabled = true;
  if (raw.length < 2) return;
  // Deduplicate close points for smoother curve
  const pts = [raw[0]];
  const minD = tools.pencil.radius * 0.4;
  for (let i = 1; i < raw.length; i++) if (raw[i].distanceTo(pts[pts.length - 1]) > minD) pts.push(raw[i]);
  if (pts.length < 2) pts.push(raw[raw.length - 1]);
  const params = {
    points: pts.map(p => p.toArray()),
    radius: tools.pencil.radius,
    color: tools.pencil.color,
    roughness: 0.4, metalness: 0.1,
    surface: defaultSurface(),
  };
  const mesh = buildPencilMesh(params);
  mesh.castShadow = true; mesh.receiveShadow = true;
  register({ type: 'pencil', mesh, params, name: `ペン ${uid + 1}` });
  // Fade-in 0.2s
  const mat = mesh.material;
  mat.transparent = true; mat.opacity = 0;
  const t0 = performance.now();
  (function fade(now){
    const t = Math.min(1, (now - t0) / 200);
    mat.opacity = t;
    if (t < 1) requestAnimationFrame(fade);
    else { mat.transparent = false; mat.needsUpdate = true; }
  })(t0);
}
function buildPencilMesh(p){
  const pts = p.points.map(arr => new THREE.Vector3().fromArray(arr));
  const curve = new THREE.CatmullRomCurve3(pts, false, 'centripetal', 0.5);
  const segs = Math.max(8, Math.min(pts.length * 8, 600));
  const geo = new THREE.TubeGeometry(curve, segs, Math.max(0.002, p.radius), 20, false);
  return new THREE.Mesh(geo, makeMaterial(p));
}
function rebuildPencil(o){
  const parent = o.mesh.parent || scene;
  const nm = buildPencilMesh(o.params);
  nm.position.copy(o.mesh.position);
  nm.rotation.copy(o.mesh.rotation);
  nm.scale.copy(o.mesh.scale);
  nm.castShadow = true; nm.receiveShadow = true;
  nm.traverse(n => n.userData.objId = o.id);
  disposeDeep(o.mesh);
  parent.remove(o.mesh);
  parent.add(nm);
  o.mesh = nm;
  applyMaterial(nm, o.params);
  applySurface(o);
  if (state.selectedIds.has(o.id) && state.selectedIds.size === 1) gizmo.attach(nm);
}

function setTool(name){
  state.tool = name;
  document.querySelectorAll('.tool-modes .tool').forEach(b => b.classList.toggle('active', b.dataset.tool === name));
  renderToolPopover();
  viewportEl.classList.toggle('lasso-cursor', name === 'paint' || name === 'carve' || name === 'bump');
}

    tpBody.innerHTML = `
      <div class="segmented er-mode" style="margin:2px 0 8px;">
        <button data-em="object" class="${m === 'object' ? 'active' : ''}">オブジェクト</button>
        <button data-em="drill" class="${m === 'drill' ? 'active' : ''}">ドリル穴</button>

    `;
    document.querySelectorAll('.er-mode button').forEach(b => {
      b.onclick = () => { tools.eraser.mode = b.dataset.em; renderToolPopover(); };
    });
    if (m === 'drill') {
      bindSlider('tp-er-r', v => tools.eraser.radius = v);
      bindSlider('tp-er-d', v => tools.eraser.depth = v);
    }
  } else if (state.tool === 'pencil'){
    tpTitle.textContent = '3Dペンシル · 0.2s で滑らかに';
    tpBody.innerHTML = `
      <label><span>色</span><input type="color" id="tp-pen-color" value="${tools.pencil.color}"></label>
      <label style="grid-template-columns: 78px 1fr; align-items:stretch;"><span>太さ</span>
        <div class="inline-wheel" id="tp-pen-wheel"></div>
      </label>
      <p class="hint" style="font-size:11px;text-align:center;color:var(--ink-3);margin:4px 0 0;">ドラッグで表面/空中に滑らかな3D線</p>

    document.getElementById('tp-pen-color').oninput = e => tools.pencil.color = e.target.value;
    buildInlineWheel(document.getElementById('tp-pen-wheel'), {
      min: 0.005, max: 2, step: 0.005, value: tools.pencil.radius, digits: 3,
      onChange: v => { tools.pencil.radius = v; }
    });
  } else if (state.tool === 'carve' || state.tool === 'bump'){
    const tool = state.tool === 'carve' ? tools.carve : tools.bump;
    const title = state.tool === 'carve' ? '削り / ドリル' : '盛り上げ';

      <p class="hint" style="font-size:11px;text-align:center;color:var(--ink-3);margin:4px 0 0;">なめらか＝ふんわり変形 / スタンプ＝円形にくっきり削り</p>

}
document.querySelectorAll('.tool-modes .tool').forEach(b => { b.onclick = () => setTool(b.dataset.tool); });

// =================== Animation ===================
const animState = new Map(); // id -> { startTime, reversed }
const easings = {
  'linear': t => t,
  'ease':         t => cubicBezierT(t, 0.25, 0.1, 0.25, 1),
  'ease-in':      t => cubicBezierT(t, 0.42, 0, 1, 1),
  'ease-out':     t => cubicBezierT(t, 0, 0, 0.58, 1),
  'ease-in-out':  t => cubicBezierT(t, 0.42, 0, 0.58, 1),
  'cubic':        t => t * t * t,
  'cubic-out':    t => 1 - Math.pow(1 - t, 3),
  'spring':       t => 1 - Math.cos(t * Math.PI * 0.5),
};
function cubicBezierT(t, x1, y1, x2, y2){
  const cx = 3 * x1, bx = 3 * (x2 - x1) - cx, ax = 1 - cx - bx;
  const cy = 3 * y1, by = 3 * (y2 - y1) - cy, ay = 1 - cy - by;
  let u = t;
  for (let i = 0; i < 8; i++) {
    const x = ((ax * u + bx) * u + cx) * u;
    const dx = (3*ax*u + 2*bx) * u + cx;
    if (Math.abs(dx) < 1e-6) break;
    u = u - (x - t) / Math.max(dx, 1e-6);
    if (u < 0) u = 0; else if (u > 1) u = 1;
  }
  return ((ay * u + by) * u + cy) * u;
}

function poseOf(mesh){
  return {
    position: mesh.position.toArray(),
    rotation: [mesh.rotation.x, mesh.rotation.y, mesh.rotation.z],
    scale: mesh.scale.toArray(),
  };
}
function applyPose(mesh, p){
  if (!p) return;
  mesh.position.fromArray(p.position);
  mesh.rotation.set(p.rotation[0], p.rotation[1], p.rotation[2]);
  mesh.scale.fromArray(p.scale);
}
function lerpPose(mesh, a, b, t){
  for (let i = 0; i < 3; i++) {
    mesh.position.setComponent(i, THREE.MathUtils.lerp(a.position[i], b.position[i], t));
    mesh.scale.setComponent(i, THREE.MathUtils.lerp(a.scale[i], b.scale[i], t));
  }
  const qa = new THREE.Quaternion().setFromEuler(new THREE.Euler(a.rotation[0], a.rotation[1], a.rotation[2]));
  const qb = new THREE.Quaternion().setFromEuler(new THREE.Euler(b.rotation[0], b.rotation[1], b.rotation[2]));
  mesh.quaternion.slerpQuaternions(qa, qb, t);
}

function ensureAnim(o){
  if (!o.animation) o.animation = { duration: 2, easing: 'ease-in-out', playMode: 'once', from: null, to: null };
  return o.animation;
}
function easingLabel(v){
  return ({ 'linear': 'Linear', 'ease': 'Ease (CSS)', 'ease-in': 'Ease-in (CSS)', 'ease-out': 'Ease-out (CSS)', 'ease-in-out': 'Ease-in-out (CSS)', 'cubic': 'Cubic', 'cubic-out': 'Cubic-out', 'spring': 'Spring' })[v] || v;
}
function playAnim(o){
  const a = ensureAnim(o);
  if (!a.from || !a.to) { toast('先に開始と終了を記録してください', 'error'); return; }
  applyPose(o.mesh, a.from);
  animState.set(o.id, { startTime: performance.now(), reversed: false });
}
function stopAnim(o){
  animState.delete(o.id);
}
function tickAnim(now){
  for (const [id, s] of animState) {
    const o = objects.get(id);
    if (!o || !o.animation) { animState.delete(id); continue; }
    const a = o.animation;
    const dur = Math.max(50, (a.duration || 1) * 1000);
    let t = (now - s.startTime) / dur;
    let doneSide = false;
    if (t >= 1) { t = 1; doneSide = true; }
    const eased = (easings[a.easing] || easings.linear)(t);
    const from = s.reversed ? a.to : a.from;
    const to = s.reversed ? a.from : a.to;
    lerpPose(o.mesh, from, to, eased);
    if (doneSide) {
      if (a.playMode === 'once') {
        animState.delete(id);
      } else if (a.playMode === 'loop') {
        s.startTime = now;
      } else if (a.playMode === 'pingpong') {
        s.reversed = !s.reversed;
        s.startTime = now;
      }
    }
  }
}

// =================== Duration wheel (iOS-style) ===================
function buildDurWheel(containerId, value, onChange){
  const el = document.getElementById(containerId);
  if (!el) return;
  const vals = [];
  for (let i = 1; i <= 200; i++) vals.push(Math.round(i * 0.1 * 10) / 10); // 0.1..20.0
  const items = vals.map(v => `<div class="item" data-v="${v}">${v.toFixed(1)}s</div>`).join('');
  el.innerHTML = `<div class="dur-selbar"></div><div class="dur-track">
    <div class="pad"></div>${items}<div class="pad"></div>
  </div>`;
  const track = el.querySelector('.dur-track');
  const all = [...el.querySelectorAll('.item')];
  const H = 44;
  const idx = Math.max(0, vals.findIndex(v => Math.abs(v - value) < 0.05));
  requestAnimationFrame(() => { track.scrollTop = idx * H; markSelected(); });
  function markSelected(){
    const sel = Math.round(track.scrollTop / H);
    all.forEach((it, i) => it.classList.toggle('selected', i === sel));
    const v = vals[Math.max(0, Math.min(vals.length - 1, sel))];
    onChange(v);
  }
  let st = null;
  track.addEventListener('scroll', () => {
    clearTimeout(st);
    markSelected();
    st = setTimeout(() => {
      const sel = Math.round(track.scrollTop / H);
      track.scrollTo({ top: sel * H, behavior: 'smooth' });
    }, 120);
  });
  all.forEach((it, i) => it.onclick = () => track.scrollTo({ top: i * H, behavior: 'smooth' }));
}

// =================== Loop ===================
(function loop(now){
  requestAnimationFrame(loop);
  orbit.update();
  pivotMarker.position.copy(orbit.target);
  tickAnim(now || performance.now());
  renderer.render(scene, camera);
})();

// =================== Mobile panel toggles ===================
(function setupMobileToggles(){
  const L = document.querySelector('.panel-left');
  const R = document.querySelector('.panel-right');
  const btnL = document.getElementById('mob-left');
  const btnR = document.getElementById('mob-right');
  if (btnL) btnL.onclick = () => { L.classList.toggle('open'); R.classList.remove('open'); };
  if (btnR) btnR.onclick = () => { R.classList.toggle('open'); L.classList.remove('open'); };
  // Tap outside closes
  document.addEventListener('pointerdown', e => {
    if (!window.matchMedia('(max-width: 820px)').matches) return;
    if (e.target.closest('.panel-left, .panel-right, .mob-toggle')) return;
    L.classList.remove('open'); R.classList.remove('open');
  });
})();

// =================== Keyboard tool shortcuts ===================
window.addEventListener('keydown', e => {
  if (e.target.matches('input, textarea, select')) return;
  if (e.key === 'p' || e.key === 'P') setTool('paint');
  if (e.key === 'c' || e.key === 'C') setTool('carve');
  if (e.key === 'b' || e.key === 'B') setTool('bump');
  if (e.key === 'n' || e.key === 'N') setTool('none');
  if (e.key === 'k' || e.key === 'K') setTool('pencil');
  if (e.key === 'x' || e.key === 'X') setTool('eraser');
  // T = add Text (quick)
  if (e.key === 't' || e.key === 'T') addText();
});
