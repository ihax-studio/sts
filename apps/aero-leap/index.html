<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#bfe2ff">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="assets/arcade.png">
<title>Aero Leap</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{width:100%;height:100%;overflow:hidden;background:transparent;
    font-family:-apple-system,"SF Pro Text","SF Pro Display",system-ui,"Helvetica Neue",sans-serif;
    user-select:none;-webkit-user-select:none;color-scheme:light dark;}
  canvas{display:block;position:fixed;inset:0;width:100%;height:100%;}

  /* ---- Full-screen tap surface backing a REAL switch so iOS fires one
         genuine haptic per tap (the finger toggles a real control). ---- */
  .tap-haptic{position:fixed;inset:0;z-index:4;margin:0;display:block;touch-action:none;}
  .tap-haptic input{position:absolute;inset:0;width:100%;height:100%;margin:0;opacity:0;
    -webkit-appearance:switch;appearance:auto;border:0;background:transparent;}

  /* ---- HUD — frosted, borderless, SF Pro, minimal ---- */
  .hud{position:fixed;inset:0;pointer-events:none;z-index:20;
    padding:env(safe-area-inset-top,12px) env(safe-area-inset-right,12px) env(safe-area-inset-bottom,12px) env(safe-area-inset-left,12px);}
  .frost{
    background:rgba(255,255,255,0.16);
    backdrop-filter:blur(22px) saturate(1.5);
    -webkit-backdrop-filter:blur(22px) saturate(1.5);
    border-radius:20px;
    box-shadow:0 6px 24px rgba(0,40,90,0.18), inset 0 1px 0 rgba(255,255,255,0.5);
    color:#fff;text-shadow:0 1px 3px rgba(0,30,70,0.4);
  }
  .top{position:absolute;top:max(14px,env(safe-area-inset-top,14px));left:14px;right:14px;
    display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .panel{padding:9px 14px;display:flex;flex-direction:column;gap:2px;line-height:1.2;}
  .course-name{font-size:13px;font-weight:700;letter-spacing:0.04em;}
  .course-sub{font-size:10px;font-weight:500;opacity:0.8;letter-spacing:0.08em;text-transform:uppercase;}
  .score-row{font-size:11px;opacity:0.92;margin-top:1px;}
  .right-panel{align-items:flex-end;}
  .top .panel:not(.right-panel){display:none;}   /* 左上のコース/Score(clearとか)は非表示=そこに色選択(bgPick)を出す */
  .hearts{font-size:16px;letter-spacing:1px;}
  /* ★残機ハートを上部中央に5個・ハートのみ(combo横の旧表示は廃止) */
  .hearts-center{position:fixed;top:calc(env(safe-area-inset-top,0px) + 14px);left:50%;transform:translateX(-50%);font-size:24px;letter-spacing:4px;color:#ff3b6b;text-shadow:0 2px 9px rgba(0,0,0,.4);z-index:6;pointer-events:none;white-space:nowrap;}
  .combo{display:none;}  /* コンボ表示は出さない(ユーザ要望) */

  /* ---- Left course rail (tap a dot to glide back to that course) ---- */
  .rail{position:fixed;left:max(14px,env(safe-area-inset-left,14px));top:50%;
    transform:translateY(-50%);z-index:21;display:flex;flex-direction:column;
    align-items:center;gap:0;pointer-events:none;}
  .rail-line{position:absolute;top:8px;bottom:8px;left:50%;width:4px;transform:translateX(-50%);
    border-radius:4px;background:linear-gradient(to bottom,rgba(120,230,255,0.9),rgba(120,230,255,0.5));
    box-shadow:0 0 10px rgba(120,230,255,0.7);}
  .rail-fill{position:absolute;top:8px;left:50%;width:4px;transform:translateX(-50%);
    border-radius:4px;background:#7fe9ff;box-shadow:0 0 14px rgba(140,240,255,0.95);transition:height .35s ease;}
  .dot{position:relative;width:26px;height:26px;margin:9px 0;border-radius:50%;
    display:flex;align-items:center;justify-content:center;cursor:pointer;pointer-events:auto;
    background:rgba(255,255,255,0.35);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    box-shadow:0 2px 8px rgba(0,30,70,0.35),inset 0 1px 0 rgba(255,255,255,0.8);
    transition:transform .18s ease,opacity .25s ease,background .25s ease;}
  .dot input{position:absolute;inset:0;width:100%;height:100%;opacity:0;margin:0;-webkit-appearance:auto;}
  .dot .glyph{font-size:12px;line-height:1;filter:drop-shadow(0 1px 1px rgba(0,30,70,0.4));}
  .dot.locked{opacity:0.32;pointer-events:none;}
  .dot.active{transform:scale(1.32);background:rgba(255,255,255,0.92);}
  .dot.active .glyph{filter:none;}

  /* ---- Action buttons (frosted circles, each a real switch for haptic) ---- */
  .actions{position:fixed;right:max(14px,env(safe-area-inset-right,14px));
    bottom:max(16px,env(safe-area-inset-bottom,16px));z-index:21;display:flex;gap:10px;}
  .ctl{position:relative;width:46px;height:46px;border-radius:50%;display:flex;align-items:center;
    justify-content:center;cursor:pointer;color:#fff;font-size:18px;
    background:rgba(255,255,255,0.18);backdrop-filter:blur(18px) saturate(1.4);
    -webkit-backdrop-filter:blur(18px) saturate(1.4);
    box-shadow:0 4px 16px rgba(0,30,70,0.25),inset 0 1px 0 rgba(255,255,255,0.6);
    text-shadow:0 1px 2px rgba(0,30,70,0.4);transition:transform .12s ease;}
  .ctl:active{transform:scale(0.9);}
  .ctl input{position:absolute;inset:0;width:100%;height:100%;opacity:0;margin:0;-webkit-appearance:auto;}
  .ctl .glyph{pointer-events:none;}

  /* ---- Charge gauge ---- */
  .charge{position:fixed;left:50%;bottom:20%;transform:translateX(-50%) scale(.6);
    width:190px;height:10px;opacity:0;transition:opacity .18s ease,transform .18s ease;
    pointer-events:none;z-index:21;}
  .charge.show{opacity:1;transform:translateX(-50%) scale(1);}
  .charge .track{width:100%;height:100%;border-radius:999px;overflow:hidden;
    background:rgba(0,30,70,0.35);backdrop-filter:blur(8px);box-shadow:inset 0 1px 3px rgba(0,0,40,0.5);}
  .charge .fill{height:100%;width:0%;border-radius:999px;
    background:linear-gradient(to right,#9ee6ff,#5fe0a0 50%,#ffe060 80%,#ff8060);
    box-shadow:0 0 14px rgba(180,230,255,0.9);transition:width .04s linear;}
  .charge .lbl{position:absolute;left:0;right:0;top:-17px;text-align:center;color:#fff;
    font-size:9px;font-weight:700;letter-spacing:0.22em;text-shadow:0 1px 3px rgba(0,30,70,0.7);}

  /* ---- Hint ---- */
  .hint{position:fixed;left:50%;top:58%;transform:translate(-50%,0);color:#fff;text-align:center;
    font-size:13px;font-weight:600;letter-spacing:0.12em;z-index:21;pointer-events:none;
    text-shadow:0 2px 6px rgba(0,30,70,0.7);opacity:0;transition:opacity .4s ease;}
  .hint.show{opacity:0.92;}
  .hint small{display:block;font-size:10px;font-weight:400;opacity:0.75;margin-top:5px;letter-spacing:0.05em;}

  /* ---- Score popups ---- */
  #popLayer{position:fixed;inset:0;pointer-events:none;z-index:22;}
  .pop{position:absolute;color:#fff;font-weight:800;font-size:18px;
    text-shadow:0 0 10px rgba(255,255,255,.9),0 0 18px rgba(150,230,140,.8),0 2px 3px rgba(0,30,70,.6);
    animation:floatUp 1s ease-out forwards;}
  @keyframes floatUp{0%{opacity:0;transform:translateY(0) scale(.6);}
    20%{opacity:1;transform:translateY(-12px) scale(1.2);}100%{opacity:0;transform:translateY(-64px) scale(1);}}

  /* ---- Hello intro (glass / SF Pro) ---- */
  .hello{position:fixed;inset:0;z-index:40;display:flex;flex-direction:column;align-items:center;
    justify-content:center;cursor:pointer;background:transparent;
    backdrop-filter:blur(34px) saturate(1.3);-webkit-backdrop-filter:blur(34px) saturate(1.3);
    transition:opacity .7s ease;}
  .hello.hide{opacity:0;pointer-events:none;}
  .hello canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
  .hello .cont{position:absolute;bottom:14%;color:rgba(255,255,255,0.7);font-size:17px;font-weight:400;
    animation:breathe 2.4s ease-in-out infinite;}
  @keyframes breathe{0%,100%{opacity:0.5;}50%{opacity:0.95;}}

  /* ---- Clear / game-over ---- */
  .over{position:fixed;inset:0;z-index:41;display:none;flex-direction:column;align-items:center;
    justify-content:center;background:radial-gradient(ellipse at center,rgba(0,20,60,.25),rgba(0,10,40,.65));
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);pointer-events:auto;}
  .over.show{display:flex;}
  .over h1{color:#fff;font-size:40px;font-weight:700;letter-spacing:0.02em;
    text-shadow:0 0 24px rgba(140,210,255,.7),0 4px 6px rgba(0,30,70,.6);margin-bottom:8px;}
  .over .sub{color:rgba(255,255,255,.85);font-size:14px;letter-spacing:0.06em;margin-bottom:26px;}
  .over .again{position:relative;padding:14px 38px;border-radius:999px;color:#fff;font-size:15px;font-weight:600;
    letter-spacing:0.08em;cursor:pointer;border:0;
    background:rgba(255,255,255,0.18);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    box-shadow:0 6px 24px rgba(0,30,70,0.4),inset 0 1px 0 rgba(255,255,255,0.6);}
  .over .again input{position:absolute;inset:0;width:100%;height:100%;opacity:0;margin:0;}

  /* 🫨 build toggle — sits at the TOP of the rail (hidden until the first clear) */
  .build-btn{position:relative;width:40px;height:40px;font-size:20px;margin-bottom:8px;z-index:22;pointer-events:auto;display:none;}
  .build-btn.avail{display:flex;}
  .build-btn.on{background:rgba(124,230,255,0.5);box-shadow:0 0 0 2px rgba(255,255,255,.6),0 4px 16px rgba(0,40,90,.35);}

  /* Play / Edit glass buttons (right) */
  .modeBtns{position:fixed;right:max(14px,env(safe-area-inset-right,14px));top:50%;transform:translateY(-50%) translateX(120%);z-index:23;
    display:flex;flex-direction:column;gap:12px;opacity:0;pointer-events:none;transition:transform .5s ease,opacity .5s ease;}
  .modeBtns.show{transform:translateY(-50%) translateX(0);opacity:1;pointer-events:auto;}
  .modebtn{position:relative;width:58px;height:58px;border-radius:18px;cursor:pointer;
    background-size:66% 66%;background-position:center;background-repeat:no-repeat;
    background-color:rgba(255,255,255,0.16);backdrop-filter:blur(18px) saturate(1.4);-webkit-backdrop-filter:blur(18px) saturate(1.4);
    box-shadow:0 4px 16px rgba(0,30,70,0.3),inset 0 1px 0 rgba(255,255,255,0.6);transition:transform .12s ease,box-shadow .2s;}
  .modebtn:active{transform:scale(.92);}
  .modebtn input{position:absolute;inset:0;width:100%;height:100%;opacity:0;margin:0;}
  .modebtn.play{border-radius:88px;background-image:url(assets/arcade.png);}
  .modebtn.edit{background-image:url(assets/prefs.png);}
  .modebtn.sel{box-shadow:0 0 0 2.5px #7ce6ff,0 6px 16px rgba(0,40,90,.45);}

  /* drag-to-delete trash (edit mode, bottom-left) */
  .trash{position:fixed;left:max(10px,env(safe-area-inset-left,10px));bottom:max(26px,calc(env(safe-area-inset-bottom,0px) + 26px));
    width:66px;height:66px;z-index:46;background:url(assets/trash.png) center/contain no-repeat;cursor:pointer;
    opacity:0;transform:translateY(40px) scale(.7);transition:opacity .7s ease,transform .7s ease,filter .3s ease;pointer-events:none;}
  .trash.show{opacity:1;transform:translateY(0) scale(1);pointer-events:auto;}
  /* armed (delete-mode) — iOS-style quick red glow + pulse */
  .trash.armed{filter:drop-shadow(0 0 16px rgba(255,64,64,1)) brightness(1.08);animation:trashPulse 0.9s ease-in-out infinite;}
  @keyframes trashPulse{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(0) scale(1.12);}}
  .trash.hot{filter:drop-shadow(0 0 18px rgba(255,80,80,1));}

  /* background colour picker — small frosted swatch (opens native OS palette) */
  .bgpick{position:fixed;left:max(14px,env(safe-area-inset-left,14px));top:max(14px,env(safe-area-inset-top,14px));
    width:40px;height:40px;border-radius:50%;z-index:22;cursor:pointer;overflow:hidden;
    box-shadow:0 4px 14px rgba(0,30,70,.3),inset 0 1px 0 rgba(255,255,255,.6);border:2px solid rgba(255,255,255,.7);}
  .bgpick input{position:absolute;inset:-6px;width:140%;height:140%;border:0;padding:0;cursor:pointer;background:transparent;}

  /* clear celebration — message fades over 0.8s while 3D dots spread */
  .clearfx{position:fixed;inset:0;z-index:44;display:none;align-items:center;justify-content:center;pointer-events:none;}
  .clearfx.show{display:flex;animation:clearFade .8s ease forwards;}
  .clearfx-msg{color:#fff;font-size:36px;font-weight:700;letter-spacing:.02em;
    text-shadow:0 0 26px rgba(140,210,255,.85),0 4px 8px rgba(0,30,70,.6);}
  @keyframes clearFade{0%{opacity:0;transform:scale(.8);}30%{opacity:1;transform:scale(1);}100%{opacity:0;transform:scale(1.1);}}

  /* restart confirm — transparent blur, borderless, SF Pro */
  .confirm{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;
    backdrop-filter:blur(26px) saturate(1.2);-webkit-backdrop-filter:blur(26px) saturate(1.2);
    opacity:0;transition:opacity .7s ease;pointer-events:none;}
  .confirm.show{display:flex;opacity:1;pointer-events:auto;}
  .confirm-card{max-width:80vw;text-align:center;color:#fff;
    font-family:-apple-system,"SF Pro Display","SF Pro Text",system-ui,sans-serif;
    text-shadow:0 1px 6px rgba(0,30,70,.5);}
  .confirm-card h2{font-size:26px;font-weight:600;letter-spacing:0.01em;margin-bottom:10px;}
  .confirm-card p{font-size:14px;font-weight:400;opacity:0.85;line-height:1.5;margin-bottom:24px;}
  .confirm-card .row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
  .confirm-card button{padding:12px 26px;border:0;border-radius:999px;font-size:15px;font-weight:600;cursor:pointer;
    font-family:inherit;color:#fff;background:rgba(255,255,255,0.18);backdrop-filter:blur(16px);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.5),0 4px 16px rgba(0,30,70,.35);}
  .confirm-card button.danger{background:linear-gradient(to bottom,#ff8a8a,#e8344f);}

  /* OS X 10.4-style Dock */
  .dock{position:fixed;left:50%;bottom:max(14px,env(safe-area-inset-bottom,14px));transform:translateX(-50%) translateY(140%);
    z-index:45;display:flex;flex-direction:column;align-items:center;gap:8px;opacity:0;transition:transform .5s ease,opacity .5s ease;pointer-events:none;max-width:94vw;}
  .dock.show{transform:translateX(-50%) translateY(0);opacity:1;pointer-events:auto;}
  .dock-row{display:flex;align-items:center;gap:10px;}
  .dock-inner{display:flex;gap:8px;padding:8px 12px;border-radius:20px;flex-wrap:nowrap;overflow-x:auto;max-width:80vw;
    background:linear-gradient(to bottom,rgba(255,255,255,0.55),rgba(220,235,250,0.28));
    backdrop-filter:blur(24px) saturate(1.5);-webkit-backdrop-filter:blur(24px) saturate(1.5);
    box-shadow:0 8px 30px rgba(0,40,90,0.3),inset 0 1px 0 rgba(255,255,255,0.9),inset 0 -1px 0 rgba(0,30,70,0.15);}
  .dock-inner::-webkit-scrollbar{display:none;}
  /* thin flat power button — reveals the reset slider */
  .powerbtn{width:36px;height:36px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.85);background:rgba(255,255,255,0.14);
    color:#fff;font-size:16px;cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0;
    backdrop-filter:blur(10px);box-shadow:inset 0 1px 0 rgba(255,255,255,.4),0 2px 8px rgba(0,30,70,.25);}
  .dock.build .powerbtn{display:flex;}
  .powerbtn.on{background:rgba(124,230,255,0.45);box-shadow:0 0 0 2px rgba(255,255,255,.6);}
  .tile{position:relative;width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;
    font-size:26px;cursor:pointer;flex-shrink:0;
    background:linear-gradient(to bottom,rgba(255,255,255,0.7),rgba(255,255,255,0.12));
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.9),0 2px 6px rgba(0,30,70,0.25);transition:transform .12s ease;}
  .tile:active{transform:scale(.9);}
  .tile.sel{transform:scale(1.18) translateY(-6px);box-shadow:0 0 0 2px #7ce6ff,0 6px 14px rgba(0,40,90,.4);}
  .tile .cnt{position:absolute;right:-3px;top:-3px;min-width:16px;height:16px;padding:0 4px;border-radius:999px;
    background:#ff3b6b;color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;
    box-shadow:0 1px 3px rgba(0,0,0,.3);}
  .tile.erase{font-size:22px;}

  /* slide-to-reset — revealed by the power button with a 0.7s ease (both ways) */
  .slide-reset{position:relative;width:210px;height:0;border-radius:999px;display:flex;align-items:center;overflow:hidden;opacity:0;
    background:rgba(0,30,70,0.28);backdrop-filter:blur(10px);box-shadow:inset 0 1px 3px rgba(0,0,40,.5);
    transition:height .7s ease,opacity .7s ease,margin-top .7s ease;margin-top:0;}
  .dock.reset-open .slide-reset{height:34px;opacity:1;margin-top:8px;}
  .sr-fill{position:absolute;left:0;top:0;bottom:0;width:0;border-radius:999px;background:linear-gradient(to right,#ff8a8a,#e83a5a);}
  .sr-knob{position:absolute;left:2px;top:2px;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    color:#1a3a5a;font-size:15px;cursor:grab;z-index:2;
    background:radial-gradient(circle at 35% 30%,#fff,#cfe2f0);box-shadow:0 2px 5px rgba(0,30,70,.4);}
  .sr-label{position:absolute;left:0;right:0;text-align:center;color:rgba(255,255,255,.85);font-size:11px;letter-spacing:.08em;pointer-events:none;}

  @media (max-width:480px){.hello h1{font-size:52px;} .tile{width:42px;height:42px;font-size:22px;}}
</style>
</head>
<body>
<canvas id="game"></canvas>

<!-- Real switch behind the whole play area → one guaranteed haptic per tap -->
<label class="tap-haptic" id="tapSurface"><input type="checkbox" switch aria-hidden="true"></label>

<div class="hud">
  <div class="hearts-center" id="hearts">♥♥♥♡♡</div>
  <div class="top">
    <div class="frost panel">
      <div class="course-name" id="courseName">Aero Pond</div>
      <div class="course-sub" id="courseSub">Course 1 / 7</div>
      <div class="score-row">Score <span id="scoreText">0</span></div>
    </div>
    <div class="frost panel right-panel">
      <div class="combo" id="combo">COMBO ×0</div>
    </div>
  </div>
</div>

<!-- Left course rail — 🫨 sits at the TOP (above the fish & flower dots) -->
<div class="rail" id="rail">
  <label class="ctl build-btn" id="buildBtn"><input type="checkbox" switch aria-hidden="true"><span class="glyph">🫨</span></label>
  <div class="rail-line"></div>
  <div class="rail-fill" id="railFill" style="height:0"></div>
</div>

<!-- Play / Edit mode buttons (right, glass) -->
<div class="modeBtns" id="modeBtns">
  <label class="modebtn play" id="playBtn" title="Play"><input type="checkbox" switch aria-hidden="true"></label>
  <label class="modebtn edit" id="editBtn" title="Edit"><input type="checkbox" switch aria-hidden="true"></label>
</div>

<!-- Background colour picker (native OS palette) -->
<label class="bgpick" id="bgPick" title="Background"><input type="color" id="bgColor" value="#3a82d0"></label>

<!-- Drag-to-delete trash (bottom-left). Tap = reset access; in edit also deletes items -->
<div class="trash" id="trash"></div>

<!-- Clear celebration (dots spread + 0.8s fade) -->
<div class="clearfx" id="clearfx"><div class="clearfx-msg">Heaven Reached ✦</div></div>

<!-- Restart-from-beginning confirm (blur, borderless, SF Pro) -->
<div class="confirm" id="confirm"><div class="confirm-card" id="confirmCard"></div></div>

<!-- OS X 10.4-style Dock: collected G4-Cube items (also the builder palette) -->
<div class="dock" id="dock">
  <div class="dock-row">
    <div class="dock-inner" id="dockInner"></div>
    <button class="powerbtn" id="powerBtn" title="reset slider">⏻</button>
  </div>
  <div class="slide-reset" id="slideReset">
    <div class="sr-fill" id="srFill"></div>
    <div class="sr-knob" id="srKnob">⟲</div>
    <span class="sr-label">slide to reset →</span>
  </div>
</div>

<div class="charge" id="charge">
  <div class="lbl">LEAP POWER</div>
  <div class="track"><div class="fill" id="chargeFill"></div></div>
</div>

<div class="hint" id="hint">HOLD ANYWHERE TO LEAP
  <small>release to jump · tap in air for a rescue hop</small></div>

<div id="popLayer"></div>

<div class="hello" id="hello">
  <canvas id="helloCanvas"></canvas>
  <div class="cont">Tap to continue</div>
</div>

<div class="over" id="over">
  <h1 id="overTitle">Splash!</h1>
  <p class="sub">Reached <span id="overCourse">—</span> · Score <span id="overScore">0</span></p>
  <label class="again" id="againBtn"><input type="checkbox" switch aria-hidden="true">LEAP AGAIN</label>
</div>

<!-- BGM: iLoop1 = intro/menu loop, iLoop2 = gameplay loop. OSX.mp3 = clear sting (placeholder). -->
<!-- BGM + SFX are loaded in JS (Web Audio on http, HTMLAudio on file://). -->


<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

// ============================================================
// Candy glass dolphin tones (key lime, lime, blueberry, tangerine, indigo)
// ============================================================

// ---- Sky shader ----
const P0 = PALETTES.AeroPond.sky;
const skyU = {
  topColor:{value:P0.top.clone()}, midColor:{value:P0.mid.clone()}, horizonCol:{value:P0.horizon.clone()},
  sunDir:{value:P0.sunDir.clone()}, sunColor:{value:P0.sunCol.clone()},
};
const skyMat = new THREE.ShaderMaterial({
  side:THREE.BackSide, depthWrite:false, uniforms:skyU,
  vertexShader:`varying vec3 vDir; void main(){ vec4 wp=modelMatrix*vec4(position,1.0); vDir=normalize(wp.xyz); gl_Position=projectionMatrix*viewMatrix*wp; }`,
  fragmentShader:`varying vec3 vDir; uniform vec3 topColor,midColor,horizonCol,sunColor,sunDir;
    void main(){ vec3 d=normalize(vDir); float h=clamp(d.y*0.5+0.5,0.0,1.0);
      vec3 col=mix(horizonCol,midColor,smoothstep(0.0,0.55,h)); col=mix(col,topColor,smoothstep(0.45,1.0,h));
      float sd=max(dot(d,normalize(sunDir)),0.0);
      col+=sunColor*pow(sd,240.0)*1.6; col+=sunColor*pow(sd,16.0)*0.18; col+=sunColor*pow(sd,4.0)*0.06;
      gl_FragColor=vec4(col,1.0);}`,
});
const sky=new THREE.Mesh(new THREE.SphereGeometry(340,48,32), skyMat); scene.add(sky);

// ---- Clouds ----
const cloudMat = new THREE.ShaderMaterial({
  transparent:true, depthWrite:false,
  uniforms:{tint:{value:C(0xffffff)},opacity:{value:0.9}},
  vertexShader:`varying vec2 vUv; void main(){vUv=uv; gl_Position=projectionMatrix*viewMatrix*modelMatrix*vec4(position,1.0);}`,
  fragmentShader:`varying vec2 vUv; uniform vec3 tint; uniform float opacity;
    float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
    float noise(vec2 p){vec2 i=floor(p),f=fract(p);float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));vec2 u=f*f*(3.0-2.0*f);return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);}
    float fbm(vec2 p){float v=0.0,a=0.5;for(int i=0;i<5;i++){v+=a*noise(p);p*=2.05;a*=0.5;}return v;}
    void main(){vec2 uv=vUv-0.5;float r=length(uv*vec2(1.0,1.6));float n=fbm(vUv*4.0);
      float shape=smoothstep(0.55,0.15,r-n*0.18);float light=mix(0.78,1.05,smoothstep(0.0,1.0,vUv.y+n*0.2));
      gl_FragColor=vec4(tint*light,shape*opacity);}`,
});

// ---- Water surface (waves via vertex displacement) ----
const waterU={time:{value:0}};
const W0=PALETTES.AeroPond.water;

  color:W0.color.clone(),metalness:W0.metalness,roughness:W0.roughness,transmission:W0.transmission,
  thickness:2.5,ior:1.33,attenuationColor:W0.atten.clone(),attenuationDistance:4.5,
  clearcoat:1.0,clearcoatRoughness:0.04,envMapIntensity:1.4,transparent:true,side:THREE.DoubleSide,
});
waterMat.onBeforeCompile=(sh)=>{
  sh.uniforms.time=waterU.time;
  sh.vertexShader=sh.vertexShader
    .replace('#include <common>',`#include <common>
       uniform float time;
       float waveH(vec2 p){return sin(p.x*0.55+time*1.1)*0.07+sin(p.y*0.45+time*0.85)*0.06+sin((p.x+p.y)*0.32+time*1.5)*0.04+sin(p.x*1.6-time*0.7)*0.02;}
       vec3 waveN(vec2 p){float ex=0.55*cos(p.x*0.55+time*1.1)*0.07+0.32*cos((p.x+p.y)*0.32+time*1.5)*0.04+1.6*cos(p.x*1.6-time*0.7)*0.02;
         float ey=0.45*cos(p.y*0.45+time*0.85)*0.06+0.32*cos((p.x+p.y)*0.32+time*1.5)*0.04; return normalize(vec3(-ex,-ey,1.0));}`)
    .replace('#include <beginnormal_vertex>',`vec3 objectNormal=waveN(position.xy);
       #ifdef USE_TANGENT
       vec3 objectTangent=vec3(1.0,0.0,0.0);
       #endif`)
    .replace('#include <begin_vertex>',`vec3 transformed=vec3(position); transformed.z+=waveH(position.xy);`);
};

function glassMat(opts={}){
  // crisp Frutiger-Aero glass: low roughness + tight clearcoat + strong env reflections
  return new THREE.MeshPhysicalMaterial(Object.assign({
    color:0xffffff,metalness:0,roughness:0.02,transmission:1.0,thickness:0.6,ior:1.34,

  },opts));
}

// ----- Lily pad (curled disc) -----
const padDisc = new THREE.CircleGeometry(1,40);
{ const pos=padDisc.attributes.position;
  for(let i=0;i<pos.count;i++){const x=pos.getX(i),y=pos.getY(i);pos.setZ(i,Math.pow(Math.sqrt(x*x+y*y),2.2)*0.18);}
  padDisc.computeVertexNormals(); }
function makeLilyPad(r,flower,hue){
  const mat=new THREE.MeshPhysicalMaterial({
    color:new THREE.Color().setHSL(hue??(0.27+Math.random()*0.05),0.7,0.35+Math.random()*0.08),
    metalness:0,roughness:0.45,clearcoat:0.85,clearcoatRoughness:0.18,sheen:0.5,
    sheenColor:C(0xa8e070),envMapIntensity:0.9,side:THREE.DoubleSide});
  const m=new THREE.Mesh(padDisc,mat); m.scale.setScalar(r); m.rotation.x=-Math.PI/2; m.rotation.z=Math.random()*Math.PI*2;
  m.userData.rotZ=m.rotation.z;
  if(flower){const f=makeLotus(); f.rotation.x=Math.PI/2; f.scale.setScalar(0.6/r); f.userData.isFlower=true; m.add(f); m.userData.flower=true;}
  return m;
}
function makeLotus(){
  const g=new THREE.Group();
  const sh=new THREE.Shape(); sh.moveTo(0,0); sh.quadraticCurveTo(0.15,0.18,0,0.45); sh.quadraticCurveTo(-0.15,0.18,0,0);
  const geo=new THREE.ShapeGeometry(sh,8);
  { const p=geo.attributes.position; for(let i=0;i<p.count;i++){const y=p.getY(i);p.setZ(i,Math.pow(y/0.45,2)*0.08);} geo.computeVertexNormals(); }
  const pm=new THREE.MeshPhysicalMaterial({color:0xffb0c8,roughness:0.35,transmission:0.35,thickness:0.1,ior:1.4,
    clearcoat:0.6,sheen:1.0,sheenColor:C(0xfff0f8),side:THREE.DoubleSide,transparent:true});
  for(let i=0;i<8;i++){const p=new THREE.Mesh(geo,pm);p.rotation.z=i/8*Math.PI*2;p.rotation.x=-0.6;p.position.y=0.04;g.add(p);}
  for(let i=0;i<6;i++){const p=new THREE.Mesh(geo,pm.clone());p.material.color=C(0xffd0e0);p.scale.setScalar(0.7);p.rotation.z=i/6*Math.PI*2+0.2;p.rotation.x=-0.4;p.position.y=0.08;g.add(p);}
  const pi=new THREE.Mesh(new THREE.SphereGeometry(0.08,12,8), new THREE.MeshPhysicalMaterial({color:0xffd040,metalness:0.3,roughness:0.35,emissive:0xffaa20,emissiveIntensity:0.25}));
  pi.position.y=0.1; pi.scale.y=0.7; g.add(pi); return g;
}

const domeGeo=new THREE.SphereGeometry(1,36,24,0,Math.PI*2,0,Math.PI*0.52);

// ----- Coral mound (Aqua platform) -----
function makeCoral(r,flower){
  const g=new THREE.Group();
  const tone=[0xff7090,0xffa060,0xc060a0,0xff5570,0xe080d0][Math.floor(Math.random()*5)];
  const mat=new THREE.MeshPhysicalMaterial({color:tone,roughness:0.5,clearcoat:0.6,clearcoatRoughness:0.3,sheen:0.4,sheenColor:C(0xffe0e8)});
  const base=new THREE.Mesh(new THREE.SphereGeometry(r*0.95,22,16,0,Math.PI*2,0,Math.PI*0.6),mat);
  base.scale.y=0.65; g.add(base);
  for(let i=0;i<5;i++){const a=i/5*Math.PI*2;const lobe=new THREE.Mesh(new THREE.SphereGeometry(r*(0.28+Math.random()*0.18),14,10),mat);
    lobe.position.set(Math.cos(a)*r*0.7,r*0.25,Math.sin(a)*r*0.7); lobe.scale.y=1.4; g.add(lobe);}
  if(flower){const fl=makeLotus(); fl.scale.setScalar(0.5); fl.position.y=r*0.45; fl.userData.isFlower=true; g.add(fl); g.userData.flower=true;}
  g.userData.standY=r*0.5; return g;
}

// ----- Big leaf (Technozen) -----
function makeLeaf(r,flower){
  const sh=new THREE.Shape(); sh.moveTo(0,-1); sh.bezierCurveTo(0.9,-0.6,0.8,0.8,0,1.1); sh.bezierCurveTo(-0.8,0.8,-0.9,-0.6,0,-1);
  const geo=new THREE.ShapeGeometry(sh,24);
  { const p=geo.attributes.position; for(let i=0;i<p.count;i++){const x=p.getX(i);p.setZ(i,-Math.abs(x)*0.12);} geo.computeVertexNormals(); }
  const mat=new THREE.MeshPhysicalMaterial({color:new THREE.Color().setHSL(0.3,0.6,0.4),roughness:0.4,clearcoat:0.7,
    clearcoatRoughness:0.2,sheen:0.6,sheenColor:C(0xc8ffa0),transmission:0.15,thickness:0.2,side:THREE.DoubleSide});
  const m=new THREE.Mesh(geo,mat); m.scale.setScalar(r*1.15); m.rotation.x=-Math.PI/2; m.rotation.z=Math.random()*Math.PI*2;
  m.userData.rotZ=m.rotation.z;
  if(flower){const f=makeLotus();f.rotation.x=Math.PI/2;f.scale.setScalar(0.45/r);f.position.set(0,0,0.05);f.userData.isFlower=true;m.add(f);m.userData.flower=true;}
  return m;
}

// ----- Glass cube (Cybercore) -----
const cubeGeo=new THREE.BoxGeometry(1,1,1);
function makeCube(r,flower){
  const g=new THREE.Group();
  const mat=glassMat({color:0xdff2ff,roughness:0.06,transmission:0.92,thickness:1.2,
    emissive:0x66c8ff,emissiveIntensity:0.12,clearcoatRoughness:0.05});
  const w=r*1.7,h=r*1.25;
  const cube=new THREE.Mesh(cubeGeo,mat); cube.scale.set(w,h,w); cube.position.y=h/2; g.add(cube);
  const edges=new THREE.LineSegments(new THREE.EdgesGeometry(cubeGeo),
    new THREE.LineBasicMaterial({color:0x9fe6ff,transparent:true,opacity:0.7}));
  edges.scale.set(w,h,w); edges.position.y=h/2; g.add(edges);
  if(flower){const fl=new THREE.Mesh(new THREE.OctahedronGeometry(r*0.3),
      new THREE.MeshPhysicalMaterial({color:0x9fe6ff,emissive:0x40c0ff,emissiveIntensity:0.6,roughness:0.1,transmission:0.6,transparent:true}));
    fl.position.y=h+r*0.35; fl.userData.isFlower=true; g.add(fl); g.userData.flower=true; g.userData.spinGem=fl;}
  g.userData.standY=h; return g;
}

// ----- Rock + lotus leaf (Jungle) -----
function makeRock(r,flower){
  const g=new THREE.Group();
  const mat=new THREE.MeshStandardMaterial({color:0x7a7068,roughness:0.92,metalness:0.0});
  const rock=new THREE.Mesh(new THREE.IcosahedronGeometry(r*0.95,1),mat);
  const p=rock.geometry.attributes.position; for(let i=0;i<p.count;i++){const f=0.82+Math.random()*0.36;p.setXYZ(i,p.getX(i)*f,p.getY(i)*f,p.getZ(i)*f);} rock.geometry.computeVertexNormals();
  rock.scale.y=0.7; rock.position.y=r*0.2; g.add(rock);
  // mossy lily on top
  const moss=makeLilyPad(r*0.85,flower,0.32); moss.position.y=r*0.55; g.add(moss);
  g.userData.standY=r*0.55+0.05; if(flower) g.userData.flower=true; return g;
}

let _aeroTex=null;
function aeroTexture(){
  if(_aeroTex) return _aeroTex;

// ----- Waterfall (Jungle decor) -----
function makeWaterfall(w,h){
  const mat=new THREE.ShaderMaterial({transparent:true,depthWrite:false,side:THREE.DoubleSide,
    uniforms:{time:{value:0}},
    vertexShader:`varying vec2 vUv; void main(){vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader:`varying vec2 vUv; uniform float time;
      float hash(vec2 p){return fract(sin(dot(p,vec2(41.3,289.1)))*43758.5);}
      void main(){ float y=vUv.y-time*0.9; vec2 c=vec2(vUv.x*14.0,y*8.0);
        float n=hash(floor(c)); float streak=smoothstep(0.4,1.0,fract(n+vUv.x*7.0));
        float a=(0.5+0.5*streak)*smoothstep(0.0,0.15,vUv.x)*smoothstep(1.0,0.85,vUv.x);
        vec3 col=mix(vec3(0.6,0.85,1.0),vec3(1.0),streak);
        gl_FragColor=vec4(col,a*0.7);}`});
  const m=new THREE.Mesh(new THREE.PlaneGeometry(w,h),mat); m.userData.waterfall=mat; return m;
}

function makeEscalator(){
  const g=new THREE.Group();

  const steps=[];
  for(let i=0;i<14;i++){

    s.position.set(0,i*0.42,-i*0.7); g.add(s); steps.push(s);

  const railMat=new THREE.MeshStandardMaterial({color:0xcfe6ff,metalness:0.6,roughness:0.2,transparent:true,opacity:0.5});

    rail.position.set(sx,3.0,-4.5); rail.rotation.x=-Math.atan2(0.42,0.7); g.add(rail);

  g.userData.steps=steps; return g;
}

function padTypeFor(key,alt){
  switch(key){
    case 'AeroPond': return 'lily';
    case 'HelveticaAqua': return alt? 'coral':'bubble';
    case 'Technozen': return alt? 'leaf':'springg';   // green mochi = spring
    case 'Cybercore': return 'cube';
    case 'JungleAero': return alt? 'rock':'lotusleaf';
    case 'RetroApple': return alt? 'imac':'ipod';
    case 'ClearGoal': return alt? 'shell':'ipod';      // glass shells + aero iPods
  }
  return 'lily';
}
function buildPadMesh(type,r,flower){
  switch(type){
    case 'lily':      return {mesh:makeLilyPad(r,flower),standY:0.05};
    case 'lotusleaf': return {mesh:makeLilyPad(r,flower,0.33),standY:0.05};
    case 'bubble':    return {mesh:makeDome(r,0xffffff,flower),standY:r*0.55};
    case 'drop':      return {mesh:makeDome(r,0xbfffd0,flower),standY:r*0.55};
    case 'coral':     {const m=makeCoral(r,flower);return {mesh:m,standY:m.userData.standY};}
    case 'leaf':      return {mesh:makeLeaf(r,flower),standY:0.06};
    case 'cube':      {const m=makeCube(r,flower);return {mesh:m,standY:m.userData.standY};}
    case 'rock':      {const m=makeRock(r,flower);return {mesh:m,standY:m.userData.standY};}
    case 'imac':      {const m=makeIMac(r);return {mesh:m,standY:m.userData.standY};}
    case 'ipod':      {const m=makeIPod(r,true);return {mesh:m,standY:m.userData.standY};}
    case 'shell':     {const m=makeShell(r);return {mesh:m,standY:m.userData.standY};}
    case 'spring':    return makeSpring(r,0x8fe8ff);
    case 'springb':   return makeSpring(r,0x2a5ad6);
    case 'springg':   return makeSpring(r,0x7fe04a);
    case 'updraft':   return makeUpdraft(r);
  }
  return {mesh:makeLilyPad(r,flower),standY:0.05};
}
function spawnPad(key,z,x,r,opts={}){
  const type=opts.type||padTypeFor(key,opts.alt);
  const {mesh,standY}=buildPadMesh(type,r,opts.flower);
  mesh.position.set(x,opts.y!=null?opts.y:0.05,z); scene.add(mesh);
  const pad={mesh,radius:r,standY,basePos:mesh.position.clone(),sway:Math.random()*Math.PI*2,
    key,type,flower:!!opts.flower,dolphin:!!opts.dolphin};
  if(mesh.userData.spinGem) pad.spinGem=mesh.userData.spinGem;
  if(mesh.userData.wheel) pad.wheel=mesh.userData.wheel;
  pads.push(pad); return pad;

// Lay out every course sequentially along -Z so the path is always full.
(function buildCourses(){
  let z=4, x=0;
  COURSES.forEach((course,ci)=>{
    const zStart=z;
    // entry platform (slightly larger, no flower)
    const entry=spawnPad(course.key,z,x,ci===0?1.4:1.1,{alt:0});
    const ringChance = (course.key==='HelveticaAqua'||course.key==='RetroApple')?0.28:0.10;
    for(let i=1;i<course.len;i++){
      const dz=2.7+Math.random()*2.6; z-=dz;
      x=Math.max(-4,Math.min(4,x+(Math.random()-0.5)*2.6));
      let r=0.72+Math.random()*0.5;
      const flower=Math.random()<0.16;
      // a dolphin-ride pad mid-Aqua (wide gap, you ride across)
      let opts={alt:i%2,flower};
      if(course.key==='HelveticaAqua' && i===Math.floor(course.len*0.55)){
        z-=2.0; // bigger gap before the ride
        const d=spawnPad(course.key,z,x,1.0,{type:'__dolphin'});
        continue;
      }
      // waterfall updraft (Jungle) launches you straight up — wide & easy to land
      if(course.key==='JungleAero' && i===Math.floor(course.len*0.5)){ opts={type:'updraft'}; r=1.5; }
      // moving glass walkway (Cybercore) carries you forward
      else if(course.key==='Cybercore' && i===Math.floor(course.len*0.5)){ opts={type:'walkway'}; r=1.6; }
      // occasional springy mochi pad — dark-blue in the watery/icy courses, cyan elsewhere
      else if(Math.random()<0.12 && i>1 && i<course.len-1){
        opts={type:(course.key==='HelveticaAqua'||course.key==='Cybercore')?'springb':'spring'}; }
      // vertical variation (more 3D): Cybercore climbs a hump, Goal ascends, others bump
      let ey=0.05;
      if(course.key==='Cybercore'){ ey=0.05+Math.max(0,Math.sin(i/course.len*Math.PI))*2.4; }
      else if(course.key==='ClearGoal'){ ey=0.05+(i/course.len)*1.8; }
      else if(Math.random()<0.18){ ey=0.05+Math.random()*0.9; }
      opts.y=ey;
      const pad=spawnPad(course.key,z,x,r,opts);
      // far-left / far-right LANDABLE side platforms (reachable via a left/right tap).
      // some are SHORTCUTS that fling you further ahead.
      if(!opts.type && i>1 && course.key!=='ClearGoal' && Math.random()<0.30){
        const sdir=Math.random()<0.5?-1:1;
        const sx=Math.max(-9,Math.min(9,x+sdir*(4.5+Math.random()*2.5)));
        const sp=spawnPad(course.key,z-1.0,sx,0.95,{alt:i%2,y:0.05+Math.random()*0.4});
        sp.side=sdir<0?'left':'right';
        sp.shortcut=Math.random()<0.4;   // ~40% of side pads = shortcut boost
        // a ring over the side area (leap through it on the way out/back)
        const rg2=makeRing(1.1); const ry2=sp.basePos.y+1.5+Math.random()*0.6;
        rg2.position.set(sx,ry2,z-1.0); world.add(rg2);
        rings.push({group:rg2,pos:new THREE.Vector3(sx,ry2,z-1.0),radius:1.1,passed:false});
      }
      // floating ring over some gaps
      if(Math.random()<ringChance){
        const rg=makeRing(1.1);
        const rx=x+(Math.random()-0.5)*1.0, rz=z+dz*0.5, ry=1.5+Math.random()*0.8;
        rg.position.set(rx,ry,rz); rg.rotation.y=0; world.add(rg);
        rings.push({group:rg,pos:new THREE.Vector3(rx,ry,rz),radius:1.1,passed:false});
      }
      // heart pickup — sits just above a platform so it's ALWAYS reachable
      if(!opts.type && Math.random()<0.12){
        const h=makeHeart(); const hy=pad.basePos.y+pad.standY+0.95;
        h.position.set(x,hy,z); world.add(h);
        hearts3d.push({group:h,pos:new THREE.Vector3(x,hy,z),collected:false,baseScale:h.scale.x});
      }
      // G4-Cube collectible — also just above a platform (reachable). Random kind.
      else if(!opts.type && Math.random()<0.16){
        const kind=KIND_IDS[Math.floor(Math.random()*KIND_IDS.length)];
        const cb=makeG4Cube(kind); const cy=pad.basePos.y+pad.standY+1.0;
        cb.position.set(x,cy,z); world.add(cb);
        cubes3d.push({group:cb,pos:new THREE.Vector3(x,cy,z),kind,collected:false});
      }
    }
    const zEnd=z;
    buildDecorFor(course.key,(zStart+zEnd)/2,zStart,zEnd);
    courseAnchors.push({key:course.key,name:course.name,glyph:course.glyph,index:ci,zStart,zEnd,entryPad:entry});
    z-=4.5; // gap between courses
  });
})();

// Palette anchors for environment interpolation
const P = courseAnchors.map(a=>PALETTES[a.key]);
const courseCenters = courseAnchors.map(a=>(a.zStart+a.zEnd)/2);
function envIndexT(z){
  const c=courseCenters;
  if(z>=c[0]) return [0,0];
  if(z<=c[c.length-1]) return [c.length-1,0];
  for(let i=0;i<c.length-1;i++){ if(z<=c[i]&&z>=c[i+1]){ return [i,(c[i]-z)/(c[i]-c[i+1])]; } }
  return [0,0];
}
const _tmpC=new THREE.Color();
function applyEnv(z){
  const [i,t]=envIndexT(z); const a=P[i], b=P[Math.min(i+1,P.length-1)];
  skyU.topColor.value.lerpColors(a.sky.top,b.sky.top,t);
  skyU.midColor.value.lerpColors(a.sky.mid,b.sky.mid,t);
  skyU.horizonCol.value.lerpColors(a.sky.horizon,b.sky.horizon,t);
  skyU.sunDir.value.lerpVectors(a.sky.sunDir,b.sky.sunDir,t).normalize();
  skyU.sunColor.value.lerpColors(a.sky.sunCol,b.sky.sunCol,t);
  waterMat.color.lerpColors(a.water.color,b.water.color,t);
  waterMat.attenuationColor.lerpColors(a.water.atten,b.water.atten,t);
  waterMat.transmission=THREE.MathUtils.lerp(a.water.transmission,b.water.transmission,t);
  waterMat.roughness=THREE.MathUtils.lerp(a.water.roughness,b.water.roughness,t);
  waterMat.metalness=THREE.MathUtils.lerp(a.water.metalness,b.water.metalness,t);
  depthMat.color.lerpColors(a.water.deep,b.water.deep,t);
  sun.color.lerpColors(a.light.sunCol,b.light.sunCol,t); sun.intensity=THREE.MathUtils.lerp(a.light.sunInt,b.light.sunInt,t);
  hemi.color.lerpColors(a.light.hemiSky,b.light.hemiSky,t); hemi.groundColor.lerpColors(a.light.hemiGround,b.light.hemiGround,t); hemi.intensity=THREE.MathUtils.lerp(a.light.hemiInt,b.light.hemiInt,t);
  fill.color.lerpColors(a.light.fillCol,b.light.fillCol,t); fill.intensity=THREE.MathUtils.lerp(a.light.fillInt,b.light.fillInt,t);
  scene.fog.color.lerpColors(a.fog.color,b.fog.color,t); scene.fog.density=THREE.MathUtils.lerp(a.fog.density,b.fog.density,t);
  renderer.toneMappingExposure=THREE.MathUtils.lerp(a.exposure,b.exposure,t);
  const cl=THREE.MathUtils.lerp(a.cloud,b.cloud,t);
  for(const c of clouds){ if(c.material.uniforms?.opacity) c.material.uniforms.opacity.value=cl; }
  _tmpC.lerpColors(a.playerAtten,b.playerAtten,t);
  player.traverse(o=>{ if(o.material&&o.material.attenuationColor) o.material.attenuationColor.copy(_tmpC); });
}

  mush:'assets/pluck2.aiff',                           // step on glass mushroom

  mall:'assets/PassthroughReveal.wav',                 // pass through the mall
  heart:'assets/ScreenOff.aiff',                       // receive a heart
  ring:'assets/Reorder-1.aiff',                         // ring → fly far
  dolphin:'assets/Calibration_tone_success.wav',       // ride a dolphin
  ipod:'assets/Tock.caf',                              // land on an iPod
  cube:'assets/Spatial_Profile_Scan_Lock-1.wav',       // land on a glass cube
  trash:'assets/Trash.m4a',                            // delete an item in the trash
  clear:'assets/MU_Out18a.m4a',                        // clear complete
};
const SND_OSX='assets/OSX.wav';   // golden-dolphin invincibility ride (~39s, loaded on demand)
let muted=false;
/* ★親(Shake to Shake)で音楽が再生中の間は、Aero LEAPのSFXを無音化しBGMを1sでフェードアウト。止めたら1sで戻す。 */
let extMuted=false;
function setExtMuted(on){ on=!!on; if(extMuted===on) return; extMuted=on;
  if(on){ rampMaster(0,1.0); for(const k in loopEls){ try{ loopEls[k].setVol(0); }catch(e){} } }   // 1sで無音へ(SFXはextMutedで即遮断)
  else if(!muted){ rampMaster(MUSIC_VOL,1.0); if(curTrack&&loopEls[curTrack]){ try{ loopEls[curTrack].setVol(MUSIC_VOL); loopEls[curTrack].play(); }catch(e){} } } }   // 音楽を止めたら1sで戻す(手動muteでなければ)
try{ window.addEventListener('message', function(e){ var d=e&&e.data; if(!d||typeof d!=='object') return;
  if(d.type==='s2s:extmusic'){ setExtMuted(!!d.playing); } }); }catch(e){}
function trackForCourse(ci){ const key=courseAnchors[ci]&&courseAnchors[ci].key; return (key==='Cybercore'||key==='RetroApple')?'loop2':'loop1'; }

// SFX — preloaded HTMLAudio, cloned on play so they can overlap
const sfxEls={};
const SFX_KEYS=['jump','djump','land','landL','landR','get','place','bigjump','spring','mush','bridge','mall','ipod','cube','trash','heart','ring','dolphin','clear'];
function preloadSfx(){ for(const k of SFX_KEYS){ try{ const a=new Audio(SND[k]); a.preload='auto'; sfxEls[k]=a; }catch(e){} } }
function sfx(name,vol=0.7){ if(muted||extMuted||state.goldRide||!sfxEls[name]) return; try{ const a=sfxEls[name].cloneNode(); a.volume=vol; a.play().catch(()=>{}); }catch(e){} }
function sfxGet(){ sfx('get',0.7); }

// BGM
const WEB_AUDIO_OK=(location.protocol!=='file:');
let actx=null, masterGain=null; const buffers={}; let curTrack=null, curSrc=null, curGain=null;
const loopEls={};   // file:// fallback — dual-element crossfade loopers
function elFade(outEl,inEl,ms,done){ const t0=performance.now(),vo=outEl.volume,vt=muted?0:MUSIC_VOL;
  (function step(){ const k=Math.min((performance.now()-t0)/ms,1); outEl.volume=Math.max(0,vo*(1-k)); inEl.volume=Math.max(0,vt*k);
    if(k<1) requestAnimationFrame(step); else { try{outEl.pause();}catch(e){} if(done)done(); } })(); }
function makeLoopEl(src){
  const a=new Audio(src), b=new Audio(src); a.preload=b.preload='auto';
  const o={cur:a,other:b,playing:false,fading:false,vol:MUSIC_VOL};
  function arm(el){ el.addEventListener('timeupdate',()=>{ if(!o.playing||el!==o.cur||o.fading) return;
    const rem=(el.duration||0)-el.currentTime;
    if(rem>0 && rem<0.5){ o.fading=true; const nx=o.other; try{nx.currentTime=0;}catch(e){} nx.volume=0; nx.play().catch(()=>{});
      elFade(el,nx,rem*1000,()=>{ o.cur=nx; o.other=el; o.fading=false; }); } }); }
  arm(a); arm(b);
  o.play=()=>{ o.playing=true; o.cur.volume=muted?0:o.vol; if(o.cur.paused) o.cur.play().catch(()=>{}); };
  o.pause=()=>{ o.playing=false; try{a.pause();b.pause();}catch(e){} };
  o.setVol=v=>{ o.vol=v; o.cur.volume=v; };
  return o;
}
async function initMusic(){
  if(actx||loopEls.loop1) return;
  if(WEB_AUDIO_OK){
    try{
      actx=new (window.AudioContext||window.webkitAudioContext)();
      masterGain=actx.createGain(); masterGain.gain.value=muted?0:MUSIC_VOL; masterGain.connect(actx.destination);
      const load=async(n,u)=>{ const ab=await fetch(u).then(r=>r.arrayBuffer()); buffers[n]=await actx.decodeAudioData(ab); };
      await Promise.all([ load('loop1',SND.loop1), load('loop2',SND.loop2) ]); return;
    }catch(e){ actx=null; masterGain=null; }
  }
  loopEls.loop1=makeLoopEl(SND.loop1); loopEls.loop2=makeLoopEl(SND.loop2);
}
function playTrack(name,fade=0.6){
  if(curTrack===name) return;
  if(actx&&buffers[name]){ curTrack=name;
    const g=actx.createGain(); g.gain.value=0; g.connect(masterGain);
    const s=actx.createBufferSource(); s.buffer=buffers[name]; s.loop=true; s.connect(g); s.start();
    const now=actx.currentTime; g.gain.linearRampToValueAtTime(1,now+fade);
    if(curGain&&curSrc){ const og=curGain,os=curSrc; og.gain.cancelScheduledValues(now); og.gain.setValueAtTime(og.gain.value,now);
      og.gain.linearRampToValueAtTime(0,now+fade); setTimeout(()=>{ try{os.stop();}catch(e){} },(fade+0.1)*1000); }
    curGain=g; curSrc=s; return;
  }
  if(loopEls[name]){ const prev=curTrack; curTrack=name;
    if(prev&&loopEls[prev]) loopEls[prev].pause();
    loopEls[name].setVol(muted?0:MUSIC_VOL); loopEls[name].play();
  }
}
function rampMaster(to,sec=0.4){ if(actx&&masterGain){ const g=masterGain.gain,n=actx.currentTime; g.cancelScheduledValues(n); g.setValueAtTime(g.value,n); g.linearRampToValueAtTime(to,n+sec); }
  else { const le=curTrack&&loopEls[curTrack]; if(le){ if(to<=0) le.pause(); else { le.setVol(to); le.play(); } } } }
function startAudio(){ preloadSfx(); initMusic().then(()=>{ if(actx&&actx.state==='suspended') actx.resume(); if(!muted){ rampMaster(MUSIC_VOL,0.1); playTrack(trackForCourse(0),0.8); } }); }
function setMuted(m){ muted=m; if(muteGlyph) muteGlyph.textContent=m?'♪̸':'♪'; rampMaster(m?0:MUSIC_VOL,0.3);
  if(m){ for(const k in loopEls) loopEls[k].pause(); }
  else if(curTrack&&loopEls[curTrack]){ loopEls[curTrack].setVol(MUSIC_VOL); loopEls[curTrack].play(); } }

// ---- placement via raycast onto the ground plane ----
const rayc=new THREE.Raycaster();
const groundPlane=new THREE.Plane(new THREE.Vector3(0,1,0),0);
const _ndc=new THREE.Vector2(), _hit=new THREE.Vector3();
function screenToGround(cx,cy){ _ndc.x=cx/window.innerWidth*2-1; _ndc.y=-(cy/window.innerHeight*2-1);
  rayc.setFromCamera(_ndc,camera); return rayc.ray.intersectPlane(groundPlane,_hit)?_hit.clone():null; }
// placement point: on top of an existing placed item if one is hit, else the ground
function placePoint(cx,cy){ _ndc.x=cx/window.innerWidth*2-1; _ndc.y=-(cy/window.innerHeight*2-1); rayc.setFromCamera(_ndc,camera);
  const meshes=placed.map(p=>p.mesh); const hits=meshes.length?rayc.intersectObjects(meshes,true):[];
  if(hits.length) return hits[0].point.clone();   // stack on the rooftop / surface
  return rayc.ray.intersectPlane(groundPlane,_hit)?_hit.clone():null; }
function placeAt(pt){
  if(!selectedKind) return;
  const k=KINDS[selectedKind]; if(!k) return;
  if(!k.free){ if((inventory[selectedKind]||0)<=0) return; inventory[selectedKind]--; }   // emoji is unlimited
  const baseY=Math.max(0,pt.y||0);   // stack on whatever surface was hit (stairs rooftop etc.)
  const built=k.make();
  if(k.platform){
    const mesh=built.mesh; const py=baseY+(k.air?(1.8+Math.random()*2.4):0.05); mesh.position.set(pt.x,py,pt.z); scene.add(mesh);
    const pad={mesh,radius:k.r||1.0,standY:built.standY,basePos:mesh.position.clone(),sway:Math.random()*6.28,key:'placed',type:'placed',kind:selectedKind,landSfx:k.landSfx,flower:false};
    if(mesh.userData.wheel) pad.wheel=mesh.userData.wheel;
    pads.push(pad); placed.push({pad,mesh,kind:selectedKind});
  } else if(k.ring){
    const mesh=built; mesh.position.set(pt.x,baseY+1.6,pt.z); world.add(mesh);
    const rg={group:mesh,pos:mesh.position.clone(),radius:((KINDS[selectedKind]&&KINDS[selectedKind].ringR)||1.1),passed:false}; if(KINDS[selectedKind]&&KINDS[selectedKind].mode2d) rg.mode2d=true; rings.push(rg); placed.push({mesh,ring:rg,kind:selectedKind});
  } else if(k.pickup){
    const mesh=built; mesh.position.set(pt.x,baseY+1.0,pt.z); world.add(mesh);
    const rec={mesh,pos:mesh.position.clone(),kind:k.pickup,collected:false,baseScale:mesh.scale.x}; pickups.push(rec); placed.push({mesh,pickup:rec,kind:selectedKind});
  } else {
    const mesh=built; const py=baseY+(k.air?(1.8+Math.random()*2.2):0); mesh.position.set(pt.x,py,pt.z); mesh.rotation.y=Math.random()*6.28; world.add(mesh);
    if(k.air){ mesh.userData.float={p:Math.random()*6.28,y:py}; dynamic.push(mesh); }  // floats in the air
    const rec={mesh,kind:selectedKind};
    if(k.building){ const bp={mesh,radius:1.7,standY:0.1,basePos:new THREE.Vector3(pt.x,baseY+0.05,pt.z),sway:Math.random()*6.28,key:'placed',type:'placed',kind:selectedKind,building:true,flower:false}; pads.push(bp); rec.pad=bp; }  // land at the building's base
    placed.push(rec);
  }
  sfx('place',0.7); renderDock(); saveCourse();
}
// ★作ったコース(placed[])をlocalStorageに保持＝アプリを閉じても残る(進捗とは別キー)
function saveCourse(){ try{ var arr=placed.map(function(p){ return {k:p.kind,x:Math.round(p.mesh.position.x*100)/100,y:Math.round((p.mesh.position.y||0)*100)/100,z:Math.round(p.mesh.position.z*100)/100}; }).filter(function(o){return o.k&&KINDS[o.k];}); localStorage.setItem('aeroleap_course',JSON.stringify(arr)); }catch(e){} }
function removePlaced(pl){
  if(pl.pad){ const pi=pads.indexOf(pl.pad); if(pi>=0)pads.splice(pi,1); }
  if(pl.pickup){ const ki=pickups.indexOf(pl.pickup); if(ki>=0)pickups.splice(ki,1); }
  if(pl.ring){ const ri=rings.indexOf(pl.ring); if(ri>=0)rings.splice(ri,1); }
  const di=dynamic.indexOf(pl.mesh); if(di>=0) dynamic.splice(di,1);   // floating bubbles etc.
  scene.remove(pl.mesh); world.remove(pl.mesh);
  const i=placed.indexOf(pl); if(i>=0) placed.splice(i,1);
  saveCourse();
}
function pickPlaced(cx,cy){
  _ndc.x=cx/window.innerWidth*2-1; _ndc.y=-(cy/window.innerHeight*2-1); rayc.setFromCamera(_ndc,camera);
  const meshes=placed.map(p=>p.mesh); const hits=rayc.intersectObjects(meshes,true);
  if(!hits.length) return null; let o=hits[0].object; while(o&&!meshes.includes(o)) o=o.parent;
  return placed.find(p=>p.mesh===o)||null;
}
function hitPlayer(cx,cy){ _ndc.x=cx/window.innerWidth*2-1; _ndc.y=-(cy/window.innerHeight*2-1); rayc.setFromCamera(_ndc,camera);

// ============================================================
// Jump physics
// ============================================================
function computeTarget(power){
  const fwd=2.0+power*5.5;
  let best=null,bestErr=Infinity;
  for(const p of pads){ const dz=player.position.z-p.basePos.z; if(dz<1.0||dz>fwd+2.8) continue;
    const dxp=p.basePos.x-player.position.x;
    let err=Math.abs(dz-fwd)+Math.abs(dxp)*0.4;
    if(state.aimDir!==0){ const side=Math.sign(dxp);
      err += (side===state.aimDir && Math.abs(dxp)>0.4)? -2.6 : 2.2; } // strongly focus the tapped side
    if(err<bestErr){bestErr=err;best=p;} }
  let tx=player.position.x, tz=player.position.z-fwd, ty=0.1;
  if(best&&bestErr<3.4){ const lx=state.aimDir!==0?0.93:0.65;
    tx=THREE.MathUtils.lerp(tx,best.basePos.x,lx); tz=THREE.MathUtils.lerp(tz,best.basePos.z,0.85); ty=best.basePos.y+best.standY; }
  return {x:tx,z:tz,y:ty,peak:1.0+power*1.4};
}
function updateTraj(power){
  const t=computeTarget(power); const s=player.position.clone(); const end=new THREE.Vector3(t.x,t.y,t.z);
  for(let i=0;i<trajDots.length;i++){ const u=(i+1)/(trajDots.length+1);
    const x=THREE.MathUtils.lerp(s.x,end.x,u), z=THREE.MathUtils.lerp(s.z,end.z,u), y=s.y+(4*t.peak*u*(1-u));
    trajDots[i].position.set(x,y,z); trajDots[i].visible=true; const f=Math.sin(u*Math.PI);
    trajDots[i].scale.setScalar(0.5+f*0.9); trajDots[i].material.opacity=0.3+f*0.6; }
  landMark.position.set(end.x,end.y+0.05,end.z); landMark.visible=true;
  const willLand=pads.some(p=>{const dx=end.x-p.basePos.x,dz=end.z-p.basePos.z;return Math.sqrt(dx*dx+dz*dz)<p.radius*0.9;});
  landMark.material.color.set(willLand?0xb0ffa0:0xff9aa0);
}
function hideTraj(){ for(const d of trajDots) d.visible=false; landMark.visible=false; }

let jumpAnim=null;
function startJump(power){
  if(state.gameOver) return;
  const t=computeTarget(power);
  jumpAnim={from:player.position.clone(),to:new THREE.Vector3(t.x,t.y,t.z),peak:t.peak,progress:0,duration:0.55+power*0.35,power};
  state.isJumping=true; state.hasDouble=false; hideTraj(); sfx('jump',0.6);
}
function doubleJump(){
  if(!jumpAnim||state.hasDouble) return; state.hasDouble=true;
  const fwd=2.6; let best=null,bestErr=Infinity;
  for(const p of pads){ const dz=player.position.z-p.basePos.z; if(dz<0.5||dz>fwd+3.0) continue;
    const dxp=p.basePos.x-player.position.x;
    let err=Math.abs(dz-fwd)+Math.abs(dxp)*0.4;
    if(state.aimDir!==0){ const side=Math.sign(dxp); err += (side===state.aimDir && Math.abs(dxp)>0.4)? -2.6 : 2.2; }
    if(err<bestErr){bestErr=err;best=p;} }
  let tx=player.position.x,tz=player.position.z-fwd,ty=0.1;
  if(best&&bestErr<3.6){ const lx=state.aimDir!==0?0.95:0.7; tx=THREE.MathUtils.lerp(tx,best.basePos.x,lx); tz=THREE.MathUtils.lerp(tz,best.basePos.z,0.92); ty=best.basePos.y+best.standY; }
  jumpAnim={from:player.position.clone(),to:new THREE.Vector3(tx,ty,tz),peak:0.95,progress:0,duration:0.55,power:0.5,isDouble:true};
  spawnSplash(player.position.clone().add(new THREE.Vector3(0,-0.05,0)),0xd0f2ff,14); sfx('djump',0.7);
}

function finishJump(){
  const land=player.position; let on=null;
  for(const p of pads){ const dx=land.x-p.basePos.x,dz=land.z-p.basePos.z; if(Math.sqrt(dx*dx+dz*dz)<p.radius*0.95){on=p;break;} }
  if(on&&on!==currentPad){
    currentPad=on; state.padsCleared++; state.combo++; if(state.combo>state.best)state.best=state.combo;
    let earn=50+state.combo*10; const wasFlower=on.flower;
    if(wasFlower){ earn+=200; on.flower=false; on.mesh.userData.flower=false;
      on.mesh.traverse(c=>{ if(c.userData&&c.userData.isFlower) c.visible=false; });
      spawnSplash(on.basePos.clone().add(new THREE.Vector3(0,0.2,0)),0xffd0e0,18);
    }
    state.score+=earn; spawnSplash(on.basePos.clone().add(new THREE.Vector3(0,0.05,0)),0xc8eaff,8);
    showPop('+'+earn+(wasFlower?' 🌸':''), land.clone().add(new THREE.Vector3(0,1,0)));
    // landing sound — left/right side objects get their own note
    sfx(on.side==='left'?'landL':on.side==='right'?'landR':(on.landSfx||({ipod:'ipod',cube:'cube'}[on.type])||'land'), 0.7);
    updateHUD();
    // side shortcut pad → fling further ahead
    if(on.shortcut){ jumpAnim=null; springLaunch(on,2.6,false); return; }
    // dolphin ride: carry player across to the next pad
    if(on.type==='dolphinride'){ startRide(on); state.isJumping=false; jumpAnim=null; return; }
    // spring mochi (course) or springy vine: bounce to the next platform
    if(isSpring(on.type)||on.kind==='vine'){ jumpAnim=null; springLaunch(on,on.kind==='vine'?2.3:1.9,false); return; }
    // waterfall / fountain updraft: BIG launch (course type or placed ⛲️)
    if(on.type==='updraft'||on.kind==='updraft'){ jumpAnim=null; springLaunch(on,5.2,true); return; }
    // moving walkway carries you forward automatically (course or placed)
    if(on.type==='walkway'||on.kind==='walkway'){ jumpAnim=null; springLaunch(on,0.9,false); return; }
    // soap bubble: bounce into another jump, then POP (change height via air bubbles)
    if(on.kind==='bubble'){ jumpAnim=null; const pl=placed.find(p=>p.pad===on);
      const hasNext=pads.some(p=>on.basePos.z-p.basePos.z>0.3);
      spawnSplash(on.basePos.clone(),0xbfe8ff,28); springLaunch(on,1.7,false);
      if(pl && hasNext) removePlaced(pl); return; }
    // placed mochi: BIG jump — auto-fly to a nearby building if there is one
    if(on.kind==='mochi'){ jumpAnim=null; bigMochiLaunch(on); return; }
    // glass staircase: climb UP — carries you to the highest pad ahead
    if(on.kind==='stairs'||on.type==='stairs'){ jumpAnim=null; stairsUp(on); return; }
    // CLEAR — last platform of the final course
    if(on.isGoal && !state.cleared){ triggerClear(); state.isJumping=false; jumpAnim=null; return; }
  } else if(!on){
    if(state.cleared){ // post-clear sandbox: a miss just respawns, no death
      spawnSplash(land.clone(),0xa8d8ee,20);
      setTimeout(()=>{ player.position.copy(currentPad.basePos); player.position.y=currentPad.basePos.y+currentPad.standY+0.05; },300);
    } else {
      state.combo=0; state.hp--; updateHUD(); spawnSplash(land.clone(),0xa8d8ee,28);
      setTimeout(()=>{ if(state.hp<=0){ triggerGameOver(); return; } player.position.copy(currentPad.basePos); player.position.y=currentPad.basePos.y+currentPad.standY+0.05; },350);
    }
  }
  state.isJumping=false; jumpAnim=null;
}

// Dolphin ride — find next pad ahead and swim there in an arc
function startRide(dolPad){ rideFrom(dolPad.mesh, dolPad.basePos.clone()); }
// ride any dolphin mesh from a position → carry the player to the next pad ahead
function rideFrom(mesh,fromPos){
  if(state.riding||state.goldRide) return;
  let next=null,bestDz=Infinity;
  for(const p of pads){ const dz=fromPos.z-p.basePos.z; if(dz>0.3&&dz<bestDz){bestDz=dz;next=p;} }
  if(!next) return;
  state.riding={from:fromPos.clone(),to:next.basePos.clone(),toPad:next,dol:mesh,home:mesh.position.clone(),progress:0,duration:2.6};
  sfx('dolphin',0.8); playTrack('loop2',0.5);
}

// Spring (mochi) / updraft (waterfall) — auto-launch to the next pad.
function springLaunch(pad,peak,water){
  state.isJumping=true; state.hasDouble=true; // lock input during the brief wind-up
  pad.squish=performance.now();
  sfx(water?'bigjump':'spring', water?0.95:0.7);   // waterfall big-jump / mochi spring
  spawnSplash(pad.basePos.clone().add(new THREE.Vector3(0,pad.standY+(water?0.4:0),0)), water?0xbfe8ff:0x9ff0ff, water?28:16);
  let next=null,bestDz=Infinity;
  // updraft can throw you several pads ahead (big jump)
  const reach=water?3:1; let cnt=0;
  for(const p of pads){ const dz=pad.basePos.z-p.basePos.z; if(dz>0.3&&dz<bestDz){bestDz=dz;next=p;} }
  if(water){ // pick a pad a few ahead for a long arc
    const ahead=pads.filter(p=>pad.basePos.z-p.basePos.z>0.3).sort((a,b)=>(pad.basePos.z-a.basePos.z)-(pad.basePos.z-b.basePos.z));
    if(ahead.length) next=ahead[Math.min(2,ahead.length-1)];
  }
  if(!next){ state.isJumping=false; return; }
  setTimeout(()=>{ if(state.gameOver) return;
    if(travelAnim) return;
    jumpAnim={from:player.position.clone(),to:new THREE.Vector3(next.basePos.x,next.basePos.y+next.standY,next.basePos.z),peak:peak,progress:0,duration:water?1.0:0.6,power:0.7};
    state.isJumping=true; state.hasDouble=false;
  },170);
}
// glass staircase: climb up — carry the player to the highest pad ahead
function stairsUp(pad){
  state.isJumping=true; state.hasDouble=true; pad.squish=performance.now(); sfx('cube',0.6);
  spawnSplash(pad.basePos.clone().add(new THREE.Vector3(0,pad.standY,0)),0x9fe8ff,16);
  let next=null,best=-1e9;
  for(const p of pads){ if(p===pad) continue; const dz=pad.basePos.z-p.basePos.z; if(dz>0.3&&dz<12 && p.basePos.y>best){ best=p.basePos.y; next=p; } }
  if(!next){ for(const p of pads){ const dz=pad.basePos.z-p.basePos.z; if(dz>0.3){ next=p; break; } } }
  if(!next){ state.isJumping=false; return; }
  const rise=Math.max(0,next.basePos.y-pad.basePos.y);
  setTimeout(()=>{ if(state.gameOver||travelAnim) return;
    jumpAnim={from:player.position.clone(),to:new THREE.Vector3(next.basePos.x,next.basePos.y+next.standY,next.basePos.z),peak:2.0+rise*0.5,progress:0,duration:0.95,power:0.9};
    state.isJumping=true; state.hasDouble=false;
  },170);
}
// placed mochi: BIG jump; if a building (its base pad) is nearby, auto-fly there
function bigMochiLaunch(pad){
  let target=null,bd=Infinity;
  for(const p of pads){ if(p===pad||!p.building) continue; const dz=pad.basePos.z-p.basePos.z; if(dz<-3) continue;
    const d=pad.basePos.distanceTo(p.basePos); if(d<18 && d<bd){bd=d;target=p;} }
  if(!target){ springLaunch(pad,2.8,false); return; }     // no building → just a big jump
  state.isJumping=true; state.hasDouble=true; pad.squish=performance.now(); sfx('spring',0.8);
  spawnSplash(pad.basePos.clone().add(new THREE.Vector3(0,pad.standY,0)),0x9ff0ff,18);
  setTimeout(()=>{ if(state.gameOver||travelAnim) return;
    jumpAnim={from:player.position.clone(),to:new THREE.Vector3(target.basePos.x,target.basePos.y+target.standY,target.basePos.z),peak:3.2,progress:0,duration:1.0,power:0.9};
    state.isJumping=true; state.hasDouble=false;
  },170);
}

function isHudTarget(t){ return t && t.closest && t.closest('.hud,.rail,.actions,.over,.dot,.ctl,.dock,.modebtn,.trash'); }
function onDown(e){
  if(!state.started||justStarted) return;
  if(isHudTarget(e.target)) return;
  // build mode
  if(buildMode){ const hit=pickPlaced(e.clientX,e.clientY);
    if(trashMode){ if(hitPlayer(e.clientX,e.clientY)){ openRestartDialog(); return; } if(hit) deletePlaced(hit); return; }   // trash-mode: tap player → restart confirm; tap item → delete
    if(hit){ const now=performance.now();
      if(lastPick.pl===hit && now-lastPick.t<350){ cycleScale(hit); lastPick={pl:null,t:0}; return; }   // double-tap → scale
      lastPick={pl:hit,t:now}; dragPl=hit; return; }      // drag → move
    const pt=placePoint(e.clientX,e.clientY); if(pt&&selectedKind) placeAt(pt); return; }
  if(state.gameOver||travelAnim||state.riding||state.goldRide) return;  // gold ride steers via pointer, no jump
  // press the right 30% (≥70%) → focus a right-side object; left 30% → left object
  const w=window.innerWidth, cx=(e.clientX!=null?e.clientX:w/2);
  state.aimDir = cx>=w*0.70 ? 1 : cx<=w*0.30 ? -1 : 0;
  if(state.isJumping){ doubleJump(); hideHint(); return; }
  state.isCharging=true; state.chargeStart=performance.now(); state.power=0; hideHint();
}
function onUp(e){
  if(!state.isCharging) return;
  state.isCharging=false; chargeEl.classList.remove('show');
  const dur=performance.now()-state.chargeStart; startJump(Math.min(dur/1100,1));
}
window.addEventListener('pointerdown',onDown);
window.addEventListener('pointerup',onUp);
window.addEventListener('pointercancel',onUp);
window.addEventListener('blur',()=>{ if(state.isCharging){state.isCharging=false;chargeEl.classList.remove('show');hideTraj();} });
let hintShown=false;
function hideHint(){ if(hintShown){ hintEl.classList.remove('show'); hintShown=false; } }

window.addEventListener('keydown',e=>{ if((e.key==='n'||e.key==='N')&&state.started&&!state.gameOver) travelTo(courseAnchors.length-1); });

// ============================================================
// Main loop
// ============================================================
const clock=new THREE.Clock();
function tick(){
  const dt=Math.min(clock.getDelta(),0.05); const t=clock.elapsedTime;
  waterU.time.value=t;
  sky.position.copy(camera.position);
  cloudGroup.position.z=camera.position.z;
  if(state.started) applyEnv(player.position.z);
  if(bgOverride){ skyU.topColor.value.copy(bgOverride.top); skyU.midColor.value.copy(bgOverride.mid); skyU.horizonCol.value.copy(bgOverride.horizon); if(scene.fog) scene.fog.color.copy(bgOverride.mid); }

  // billboards
  scene.traverse(o=>{ if(o.userData&&o.userData.billboard) o.lookAt(camera.position.x,o.position.y,camera.position.z); });
  world.traverse(o=>{ if(o.userData&&o.userData.billboard) o.lookAt(camera.position.x,o.position.y,camera.position.z); });

  // pads bob/animate (vertical base = p.basePos.y so elevated pads work)
  for(const p of pads){ p.sway+=dt; const px=p.basePos.x,pz=p.basePos.z,by=p.basePos.y;
    if(p.type==='bubble'||p.type==='drop'){ p.mesh.position.y=by+Math.sin(t*0.8+p.sway)*0.09; p.mesh.rotation.y+=dt*0.12; }
    else if(p.type==='cube'||p.type==='imac'||p.type==='ipod'){ p.mesh.position.y=by+Math.sin(t*0.7+p.sway)*0.05;
      if(p.spinGem) p.spinGem.rotation.y+=dt*1.2;
      if(p.wheel) p.wheel.rotation.z+=dt*(currentPad===p?3.4:0.6); } // wheel spins fast while ridden
    else if(p.type==='dolphinride'){ p.mesh.position.y=by+0.35+Math.sin(t*1.0+p.sway)*0.1;
      p.mesh.lookAt(p.basePos.x,p.mesh.position.y,p.basePos.z-2); } // face forward
    else if(isSpring(p.type)){ let k=Math.sin(t*4+p.sway)*0.1;
      if(p.squish){ const e=(performance.now()-p.squish)/300; if(e<1) k=-0.45*(1-e); else p.squish=0; }
      p.mesh.scale.set(p.radius*(1-k*0.5), p.radius*0.55*(1+k), p.radius*(1-k*0.5));
      p.mesh.position.y=by+Math.abs(Math.sin(t*2+p.sway))*0.03; }
    else if(p.type==='updraft'){ if(p.mesh.userData.jet) p.mesh.userData.jet.uniforms.time.value=t; p.mesh.position.y=by; }
    else if(p.type==='shell'){ p.mesh.position.y=by+Math.sin(t*0.7+p.sway)*0.04; p.mesh.rotation.y+=dt*0.1; }
    else if(p.type==='walkway'){ if(p.mesh.userData.belt) p.mesh.userData.belt.uniforms.time.value=t; p.mesh.position.y=by+Math.sin(t*0.6+p.sway)*0.03; }
    else if(p.type==='placed'){ p.mesh.position.y=by+Math.sin(t*0.7+p.sway)*0.04;
      if(p.mesh.userData.belt) p.mesh.userData.belt.uniforms.time.value=t;   // placed walkway belt
      if(p.wheel) p.wheel.rotation.z+=dt*(currentPad===p?3:0.5); }
    else if(p.type==='coral'||p.type==='rock'){ p.mesh.position.y=by+Math.sin(t*0.6+p.sway)*0.03; }
    else { const h=Math.sin(px*0.55+t*1.1)*0.07+Math.sin(pz*0.45+t*0.85)*0.06+Math.sin((px+pz)*0.32+t*1.5)*0.04;
      p.mesh.position.y=by+0.01+h; const dx=0.55*Math.cos(px*0.55+t*1.1)*0.07,dz=0.45*Math.cos(pz*0.45+t*0.85)*0.06;
      p.mesh.rotation.x=-Math.PI/2+dz*0.6; p.mesh.rotation.z=-dx*0.6+(p.mesh.userData.rotZ??0); }
  }

  // animated decor
  for(const o of dynamic){
    const ud=o.userData;
    if(ud.seaweed) o.rotation.z=Math.sin(t*0.7+ud.phase)*0.12;
    else if(ud.fishSchool){ const a=ud.phase+t*ud.speed;
      o.position.set(ud.base.x+Math.cos(a)*ud.radius,ud.base.y+Math.sin(a*0.6)*0.5,ud.base.z+Math.sin(a)*ud.radius*0.6);
      o.rotation.y=Math.atan2(-Math.sin(a)*ud.radius*ud.speed,Math.cos(a)*ud.radius*0.6*ud.speed)+Math.PI/2;
      for(const f of o.children){ f.rotation.z=Math.sin(t*4+f.userData.lp)*0.08; f.position.y=(f.userData.oy||0)+Math.sin(t*2+f.userData.lp)*0.08; } }
    else if(ud.swim){ const s=ud.swim; const a=s.phase+t*s.speed;
      const leap=Math.max(Math.sin(a*1.6),0);                 // periodic arc out of the water
      const pos=new THREE.Vector3(s.cx+Math.cos(a)*s.rx, s.baseY+leap*s.amp, s.cz+Math.sin(a)*s.rz);
      const a2=a+0.05;
      const ahead=new THREE.Vector3(s.cx+Math.cos(a2)*s.rx, s.baseY+Math.max(Math.sin(a2*1.6),0)*s.amp, s.cz+Math.sin(a2)*s.rz);
      o.position.copy(pos); o.lookAt(ahead);                  // nose faces travel direction (proper dive)
      o.visible = pos.y>s.baseY-0.2; }
    else if(ud.swing){ o.position.x=ud.swing.x+Math.sin(t*ud.swing.speed+ud.swing.phase)*ud.swing.amp; } // moving bridge
    else if(ud.float){ o.position.y=ud.float.y+Math.sin(t*0.8+ud.float.p)*0.4; if(ud.float.spin) o.rotation.y+=dt*ud.float.spin; }
    else if(ud.waterfall){ ud.waterfall.uniforms.time.value=t; }
    else if(ud.steps){ for(const s of ud.steps){ s.position.y=(s.position.y+dt*0.6); if(s.position.y>14*0.42) s.position.y-=14*0.42; } }
    else if(ud.wheel){ ud.wheel.rotation.z+=dt*0.6; } // free-standing iPod decor
  }

  // travel-back animation
  if(travelAnim){ travelAnim.progress+=dt/travelAnim.duration; const u=Math.min(travelAnim.progress,1);
    const eu=u<0.5?2*u*u:1-Math.pow(-2*u+2,2)/2;
    player.position.lerpVectors(travelAnim.from,travelAnim.to,eu);
    player.position.y=THREE.MathUtils.lerp(travelAnim.from.y,travelAnim.target.basePos.y+travelAnim.target.standY+0.1,eu)+Math.sin(u*Math.PI)*1.5;
    if(u>=1){ currentPad=travelAnim.target; travelAnim=null; updateHUD(); } }

  // dolphin ride
  if(state.riding){ const r=state.riding; r.progress+=dt/r.duration; const u=Math.min(r.progress,1);
    const x=THREE.MathUtils.lerp(r.from.x,r.to.x,u), z=THREE.MathUtils.lerp(r.from.z,r.to.z,u);
    const arc=Math.sin(u*Math.PI)*1.6; player.position.set(x,r.toPad.basePos.y+r.toPad.standY+0.4+arc,z);
    r.dol.position.set(x,0.4+arc*0.8,z);
    r.dol.lookAt(r.to.x, r.dol.position.y - Math.cos(u*Math.PI)*0.6, r.to.z); // face & pitch along travel
    if(u>=1){ currentPad=r.toPad; r.dol.position.copy(r.home||r.dol.position); state.riding=null;   // dolphin returns home
      playTrack(trackForCourse(curCourseIndex()),0.6); // back to the course's loop after the ride
      state.score+=120; showPop('+120 🐬',player.position.clone().add(new THREE.Vector3(0,1,0))); updateHUD(); } }

  // golden-dolphin free flight: fly forward, steer with finger, invincible
  if(state.goldRide){ const g=state.goldRide, dol=g.dol;
    const sx=(pointer.down?(pointer.x-0.5):0)*2, sy=(pointer.down?(0.5-pointer.y):0)*2;
    dol.position.z -= 7*dt;
    dol.position.x = THREE.MathUtils.clamp(dol.position.x + sx*7*dt, -34, 34);
    dol.position.y = THREE.MathUtils.clamp(dol.position.y + sy*6*dt + 0.2*dt, 0.8, 16);
    dol.lookAt(dol.position.x + sx*3, dol.position.y + sy*1.5, dol.position.z - 5);
    player.position.set(dol.position.x, dol.position.y+0.55, dol.position.z+0.15);
    player.rotation.set(0,0,0); player.scale.set(1,1,1);
    // sparkle trail
    if(Math.random()<0.5) spawnSplash(dol.position.clone(),0xffe080,3);
  }

  // trigger: touch a SELF-PLACED dolphin → ride it (gold = invincible OSX ride; blue = normal ride)
  if(state.started && !buildMode && !state.goldRide && !state.riding && performance.now()>goldCooldown){
    for(const pl of placed){
      if(pl.kind!=='goldphin' && pl.kind!=='dolphin') continue;
      if(!pl.mesh.visible) continue;
      pl.mesh.rotation.y+=dt*0.6; if(pl._by==null) pl._by=pl.mesh.position.y; pl.mesh.position.y=pl._by+Math.sin(t*1.4)*0.12;
      if(player.position.distanceTo(pl.mesh.position)<2.0){
        if(pl.kind==='goldphin') startGoldRide(pl.mesh);
        else { goldCooldown=performance.now()+1500; rideFrom(pl.mesh,pl.mesh.position.clone()); }
        break; }
    }
  }

  // rescue: if the current pad was removed (e.g. a popped bubble), snap to the nearest real pad → back to ground
  if(state.started && !state.isJumping && !travelAnim && !state.riding && !state.goldRide && pads.indexOf(currentPad)<0){
    let best=pads[0],bd=Infinity; for(const p of pads){ const d=player.position.distanceTo(p.basePos); if(d<bd){bd=d;best=p;} }
    currentPad=best;
  }
  // idle pose on pad
  if(state.started && !state.isJumping && !travelAnim && !state.riding && !state.goldRide){
    const padTop=currentPad.mesh.position.y+currentPad.standY;
    player.position.y=padTop+Math.sin(t*1.6)*0.025;
    player.position.x=THREE.MathUtils.lerp(player.position.x,currentPad.basePos.x,1-Math.pow(0.001,dt));
    player.position.z=THREE.MathUtils.lerp(player.position.z,currentPad.basePos.z,1-Math.pow(0.001,dt));
    head.rotation.y=Math.sin(t*0.8)*0.18; body.rotation.z=Math.sin(t*1.1)*0.04;
    armL.rotation.x=Math.sin(t*1.2)*0.1; armR.rotation.x=-Math.sin(t*1.2)*0.1;
  }

  // charging
  if(state.isCharging&&!state.isJumping){
    const dur=performance.now()-state.chargeStart; state.power=Math.min(dur/1100,1);
    chargeEl.classList.add('show'); chargeFill.style.width=(state.power*100)+'%'; updateTraj(state.power);
    player.scale.y=1-state.power*0.18; player.scale.x=player.scale.z=1+state.power*0.07;
  } else if(!state.isJumping){ player.scale.lerp(new THREE.Vector3(1,1,1),1-Math.pow(0.001,dt)); }

  // jump arc
  if(jumpAnim){ jumpAnim.progress+=dt/jumpAnim.duration; const u=Math.min(jumpAnim.progress,1);
    const x=THREE.MathUtils.lerp(jumpAnim.from.x,jumpAnim.to.x,u), z=THREE.MathUtils.lerp(jumpAnim.from.z,jumpAnim.to.z,u);
    const gy=THREE.MathUtils.lerp(jumpAnim.from.y,jumpAnim.to.y,u), arc=4*jumpAnim.peak*u*(1-u);
    player.position.set(x,gy+arc,z);
    head.rotation.x=-Math.sin(u*Math.PI)*0.3; body.rotation.x=-Math.sin(u*Math.PI)*0.25;
    armL.rotation.z=0.35+Math.sin(u*Math.PI)*0.5; armR.rotation.z=-0.35-Math.sin(u*Math.PI)*0.5;
    player.scale.y=1-Math.sin(u*Math.PI)*0.05;
    // ring pass check → bonus + fly far
    for(const rg of rings){ if(rg.passed) continue;
      const dx=player.position.x-rg.pos.x, dy=player.position.y-rg.pos.y, dz=player.position.z-rg.pos.z;
      if(Math.abs(dz)<0.5 && Math.sqrt(dx*dx+dy*dy)<rg.radius*0.85){ rg.passed=true; state.score+=80; state.combo++; if(rg.mode2d){ try{ window.__aero2D&&window.__aero2D(); }catch(e){} setTimeout(function(){ rg.passed=false; },1600); }
        spawnSplash(rg.pos.clone(),0x9fe8ff,16); showPop('+80 ◎⇢',rg.pos.clone()); updateHUD(); sfx('ring',0.85);
        // boost: launch far ahead in one go
        const ahead=pads.filter(p=>player.position.z-p.basePos.z>1).sort((a,b)=>(player.position.z-a.basePos.z)-(player.position.z-b.basePos.z));
        if(ahead.length){ const tg=ahead[Math.min(3,ahead.length-1)];
          jumpAnim={from:player.position.clone(),to:new THREE.Vector3(tg.basePos.x,tg.basePos.y+tg.standY,tg.basePos.z),peak:2.6,progress:0,duration:0.95,power:1}; state.hasDouble=false; }
      } }
    if(u>=1){ head.rotation.x=0; body.rotation.x=0; player.scale.set(1,1,1); finishJump(); }
  }

  // ring pulse + spin
  for(const rg of rings){ if(rg.group.userData.spin) rg.group.userData.spin.rotation.z+=dt*0.5;
    rg.group.scale.setScalar((rg.passed&&!rg.mode2d)?THREE.MathUtils.lerp(rg.group.scale.x,0.001,0.2):1+Math.sin(t*3+rg.pos.x)*0.04); }

  // heart pickups — spin/bob; touch bursts (どっと広がり) and heals +1 (max 5)
  for(const h of hearts3d){
    if(h.collected){ h.group.scale.multiplyScalar(0.82); if(h.group.scale.x<0.03) h.group.visible=false; continue; }
    h.group.rotation.y+=dt*1.6; h.group.position.y=h.pos.y+Math.sin(t*2+h.pos.x)*0.18;
    if(state.started&&!state.gameOver&&!buildMode&&state.hp<state.hpMax && player.position.distanceTo(h.pos)<1.45){
      h.collected=true; state.hp=Math.min(state.hp+1,state.hpMax);
      spawnSplash(h.pos.clone(),0xff90b0,30); showPop('+♥', h.pos.clone()); updateHUD(); sfx('heart',0.8);
    }
  }

  // G4-Cube collectibles — spin, bob; touch adds to the Dock
  for(const cb of cubes3d){
    if(cb.collected){ cb.group.scale.multiplyScalar(0.8); if(cb.group.scale.x<0.03) cb.group.visible=false; continue; }
    cb.group.rotation.y+=dt*0.8; if(cb.group.userData.inner) cb.group.userData.inner.rotation.y-=dt*1.2;
    cb.group.position.y=cb.pos.y+Math.sin(t*1.5+cb.pos.x)*0.16;
    if(state.started&&!state.gameOver&&!buildMode && player.position.distanceTo(cb.pos)<1.55){
      cb.collected=true; collectCube(cb.kind); spawnSplash(cb.pos.clone(),0xbfe6ff,24); showPop(KINDS[cb.kind].emoji, cb.pos.clone());
    }
  }
  // placed pickups (coins / hearts from the builder)
  for(const pk of pickups){
    if(pk.collected){ pk.mesh.scale.multiplyScalar(0.8); if(pk.mesh.scale.x<0.03) pk.mesh.visible=false; continue; }
    pk.mesh.rotation.y+=dt*1.6; pk.mesh.position.y=pk.pos.y+Math.sin(t*2+pk.pos.x)*0.16;
    if(state.started&&!state.gameOver&&!buildMode && player.position.distanceTo(pk.pos)<1.45){
      pk.collected=true;
      if(pk.kind==='coin'){ state.score+=50; showPop('+50 🪙',pk.pos.clone()); spawnSplash(pk.pos.clone(),0xffe0a0,20); sfxGet(); }
      else { if(state.hp<state.hpMax) state.hp=Math.min(state.hp+1,state.hpMax); showPop('+♥',pk.pos.clone()); spawnSplash(pk.pos.clone(),0xff90b0,24); sfx('heart',0.8); }
      updateHUD();
    }
  }

  // shadow
  shadow.position.set(player.position.x,0.04,player.position.z);
  const haw=Math.max(player.position.y-0.1,0); shadow.scale.setScalar(0.55+haw*0.25);
  shadow.material.opacity=0.22/(1+haw*0.4);

  // double-jump ring
  if(state.isJumping&&!state.hasDouble){ dRing.visible=true; dRing.position.set(player.position.x,player.position.y-0.18,player.position.z);
    dRing.rotation.z=t*0.8; dRing.material.opacity=0.45+Math.sin(t*5)*0.25; dRing.scale.setScalar(1+Math.sin(t*5)*0.08);
  } else dRing.visible=false;

  // splash particles
  for(let i=splash.length-1;i>=0;i--){ const s=splash[i]; s.position.addScaledVector(s.userData.v,dt*60);
    s.userData.v.y-=dt*0.5; s.userData.life--; s.scale.multiplyScalar(0.97);
    if(s.userData.life<=0||s.scale.x<0.05||s.position.y<-1){ scene.remove(s); splash.splice(i,1); } }

  // chase camera
  const camTarget=new THREE.Vector3(player.position.x*0.5,player.position.y+3.1,player.position.z+6.5);   // ★視点を少し引く=プレイヤー全退場が見やすい(従来 +2.6/+5.4)
  camera.position.lerp(camTarget,1-Math.pow(0.001,dt));
  camera.lookAt(player.position.x*0.6,player.position.y+0.5,player.position.z-3.4);

  renderer.render(scene,camera);
  requestAnimationFrame(tick);
}
tick();

window.addEventListener('resize',()=>{ renderer.setSize(window.innerWidth,window.innerHeight,false);
  camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); });

// ============================================================
// Restart
// ============================================================
function restart(){
  state.score=0; state.padsCleared=0; state.combo=0; state.best=0; state.hp=START_HP;
  state.isJumping=false; state.isCharging=false; state.hasDouble=false; state.gameOver=false; state.riding=null; state.cleared=false;
  jumpAnim=null; travelAnim=null;
  // re-arm rings, hearts, cubes & pickups & flowers (keep inventory + your built island)
  for(const rg of rings){ rg.passed=false; rg.group.scale.setScalar(1); rg.group.visible=true; }
  for(const h of hearts3d){ h.collected=false; h.group.visible=true; h.group.scale.setScalar(h.baseScale||1); }
  for(const cb of cubes3d){ cb.collected=false; cb.group.visible=true; cb.group.scale.setScalar(1); }
  for(const pk of pickups){ pk.collected=false; pk.mesh.visible=true; pk.mesh.scale.setScalar(pk.baseScale||1); }
  if(buildMode){ buildMode=false; buildBtn.classList.remove('on'); selectedKind=null; }
  hideDock(); modeBtns.classList.toggle('show',everCleared); buildBtn.classList.toggle('avail',everCleared);
  currentPad=pads[0]; player.position.copy(currentPad.basePos); player.position.y=currentPad.basePos.y+currentPad.standY+0.1;
  state.maxCourse=0; rebuildRailLocks(); updateHUD(); saveProg();
  overEl.classList.remove('show');
  if(!muted){ rampMaster(MUSIC_VOL,0.5); playTrack(trackForCourse(0),0.5); }
  hintEl.classList.add('show'); hintShown=true;
}
el('againBtn').addEventListener('click',restart);

      var l=document.createElement('div'); l.textContent=label; l.style.cssText='font-size:12px;font-weight:600;color:#fff;text-shadow:0 1px 3px rgba(0,30,70,.5);font-family:-apple-system,system-ui,sans-serif;';
      var s=document.createElement('input'); s.type='range'; s.min=mn; s.max=mx; s.step=step; s.value=val; s.style.cssText='width:100%;accent-color:#7ce6ff;';
      wrap.appendChild(l); wrap.appendChild(s); return s; }
    var sB=mkRow('明るさ',0.5,1.6,1,0.01), sS=mkRow('色彩度',0,2,1,0.01);
    function apply(){ if(cv) cv.style.filter='brightness('+parseFloat(sB.value)+') saturate('+parseFloat(sS.value)+')'; }
    sB.addEventListener('input',apply); sS.addEventListener('input',apply);
    panel.appendChild(sB.parentNode); panel.appendChild(sS.parentNode);
    /* パネルをボタンの右隣に置く(左バー上なので右へ開く)。画面下にはみ出す時は上方向へクランプ */
    function positionPanel(){ try{ var r=btn.getBoundingClientRect(); panel.style.left=(r.right+12)+'px'; var ph=panel.offsetHeight||130; var t=r.top; if(t+ph>window.innerHeight-12) t=Math.max(12,window.innerHeight-12-ph); panel.style.top=t+'px'; }catch(_){} }
    var open=false; btn.addEventListener('click',function(e){ try{ e.preventDefault(); e.stopPropagation(); }catch(_){} open=!open; if(open) positionPanel(); panel.style.opacity=open?'1':'0'; panel.style.pointerEvents=open?'auto':'none'; panel.style.transform='translateX('+(open?'0':'-8px')+')'; });
    if(rail){ rail.insertBefore(btn, rail.firstChild); }   // ★railの先頭=🪷(最上部コースドット)の上に配置
    else { btn.style.position='fixed'; btn.style.left='max(14px,env(safe-area-inset-left,14px))'; btn.style.top='max(14px,env(safe-area-inset-top,14px))'; document.body.appendChild(btn); }
    document.body.appendChild(panel); }
  _addFxBtn();
  setInterval(function(){ try{ var sb=document.getElementById('aeroShareBtn'); if(!sb) return; var has=false; try{ has=!!(window.__aeroSerializeCourse&&window.__aeroSerializeCourse().length>0); }catch(_){} var bb=document.getElementById('buildBtn'); sb.style.display=(has||(bb&&bb.classList.contains('on')))?'block':'none'; }catch(e){} }, 700);   // ★コース(置いた物)があれば常に共有→ボタン表示=編集中でなくても友達に送れる
}catch(e){}

</script>
