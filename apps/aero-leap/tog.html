<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>iOS電源オフスライダ（カーテンoverlay型）</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      height: 100vh; width: 100vw;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      overflow: hidden;
    }
    .slider-wrapper {
      position: relative;
      width: 310px;
      height: 64px;
      z-index: 2;
      transform: scale(1);
      will-change: transform;
      transition: opacity 0.5s cubic-bezier(.62,0,.4,1);
    }
    .slider-wrapper.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    .slider-track {
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      box-shadow:
        inset 1px -1px 11px rgb(255 255 255 / 12%),
        inset 1px -1px 55px rgb(255 255 255 / 11%),
        1px -1px 1px rgb(243 243 243 / 62%),
        -1px 1px 1px rgb(225 225 225 / 62%),
        0 2px 18px #0000000d;
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 64px;
      background: rgb(60 60 60 / 0%);
      border-radius: 36px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      overflow: visible;
    }
    .slider-inner-track {
      position: absolute;
      top: 0; left: -5px;
      height: 64px;
      border-radius: 36px;
      z-index: 1;
      transform: scale(0.9);
      transition: width 0.13s;
      pointer-events: none;
    }
    .slider-label {
      position: absolute;
      left: 88px;
      top: 0;
      height: 64px;
      line-height: 64px;
      color: #fff;
      font-size: 19px;
      font-weight: 500;
      letter-spacing: 1px;
      z-index: 2;
      opacity: 0.83;
      transition: opacity 0.2s;
      user-select: none;
      pointer-events: none;
      text-shadow: 0 2px 10px #000b;
    }
    .slider-knob {
      position: absolute;
      top: 4px;
      left: 4px;
      width: 56px;
      height: 56px;
      background: #ffffff8c;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 33px;
      font-weight: bold;
      z-index: 10;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      border: none;
      outline: none;
      box-shadow:
        1px -1px 1px rgb(255 255 255 / 62%),
        -1px 1px 1px rgb(255 255 255 / 62%),
        0 2px 18px #00000015;
      will-change: box-shadow, left, background;
      cursor: pointer;
      user-select: none;
      transition:
        background 0.5s cubic-bezier(.62,0,.4,1),
        box-shadow 0.5s cubic-bezier(.62,0,.4,1),
        left 0.5s cubic-bezier(.62,0,.4,1);
    }
    .slider-knob:active {
      background: #ebebeb5c;
      box-shadow:
        1px 1px 1px rgb(255 255 255 / 62%),
        -1px -1px 1px rgb(255 255 255 / 62%);
    }
    .slider-arrow-polyline {
      transition:
        stroke 0.3s cubic-bezier(.62,0,.4,1),
        stroke-width 0.3s cubic-bezier(.62,0,.4,1),
        filter 0.3s cubic-bezier(.62,0,.4,1);
    }
    .slider-knob.active .slider-arrow-polyline {
      stroke: #1552be;
      stroke-width: 3.2;
      filter: drop-shadow(0 0 7px #2579F7);
    }
    .slider-knob:not(.active) .slider-arrow-polyline {
      stroke: #2579F7;
      stroke-width: 2.6;
      filter: none;
    }
    .black-overlay {
      pointer-events: none;
      position: fixed;
      left: 0; top: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      opacity: 0;
      z-index: 1;
      transition: opacity 0.5s cubic-bezier(.62,0,.4,1);
      will-change: opacity;
    }
    .black-overlay.active {
      opacity: 0.70 !important;
      pointer-events: all;
    }
  </style>
</head>
<body>
  <div class="slider-wrapper" id="sliderWrapper">
    <div class="slider-track">
      <div class="slider-inner-track" id="sliderInner"></div>
      <div class="slider-label" id="sliderLabel">スライドでSpin</div>
    </div>
    <div class="slider-knob" id="sliderKnob">
      <svg id="knobSVG" width="32" height="32" viewBox="0 0 32 32">
        <polyline 
          class="slider-arrow-polyline"
          points="12,8 20,16 12,24" 
          fill="none" 
          stroke="#2579F7" 
          stroke-width="2.6"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </div>
  </div>
  <div class="black-overlay" id="blackOverlay"></div>
  <audio id="audioGrab" src="./VolumeModule_Sliders_Grab.wav" preload="auto"></audio>
  <audio id="audioRelease" src="./VolumeModule_Sliders_Release.wav" preload="auto"></audio>
  <script type="module">
    import { haptic } from "https://esm.sh/ios-haptics";
    const wrapper = document.getElementById('sliderWrapper');
    const knob = document.getElementById('sliderKnob');
    const svg = document.getElementById('knobSVG');
    const inner = document.getElementById('sliderInner');
    const label = document.getElementById('sliderLabel');
    const overlay = document.getElementById('blackOverlay');
    const audioGrab = document.getElementById("audioGrab");
    const audioRelease = document.getElementById("audioRelease");
    const arrow = knob.querySelector('.slider-arrow-polyline');

    let isDragging = false;
    let isMouseDrag = false;
    let startX = 0;
    let knobX = 0;
    let lastX = 0;
    let knobWidth = 56;
    let wrapperWidth = 340;
    let maxOffset = 340 - 56 - 4;
    let lockedOnce = false;
    const ua = navigator.userAgent;
    const isiPhone = /iPhone/i.test(ua);
    let lockStart = isiPhone ? true : false;
    let canHaptic = ('ontouchstart' in window || navigator.maxTouchPoints > 0) && /(iPhone|iPad|iPod|iOS|AppleWebKit)/i.test(ua);

    function doHaptic(fn) {
      if (!canHaptic) return Promise.resolve();
      try {
        let result = fn();
        if (result && typeof result.then === "function") return result;
        return Promise.resolve();
      } catch {
        return Promise.resolve();
      }
    }
    function ultraErrorBurst() { for (let i = 0; i < 5; i++) setTimeout(() => doHaptic(() => haptic.error()), i * 30);}
    function rapidErrorBurst() { for (let i = 0; i < 9; i++) setTimeout(() => doHaptic(() => haptic.error()), i * 45);}
    function selectionHaptic() { doHaptic(() => haptic.selection()); }

    function updateSizes() {
      knobWidth = knob.offsetWidth;
      wrapperWidth = wrapper.offsetWidth;
      maxOffset = wrapperWidth - knobWidth - 4;
    }
    window.addEventListener("resize", updateSizes);
    window.addEventListener("DOMContentLoaded", updateSizes);

    function setKnobPos(x) {
      knob.style.left = `${x}px`;
      inner.style.width = `${72 + x}px`;
      label.style.opacity = `${1 - x / maxOffset}`;
    }

    function playAudio(audio) {
      audio.pause();
      audio.currentTime = 0;
      audio.play().catch(() => {});
    }

    function knobActive(val) {
      if(val) knob.classList.add("active");
      else knob.classList.remove("active");
    }

    function unlockForiPhone() {
      if (lockStart && isiPhone) {
        doHaptic(() => haptic());
        lockStart = false;
        knob.classList.remove("ios-shadow");
      }
    }

    svg.addEventListener("touchstart", e => {
      if (!isiPhone || !lockStart) return;
      e.stopPropagation();
      unlockForiPhone();
    });
    svg.addEventListener("mousedown", e => {
      if (!isiPhone || !lockStart) return;
      e.stopPropagation();
      unlockForiPhone();
    });

    knob.addEventListener("touchstart", e => {
      if (isiPhone && lockStart) return;
      if (e.touches && e.touches.length > 0) knobDragStart(e.touches[0].clientX);
    });
    knob.addEventListener("mousedown", e => {
      if (isiPhone && lockStart) return;
      knobDragStart(e.clientX);
      document.body.style.userSelect = "none";
    });

function knobDragStart(clientX) {
  updateSizes();
  const nowLeft = parseFloat(knob.style.left) || 0;
  if (nowLeft > 10) return;
  isDragging = true;
  startX = clientX;
  knobX = 0;
  lastX = 0;
  knob.style.transition = "none";
  inner.style.transition = "none";
  overlay.classList.add("active");
  knobActive(true);
  playAudio(audioGrab);
  doHaptic(() => haptic.selection()); // ← 追加
  requestAnimationFrame(updateKnob);
}



svg.addEventListener("mousedown", e => {
  if (isiPhone && lockStart) return;
  e.stopPropagation();
  doHaptic(() => haptic.selection()); // 👈 ここ追加
  knobDragStart(e.clientX);
  document.body.style.userSelect = "none";
});

svg.addEventListener("touchstart", e => {
  if (isiPhone && lockStart) return;
  e.stopPropagation();
  doHaptic(() => haptic.selection()); // 👈 ここも追加
  if (e.touches && e.touches.length > 0) knobDragStart(e.touches[0].clientX);
});


    function updateKnob() {
      if (!isDragging) return;
      setKnobPos(knobX);
      requestAnimationFrame(updateKnob);
    }

    wrapper.addEventListener("touchmove", e => {
      if (!isDragging || (isiPhone && lockStart)) return;
      const clientX = e.touches[0].clientX;
      let dx = clientX - startX;
      if (dx < 0) dx = 0;
      knobX = Math.max(0, Math.min(dx, maxOffset));
      if (Math.abs(knobX - lastX) > 2) {
        selectionHaptic();
        lastX = knobX;
      }
    });

    window.addEventListener("mousemove", e => {
      if (!isDragging || (isiPhone && lockStart)) return;
      let dx = e.clientX - startX;
      if (dx < 0) dx = 0;
      knobX = Math.max(0, Math.min(dx, maxOffset));
    });

    function onSlideComplete() {
      if (!lockedOnce) {
        lockedOnce = true;
        overlay.classList.add("active");
        setTimeout(() => {
          ultraErrorBurst();
          wrapper.classList.add("fade-out");
          setTimeout(() => {
            window.location.href = "https://apple.com";
          }, 500);
        }, 20);
      }
    }

    function onSlideFail() {
      rapidErrorBurst();
      knob.style.transition = "left 0.5s cubic-bezier(.62,0,.4,1)";
      knob.style.left = "4px";
      knobX = 0;
      inner.style.transition = "width 0.13s";
      inner.style.width = "72px";
      label.style.transition = "opacity 0.2s";
      label.style.opacity = 1;
      overlay.classList.remove("active");
    }

function endDrag() {
  if (!isDragging || (isiPhone && lockStart)) return;
  isDragging = false;
  knobActive(false);
  playAudio(audioRelease);
 doHaptic(() => haptic.impact()); // ← 追加：指を離した瞬間フィードバック！

  if (knobX >= maxOffset * 0.9) onSlideComplete();
  else onSlideFail();

  document.body.style.userSelect = "";
}


    wrapper.addEventListener("touchend", endDrag);
    window.addEventListener("mouseup", endDrag);
    wrapper.addEventListener('touchcancel', endDrag);
    window.addEventListener("mouseleave", endDrag);

    if (isiPhone && lockStart) {
      knob.classList.add("ios-shadow");
    }
  </script>
</body>
</html>
