# Netlify config — 静的ホスティングのみ（サーバー処理なし＝完全無料）
[build]
  publish = "."

# セキュリティヘッダ（流出/クリックジャッキング対策）。
# ・frame-ancestors 'self'：同一オリジンの埋め込み(iframe)は許可・外部からの埋め込み(クリックジャッキング)は禁止。
# ・App Check(reCAPTCHA)用に connect-src へ www.google.com / www.gstatic.com を許可。
# ・Monaco(VS Mode) を jsdelivr から読むため script/worker/font/connect を最小限だけ開放。
# ★WebAuthn Related Origin Requests: Netlifyで作ったパスキーを pages.dev からも使えるようにする
#   (rpId=shake-to-shake.netlify.app のまま、このファイルが許可オリジンを列挙。iOS18+/Chrome128+)
[[headers]]
  for = "/.well-known/webauthn"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "max-age=300"

# ★StS CLI一式のzip: どこから開いても「表示」ではなく必ずダウンロードになる(PWA/Safari/Mac共通)
[[headers]]
  for = "/apps/stscli.zip"
  [headers.values]
    Content-Type = "application/zip"
    Content-Disposition = 'attachment; filename="StS-CLI.zip"'

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    Permissions-Policy = "camera=(self), microphone=(self), geolocation=(self), interest-cohort=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://shake-to-shake.netlify.app https://www.google.com https://www.gstatic.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://itunes.apple.com https://esm.sh; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' data: https://cdn.jsdelivr.net; img-src 'self' data: blob: https:; media-src 'self' blob: https://audio-ssl.itunes.apple.com https://video-ssl.itunes.apple.com https://*.mzstatic.com; connect-src 'self' blob: https://www.google.com https://www.gstatic.com https://itunes.apple.com https://rss.applemarketingtools.com https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com https://*.firebasedatabase.app wss://*.firebasedatabase.app https://*.workers.dev https://content-firebaseappcheck.googleapis.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://api.mymemory.translated.net https://api.open-meteo.com https://ja.wikipedia.org https://threejs.org https://flagcdn.com https://api.song.link https://corsproxy.io https://api.allorigins.win https://esm.sh https://*.skyway.ntt.com wss://*.skyway.ntt.com https://huggingface.co https://*.huggingface.co https://*.hf.co https://raw.githubusercontent.com https://*.r2.dev; frame-src 'self' https://www.google.com https://open.spotify.com https://w.soundcloud.com https://embed.music.apple.com https://www.youtube.com https://music.youtube.com https://*.trycloudflare.com; worker-src 'self' blob: data:; manifest-src 'self'; base-uri 'self'; form-action 'none'; frame-ancestors 'self'"

# spotlight 検索（spotlight ultra.html）は外部CDN(three.js/mathjs/翻訳mymemory/flagcdn/open-meteo/wikipedia)を使う自己完結ページ。
# このサブツリーだけ緩めのCSPにし、同一オリジン(本体チャット)からの埋め込み(frame-ancestors 'self')を許可。/* の後に置いて上書き。
[[headers]]
  for = "/spotlight/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "no-referrer"
    Content-Security-Policy = "default-src 'self' https: data: blob: 'unsafe-inline' 'unsafe-eval'; img-src 'self' https: data: blob:; media-src 'self' https: data: blob:; connect-src 'self' https:; frame-ancestors 'self'; base-uri 'self'"

# Aero LEAP（apps/aero-leap）は three.js(unpkg) を import map で読む自己完結ゲーム。
# このサブツリーだけ緩めのCSPにし、本体(同一オリジン)からの埋め込み(frame-ancestors 'self')を許可。/* の後に置いて上書き。
[[headers]]
  for = "/apps/aero-leap/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    Content-Security-Policy = "default-src 'self' https: data: blob: 'unsafe-inline' 'unsafe-eval'; img-src 'self' https: data: blob:; media-src 'self' https: data: blob:; connect-src 'self' https:; frame-ancestors 'self'; base-uri 'self'"

# Service Worker / メインHTML は常に最新を取りに行かせる（古い壊れた版を配り続けない＝「昨日の版のまま」を防ぐ）
[[headers]]
  for = "/gc-sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/app.js"
  [headers.values]
    Cache-Control = "no-cache"

# ★検索UI/アプリ一覧テンプレも常に再検証＝古い版を配り続けない（Aero LEAP追加・検索修正が即反映）。変更なしなら304で軽い。
[[headers]]
  for = "/spotlight-tpl.js"
  [headers.values]
    Cache-Control = "no-cache"

# CSS も常に再検証＝古いスタイルを配り続けない（HTML/JSと同じ扱い）。変更なしなら304で軽い。
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "no-cache"

# iTunes Search API を「同一オリジン」で中継するプロキシ（ミュージック検索用）。
# ブラウザは自分のドメイン(/itunes-api/...)としか通信しないので、CORS・コンテンツ
# ブロッカー・iCloudプライベートリレーの影響を原理的に受けない。設定だけで効く
# （関数と違いビルド不要）＝ドラッグ&ドロップでも確実。catch-all より必ず前に置く。
[[redirects]]
  from = "/itunes-api/*"
  to = "https://itunes.apple.com/:splat"
  status = 200
  force = true

# ★Netlify関数は廃止＝完全な静的ホスティング(ビルド工程ゼロ)に戻す。
#   関数ビルド(esbuild)が失敗するとデプロイが古いまま固まり、関数の実行時エラーは白背景に
#   「Error - Request ID: <id>」を出す。iTunes中継は上の /itunes-api/* リライトが本命なので関数は不要。
#   → ドラッグ&ドロップ同等の純静的デプロイ＝失敗しない／エラーページを出さない。

# 単一ページ：未知パスは index.html へ
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
