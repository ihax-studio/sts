<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!-- スマホ表示に対応させるための設定 -->
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>////</title>
  
  <style>
    /* 
      1. 全体の見た目と中央寄せの設定
    */
    body {
      /* フォント：Apple製品（iOS/Mac）の標準フォント「SF Pro」を最優先で指定 */
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
      
      /* 画面全体で要素を上下左右の「完全中央」に配置する最新の書き方 */
      display: flex;
      flex-direction: column;   /* 要素を縦並びにする */
      justify-content: center;  /* 縦方向の真ん中 */
      align-items: center;      /* 横方向の真ん中 */
      min-height: 100vh;        /* 画面の高さ100%を基準にする */
      margin: 0;                /* 周りの余計な隙間を消す */
      background-color: #f5f5f7;/* Apple風の薄いグレーの背景 */
    }

    /* 
      2. テキストのアニメーション（0.3秒で下からスライドアップ）
    */
    p {
      font-size: 22px;
      color: #1d1d1f;
      margin-bottom: 88px;
      font-weight:555;
      /* アニメーションの指定 */
      animation: slideUp 0.3s ease forwards;
    }

    /* 下から上にふわっと上がる動きの定義 */
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px); /* 20px下に配置しておく */
      }
      to {
        opacity: 1;
        transform: translateY(0);    /* 元の位置に戻る */
      }
    }

    /* 
      3. ボタンの見た目とアニメーション（0.5秒で縮小から元に戻る）
    */
    .haptic {
      padding: 12px 24px; /*上下 左右:*/
      font-size: 16px;
      font-weight: 600;
      border-radius: 22px;
      border: none;
      background: black;
      color: white;
      cursor: pointer; /* マウスを載せた時に指マークにする */
      min-width:111px;
      /* アニメーションの指定 */
      transition:transform 0.3s ease;
      animation: popIn 0.5s ease forwards;
    }

    /* 0.8倍の大きさから1倍（等倍）に大きくなる動きの定義 */
    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.8); /* 0.8倍のサイズからスタート */
      }
      to {
        opacity: 1;
        transform: scale(1);   /* 通常サイズに戻る */
      }
    }

    /*💡 このコードの意味と仕組みの解説① 
    なぜ全部が綺麗に中央に寄っているのか？元のコードの text-align: center は文字を真ん中にするだけなので
    ボタンなどの「塊（ブロック）」が画面の縦方向の真ん中にきません。今回は body に以下を指定

    display: flex;：中身の要素を自由自在に配置できるモードにします。
    flex-direction: column;：文字とボタンを「縦並び」にします。

    min-height: 100vh;：画面全体の高さをいっぱいに使います。
    これにより、画面の本当のど真ん中に要素が集まります。

    ② SF Pro フォントは特殊で、通常のフォントのようにURLから読見込めないので、font-family: -apple-system, BlinkMacSystemFont... と書き
    「端末に内蔵されているSF Proを自動で使ってね」 という命令をしています。
    
    ③ アニメーションの仕組み（@keyframes）slideUp（文字用）：画面が表示された瞬間
    文字が「透明（opacity: 0）で20px下がった状態」から、0.3秒かけて「くっきり（opacity: 1）元の位置」へ滑らかに上がります。
    popIn（ボタン用）：ボタンが「0.8倍に縮んだ状態」から、0.5秒かけて「1.0倍の本来の大きさ」へポンッと弾むように現れます。*/

  </style>
</head>
<body>

  <!-- 
    4. 画面に表示されるパーツ（HTML要素）
  -->
  <p>現在準備中</p>
  <button id="haptic" class="haptic">ボタン</button>

  <!-- 
    5. ボタンを押した時の動き（JavaScript）
  -->
  <script type="module">
    // 外部のiOS用振動（ハプティクス）ライブラリを読み込んでいます
    import { haptic } from 'ios-haptics'

    // HTMLにある「id="haptic"」がついたボタンをJavaScriptで見つけます
    const button = document.getElementById('haptic');

    // ボタンがクリックされた時に、振動の関数を実行します
    button.addEventListener('click', () => {
      haptic(); // スマホが「コツッ」と一瞬振動する
    });
  </script>

</body>
</html>
