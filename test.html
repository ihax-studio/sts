<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
<title>検索 中央寄せ テスト (test.html)</title>
<!--
  検索バーの左右中央ズレ修正の「単体テスト」ページ。index.html は一切触らず、
  ここで実機/各幅で中央を確認する用。確認できたら同じ SSOT ルールを index.html に適用する。
  修正の要点: .sp-bar を width:100%(中央の .sp コンテナ全幅) にする。
  旧: .sp-bar{width:77%} は margin:auto が無く左寄せ→ボール列(中央)とズレていた。
-->
<style>
:root{ --sp-bar:50px; }
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ height:100%; margin:0; }
body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;
  /* Frutiger Aero 風の背景（本番の雰囲気合わせ・テスト視認用） */
  background:linear-gradient(160deg,#8fd3ff 0%,#c9f0ff 40%,#eafff4 100%);
  min-height:100%;
}

/* ===== 検索レイアウトの単一ソース(SSOT) = index.html に入れる版と同一の考え方 ===== */
/* (1) 全画面フレックス親: 水平中央＋左右セーフエリア余白 */
.sp-ov{ position:fixed; inset:0; display:flex; justify-content:center; align-items:flex-start;
  padding:13vh max(14px,env(safe-area-inset-left)) 0 max(14px,env(safe-area-inset-right));
  box-sizing:border-box; }
/* (2) 検索本体: 画面に収まる固定上限幅を margin:auto で中央へ */
.sp{ position:relative; width:min(92vw,600px); max-width:600px; margin:0 auto; }
/* (3) 検索バー: 親(.sp)の全幅=常に左右中央（旧 width:77% の左寄せズレを撤廃） */
.sp-bar{ width:100%; margin:0 auto; height:var(--sp-bar); display:flex; align-items:center; gap:8px;
  padding:0 14px 0 15px; background:rgb(255 255 255 / 55%); border-radius:33px;
  backdrop-filter:blur(30px) saturate(180%); -webkit-backdrop-filter:blur(30px) saturate(180%);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.6), 0 18px 40px rgba(0,0,0,.16), inset 0 0 0 1px #fff; }
.sp-field{ position:relative; flex:1; min-width:0; height:100%; display:flex; align-items:center; }
.sp-field input{ width:100%; height:100%; border:0; outline:0; background:transparent;
  font-size:17px; font-weight:600; color:#1d1d1f; caret-color:#0a84ff; }
.sp-field input::placeholder{ color:rgba(60,60,67,.5); }
/* ボール列: バー直下・全幅中央（バーと左右端が一致するはず） */
.sp-balls{ position:absolute; left:0; right:0; width:100%; top:calc(var(--sp-bar) + 12px);
  height:var(--sp-bar); display:flex; align-items:center; justify-content:center; gap:16px; }
.sp-ball{ width:46px; height:46px; border-radius:50%; background:rgba(246,247,250,.6);
  backdrop-filter:blur(10px); box-shadow:inset 0 0 0 1px rgba(255,255,255,.7); }

/* 中央ズレの実測パネル（テスト専用・本番には入れない） */
#readout{ position:fixed; left:0; right:0; bottom:0; padding:10px 14px calc(10px + env(safe-area-inset-bottom));
  background:rgba(0,0,0,.72); color:#fff; font:13px/1.5 ui-monospace,Menlo,monospace; }
#readout b{ color:#5ee0a0; } #readout .ng{ color:#ff6b6b; }
</style>
</head>
<body>
<div class="sp-ov">
  <div class="sp" id="sp">
    <div class="sp-bar">
      <div class="sp-field"><input id="q" placeholder="検索" spellcheck="false" autocomplete="off"></div>
    </div>
    <div class="sp-balls">
      <div class="sp-ball"></div>
      <div class="sp-ball"></div>
    </div>
  </div>
</div>
<div id="readout">計測中…</div>
<script>
function measure(){
  var bar=document.querySelector('.sp-bar').getBoundingClientRect();
  var balls=document.querySelector('.sp-balls').getBoundingClientRect();
  var vw=window.innerWidth;
  var bl=Math.round(bar.left), br=Math.round(vw-bar.right);
  var centered=Math.abs(bl-br)<=1;
  var aligned=Math.abs(Math.round(bar.left)-Math.round(balls.left))<=1 && Math.abs(Math.round(bar.right)-Math.round(balls.right))<=1;
  document.getElementById('readout').innerHTML=
    '幅 '+vw+'px ／ バー左余白 '+bl+'px ・ 右余白 '+br+'px ／ '+
    '中央: '+(centered?'<b>OK ✅</b>':'<span class="ng">NG ❌</span>')+' ／ '+
    'バーとボール一致: '+(aligned?'<b>OK ✅</b>':'<span class="ng">NG ❌</span>');
}
measure(); addEventListener('resize',measure); addEventListener('orientationchange',measure);
</script>
</body>
</html>
